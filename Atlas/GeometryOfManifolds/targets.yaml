- description: $X$ is a symplectic vector field if $L_{X} \omega=0$, i.e. $i_{X} \omega$
    is closed. $X$ is Hamiltonian if $i_{X} \omega$ is exact.
  kind: definition
  location: Lecture 4, Section 1 (Hamiltonian Vector Fields)
  name: Definition 1
- description: Two forms $\omega_{0}, \omega_{1}$ are deformation equivalent if $\exists
    (\omega_{t})_{t \in [0,1]}$ a continuous family of symplectic forms, and isotopic
    if there is such a family with $[\omega_{t}]$ constant in $H^{2}(M, \mathbb{R})$.
  kind: definition
  location: Lecture 4, Section 2 (Moser's Theorem)
  name: Definition 2
- description: $\beta \in \Omega^{\ell}(U)$, $d \beta=0$, $i^{*} \beta = \left.\beta\right|_{X}=0
    \Longrightarrow \exists \mu \in \Omega^{\ell-1}(U)$, $\beta=d \mu$ and $\mu_{x}=0
    \;\forall x \in X$.
  kind: proposition
  location: Lecture 5, Section 1 (Tubular Neighborhoods)
  name: Proposition 1
- description: A standard (symplectic) basis of $(V^{2n}, \Omega)$ is a basis $(\{e_{i}\},
    \{f_{i}\})$ satisfying $\Omega(e_{i}, e_{j})=\Omega(f_{i}, f_{j})=0$ for all $i,j$,
    and $\Omega(e_{i}, f_{j})=\delta_{i,j}=-\Omega(f_{j}, e_{i})$.
  kind: definition
  location: Lecture 2, Section 2 (Symplectic Vector Spaces)
  name: Definition 3
- description: Let $X \hookrightarrow (M, \omega)$ be a Lagrangian submanifold. Then
    $NX \xrightarrow{\sim} T^{*} X$.
  kind: proposition
  location: Lecture 5, Section 1 (Tubular Neighborhoods)
  name: Proposition 2
- description: For $(M, \omega)$ compact, if $H^{1}(M, \mathbb{R})=0$, then every
    symplectomorphism of $M$ which is $C^{1}$ close to the identity has $\geq 2$ fixed
    points.
  kind: theorem
  location: Lecture 6, Section 1 (Applications)
  name: Theorem 1
- description: '$i^{*}: H^{*}(U_{1}, \mathbb{R}) \rightarrow H^{*}(X, \mathbb{R})$
    is an isomorphism.'
  kind: corollary
  location: Lecture 5, Section 1 (Tubular Neighborhoods)
  name: Corollary 1
- description: $E \subset V$ is a symplectic subspace if $\left.\Omega\right|_{E}$
    is nondegenerate, e.g. in a standard basis $E$ is the span of $(e_{1}, f_{1},
    \ldots, e_{k}, f_{k})$.
  kind: definition
  location: Lecture 2, Section 2 (Symplectic Vector Spaces)
  name: Definition 4
- description: $E \subset V$ is an isotropic (resp. coisotropic, Lagrangian) subspace
    if $E \subset E^{\Omega}$ (resp. $E^{\Omega} \subset E$, $E^{\Omega}=E$), e.g.
    in a standard basis $E$ is the span of $(e_{1}, \ldots, e_{k})$ (resp. $(e_{1},
    f_{1}, \ldots, e_{k}, f_{k}, e_{k+1}, \ldots, e_{n})$, $(e_{1}, \ldots, e_{n})$).
  kind: definition
  location: Lecture 2, Section 2 (Symplectic Vector Spaces)
  name: Definition 5
- description: The symplectic volume form is $\frac{1}{n!} \Omega^{\wedge n}$ (where
    $\Omega$ is considered as an element of $\wedge^{2}(V^{*})$).
  kind: definition
  location: Lecture 2, Section 2 (Symplectic Vector Spaces)
  name: Definition 6
- description: 'A symplectic form on $M$ is a 2-form $\omega$ (i.e. a skew-symmetric
    pairing $\omega_{p}: T_{p} M \times T_{p} M \rightarrow \mathbb{R}$ for all $p
    \in M$) which is nondegenerate (i.e. $\frac{1}{n!} \omega^{n}$ is a volume form)
    and closed (i.e. $d \omega=0$).'
  kind: definition
  location: Lecture 2, Section 3 (Symplectic Manifolds)
  name: Definition 7
- description: A symplectomorphism is a diffeomorphism $\phi:(M, \omega) \rightarrow
    (M^{\prime}, \omega^{\prime})$ s.t. $\phi^{*} \omega^{\prime}=\omega$.
  kind: definition
  location: Lecture 2, Section 3 (Symplectic Manifolds)
  name: Definition 8
- description: For $(M, \omega)$ symplectic, $X \subset (M, \omega)$ compact and Lagrangian,
    if $H^{1}(X, \mathbb{R})=0$, then every Lagrangian submanifold of $M$ which is
    $C^{1}$ close to $X$ intersects $X$ in $\geq 2$ points.
  kind: theorem
  location: Lecture 6, Section 1 (Applications)
  name: Theorem 2
- description: 'Let $(M, \omega)$ be a symplectic manifold, $H: M \rightarrow \mathbb{R}$
    a $C^{\infty}$ map, and $\rho_{t}$ the isotopy generated by the Hamiltonian vector
    field $X_{H}$. Then $\rho_{t}$ are symplectomorphisms.'
  kind: proposition
  location: Lecture 3, Section 2 (Hamiltonian Vector Fields)
  name: Proposition 3
- description: 'Let $M^{n} \supset X^{k}$ be a submanifold. Then $\exists U_{0}$ a
    neighborhood of $X$ in $NX$ (via the 0-section) and $U_{1}$ a neighborhood of
    $X$ in $M$ s.t. $\exists \phi: U_{0} \xrightarrow{\sim} U_{1}$ a diffeomorphism.'
  kind: theorem
  location: Lecture 5, Section 1 (Tubular Neighborhoods)
  name: Theorem 3
- description: 'Let $X \hookrightarrow M$ be a submanifold, $\omega_{0}, \omega_{1}$
    symplectic forms on $M$ s.t. $(\omega_{0})_{p}=(\omega_{1})_{p} \;\forall p \in
    X$. Then $\exists$ neighborhoods $U_{0}, U_{1} \supset X$ and $\phi: U_{0} \xrightarrow{\sim}
    U_{1}$ s.t. $\phi^{*} \omega_{1}=\omega_{0}$ and $\left.\phi\right|_{X}=\mathrm{id}$.'
  kind: theorem
  location: Lecture 5, Section 1 (Tubular Neighborhoods)
  name: Theorem 4 (Local Moser)
- description: 'Let $(M, \omega)$ be a symplectic manifold, $i: X \hookrightarrow
    M$ a closed Lagrangian submanifold, $i_{0}: X \rightarrow (T^{*} X, \omega_{0})$
    the zero-section. Then $\exists U_{0}$ a neighborhood of $X$ in $T^{*} X$ and
    $U$ a neighborhood of $X$ in $M$ s.t. we have a symplectomorphism $(U_{0}, \omega_{0})
    \xrightarrow{\sim} (U, \omega)$ which is the identity on $X$.'
  kind: theorem
  location: Lecture 5, Section 1 (Tubular Neighborhoods)
  name: Theorem 5 (Weinstein's Lagrangian Neighborhood)
- description: $d A^{\prime}+A^{\prime} \wedge A^{\prime}=g^{-1}(d A+A \wedge A) g$,
    i.e. $R^{\nabla}=d A+A \wedge A$ is a well-defined element of $\Omega^{2}(M, \operatorname{End}
    E)$ independently of trivialization.
  kind: proposition
  location: Symplectic Geometry, Lecture 9, Section 1 (Curvature)
  name: Proposition 2
- description: '$p_{1}(T M) \cdot[M]=3 \sigma(M)$, where $\sigma(M)$ is the signature
    of $M$ (the difference between the number of positive and negative eigenvalues
    of the intersection product $Q: H_{2}(M) \otimes H_{2}(M) \rightarrow \mathbb{Z},[A]
    \otimes[B] \mapsto[A \cap B]$ dual to the cup product on $H^{2}$).'
  kind: theorem
  location: Symplectic Geometry, Lecture 12, Section 1 (Existence of Almost-Complex
    Structures)
  name: Theorem 1
- description: $\exists$ an almost complex structure $J$ on $M^{4}$ s.t. $\alpha=c_{1}(T
    M, J) \in H^{2}(M, \mathbb{Z})$ iff $\alpha$ satisfies $\alpha^{2} \cdot[M]=2
    \chi+3 \sigma$ and $\alpha \cdot[A] \equiv Q([A],[A]) \mod 2 \forall[A] \in H_{2}(M,
    \mathbb{Z})$.
  kind: theorem
  location: Symplectic Geometry, Lecture 12, Section 1 (Existence of Almost-Complex
    Structures)
  name: Theorem 2
- description: The first Chern class of $L$ is $c_{1}(L)=\left[\frac{1}{2\pi} R^{\nabla}\right]
    \in H^{2}(M, \mathbb{R})$.
  kind: definition
  location: Symplectic Geometry, Lecture 10, Section 2 (Complex Vector Bundles and
    Chern Classes)
  name: Definition 1
- description: $M$ compact and oriented $\Longrightarrow c_{r}(E)=e(E) \in H^{2r}(M,
    \mathbb{Z})$.
  kind: proposition
  location: Symplectic Geometry, Lecture 11, Section 1 (Chern Classes)
  name: Proposition 1
- description: The total Chern form is $c(E, \nabla)=\operatorname{det}\left(I+\frac{i}{2\pi}
    R^{\nabla}\right) \in \bigoplus_{p \text{ even}} \Omega^{p}(M, \mathbb{C})$. Decomposing
    this element, we obtain projections $c_{j}(E, \nabla) \in \Omega^{2j}(M, \mathbb{C})$.
    Here $I+\frac{i}{2\pi} R^{\nabla}$ is a matrix with entries (const + 2-forms)
    in a local trivialization, and det is the usual determinant under the $\wedge$
    product.
  kind: definition
  location: Symplectic Geometry, Lecture 10, Section 2 (Complex Vector Bundles and
    Chern Classes)
  name: Definition 2
- description: $c_{1}^{2} \cdot[M]=2 \chi(M)+3 \sigma(M)$.
  kind: corollary
  location: Symplectic Geometry, Lecture 12, Section 1 (Existence of Almost-Complex
    Structures)
  name: Corollary 1
- description: The space of compatible almost-complex structures on $(M, \omega)$
    is contractible. It is the space of sections of a bundle whose fibers are contractible
    by the previous proposition.
  kind: corollary
  location: Symplectic Geometry, Lecture 8, Section 1 (Almost-complex Structures)
  name: Corollary 2
- description: For $(M, J)$ an almost-complex manifold, $\omega_{0}, \omega_{1}$ two
    symplectic forms compatible with $J$, $\omega_{t}=(1-t) \omega_{0}+t \omega_{1}$
    is symplectic and $J$-compatible $\forall t \in[0,1]$ (i.e. the space of $J$-compatible
    $\omega$ is convex).
  kind: proposition
  location: Symplectic Geometry, Lecture 8, Section 1 (Almost-complex Structures)
  name: Proposition 3
- description: If $X$ is an almost-complex submanifold in compatible $(M, \omega,
    J)$, then $X$ is symplectic (i.e. $\left.\omega\right|_{X}$ is nondegenerate).
  kind: proposition
  location: Symplectic Geometry, Lecture 8, Section 1 (Almost-complex Structures)
  name: Proposition 4
- description: $\operatorname{Sp}(2n) \cap O(2n)=\operatorname{Sp}(2n) \cap \operatorname{GL}(n,
    \mathbb{C})=O(2n) \cap \operatorname{GL}(n, \mathbb{C})=U(n)$.
  kind: proposition
  location: Symplectic Geometry, Lecture 8, Section 1 (Almost-complex Structures)
  name: Proposition 5
- description: A connection $\nabla$ on $E$ is an $\mathbb{R}$ or $\mathbb{C}$-linear
    mapping $C^{\infty}(M, E) \rightarrow C^{\infty}\left(M, T^{*} M \otimes E\right)=\Omega^{1}(M,
    E)$ s.t. $\nabla(f \sigma)=d f \cdot \sigma+f \nabla \sigma$. For $v \in T_{x}
    M$, we let $\nabla_{v}$ denote the mapping $\sigma \mapsto \nabla \sigma(v)$.
  kind: definition
  location: Symplectic Geometry, Lecture 8, Section 2 (Vector Bundles and Connections)
  name: Definition 3
- description: For $\langle\cdot, \cdot\rangle$ a Euclidean or Hermitian metric on
    $E$, $\nabla$ is compatible with the metric if $d\left\langle\sigma, \sigma^{\prime}\right\rangle=\left\langle\nabla
    \sigma, \sigma^{\prime}\right\rangle+\left\langle\sigma, \nabla \sigma^{\prime}\right\rangle$.
  kind: definition
  location: Symplectic Geometry, Lecture 8, Section 2 (Vector Bundles and Connections)
  name: Definition 4
- description: Every elliptic operator has a pseudoinverse.
  kind: theorem
  location: Lecture 16
  name: Theorem 1
- description: $\xi \in W^{s}(E)$, $L$ elliptic, $L \xi \in C^{\infty}(F) \Longrightarrow
    \xi \in C^{\infty}(E)$.
  kind: corollary
  location: Lecture 16
  name: Corollary 1
- description: $L$ elliptic $\Longrightarrow L_{s}$ is Fredholm, i.e. $\operatorname{Ker}
    L_{s}$, Coker $L_{s}$ are finite dimensional, $\operatorname{Im} L_{s}$ is closed,
    and $\operatorname{Ker} L_{s}=\operatorname{Ker} L \subset C^{\infty}(E)$.
  kind: theorem
  location: Lecture 16
  name: Theorem 2
- description: 'For $L: \Gamma(E) \rightarrow \Gamma(F)$ a differential operator,
    $P: \Gamma(F) \rightarrow \Gamma(E)$ is called a parametrix (or pseudoinverse)
    if $L \circ P-\operatorname{id}_{E}$ and $P \circ L-\operatorname{id}_{F}$ are
    smoothing operators, i.e. they extend continuously to $W^{s}(E) \rightarrow W^{s+1}(E)$.'
  kind: definition
  location: Lecture 16
  name: Definition 1
- description: 'The codifferential is the map $d^{*}=(-1)^{n(k-1)+1} * d *: \Omega^{k}(M)
    \rightarrow \Omega^{k-1}(M)$.'
  kind: definition
  location: Lecture 15, Section 1, Hodge Theory
  name: Definition 2
- description: 'The Laplacian is $\Delta=d d^{*}+d^{*} d: \Omega^{k} \rightarrow \Omega^{k}$.'
  kind: definition
  location: Lecture 15, Section 1, Hodge Theory
  name: Definition 3
- description: $*$ maps $\bigwedge^{p, q} \rightarrow \bigwedge^{n-q, n-p}$.
  kind: proposition
  location: Lecture 16
  name: Proposition 1
- description: $\Delta_{C}=J^{-1} \Delta J=d_{C} d_{C}^{*}+d_{C}^{*} d_{C}=\Delta$.
  kind: proposition
  location: Lecture 16
  name: Proposition 2
- description: If $J$ is a complex structure, $N=0$.
  kind: proposition
  location: Lecture 13, Section 1, Integrability of Almost-Complex Structures
  name: Proposition 3
- description: 'The dual map $N^{*}: \bigwedge^{0,1} T^{*} M \rightarrow \bigwedge^{2,0}
    T^{*} M$ is precisely the map $N^{*} \alpha=(d \alpha)^{(2,0)}$.'
  kind: proposition
  location: Lecture 13, Section 1, Integrability of Almost-Complex Structures
  name: Proposition 4
- description: $L$ elliptic, $\tau \in\left(\operatorname{Ker} L^{*}\right)^{\perp}=\operatorname{Im}
    L \subset C^{\infty}(F) \Longrightarrow \exists!\xi \in C^{\infty}(E)$ s.t. $L
    \xi=\tau$ and $\xi \perp \operatorname{Ker} L$.
  kind: theorem
  location: Lecture 16
  name: Theorem 3
- description: The space of harmonic forms is the set $\mathcal{H}^{k}=\left\{\alpha
    \in \Omega^{k} \mid \Delta \alpha=0\right\}$.
  kind: definition
  location: Lecture 15, Section 1, Hodge Theory
  name: Definition 4
- description: 'A differential operator of order $k$ is a linear map $L: \Gamma(E)
    \rightarrow \Gamma(F)$ s.t., locally in coordinates, $L(s)=\sum_{|\alpha| \leq
    k} A_{\alpha} \frac{\partial^{|\alpha|} s}{\partial x^{\alpha}}$ where each $A_{\alpha}$
    is a $C^{\infty}$ function with values in matrices, i.e. a local section of $\operatorname{Hom}(E,
    F)$. The symbol of $L$ is the map $\sigma_{k}: T_{x}^{*} M \ni \xi \mapsto \sum_{|\alpha|=k}
    A_{\alpha}(x) \xi_{1}^{\alpha_{1}} \cdots \xi_{n}^{\alpha_{n}} \in \operatorname{Hom}\left(E_{x},
    F_{x}\right)$. $L$ is elliptic if for every nonzero $\xi$, $\sigma(\xi)$ is an
    isomorphism.'
  kind: definition
  location: Lecture 15, Section 1, Hodge Theory
  name: Definition 5
- description: 'For $L: \Gamma(E) \rightarrow \Gamma(F)$ a differential operator,
    $P: \Gamma(F) \rightarrow \Gamma(E)$ is called a parametrix (or pseudoinverse)
    if $L \circ P-\operatorname{id}_{E}$ and $P \circ L-\operatorname{id}_{F}$ are
    smoothing operators, i.e. they extend continuously to $W^{s}(E) \rightarrow W^{s+1}(E)$.'
  kind: definition
  location: Lecture 15, Section 1, Hodge Theory
  name: Definition 6
- description: '$L$ elliptic, self-adjoint $\Longrightarrow \exists H_{L}, G_{L}:
    C^{\infty}(E) \rightarrow C^{\infty}(E)$ s.t. (1) $H_{L}$ maps $C^{\infty}(E)
    \rightarrow \operatorname{Ker}(L)$, (2) $L \circ G_{L}=G_{L} \circ L=\mathrm{id}-H_{L}$,
    (3) $G_{L}, H_{L}$ extend to bounded operators $W^{s} \rightarrow W^{s}$, and
    (4) $C^{\infty}(E)=\operatorname{Ker} L \oplus_{\perp L^{2}} \operatorname{Im}\left(L
    \circ G_{L}\right)$.'
  kind: theorem
  location: Lecture 16
  name: Theorem 4
- description: '$\exists G: \Omega^{k} \rightarrow \Omega^{k}$ and $H: \Omega^{k}
    \rightarrow \mathcal{H}^{k}=\operatorname{Ker} \Delta$ s.t. $G \Delta=\Delta G=\operatorname{id}-H$
    and $\operatorname{Im}(G \Delta)=\left(\mathcal{H}^{k}\right)^{\perp}$.'
  kind: corollary
  location: Lecture 16
  name: Corollary 2
- description: $\Omega^{k}=\mathcal{H}^{k} \oplus_{\perp L^{2}} \operatorname{Im}
    d \oplus_{\perp L^{2}} \operatorname{Im} d^{*}$.
  kind: corollary
  location: Lecture 16
  name: Corollary 3
- description: For $M$ a compact, oriented Riemannian manifold, every cohomology class
    has a unique harmonic representative.
  kind: theorem
  location: Lecture 16
  name: Theorem 5 (Hodge)
- description: For $X$ KĂ¤hler, $[L, d]=0$, $\left[L^{*}, d^{*}\right]=0$, $\left[L,
    d^{*}\right]=d_{C}$, $\left[L^{*}, d\right]=-d_{C}^{*}$.
  kind: lemma
  location: Lecture 16
  name: Lemma 1
- description: $\overline{\partial^{*}}$ is $L^{2}$-adjoint to $\bar{\partial}$, and
    $\partial^{*}$ is $L^{2}$-adjoint to $\partial$.
  kind: lemma
  location: Lecture 16
  name: Lemma 2
- description: For $M$ compact, KĂ¤hler, $H_{\bar{\partial}}^{p, q}(M)=\mathcal{H}_{\bar{\square}}^{p,
    q}=\operatorname{Ker} \bar{\square}$.
  kind: theorem
  location: Lecture 16
  name: Theorem 6
- description: $\Delta=2 \square=2 \bar{\square}$.
  kind: theorem
  location: Lecture 16
  name: Theorem 7
- description: $\Delta$ maps $\Omega^{p, q}$ to itself and $H_{dR}^{k}(M, \mathbb{C})=\mathcal{H}_{\Delta}^{k}=\bigoplus_{p+q=k}
    \mathcal{H}^{p, q}=\bigoplus_{p, q} H_{\bar{\partial}}^{p, q}(M)$.
  kind: corollary
  location: Lecture 16
  name: Corollary 4
- description: 'Let $f: M \rightarrow B$ be a compact, locally trivial symplectic
    fibration with symplectic fiber $(F, \omega_F)$ and symplectic base $(B, \omega_B)$.
    If $\exists c \in H^{2}(M, \mathbb{R})$ s.t. $c|_{F}=[\omega_{F}] \in H^{2}(F,
    \mathbb{R})$, then $\forall k \gg 0, \exists$ a symplectic form on $M$ in the
    class $c+k \cdot f^{*}[\omega_{B}]$ for which the fibers of $f$ are symplectic
    submanifolds.'
  kind: theorem
  location: Symplectic Geometry, Lecture 21, Section 2
  name: Theorem 1 (Thurston)
- description: 'If $f: M^{4} \rightarrow \Sigma^{2}$ is a Lefschetz fibration with
    $[F] \neq 0 \in H_{2}(M, \mathbb{R})$, then $M$ carries a symplectic form s.t.
    the fibers are symplectic.'
  kind: theorem
  location: Symplectic Geometry, Lecture 21, Section 2
  name: Theorem 2 (Gompf, 1998)
- description: 'A fibration $f: M \rightarrow B$ with generic fiber $(F, \omega_F)$
    a symplectic manifold is symplectic if the structure group reduces to $\operatorname{Symp}(F,
    \omega_F)$, i.e. $\exists$ local trivializations $f: f^{-1}(U_i) \cong U_i \times
    F \rightarrow U_i$ s.t., over $U_i \cap U_j$, the change of trivialization is
    a symplectomorphism.'
  kind: definition
  location: Symplectic Geometry, Lecture 21, Section 2
  name: Definition 1
- description: A Lefschetz fibration is a map $M^{4} \rightarrow \Sigma^{2}$ between
    oriented manifolds with isolated critical points modeled in oriented coordinates
    on $\mathbb{C}^{2} \rightarrow \mathbb{C}, (z_{1}, z_{2}) \rightarrow z_{1}^{2}+z_{2}^{2}$.
  kind: definition
  location: Symplectic Geometry, Lecture 21, Section 2
  name: Definition 2
- description: $\exists$ a family of sections $(\sigma_{k, p})_{k>k_{0}, p \in M}$
    which is uniformly bounded and almost-holomorphic, uniformly concentrated, and
    satisfies $|\sigma_{k, p}| \geq c>0$ on $B(p, k^{-1/2})$. Furthermore, $\exists$
    a family of holomorphic sections $(\tilde{\sigma}_{k, p})$ with $\sup|\sigma_{k,
    p}-\tilde{\sigma}_{k, p}|, \sup(k^{1/2}|\nabla \sigma_{k, p}-\nabla \tilde{\sigma}_{k,
    p}|) \leq O(\exp(-\lambda k^{1/3}))$.
  kind: proposition
  location: Symplectic Geometry, Lecture 19
  name: Proposition 1 (Donaldson)
- description: Given a family of sections $\{\sigma_{k, p}\}$ as above, $\exists\{\tilde{\sigma}_{k,
    p}\}$ holomorphic s.t. $\sup(k^{r/2}|\nabla^{r} \sigma_{k, p}-\nabla^{r} \tilde{\sigma}_{k,
    p}|) \leq C e^{-\lambda k/3}$.
  kind: proposition
  location: Symplectic Geometry, Lecture 18
  name: Proposition 2
- description: For $(M^{4}, \omega)$ symplectic, after blowing up points in $M$, we
    get $\hat{M}$ which admits a Lefschetz fibration to $S^{2}$. Here, the blowup
    is locally given by $\hat{\mathbb{C}^{2}}=\{(x, \ell) \in \mathbb{C}^{2} \times
    \mathbb{CP}^{1} \mid x \in \ell\}$.
  kind: theorem
  location: Symplectic Geometry, Lecture 21, Section 2
  name: Theorem 3 (Donaldson)
- description: $H_{1}(M, \mathbb{Z})=\mathbb{Z}^{3}$.
  kind: lemma
  location: Symplectic Geometry, Lecture 21, Section 1
  name: Lemma 1
- description: A symplectic sum is a connected sum along a codimension 2 symplectic
    submanifold.
  kind: definition
  location: Symplectic Geometry, Lecture 21, Section 3
  name: Definition 3
- description: For $(g, \mu)$ generic, $\mathcal{M}$ (if nonempty) is a smooth, compact,
    orientable manifold of dimension $d(S) = \frac{1}{4}(c_{1}(L)^{2} \cdot [X] -
    (2\chi + 3\sigma))$.
  kind: theorem
  location: Lecture 25, Section 2 (Seiberg-Witten Equations)
  name: Theorem 1
- description: The Seiberg-Witten equations are the equations $D_{A}\psi = 0 \in \Gamma(S^{-})$
    and $\gamma(F_{A}^{+}) = (\psi^{*} \otimes \psi)_{0} [+ \gamma(\mu)] \in \Gamma(\operatorname{End}(S^{+}))$,
    where $A$ is a Hermitian connection on $L = \bigwedge^{2} S^{\pm}$ (corresponding
    to a spin$^{c}$ connection $\nabla^{A}$), $\psi \in \Gamma(S^{+})$ is a section,
    $F_{A}^{+} = \frac{1}{2}(F_{A} + *F_{A}) \in i\Omega_{+}^{2}$ for $F_{A} \in i\Omega^{2}$
    the curvature of $A$, $(\psi^{*} \otimes \psi)_{0}$ is the traceless part of $\psi^{*}
    \otimes \psi$, and $\mu$ is an imaginary self-dual form fixed in advance.
  kind: definition
  location: Lecture 25, Section 2 (Seiberg-Witten Equations)
  name: Definition 1
- description: The moduli space of solutions $\mathcal{M}(S, g, \mu)$ is the set of
    solutions to the Seiberg-Witten equations modulo $\mathcal{G}$.
  kind: definition
  location: Lecture 25, Section 2 (Seiberg-Witten Equations)
  name: Definition 2
- description: 'Given a spin$^{c}$ structure and a connection, the Dirac operator
    is $D_{A}: \Gamma(S^{\pm}) \rightarrow \Gamma(S^{\pm}), D_{A}\psi = \sum_{i} \gamma(e^{i})\nabla_{e_{i}}^{A}\psi$
    for $\{e_{i}\}$ an orthonormal basis (though it is independent of choice of basis).'
  kind: definition
  location: Lecture 24, Section 3 (Dirac Operator)
  name: Definition 3
- description: 'We can represent complexified forms via $\gamma: \wedge^{*} \otimes
    \mathbb{C} \xrightarrow{\sim} \operatorname{End}(S^{+} \oplus S^{-})$. More specifically,
    we have decompositions $\wedge^{\text{even}} \otimes \mathbb{C} \cong \operatorname{End}(S^{+})
    \oplus \operatorname{End}(S^{-})$, $\wedge^{\text{odd}} \otimes \mathbb{C} \cong
    \operatorname{Hom}(S^{+}, S^{-}) \oplus \operatorname{Hom}(S^{-}, S^{+})$, with
    $\gamma(*\alpha) = \gamma(\alpha)$ on $S^{+}$ and $-\gamma(\alpha)$ on $S^{-}$
    for any $\alpha \in \wedge^{2}$, so $\operatorname{End}(S^{+}) = \mathbb{C} \oplus
    (\wedge_{+}^{2} \otimes \mathbb{C})$, $\operatorname{End}(S^{-}) = \mathbb{C}
    \oplus (\wedge_{-}^{2} \otimes \mathbb{C})$.'
  kind: lemma
  location: Lecture 24, Section 2 (Seiberg-Witten Invariants)
  name: Lemma 1
- description: The gauge group action $(A, \psi) \mapsto (A - 2df \cdot f^{-1}, f\psi)$
    preserves the solution space of the Seiberg-Witten equations, and the action of
    $\mathcal{G}$ is free unless $\psi \equiv 0$ (reducible solutions), where $\operatorname{Stab}((A,0))
    \cong S^{1}$ is the space of constant maps.
  kind: proposition
  location: Lecture 25, Section 2 (Seiberg-Witten Equations)
  name: Proposition 1
- description: If $g$ has scalar curvature $> 0$, then the SW-invariants $\equiv 0$.
  kind: theorem
  location: Lecture 25, Section 2 (Seiberg-Witten Equations)
  name: Theorem 2
- description: Every compact 4-manifold admits spin$^{c}$ structures classified up
    to 2-torsion by $c = c_{1}(S^{+}) = c_{1}(S^{-}) = c_{1}(L) \in H^{2}(X, \mathbb{Z})$,
    where $L = \det(S^{+}) = \wedge^{2} S^{+} = \wedge^{2} S^{-}$. Moreover, $c$ is
    a characteristic element, i.e. $\langle c_{1}(L), \alpha \rangle \equiv Q(\alpha,
    \alpha) \bmod 2$.
  kind: theorem
  location: Lecture 24, Section 2 (Seiberg-Witten Invariants)
  name: Theorem 3
- description: Any two spin$^{c}$ connections differ by a 1-form on $X$ of the type
    $ia \otimes \operatorname{id}_{S^{\pm}}$, and the induced connection $A$ on $L
    = \wedge^{2} S^{\pm}$ defines the spin$^{c}$ connection uniquely.
  kind: proposition
  location: Lecture 24, Section 3 (Dirac Operator)
  name: Proposition 2
- description: The Seiberg-Witten equations are the equations $D_{A}\psi = 0 \in \Gamma(S^{-})$
    and $\gamma(F_{A}^{+}) = (\psi^{*} \otimes \psi)_{0} \in \Gamma(\operatorname{End}(S^{+}))$,
    where $A$ is a Hermitian connection on $L = \wedge^{2} S^{\pm}$ (corresponding
    to a spin$^{c}$ connection on $S^{\pm}$), $\psi \in \Gamma(S^{+})$ is a section,
    $F_{A}^{+} = \frac{1}{2}(F_{A} + *F_{A}) \in i\Omega_{+}^{2}$ for $F_{A} \in i\Omega^{2}$
    the curvature of $A$, and $(\psi^{*} \otimes \psi)_{0} = \psi^{*} \otimes \psi
    - \frac{1}{2}|\psi|^{2}$ is the traceless part of $\psi^{*} \otimes \psi$.
