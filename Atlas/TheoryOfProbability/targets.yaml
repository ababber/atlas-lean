- description: For each right continuous, non-decreasing function F, tending to 0
    at -∞ and to 1 at ∞, there is a unique measure defined on the Borel sets of R
    with P((a,b]) = F(b) - F(a).
  kind: theorem
  location: Lecture 2, section 'How do we produce measures on R?'
  name: Theorem (construction of measures on R)
- description: If P is a π-system and L is a λ-system that contains P, then σ(P) ⊂
    L, where σ(A) denotes smallest σ-algebra containing A.
  kind: theorem
  location: Lecture 2, section 'π-systems and λ-systems'
  name: Theorem (π-system and λ-system)
- description: If μ is a σ-finite measure on an algebra A then μ has a unique extension
    to the σ-algebra generated by A.
  kind: theorem
  location: Lecture 2, section 'Caratheéodory Extension Theorem'
  name: Caratheéodory Extension Theorem
- description: Given F, there is a unique measure whose values on finite rectangles
    are determined by taking differences of F applied to vertices, provided that F
    is non-decreasing, right continuous, and assigns a non-negative value to each
    rectangle.
  kind: theorem
  location: Lecture 3, section 'Characterizing probability measures on R^d'
  name: Theorem (characterizing probability measures on R^d)
- description: If X^{-1}(A) ∈ F for all A ∈ A and A generates S, then X is a measurable
    map from (Ω, F) to (S, S).
  kind: theorem
  location: Lecture 3, section 'Defining random variables'
  name: Theorem (measurability from generators)
- description: 'If f and g are integrable then: (1) If f ≥ 0 a.s. then ∫ f dμ ≥ 0.
    (2) For a, b ∈ R, ∫(af + bg)dμ = a∫f dμ + b∫g dμ. (3) If g ≤ f a.s. then ∫g dμ
    ≤ ∫f dμ. (4) If g = f a.e. then ∫g dμ = ∫f dμ. (5) |∫f dμ| ≤ ∫|f| dμ.'
  kind: theorem
  location: Lecture 4, section 'Lebesgue integration'
  name: Theorem (properties of integration)
- description: 'If μ is a probability measure and φ : R → R is convex then φ(∫f dμ)
    ≤ ∫φ(f)dμ. If X is a random variable then Eφ(X) ≥ φ(EX).'
  kind: theorem
  location: Lecture 5, section 'Properties of expectation/integration'
  name: Jensen's inequality
- description: Write ||f||_p = (∫|f|^p dμ)^{1/p} for 1 ≤ p < ∞. If 1/p + 1/q = 1,
    then ∫|fg| dμ ≤ ||f||_p ||g||_q.
  kind: theorem
  location: Lecture 5, section 'Properties of expectation/integration'
  name: Hölder's inequality
- description: Consider probability measure μ and suppose |f_n| ≤ M a.s. for all n
    and some fixed M > 0, and that f_n → f in probability. Then ∫f dμ = lim_{n→∞}
    ∫f_n dμ.
  kind: theorem
  location: Lecture 5, section 'Bounded convergence theorem'
  name: Bounded convergence theorem
- description: If f_n ≥ 0 then ∫ liminf_{n→∞} f_n dμ ≤ liminf_{n→∞} ∫ f_n dμ.
  kind: lemma
  location: Lecture 5, section 'Fatou's lemma'
  name: Fatou's lemma
- description: If f_n ≥ 0 and f_n ↑ f then ∫f_n dμ ↑ ∫f dμ.
  kind: theorem
  location: Lecture 5, section 'More integral properties'
  name: Monotone convergence
- description: If f_n → f a.e. and |f_n| ≤ g for all n and g is integrable, then ∫f_n
    dμ → ∫f dμ.
  kind: theorem
  location: Lecture 5, section 'More integral properties'
  name: Dominated convergence
- description: If X_1, X_2, ... are i.i.d. real-valued random variables with expectation
    m and A_n := n^{-1} ∑_{i=1}^n X_i are the empirical means then lim_{n→∞} A_n =
    m almost surely.
  kind: theorem
  location: Lecture 6, section 'Strong law of large numbers'
  name: Theorem (strong law)
- description: Suppose $A_1, A_2, ...$ are pairwise independent and $\sum P(A_n) =
    \infty$, and write $S_n = \sum_{i=1}^n 1_{A_i}$. Then the ratio $S_n/ES_n$ tends
    a.s. to 1.
  kind: theorem
  location: Lecture 9
  name: Theorem
- description: Consider $\sigma$-finite measure spaces $(X, \mathcal{A}, \mu_1)$ and
    $(Y, \mathcal{B}, \mu_2)$. Let $\Omega = X \times Y$ and $\mathcal{F}$ be product
    $\sigma$-algebra. There is a unique measure $\mu$ on $\mathcal{F}$ with $\mu(A
    \times B) = \mu_1(A)\mu_2(B)$. If $f \ge 0$ or $\int |f| d\mu < \infty$ then $\int_{X}
    \int_{Y} f(x,y)\mu_{2}(dy)\mu_{1}(dx) = \int_{X\times Y} fd\mu = \int_{Y} \int_{X}
    f(x,y)\mu_{1}(dx)\mu_{2}(dy).$
  kind: theorem
  location: Lecture 7
  name: Fubini's theorem
- description: Let $X$ be a random variable. The moment generating function of $X$
    is defined by $M(t) = M_X(t) := E[e^{tX}]$.
  kind: definition
  location: Lecture 8
  name: Definition (moment generating function)
- description: Let $X$ be a non-negative random variable. Fix $a > 0$. Then $P\{X
    \ge a\} \le \frac{E[X]}{a}$.
  kind: theorem
  location: Lecture 8
  name: Markov's inequality
- description: If $X$ has finite mean $\mu$, variance $\sigma^2$, and $k > 0$ then
    $P\{|X - \mu| \ge k\} \le \frac{\sigma^2}{k^2}$.
  kind: theorem
  location: Lecture 8
  name: Chebyshev's inequality
- description: Let $X$ be a random variable. The characteristic function of $X$ is
    defined by $\phi(t) = \phi_X(t) := E[e^{itX}]$.
  kind: definition
  location: Lecture 8
  name: Definition (characteristic function)
- description: If $\lim_{n\to\infty}\phi_{X_n}(t)=\phi_X(t)$ for all $t$, then $X_n$
    converge in law to $X$.
  kind: theorem
  location: Lecture 8
  name: Lévy's continuity theorem
- description: If $\sum_{n=1}^{\infty} P(A_n) < \infty$ then $P(A_n \text{ i.o.})
    = 0$.
  kind: lemma
  location: Lecture 9
  name: First Borel-Cantelli lemma
- description: If $A_n$ are independent, then $\sum_{n=1}^{\infty} P(A_n) = \infty$
    implies $P(A_n \text{ i.o.}) = 1$.
  kind: lemma
  location: Lecture 9
  name: Second Borel-Cantelli lemma
- description: $X_n \to X$ in probability if and only if for every subsequence of
    the $X_n$ there is a further subsequence converging a.s. to $X$.
  kind: theorem
  location: Lecture 9, Convergence in probability subsequential a.s. convergence
  name: Theorem (convergence in probability subsequential a.s. convergence)
- description: Consider sequence of random variables $X_n$ on some probability space.
    Write $\mathcal{F}'_n = \sigma(X_n, X_{n+1}, \ldots)$ and $\mathcal{T} = \cap_n
    \mathcal{F}'_n$. $\mathcal{T}$ is called the tail $\sigma$-algebra. If $X_1, X_2,
    ...$ are independent and $A \in \mathcal{T}$ then $P(A) \in \{0, 1\}$.
  kind: theorem
  location: Lecture 10, Kolmogorov zero-one law
  name: Theorem (Kolmogorov zero-one law)
- description: Suppose $X_i$ are independent with mean zero and finite variances,
    and $S_n = \sum_{i=1}^n X_i$. Then $P(\max_{1\leq k\leq n}|S_k|\geq x)\leq x^{-2}\mathrm{Var}(S_n)=x^{-2}E|S_n|^2$.
  kind: theorem
  location: Lecture 10, Kolmogorov maximal inequality
  name: Theorem (Kolmogorov maximal inequality)
- description: 'Let $X_1, X_2, ...$ be independent and fix $A > 0$. Write $Y_i = X_i
    1_{(|X_i| \le A)}$. Then $\sum X_i$ converges a.s. if and only if the following
    are all true: (1) $\sum_{n=1}^{\infty} P(|X_n| > A)$ converges, (2) $\sum_{n=1}^{\infty}
    EY_n$ converges, (3) $\sum_{n=1}^{\infty} \mathrm{Var}(Y_n) < \infty$.'
  kind: theorem
  location: Lecture 10, Kolmogorov three-series theorem
  name: Theorem (Kolmogorov three-series theorem)
- description: Let $X_i$ be i.i.d. random variables. Write $S_n = \sum_{i=1}^n X_i$.
    Suppose each $X_i$ is 1 with probability $p$ and 0 with probability $q = 1 - p$.
    Then $\lim_{n\to\infty} P\{a \leq \frac{S_n - np}{\sqrt{npq}} \leq b\} \to \Phi(b)
    - \Phi(a)$, where $\Phi(b) - \Phi(a) = P\{a \le Z \le b\}$ when $Z$ is a standard
    normal random variable.
  kind: theorem
  location: Lecture 12, DeMoivre-Laplace limit theorem
  name: Theorem (DeMoivre-Laplace limit theorem)
- description: If $2k/\sqrt{2n} \to x$ then $P(S_{2n} = 2k) \sim (\pi n)^{-1/2} e^{-x^2/2}$.
  kind: theorem
  location: Lecture 12, Local p=1/2 DeMoivre-Laplace limit theorem
  name: Theorem (Local p=1/2 DeMoivre-Laplace limit theorem)
- description: 'The Legendre transform (or Legendre dual) of a function $\Lambda :
    \mathbb{R}^d \to \mathbb{R}$ is defined by $\Lambda^*(x) = \sup_{\lambda \in \mathbb{R}^d}
    \{(\lambda, x) - \Lambda(\lambda)\}$.'
  kind: definition
  location: Lecture 13, Legendre transform
  name: Definition (Legendre transform)
- description: If we have two probability measures $\mu$ and $\nu$ we define the total
    variation distance between them as $||\mu - \nu|| := \sup_{B} |\mu(B) - \nu(B)|$.
  kind: definition
  location: Lecture 12, Total variation norm
  name: Definition (total variation distance)
- description: Let $X$ be a random variable, $X_n$ a sequence of random variables.
    Say $X_n$ converge in distribution or converge in law to $X$ if $\lim_{n\to\infty}
    F_{X_n}(x) = F_X(x)$ at all $x \in \mathbb{R}$ at which $F_X$ is continuous. Also
    say that the $F_n = F_{X_n}$ converge weakly to $F = F_X$.
  kind: definition
  location: Lecture 12, Weak convergence
  name: Definition (weak convergence)
- description: Say $\mu_n$ are tight if for every $\epsilon$ we can find an $M$ so
    that $\mu_n[-M,M] < \epsilon$ for all $n$. Define tightness analogously for corresponding
    real random variables or distribution functions.
  kind: definition
  location: Lecture 12, Compactness
  name: Definition (tightness)
- description: Consider sequence of random variables $X_n$ on some probability space.
    Write $\mathcal{F}'_n = \sigma(X_n, X_{n+1}, \ldots)$ and $\mathcal{T} = \cap_n
    \mathcal{F}'_n$. $\mathcal{T}$ is called the tail $\sigma$-algebra. It contains
    the information you can observe by looking only at stuff arbitrarily far into
    the future.
  kind: definition
  location: Lecture 10, Kolmogorov zero-one law
  name: Definition (tail σ-algebra)
- description: If $F_n \to F_\infty$, then we can find corresponding random variables
    $Y_n$ on a common measure space so that $Y_n \to Y_\infty$ almost surely.
  kind: theorem
  location: Lecture 12, Convergence results section
  name: Theorem (Skorokhod representation)
- description: $X_n \Longrightarrow X_\infty$ if and only if for every bounded continuous
    $g$ we have $Eg(X_n) \to Eg(X_\infty)$.
  kind: theorem
  location: Lecture 12, Convergence results section
  name: Theorem (Portmanteau, weak convergence via bounded continuous functions)
- description: Suppose $g$ is measurable and its set of discontinuity points has $\mu_X$
    measure zero. Then $X_n \Longrightarrow X_\infty$ implies $g(X_n) \Longrightarrow
    g(X)$.
  kind: theorem
  location: Lecture 12, Convergence results section
  name: Theorem (continuous mapping theorem)
- description: Every sequence $F_n$ of distributions has a subsequence converging
    to a right continuous nondecreasing $F$ so that $\lim F_{n(k)}(y) = F(y)$ at all
    continuity points of $F$.
  kind: theorem
  location: Lecture 12, Compactness section
  name: Theorem (Helly's selection theorem)
- description: Every subsequential limit of the $F_n$ is the distribution function
    of a probability measure if and only if the $F_n$ are tight.
  kind: theorem
  location: Lecture 12, Compactness section
  name: Theorem (tightness and compactness)
- description: 'The rate function is a lower-semicontinuous map $I: \mathcal{X} \to
    [0, \infty]$ (the sets $\{x: I(x) \le a\}$ are closed; rate function called ''good''
    if these sets are compact). $\{\mu_n\}$ satisfy LDP with rate function $I$ and
    speed $n$ if for all $\Gamma \in \mathcal{B}$, $-\inf_{x\in\Gamma^0}I(x)\leq \liminf_{n\to\infty}\frac{1}{n}\log\mu_n(\Gamma)\leq
    \limsup_{n\to\infty}\frac{1}{n}\log\mu_n(\Gamma)\leq -\inf_{x\in\overline{\Gamma}}I(x)$.'
  kind: definition
  location: Lecture 13, General large deviation principle section
  name: Definition (rate function and large deviation principle)
- description: Let $\mu_n$ be the law of the empirical mean $A_n = \frac{1}{n} \sum_{j=1}^n
    X_j$ for i.i.d. vectors $X_1, X_2, \dots, X_n$ in $\mathbb{R}^d$ with same law
    as $X$. Define $\Lambda(\lambda) = \log \mathbb{E}e^{(\lambda,X)}$ and $\Lambda^*(x)
    = \sup_{\lambda \in \mathbb{R}^d} \{(\lambda, x) - \Lambda(\lambda)\}$. Then $\mu_n$
    satisfy LDP with convex rate function $\Lambda^*$.
  kind: theorem
  location: Lecture 13, Cramer's theorem section
  name: Theorem (Cramer's theorem)
- description: A continuous function from $\mathbb{R}$ to $\mathbb{R}$ with $\phi(1)=1$
    is a characteristic function of some probability measure on $\mathbb{R}$ if and
    only if it is positive definite.
  kind: theorem
  location: Lecture 14 / Lecture 15, Bochner's theorem
  name: Theorem (Bochner's theorem)
- description: Let $X_1, X_2, \ldots$ be i.i.d. with $EX_i = \mu$, $\operatorname{Var}(X_i)
    = \sigma^2 \in (0, \infty)$. If $S_n = X_1 + \ldots + X_n$ then $(S_n - n\mu)/(\sigma
    n^{1/2})$ converges in law to a standard normal.
  kind: theorem
  location: Lecture 15, Moments, derivatives, CLT
  name: Theorem (Central Limit Theorem)
- description: Suppose $X_{n,m}$ are independent expectation-zero random variables
    when $1 \le m \le n$ (triangular array). Suppose $\sum_{m=1}^{n} EX_{n,m}^2 \to
    \sigma^2 > 0$ and for all $\epsilon$, $\lim_{n\to\infty} E(|X_{n,m}|^2; |X_{n,m}|
    > \epsilon) = 0$. Then $S_n = X_{n,1} + X_{n,2} + \ldots + X_{n,n} \Longrightarrow
    \sigma \chi$ (where $\chi$ is standard normal) as $n \to \infty$.
  kind: theorem
  location: Lecture 16, Lindeberg-Feller theorem
  name: Theorem (Lindeberg-Feller theorem)
- description: If $X_i$ are i.i.d. with mean zero, variance $\sigma^2$, and $E|X_i|^3
    = \rho < \infty$, and $F_n(x)$ is the distribution of $(X_1 + \ldots + X_n)/(\sigma\sqrt{n})$
    and $\Phi(x)$ is the standard normal distribution, then $|F_n(x) - \Phi(x)| \le
    3\rho/(\sigma^3\sqrt{n})$.
  kind: theorem
  location: Lecture 16, Berry-Esseen theorem
  name: Theorem (Berry-Esseen theorem)
- description: Let $X_{n,m}$ be independent $\{0,1\}$-valued random variables with
    $P(X_{n,m}=1)=p_{n,m}$. Suppose $\sum_{m=1}^{n}p_{n,m}\to\lambda$ and $\max_{1\leq
    m\leq n}p_{n,m}\to 0$. Then $S_n=X_{n,1}+\ldots+X_{n,n}\Longrightarrow Z$ where
    $Z$ is $\text{Poisson}(\lambda)$.
  kind: theorem
  location: Lecture 17, Poisson convergence
  name: Theorem (Poisson convergence)
- description: If $\phi_X(\lambda) = 1$ for some $\lambda \neq 0$ then $X$ is supported
    on (some translation of) $(2\pi/\lambda)\mathbb{Z}$. When this holds but $\phi_X$
    is not identically 1 (i.e., $\phi_X$ is periodic but not identically 1) we call
    $X$ a lattice random variable.
  kind: definition
  location: Lecture 16 / Lecture 17, Local limit theorems for walks on Z
  name: Definition (lattice random variable)
- description: A Poisson random variable $X$ with parameter $\lambda$ satisfies $P\{X
    = k\} = \frac{\lambda^k}{k!}e^{-\lambda}$ for integer $k \ge 0$.
  kind: definition
  location: Lecture 17, Poisson random variables
  name: Definition (Poisson random variable)
- description: Assume $X_i$ are i.i.d. lattice random variables with $EX_i = 0$ and
    $EX_i^2 = \sigma^2 \in (0,\infty)$, supported on $b + h\mathbb{Z}$. Write $p_n(x)
    = P(S_n/\sqrt{n} = x)$ for $x \in \mathcal{L}_n := (nb + h\mathbb{Z})/\sqrt{n}$
    and $n(x) = (2\pi\sigma^2)^{-1/2}\exp(-x^2/2\sigma^2)$. Then as $n \to \infty$,
    $\sup_{x \in \mathcal{L}^n} |n^{1/2}/h \cdot p_n(x) - n(x)| \to 0$.
  kind: theorem
  location: Lecture 16, section on local limit theorems for walks on Z (also recalled
    in Lecture 17)
  name: Theorem (Local CLT for lattice random walks)
- description: Suppose that $\lim_{x\to\infty} P(X_1>x)/P(|X_1|>x)=\theta\in[0,1]$
    and $P(|X_1|>x)=x^{-\alpha}L(x)$ where $L$ is slowly varying (which means $\lim_{x\to\infty}
    L(tx)/L(x)=1$ for all $t>0$). Then $(S_n - b_n)/a_n$ converges in law to a limiting
    random variable, for appropriate $a_n$ and $b_n$ values.
  kind: theorem
  location: Lecture 18, Domain of attraction to stable random variable
  name: Theorem (Domain of attraction to stable random variable)
- description: 'If $X_i$ are i.i.d. in $\mathbb{R}$ and $S_n = \sum_{i=1}^n X_i$ is
    a random walk on $\mathbb{R}$ then one of the following occurs with probability
    one: (1) $S_n = 0$ for all $n$, (2) $S_n \to \infty$, (3) $S_n \to -\infty$, (4)
    $-\infty = \liminf S_n < \limsup S_n = \infty$.'
  kind: theorem
  location: Lecture 23, Application of Hewitt-Savage
  name: Theorem (Random walk dichotomy)
- description: Say that $T$ is a stopping time if the event that $T = n$ is in $\mathcal{F}_n$
    for $i \leq n$.
  kind: definition
  location: Lecture 23, Stopping time definition
  name: Definition (Stopping time)
- description: Let $X_1, X_2, \ldots$ be i.i.d. and $N$ a stopping time with $N <
    \infty$. Conditioned on stopping time $N < \infty$, the conditional law of $\{X_{N+n},
    n \geq 1\}$ is independent of $\mathcal{F}_n$ and has the same law as the original
    sequence.
  kind: theorem
  location: Lecture 23, Stopping time theorems
  name: Theorem (Strong Markov property for i.i.d. sequences)
- description: Given a probability space $(\Omega, \mathcal{F}_0, P)$ and a $\sigma$-field
    $\mathcal{F} \subset \mathcal{F}_0$ and a random variable $X$ measurable w.r.t.
    $\mathcal{F}_0$, with $E|X| < \infty$, the conditional expectation of $X$ given
    $\mathcal{F}$ is a random variable $Y = E(X|\mathcal{F})$ such that $Y$ is $\mathcal{F}$-measurable
    and for all $A$ in $\mathcal{F}$, $\int_A X dP = \int_A Y dP$.
  kind: definition
  location: Lecture 25, Conditional expectation
  name: Definition (Conditional expectation)
- description: Let $\mu$ and $\nu$ be $\sigma$-finite measures on $(\Omega, \mathcal{F})$.
    Say $\nu << \mu$ (or $\nu$ is absolutely continuous w.r.t. $\mu$) if $\mu(A) =
    0$ implies $\nu(A) = 0$.
  kind: definition
  location: Lecture 25, Radon-Nikodym theorem
  name: Definition (Absolutely continuous)
- description: Say a random variable $X$ is infinitely divisible if, for each $n$,
    there is a random variable $Y$ such that $X$ has the same law as the sum of $n$
    i.i.d. copies of $Y$.
  kind: definition
  location: Lecture 18 / Lecture 20, Infinitely divisible laws
  name: Definition (Infinitely divisible)
- description: If $X_1, X_2, \ldots$ are i.i.d. and $A \in \mathcal{E}$ (the $\sigma$-field
    of permutable events) then $P(A) \in \{0, 1\}$.
  kind: theorem
  location: Lecture 23, Random walks section
  name: Theorem (Hewitt-Savage 0-1 law)
- description: Let $X_i$ be i.i.d. with $E|X_i| < \infty$. If $N$ is a stopping time
    with $EN < \infty$ then $ES_N = EX_1 \cdot EN$.
  kind: theorem
  location: Lecture 23, Stopping times section
  name: Theorem (Wald's equation)
- description: Let $X_i$ be i.i.d. with $EX_i = 0$ and $EX_i^2 = \sigma^2 < \infty$.
    If $N$ is a stopping time with $EN < \infty$ then $ES_N^2 = \sigma^2 EN$.
  kind: theorem
  location: Lecture 23, Stopping times section
  name: Theorem (Wald's second equation)
- description: Suppose that in an election candidate A gets $\alpha$ votes and B gets
    $\beta < \alpha$ votes. The probability that A is ahead throughout the counting
    is $(\alpha - \beta)/(\alpha + \beta)$.
  kind: theorem
  location: Lecture 23, Reflection principle section
  name: Theorem (Ballot Theorem)
- description: 'If $\mu$ and $\nu$ are $\sigma$-finite measures on $(\Omega, \mathcal{F})$
    and $\nu$ is absolutely continuous w.r.t. $\mu$ (i.e., $\mu(A) = 0$ implies $\nu(A)
    = 0$), then there exists a measurable $f: \Omega \to [0, \infty)$ such that $\nu(A)
    = \int_A f\, d\mu$.'
  kind: theorem
  location: Lecture 25, Conditional expectation section
  name: Theorem (Radon-Nikodym theorem)
- description: 'If $X_n \to X$ in probability then the following are equivalent: (1)
    $X_n$ are uniformly integrable, (2) $X_n \to X$ in $L^1$, (3) $E|X_n| \to E|X|
    < \infty$.'
  kind: theorem
  location: Lecture 28
  name: Theorem
- description: 'Consider probability space $(\Omega, \mathcal{F}, P)$, a measurable
    map $X: (\Omega, \mathcal{F}) \to (S, \mathcal{S})$ and $\mathcal{G} \subset \mathcal{F}$
    a $\sigma$-field. Then $\mu: \Omega \times \mathcal{S} \to [0,1]$ is a regular
    conditional distribution for X given $\mathcal{G}$ if: (1) For each A, $\omega
    \to \mu(\omega, A)$ is a version of $P(X \in A|\mathcal{G})$. (2) For a.e. $\omega$,
    $A \to \mu(\omega, A)$ is a probability measure on $(S, \mathcal{S})$.'
  kind: definition
  location: Lecture 26
  name: Definition (Regular conditional distribution)
- description: Let $\mathcal{F}_n$ be increasing sequence of $\sigma$-fields (called
    a filtration).
  kind: definition
  location: Lecture 25
  name: Definition (Filtration)
- description: Any submartingale $X_n$ can be written in a unique way as $X_n = M_n
    + A_n$ where $M_n$ is a martingale and $A_n$ is a predictable increasing sequence
    with $A_0 = 0$.
  kind: theorem
  location: Lecture 27
  name: Theorem (Doob's decomposition)
- description: Let $X_n$ be a martingale with $EX_n^2 < \infty$ for all n. If $m \le
    n$ and $Y \in \mathcal{F}_m$ with $EY^2 < \infty$, then $E((X_n - X_m)Y) = 0$.
  kind: theorem
  location: Lecture 28
  name: Theorem (Orthogonality of martingale increments)
- description: Say $X_i$, $i \in I$, are uniformly integrable if $\lim_{M\to\infty}
    \left(\sup_{i\in I} E(|X_i|; |X_i| > M)\right) = 0$.
  kind: definition
  location: Lecture 28
  name: Definition (Uniform integrability)
- description: 'The following are equivalent for a submartingale: (1) It''s uniformly
    integrable. (2) It converges a.s. and in $L^1$. (3) It converges in $L^1$.'
  kind: theorem
  location: Lecture 28
  name: Theorem (Submartingale convergence)
- description: If $X_n$ is a martingale with $\sup E|X_n|^p < \infty$ where $p > 1$
    then $X_n \to X$ a.s. and in $L^p$.
  kind: theorem
  location: Lecture 28
  name: Theorem ($L^p$ convergence theorem)
- description: If $X_n$ is a submartingale with $\sup EX_n^+ < \infty$ then as $n
    \to \infty$, $X_n$ converges a.s. to a limit $X$ with $E|X| < \infty$.
  kind: theorem
  location: Lecture 27
  name: Theorem (Martingale convergence)
- description: Regular conditional probabilities exist if $(S, \mathcal{S})$ is nice.
  kind: theorem
  location: Lecture 26
  name: Theorem (Existence of regular conditional probabilities)
- description: If $X_n$ is a martingale with $\sup E|X_n|^p < \infty$ where $p > 1$
    then $X_n \to X$ a.s. and in $L^p$.
  kind: theorem
  location: Lecture 28
  name: Theorem (L^p convergence theorem)
- description: If $X_n$ is a martingale with $EX_n^2 < \infty$ for all $n$ then $E((X_n
    - X_m)^2|\mathcal{F}_m) = E(X_n^2|\mathcal{F}_m) - X_m^2$.
  kind: theorem
  location: Lecture 28
  name: Theorem (Conditional variance theorem)
- description: If $X_n$ is a martingale with $EX_n^2 < \infty$ for all $n$, and $A_n
    = \sum_{m=1}^n E((X_m - X_{m-1})^2|\mathcal{F}_{m-1})$, then $E(\sup_m |X_m|^2)
    \le 4EA_\infty$.
  kind: theorem
  location: Lecture 28
  name: Theorem (Square integrable martingale maximal inequality)
- description: Suppose $X_n$ is a martingale with $EX_n^2 < \infty$ for all $n$. Then
    $\lim_{n \to \infty} X_n$ exists and is finite a.s. on $\{A_\infty < \infty\}$.
  kind: theorem
  location: Lecture 28
  name: Theorem (Square integrable martingale convergence)
- description: 'If $X_n \to X$ in probability then the following are equivalent: (1)
    $X_n$ are uniformly integrable, (2) $X_n \to X$ in $L^1$, (3) $E|X_n| \to E|X|
    < \infty$.'
  kind: theorem
  location: Lecture 28
  name: Theorem (Uniform integrability equivalences)
- description: If $X_n$ is a martingale w.r.t. $\mathcal{F}_n$ and $\phi$ is convex
    with $E|\phi(X_n)| < \infty$ then $\phi(X_n)$ is a submartingale.
  kind: claim
  location: Lecture 26 / Lecture 27, Martingale observations
  name: Claim
- description: Suppose $E(X_{n+1}|\mathcal{F}_n) = X_n$ with $n \le 0$ (and $\mathcal{F}_n$
    increasing as $n$ increases). Then $X_{-\infty} = \lim_{n \to -\infty} X_n$ exists
    a.s. and in $L^1$.
  kind: theorem
  location: Lecture 29, Backwards martingales section
  name: Theorem (Backwards martingales)
- description: Let $X_n$ be a uniformly integrable submartingale. For any stopping
    time $N$, $X_{N \wedge n}$ is uniformly integrable.
  kind: theorem
  location: Lecture 29, General optional stopping theorem section
  name: Theorem (General optional stopping, uniform integrability preservation)
- description: Let $X_n$ be a uniformly integrable submartingale. If $E|X_n| < \infty$
    and $X_n 1_{(N>n)}$ is uniformly integrable, then $X_{N \wedge n}$ is uniformly
    integrable.
  kind: theorem
  location: Lecture 29, General optional stopping theorem section
  name: Theorem (General optional stopping, alternative condition)
- description: Let $X_n$ be a uniformly integrable submartingale. For any stopping
    time $N \le \infty$, we have $EX_0 \le EX_N \le EX_\infty$ where $X_\infty = \lim
    X_n$.
  kind: theorem
  location: Lecture 29, General optional stopping theorem section
  name: Theorem (General optional stopping, expectation inequality)
- description: If $L \le M$ are stopping times and $Y_{M \wedge n}$ is a uniformly
    integrable submartingale, then $EY_L \le EY_M$ and $Y_L \le E(Y_M | \mathcal{F}_L)$.
  kind: theorem
  location: Lecture 29, General optional stopping theorem section
  name: Theorem (General form of optional stopping)
- description: 'The following are equivalent for a martingale: (1) It''s uniformly
    integrable. (2) It converges a.s. and in $L^1$. (3) It converges in $L^1$. (4)
    There is an integrable random variable $X$ so that $X_n = E(X|\mathcal{F}_n)$.'
  kind: theorem
  location: Lecture 29, Martingale convergence section
  name: Theorem (Martingale convergence)
- description: 'Consider a measurable space $(S, \mathcal{S})$. A function $p: S \times
    \mathcal{S} \to \mathbb{R}$ is a transition probability if (1) for each $x \in
    S$, $A \to p(x, A)$ is a probability measure on $(S, \mathcal{S})$, and (2) for
    each $A \in \mathcal{S}$, the map $x \to p(x, A)$ is a measurable function.'
  kind: definition
  location: Lecture 30/31, Markov chains general definition section
  name: Definition (Transition probability)
- description: Say that $X_n$ is a Markov chain w.r.t. $\mathcal{F}_n$ with transition
    probability $p$ if $P(X_{n+1} \in B | \mathcal{F}_n) = p(X_n, B)$.
  kind: definition
  location: Lecture 30/31, Markov chains general definition section
  name: Definition (Markov chain, general)
- description: $(X_0, X_1, \ldots)$ chosen from $P_\mu$ is a Markov chain.
  kind: theorem
  location: Lecture 30/31, Markov chains section
  name: Theorem (Markov chain construction)
- description: If $X_n$ is any Markov chain with initial distribution $\mu$ and transition
    $p$, then finite dimensional probabilities are given by $P(X_j \in B_j, 0 \le
    j \le n) = \int_{B_0} \mu(dx_0) \int_{B_1} p(x_0, dx_1) \cdots \int_{B_n} p(x_{n-1},
    dx_n)$.
  kind: theorem
  location: Lecture 30/31, Markov chains section
  name: Theorem (Markov chain finite dimensional distributions)
- description: Say a Markov chain is ergodic if some power of the transition matrix
    has all non-zero entries.
  kind: definition
  location: Lecture 30/31, Ergodic Markov chains section
  name: Definition (Ergodic Markov chain)
- description: 'Take $(\Omega_0, \mathcal{F}) = (S^{\{0,1,\ldots\}}, \mathcal{S}^{\{0,1,\ldots\}})$,
    and let $P_\mu$ be Markov chain measure and $\theta_n$ the shift operator on $\Omega_0$.
    If $Y: \Omega_0 \to \mathbb{R}$ is bounded and measurable then $E_\mu(Y \circ
    \theta_n | \mathcal{F}_n) = E_{X_n} Y$.'
  kind: theorem
  location: Lecture 31, Markov properties section
  name: Theorem (Markov property)
- description: 'Can replace $n$ with an a.s. finite stopping time $N$ and the function
    $Y$ can vary with time. Suppose that for each $n$, $Y_n : \Omega_0 \to \mathbb{R}$
    is measurable and $|Y_n| \le M$ for all $n$. Then $E_\mu(Y_N \circ \theta_N |
    \mathcal{F}_N) = E_{X_N} Y_N$, where RHS means $E_x Y_n$ evaluated at $x = X_N$,
    $n = N$.'
  kind: theorem
  location: Lecture 31, Markov properties section
  name: Theorem (Strong Markov property)
- description: Consider a sequence of random variables $X_0, X_1, X_2, \ldots$ each
    taking values in a finite set $\{0, 1, \ldots, M\}$. The sequence is called a
    Markov chain if we have a fixed collection of numbers $P_{ij}$ such that $P\{X_{n+1}
    = j | X_n = i, X_{n-1} = i_{n-1}, \ldots, X_1 = i_1, X_0 = i_0\} = P_{ij}$.
  kind: definition
  location: Lecture 30/31, Markov chains section
  name: Definition (Markov chain, finite state)
- description: A sequence $X_n$ is adapted to $\mathcal{F}_n$ if $X_n \in \mathcal{F}_n$
    for all $n$. If $X_n$ is an adapted sequence (with $E|X_n| < \infty$) then it
    is called a martingale if $E(X_{n+1}|\mathcal{F}_n) = X_n$ for all $n$. It's a
    supermartingale (resp., submartingale) if same thing holds with $=$ replaced by
    $\le$ (resp., $\ge$).
  kind: definition
  location: Lecture 29, Martingales section
  name: Definition (Martingale, supermartingale, submartingale)
- description: $E(X|\mathcal{F}_i)$ is a martingale if $\mathcal{F}_i$ is an increasing
    sequence of $\sigma$-algebras and $E(|X|) < \infty$.
  kind: theorem
  location: Lecture 29, Martingales section
  name: Theorem (Conditional expectation martingale)
- description: Suppose $p$ is irreducible. Then there exists a reversible measure
    if and only if (1) $p(x, y) > 0$ implies $p(y, x) > 0$, and (2) for any loop $x_0,
    x_1, \ldots x_n$ with $\prod_{i=1}^n p(x_i, x_{i-1}) > 0$, we have $\prod_{i=1}^{n}
    \frac{p(x_{i-1}, x_i)}{p(x_i, x_{i-1})} = 1$.
  kind: theorem
  location: Lecture 32, Cycle theorem
  name: Kolmogorov's cycle theorem
- description: Let $\phi$ be a measure preserving transformation of $(\Omega, \mathcal{F},
    P)$. Then for any $X \in L^1$ we have $\frac{1}{n}\sum_{m=0}^{n-1}X(\phi^m\omega)\to
    E(X|\mathcal{I})$ a.s. and in $L^1$.
  kind: theorem
  location: Lecture 33, Birkhoff's ergodic theorem
  name: Ergodic theorem (Birkhoff's ergodic theorem)
- description: If $A \in \mathcal{F}_0^+$, then $P(A) \in \{0,1\}$ (if $P$ is the
    probability law for Brownian motion started at a fixed value $x$ at time 0).
  kind: theorem
  location: Lecture 36, Brownian motion properties and construction
  name: Blumenthal's 0-1 law
- description: Suppose $E|X_s - X_t|^{\beta} \le K|t - s|^{1+\alpha}$ where $\alpha,
    \beta > 0$. If $\gamma < \alpha/\beta$ then with probability one there is a constant
    $C(\omega)$ so that $|X(q) - X(r)| \le C|q - r|^{\gamma}$ for all $q, r \in \mathbb{Q}_2
    \cap [0, 1]$.
  kind: theorem
  location: Lecture 37
  name: Kolmogorov continuity theorem
- description: If $s \ge 0$ and $Y$ is bounded and $\mathcal{C}$-measurable, then
    for all $x \in \mathbb{R}^d$, we have $E_x(Y \circ \theta_s | \mathcal{F}_s^+)
    = E_{B_s} Y$, where the RHS is function $\phi(x) = E_x Y$ evaluated at $x = B_s$.
  kind: theorem
  location: Lecture 37
  name: Markov property
- description: If $Z$ is bounded and measurable then for all $s \ge 0$ and $x \in
    \mathbb{R}^d$ have $E_x(Z|\mathcal{F}_s^+) = E_x(Z|\mathcal{F}_s^o)$.
  kind: theorem
  location: Lecture 38
  name: Expectation equivalence theorem
- description: Let $(s, \omega) \to Y_s(\omega)$ be bounded and $\mathcal{R} \times
    \mathcal{C}$-measurable. If $S$ is a stopping time, then for all $x \in \mathbb{R}^d$,
    $E_x(Y_S \circ \theta_S | \mathcal{F}_S) = E_{B(S)} Y_S$ on $\{S < \infty\}$,
    where RHS means function $\phi(x, t) = E_x Y_t$ evaluated at $x = B(S)$, and $t
    = S$.
  kind: theorem
  location: Lecture 39
  name: Strong Markov property
- description: A random variable $S$ taking values in $[0, \infty]$ is a stopping
    time if for all $t \ge 0$, we have $\{S > t\} \in \mathcal{F}_t$.
  kind: definition
  location: Lecture 39
  name: Stopping time
