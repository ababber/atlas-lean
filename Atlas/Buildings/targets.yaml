- description: Given $w \in W$ and $s, t \in S$ with $\ell(sw) = \ell(w) + 1$ and
    $\ell(wt) = \ell(w) + 1$, either $\ell(swt) = \ell(w) + 2$ or $swt = w$.
  kind: corollary
  location: Section 1.7
  name: Corollary
- description: If $\alpha, \beta$ are roots and $\beta = w\alpha$ for some $w \in
    W$, then $ws_{\alpha}w^{-1} = s_{\beta}$.
  kind: lemma
  location: Section 1.6
  name: Lemma
- description: Let $v \leq w$ and take $s \in S$. Then either $vs \leq w$ or $vs \leq
    ws$ or both.
  kind: proposition
  location: Section 1.8
  name: Proposition
- description: Any group $W$ generated by a set $S$ with all $s \in S$ of order 2
    and satisfying the Deletion Condition gives a Coxeter system $(W, S)$.
  kind: theorem
  location: Section 1.7
  name: Theorem
- description: For $v, w \in W$ write $v \to w$ if there is $t \in T$ so that $vt
    = w$ and $\ell(v) < \ell(w)$. Define the Bruhat order $<$ by saying that $v <
    w$ if there is a sequence $v = w_o \to w_1 \to w_2 \to \ldots \to w_n = w$.
  kind: definition
  location: Section 1.8
  name: Definition
- description: Let $f$ be a reversible folding. Let $C, C'$ be adjacent chambers so
    that $C \in \Phi$ and $C' \notin \Phi$. Then $\Phi$ is the set of chambers $D$
    so that $d(C, D) < d(C', D)$.
  kind: proposition
  location: Section 3.3
  name: Proposition
- description: Let $w = s_1 \dots s_n$ be a fixed reduced expression of $w \in W$.
    Then $v \leq w$ if and only if $v$ can be obtained as a subexpression of $s_1
    \dots s_n$, that is, if and only if $v$ can be written in the form $v = s_{i_1}
    \dots s_{i_m}$ where $1 \leq i_1 < i_2 < \ldots < i_m \leq n$.
  kind: theorem
  location: Section 1 (Bruhat order context)
  name: Theorem
- description: Let $v < w$ in $W$. Then there are elements $w_1, \ldots, w_n$ in $W$
    so that $v = w_1 < \ldots < w_n = w$ and $\ell(w_i) + 1 = \ell(w_{i+1})$ for all
    $i$.
  kind: corollary
  location: Section 1 (Bruhat order context)
  name: Corollary
- description: 'Let $X$ be a thin chamber complex. Fix a chamber $C_o$ in $X$. Let
    $f: X \to X$ be a chamber complex map so that $f$ fixes $C_o$ pointwise. Let $\gamma$
    be a non-stuttering gallery $C_o, C_1, \ldots, C_n$ starting at $C$. Then either
    $f\gamma = fC_o, \ldots, fC_n$ stutters, or else $f$ fixes every chamber $C_i$
    pointwise.'
  kind: lemma
  location: Section 3.3
  name: Lemma
- description: A thin chamber complex is a Coxeter complex if and only if any two
    adjacent chambers are separated by a wall.
  kind: theorem
  location: Section 3.5
  name: Theorem
- description: The link of a simplex in a thick building is itself a thick building.
  kind: proposition
  location: Section 4.4
  name: Proposition
- description: 'For apartments A, A'' in a given apartment system with a chamber in
    common, there is a label-preserving chamber-complex isomorphism f: A → A'' fixing
    A ∩ A'' pointwise, and any isomorphism f: A → A'' fixing A ∩ A'' pointwise is
    label-preserving.'
  kind: corollary
  location: Section 4.4
  name: Corollary
- description: 'Let X be a thick building with apartment system A. If two apartments
    A, A'' ∈ A both contain a chamber C, then there is a chamber-complex isomorphism
    φ: A → A'' which fixes A ∩ A'' pointwise.'
  kind: lemma
  location: Section 4.1
  name: Lemma
- description: Let w = s₁...sₙ be a reduced expression. Then the smallest subgroup
    of G containing BwB contains sᵢ for all i. It is also generated by B and w⁻¹Bw.
  kind: proposition
  location: Section 5.3
  name: Proposition
- description: The parabolic subgroups of G are exactly those subgroups containing
    B. Every parabolic subgroup is its own normalizer in G, and no two are conjugate
    in G. For a subgroup P of G containing B, let W_P = (P ∩ N)T/T. Then we have P
    = BW_PB.
  kind: corollary
  location: Section 5.3
  name: Corollary
- description: We have a bijection W₁\W/W₂ ↔ P₁\G/P₂ given by W₁wW₂ ↔ P₁wP₂.
  kind: theorem
  location: Section 5.4
  name: Theorem
- description: In a simplicial complex X, the link lk_X(x) of a simplex x is defined
    to be the subcomplex of X consisting of simplices y so that, on one hand, there
    is no simplex z so that z ≤ x and z ≤ y, but there is a simplex w so that w ≥
    x and w ≥ y.
  kind: definition
  location: Section 4.4
  name: Definition
- description: The subgroup T acts trivially pointwise on A₀, so is the kernel of
    the natural map N → W. Therefore, it is normal in N. The induced map N → N/T ⊂
    W is surjective.
  kind: lemma
  location: Section 5.2
  name: Lemma
- description: 'Given a Coxeter system $(W, S)$ and structure constants $a_s, b_s$,
    there is exactly one associative algebra structure on $\mathcal{A}$ (a free $R$-module
    with $R$-basis $\{T_w : w \in W\}$) so that $T_s T_w = T_{sw}$ if $\ell(sw) >
    \ell(w)$, $T_s^2 = a_s T_s + b_s T_1$ for all $s \in S$, and with the requirement
    that $T_1$ is the identity in $\mathcal{A}$. With this associative algebra structure,
    we also have $T_s T_w = a_s T_w + b_s T_{sw}$ if $\ell(sw) < \ell(w)$. Further,
    we have the right-handed version of these identities: $T_w T_s = T_{ws}$ if $\ell(ws)
    > \ell(w)$ and $T_w T_s = a_s T_w + b_s T_{ws}$ if $\ell(ws) < \ell(w)$.'
  kind: theorem
  location: Section 6.1
  name: Theorem
- description: If $g \in \tilde{G}$ has the property that it preserves types of the
    faces of a chamber $C_1$, then $g \in G$.
  kind: lemma
  location: Section 5.5
  name: Lemma
- description: 'The poset $Y$ of all special subsets of $G$ (with inclusion reversed)
    is isomorphic (as poset) to the poset $X$ of all proper parabolic subsets (with
    inclusion reversed), by the map $f: gP \to gPg^{-1}$. Further, this map respects
    the action of $G$ upon $X$ and $Y$.'
  kind: proposition
  location: Section 5.7
  name: Proposition
- description: Let $w_o$ be the longest element in a spherical Coxeter group $W$.
    The map $w \to w_o w w_o^{-1}$ gives an automorphism of $W$ of order 2 which stabilizes
    the generating set $S$.
  kind: corollary
  location: Section 5.6
  name: Corollary
- description: 'Given a Coxeter system $(W,S)$ and structure constants $a_s, b_s$,
    the generic algebra $\mathcal{A} = \mathcal{A}(W, S, \{(a_s, b_s) : s \in S\})$
    is the associative $R$-algebra determined according to the theorem.'
  kind: definition
  location: Section 6.1, after the Theorem statement
  name: Definition
- description: The generalized Iwahori-Hecke algebra H is H ≈ k[Ω] ⊗' H_o with isomorphism
    given by the map ch_{Bσ wB} → [σ] ⊗ ch_{BwB}.
  kind: theorem
  location: Section 6.3
  name: Theorem
- description: The subalgebra H_Ω of H consisting of functions supported on cosets
    of the form B_o σ for σ ∈ Ω is isomorphic to the group algebra k[Ω], by the map
    ch_{B_o σ B_o} = ch_{B_o σ} → [σ] ∈ k[Ω].
  kind: proposition
  location: Section 6.3
  name: Proposition
- description: For all s, t ∈ S, the operators λ_s, ρ_t ∈ E commute.
  kind: lemma
  location: Section 6.1
  name: Lemma
- description: Let V be non-degenerate, and W a subspace. Let W_o be the kernel of
    W. Then there is a non-degenerate subspace W_1 of W so that W_o + W_1 = W is a
    direct sum. Further, for any basis x_1, …, x_n for W_o, and for any such W_1,
    there is a set {y_i} ⊂ W_1^⊥ so that the subspaces Dx_i + Dy_i are mutually orthogonal
    hyperbolic planes. In particular, W + Σ_i Dy_i = W ⊕ (⊕_i Dy_i) is non-degenerate
    and W_o + Σ_i Dy_i is a hyperbolic space.
  kind: proposition
  location: Section 7.2, Bilinear and hermitian forms
  name: Proposition
- description: Let V be a non-degenerate space. Then there is a hyperbolic subspace
    H of V and an anisotropic subspace A of V so that V is the orthogonal direct sum
    V = H ⊕ A.
  kind: corollary
  location: Section 7.2, Bilinear and hermitian forms
  name: Corollary
- description: 'Let U, W be subspaces of a non-degenerate space V. Every isometry
    φ: U → W extends to an isometry Φ: V → V. (That is, Φ restricted to U is φ.) If
    U, V, W are spaces so that U ⊕ V ≅ U ⊕ W, then V ≅ W.'
  kind: theorem
  location: Section 7.3, Extending isometries
  name: Theorem
- description: If U ⊕ X ≅ U ⊕ Y with U, X, Y all non-degenerate, then X ⊕ -Y is hyperbolic.
  kind: lemma
  location: Section 7.3, Extending isometries
  name: Lemma
- description: Any two parabolic subgroups of the same 'type' are conjugate by an
    element of G.
  kind: proposition
  location: Section 7.4 (Parabolics)
  name: Proposition
- description: The symmetric group S_n is a Coxeter group, generated by adjacent transpositions
    α_j = (j, j+1). The 3-cycle α_j α_{j+1} has order 3, and α_i α_j = α_j α_i if
    |i-j| ≠ 1. This is the Coxeter system of type A_{n-1}.
  kind: definition
  location: Section 9.6
  name: Definition (Coxeter system of type A_{n-1})
- description: Let S_n be the permutation group on n things, and let H be the direct
    sum of n copies of the group {±1}. Let π ∈ S_n act on H by (ε_1,…,ε_n)^π = (ε_{π(1)},…,ε_{π(n)}).
    Then the semi-direct product S_n^± = H ×◁ S_n is the signed permutation group
    on n things.
  kind: definition
  location: Section 10.2
  name: Definition (Signed permutation group)
- description: Elements of the isometry group of a non-degenerate quadratic form have
    determinant ±1.
  kind: lemma
  location: Section 11.3
  name: Lemma
- description: Let Y be a totally isotropic (n-1)-dimensional subspace of V. Let V_1,
    V_2 be the two totally isotropic n-dimensional subspaces V_1, V_2 contained in
    Y^⊥. Then these two spaces V_1, V_2 are in distinct SO(n, n)-orbits.
  kind: proposition
  location: Section 11.3
  name: Proposition
- description: If C, D are distinct chambers, then there is a wall of C separating
    them.
  kind: corollary
  location: Section 12.1
  name: Corollary
- description: 'For any special vertex x, the group W is the semidirect product of
    the translation subgroup W₁ and the group W̄ of linear parts: W ≈ W₁ × W̄.'
  kind: corollary
  location: Section 12.4
  name: Corollary
- description: Suppose that W̄ is essential and that W is indecomposable. Then the
    normal subgroup W₁ of translations in W is a discrete subgroup of the group T
    ≈ ℝⁿ of all translations of X ≈ ℝⁿ. Further, the quotient X/W₁ of X by W₁ is compact.
  kind: proposition
  location: Section 12.4
  name: Proposition
- description: For distinct walls η ≠ ζ of C with inward-pointing unit normal vectors
    e, f (respectively), we have ⟨e, f⟩ ≤ 0.
  kind: lemma
  location: Section 12.4
  name: Lemma
- description: The collection $H$ of affine hyperplanes $\eta_{\alpha,k}$ is locally
    finite and is stable under $W_a$. The affine Weyl group $W_a$ is the semi-direct
    product $W_a = W \ltimes \Lambda(\check{\Phi})$ of the group $W$ and the coroot
    lattice $\Lambda(\check{\Phi})$. The group generated by reflections in the hyperplanes
    in $H$ is just $W_a$.
  kind: proposition
  location: Section 12.5
  name: Proposition
- description: 'If $W_I$ is finite for subsets $I$ of $S$ strictly smaller than $S$,
    then the Tits'' cone $U$ associated to $(W, S)$ is $U = \{0\} \cup \{x \in V^*
    : \nu(x) < \infty\}$.'
  kind: lemma
  location: Section 13.4
  name: Lemma
- description: Let $M$ be an indecomposable real symmetric $n \times n$ matrix which
    is positive semi-definite. Assume further that $M_{ij} \leq 0$ for $i \neq j$.
    Let $N$ be the $(n-1) \times (n-1)$ matrix obtained by deleting the $i_o^{\text{th}}$
    row and column from $M$. Then $N$ is positive-definite.
  kind: corollary
  location: Section 13.3
  name: Corollary
- description: The Tits' cone $U$ is a convex cone in $V^*$, and every closed line
    segment in $U$ meets only finitely-many sets of the form $wF_I$. If $wF_I \cap
    F_J \neq \emptyset$, then $I = J$ and $w \in I$ (so actually $wF_J = F_I$ and
    $J = I$ and $w \in W_I$.) The set $\overline{C}$ is a fundamental domain for $W$
    acting on $U$. That is, given a point $u \in U$, the $W$-orbit $Wu$ of $u$ meets
    $\overline{C}$ in exactly one point.
  kind: theorem
  location: Section 13.1
  name: Theorem
- description: Assuming that $(W, S)$ is affine, the set $E \cap U = \bigcup_{w,I}
    wF_I \cap E = \bigsqcup_{w,I} wF_I \cap E$ is actually all of $E$.
  kind: lemma
  location: Section 13.6
  name: Lemma
- description: 'Let $(W, S)$, $(W'', S'')$ be affine Coxeter systems. Let $\phi: \Sigma(W,S)
    \to \Sigma(W'',S'')$ be an isomorphism of simplicial complexes. Normalize the
    metrics on the geometric realizations $|\Sigma(W,S)|, |\Sigma(W'',S'')|$ by dilating
    so that the diameter of a chamber is 1 in both cases. Then $|\phi|: |\Sigma(W,S)|
    \to |\Sigma(W'',S'')|$ is an isometry of the geometric realizations.'
  kind: corollary
  location: Section 13.7
  name: Corollary
- description: 'Let $(W, S)$, $(W'', S'')$ be affine Coxeter systems with metrics
    as described. Let $\phi: \Sigma(W,S) \to \Sigma(W'',S'')$ be an isomorphism of
    simplicial complexes. Then the geometric realization $|\phi|$ is a similitude
    $|\phi|: |\Sigma(W,S)| \to |\Sigma(W'',S'')|$.'
  kind: theorem
  location: Section 13.7
  name: Theorem
- description: The metric normalized to give a chamber diameter 1 is the **canonical
    metric** on the affine Coxeter complex $|\Sigma(W, S)|$.
  kind: definition
  location: Section 13.7
  name: Definition
- description: The canonical metric on $|X|$ is well-defined.
  kind: proposition
  location: Section 14.2
  name: Proposition
- description: 'The following three conditions on a subset E of G̃ are equivalent:

    • E is contained in a finite union of double cosets BσwB with w ∈ W and σ ∈ Ω.

    • There is a point x ∈ |X| so that Ex = {gx : g ∈ E} is a bounded subset of the
    metric space |X|.

    • For every bounded subset Y of the metric space |X|, the set EY = {gy : g ∈ E}
    is bounded in |X|.'
  kind: proposition
  location: Section 14.7
  name: Proposition
- description: Let G̃ act strongly transitively on a thick affine building X, with
    type-preserving subgroup G acting strongly transitively. With the bornology above,
    every bounded subgroup of G̃ is contained in a maximal bounded subgroup. Every
    maximal bounded subgroup K of G̃ is the stabilizer of a point in X. Conjugating
    if necessary, we may assume that B ⊂ K. The subgroup K_o = K ∩ G is bounded in
    G and is of the form BW_{S'}B for some proper subset S' of S. Identifying K/K_o
    with a subgroup Ω_K of Ω = T̃/T, we have K = Ω_K K_o = Ω_K · BW_{S'}B = BΩ_K W_{S'}B.
  kind: theorem
  location: Section 14.7
  name: Theorem
- description: Let X be an affine building with canonical metric d = d_X. For x, y,
    z ∈ |X|, let z_t = tx + (1 − t)y. Then d²(z, z_t) ≤ t d²(z, x) + (1 − t)d²(z,
    y) − t(1 − t)d²(x, y).
  kind: proposition
  location: Section 14.3
  name: Proposition (Negative Curvature Inequality)
- description: There exist good maximal bounded subgroups of G, obtained as BW_xB
    where W_x is the fixer in W of a special vertex x of the chamber fixed by B.
  kind: corollary
  location: Section 14.8
  name: Corollary
- description: The inverse image in |X| by |ρ| of a single point y of |C| is discrete
    in |X|.
  kind: lemma
  location: Section 14.5
  name: Lemma
- description: 'For a chamber C in an apartment A, and for another chamber D, there
    is a unique label-preserving ρ = ρ_{D;C,A}: X → A which sends D to C, and so that
    the restriction of ρ to any apartment B containing D is an isomorphism to A.'
  kind: proposition
  location: Section 15.5
  name: Proposition
- description: Let Y be a set of chambers in a thick building X. If Y is strongly
    isometric to a subset of some apartment, then Y is a subset of some apartment
    in the maximal apartment system for X.
  kind: theorem
  location: Section 15.5
  name: Theorem
- description: 'Let f: Y → A be a strong isometry to an apartment A in X. For any
    chamber C'' not in the image f(Y) of f but adjacent to a chamber in the image,
    there is a strong isometry g̃: f(Y) ∪ {C̄''} → X extending f''s inverse f⁻¹: f(Y)
    → Y.'
  kind: lemma
  location: Section 15.5
  name: Lemma
- description: There exist good bounded subgroups of G̃, obtained as Ω'K_o where K_o
    is a good maximal bounded subgroup of G, and where Ω' is a bounded subgroup of
    T̃ stabilizing the subset S_x of S under the conjugation action of T̃.
  kind: corollary
  location: Section 14.8
  name: Corollary
- description: Let $\lambda$ be an affine functional on an apartment $A'$ in the thick
    affine building $X$ which vanishes on a wall $\eta$ in $A'$. Then either $\lambda$
    is bounded above, or is bounded below on the sector $\mathcal{C}'$. That is, either
    there is a constant $\lambda_o$ so that $\lambda(z) \leq \lambda_o$ for all $z
    \in \mathcal{C}'$, or else there is a constant $\lambda_o$ so that $\lambda(z)
    \geq \lambda_o$ for all $z \in \mathcal{C}'$.
  kind: lemma
  location: Chapter 16, Section 16.6
  name: Lemma
- description: Given a chamber $C$ in $X$ and a sector $\mathcal{C}$ in $X$ there
    is an apartment $B \in \mathcal{A}$ and a subsector $\mathcal{C}'$ of $\mathcal{C}$
    so that both $C$ and $\mathcal{C}'$ are contained in $B$.
  kind: theorem
  location: Chapter 16, Section 16.5
  name: Theorem
- description: Let $\eta$ be a wall in an apartment $A'$ containing a sector $\mathcal{C}'$.
    Then in one of the half-apartments cut out by $\eta$ there is a bound for the
    maximum distance of any point of $\mathcal{C}'$ from $\eta$, while in the other
    half-apartment there is no such bound.
  kind: corollary
  location: Chapter 16, Section 16.6
  name: Corollary
- description: The poset X_∞ (by which we really mean the poset of ideal simplices)
    is a simplicial complex.
  kind: lemma
  location: Section 16.9
  name: Lemma
- description: Each A_∞ is a simplicial subcomplex of X_∞.
  kind: corollary
  location: Section 16.9
  name: Corollary
- description: If φ is an isometry of the geometric realization |X| of the thick affine
    building X, then φ preserves parallelism classes of geodesic rays, so it gives
    a well-defined map φ_∞ on the geometric realization |X_∞| of the building at infinity,
    by φ([x,ξ)) = [φx, φ_∞ξ) where ξ is a point at infinity and x is any point in
    |X|.
  kind: proposition
  location: Section 16.10
  name: Proposition
- description: 'Let f: X → X be a simplicial-complex automorphism of the thick affine
    building X, with its maximal apartment system. Then the geometric realization
    |f| of f maps conical cells to conical cells in |X|, and defines a simplicial-complex
    automorphism f_∞ of X_∞ by f_∞(c_∞) = (fc)_∞ where c is a conical cell and c_∞
    is its face at infinity. If f is label-preserving, then so is the induced map
    f_∞.'
  kind: theorem
  location: Section 16.10
  name: Theorem
- description: With the hypothesis that B is compact and open in G, the group G^o
    of type-preserving maps in G acts strongly transitively on pairs C' ⊂ A' for chambers
    C' and apartments A' in the maximal apartment system.
  kind: theorem
  location: Section 17.7
  name: Theorem
- description: If B is compact and open in G, then any apartment system A stable under
    the action of G is unavoidably the maximal apartment system.
  kind: corollary
  location: Section 17.7
  name: Corollary
- description: 'Let Y be a subset of X which is contained in the union of finitely-many
    simplices in X. Suppose that Y contains at least one chamber. Then the pointwise
    fixer G_Y = {g ∈ G : gy = y ∀ y ∈ Y} of Y is open and compact in G.'
  kind: proposition
  location: Section 17.7
  name: Proposition
- description: A group G is a topological group if it has a topology in which the
    multiplication and inverse operations are continuous. That is, the maps G × G
    → G by g × h → gh and G → G by g → g^{-1} are both continuous. Most often a topological
    group is also required to be Hausdorff and locally compact, as well.
  kind: definition
  location: Section 17.7
  name: Definition
- description: The valuation ring o, the group of units o×, and the maximal ideal
    m are all simultaneously open and closed as subsets of k.
  kind: proposition
  location: Section 18.5
  name: Proposition
- description: Let k be a complete ultrametric field with valuation ring o. Let f(x)
    be a non-constant polynomial with coefficients in o. Let x_o ∈ o so that |f(x_o)|
    < 1 and |f'(x_o)| = 1. Then the sequence x_1, x_2, x_3, ... defined recursively
    by x_{n+1} = x_n - f(x_n)/f'(x_n) converges to a root of the equation f(x) = 0.
  kind: theorem
  location: Section 18.3
  name: Theorem
- description: Given an element b of the Iwahori subgroup B of GL(n,k), there are
    uniquely-determined u' ∈ N^{opp} ∩ B, m ∈ M ∩ B, and u ∈ N ∩ B so that b = u'
    · m · u. That is, B decomposes as B = (N^{opp} ∩ B) · (M ∩ B) · (N ∩ B) and uniquely
    so.
  kind: theorem
  location: Section 18.6
  name: Theorem (Iwahori decomposition)
- description: If the discrete valuation ring **o** is complete and its fraction field
    k is locally compact then we have strong transitivity of SL(V) with reference
    to the maximal apartment system in the thick affine building X constructed above.
  kind: theorem
  location: Section 19.5
  name: Theorem
- description: If k is locally compact then the apartment system A constructed above
    is the maximal one.
  kind: corollary
  location: Section 19.5
  name: Corollary
- description: Let V^+ be an anisotropic quadratic space over k. Suppose that k is
    a complete discretely-valued field. Suppose that 2 is a unit in the valuation
    ring **o**. Then there is a unique maximal lattice on which ⟨,⟩ has values in
    the valuation ring **o**.
  kind: lemma
  location: Section 20.3
  name: Lemma
