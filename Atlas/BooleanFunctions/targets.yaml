  kind: lemma
  location: Section 4.2
  name: Lemma 4.3
- description: 'For all d ∈ ℕ, if f(x_1, …, x_n) = ∑_{|S|≤d} f̂(S)χ_S(x) is a function
    of degree at most d, and ψ: ℝ → ℝ is a smooth function with ‖ψ‴‖_∞ ≤ C, then E_{x
    ~ {-1,1}^n}[ψ(f(x))] - E_{z ~ N(0,I_n)}[ψ(f(z))] ≤ (C/2) 2^{3d/2} ∑_{i=1}^n I_i[f]^{3/2}.'
  kind: theorem
  location: Section 1 (Motivation and statement)
  name: Theorem 1.1
- description: 'For all C, ε > 0, d ∈ ℕ there is τ > 0 such that if f(x_1, …, x_n)
    = ∑_{|S|≤d} f̂(S)χ_S(x) is a function of degree at most d, ψ: ℝ → ℝ is a smooth
    function with ‖ψ‴‖_∞ ≤ C and var(f) ≤ C, then E_{x ~ {-1,1}^n}[ψ(f(x))] - E_{z
    ~ N(0,I_n)}[ψ(f(z))] ≤ ε.'
  kind: corollary
  location: Section 1 (Motivation and statement)
  name: Corollary 1.2
- description: 'If f(x_1, ..., x_n) = ∑_{i=1}^n a_i x_i, and ψ: ℝ → ℝ is a smooth
    function with ‖ψ‴‖_∞ ≤ C, then E_{x ~ {-1,1}^n}[ψ(f(x))] - E_{z ~ N(0,I_n)}[ψ(f(z))]
    ≤ (C/2) ∑_{i=1}^n a_i^3.'
  kind: theorem
  location: Section 2 (The Berry-Essen Theorem)
  name: Theorem 2.1
- description: 'Suppose f: (ℝ^n, μ^{⊗n}) → ℝ is a function of degree at most d, and
    q ≥ 2. Then ‖f‖_q ≤ √(q-1)^d ‖f‖_2.'
  kind: lemma
  location: Section 3 (Hypercontractivity in Gaussian space)
  name: Lemma 3.1 (Hypercontractivity for Gaussian space)
- description: 'Suppose f: {-1,1}^t × ℝ^{n-t} → ℝ is a function of degree at most
    d, and q ≥ 2. Then ‖f‖_q ≤ √(q-1)^d ‖f‖_2.'
  kind: lemma
  location: Section 3 (Hypercontractivity in Gaussian space)
  name: Lemma 3.2
- description: For all d ∈ ℕ, ε > 0 there is τ > 0 such that if f(x_1, …, x_n) = ∑_{|S|≤d}
    f̂(S)χ_S(x) is a function of degree at most d, and max_i I_i[f] ≤ τ, then E_{x
    ~ {-1,1}^n}[ψ_0(f(x))] - E_{z ~ N(0,I_n)}[ψ_0(f(z))] ≤ ε.
  kind: theorem
  location: Section 5.1 (Invariance principle for non-smooth test functions)
  name: Theorem 5.1
- description: Suppose f(x) = ∑_{0<|S|≤d} a_S χ_S is a multi-linear polynomial such
    that ∑_S a_S^2 ≤ 1, and I ⊆ ℝ is an interval of length at most ε. Then Pr_{z ~
    N(0,1)}[|f(z)| ≤ ε] ≤ O(dε^{1/d}).
  kind: theorem
  location: Section 5.1.2 (An anticoncentration bound in Gaussian space)
  name: Theorem 5.2
- description: 'For all C, ε > 0, d ∈ ℕ there is τ > 0 such that if f(x_1, …, x_n)
    = ∑ f̂(S)χ_S(x) is a function such that max_i I_i[f^{≤d}] ≤ τ, and ψ: ℝ → ℝ is
    a piecewise smooth C-Lipschitz function with ‖ψ‴‖_∞ ≤ C, then E_{x ~ {-1,1}^n}[ψ(f(x))]
    - E_{z ~ N(0,I_n)}[ψ(f(z))] ≤ ε + 2C‖f^{≥d}‖_2.'
  kind: theorem
  location: Section 5.2 (Invariance principle for functions with small Fourier tails)
  name: Theorem 5.3
- description: For $\rho \in [0,1]$, the operator $T_{\rho}$ acting on functions $f\colon
    \mathbb{R}^n \to \mathbb{R}$ is defined as $U_{\rho}(z) = \mathbb{E}_{w \sim N(0,
    I_n)} [f(\rho z + \sqrt{1 - \rho^2} w)]$.
  kind: definition
  location: Section 6
  name: Definition 6.1
- description: Given $\rho \in [0,1]$ and $f\colon \mathbb{R}^n \to \mathbb{R}$, the
    noise stability of $f$ with parameter $\rho$ is $\mathsf{Stab}_{\rho}(f) = \langle
    f, U_{\rho} f \rangle$.
  kind: definition
  location: Section 6
  name: Definition 6.2
- description: Let $\rho \in [0,1]$, and $f\colon \mathbb{R}^n \to [-1,1]$ with $\mathbb{E}[f]
    = 0$. Then $\mathsf{Stab}_{\rho}(f) \leqslant 1 - \frac{2}{\pi}\mathsf{Arccos}(\rho)$.
  kind: theorem
  location: Section 6
  name: Theorem 6.3 (Borel's theorem)
- description: 'For all $\varepsilon > 0$, $\rho \in (0,1)$ there are $d \in \mathbb{R}$
    and $\tau > 0$ such that if $f : \{-1,1\}^n \to [-1,1]$ is balanced and $\max_i
    I_i[f^{\leq d}] \leq \tau$, then $\operatorname{Stab}_{\rho}(f) \leqslant 1 -
    \frac{2}{\pi} \operatorname{Arccos}(\rho) + \varepsilon$.'
  kind: theorem
  location: Section 6
  name: Theorem 6.4
- description: Suppose $G=(V,E)$ has a cut of size $(1-\varepsilon)|E|$. Then the
    expected size of the cut in the Goemans-Williamson algorithm is at least $\left(1-\frac{2}{\pi}\sqrt{\varepsilon}-O(\varepsilon^{1.5})\right)|E|$.
  kind: theorem
  location: Lecture 16, Section 1.3
  name: Theorem 1.1
- description: There is an efficient algorithm that finds a vertex-cover of size at
