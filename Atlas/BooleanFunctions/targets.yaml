- description: Let $0 \leqslant p < 1/2$. The $p$-biased Kneser graph is a graph whose
    vertex set is $P([n])$, and the weight of a set $A$ is $\mu_p(A) = p^{|A|}(1-p)^{n-|A|}$.
    The edges of the graph are $E = \{(A, B) \mid A \cap B = \emptyset\}$.
  kind: definition
  location: Lecture 17, Section 1.2
  name: Definition 1.3
- description: 'For $\eta > 0$, $t \in \mathbb{N}$ we are given a non-bipartite Unique-Games
    instance $\Psi = (X, E, \Sigma, \Phi)$, and we wish to distinguish between the
    following two cases: 1. YES case: there exists $X'' \subseteq X$ of size at least
    $(1 - \eta)|X|$, and an assignment $A: X'' \to \Sigma$, such that $A$ satisfies
    all of the constraints inside $X''$. 2. NO case: for all $X'' \subseteq X$ of
    size at least $\eta |X|$ and a $t$-assignment, i.e. $A: X'' \to {\Sigma \choose
    t}$, not all of the constraints in $X''$ are satisfied by $A$.'
  kind: definition
  location: Lecture 17, Section 1.3
  name: Definition 1.4 (A strongish form of UGC)
- description: Assuming UGC, for all $t \in \mathbb{N}$, $\eta > 0$, the problem gap-StrongishUG$_t$[$1
    - \eta$, $\eta$] is NP-hard.
  kind: theorem
  location: Lecture 17, Section 1.3
  name: Theorem 1.5
- description: For all $\varepsilon > 0$, $p = \frac{1}{2} - \varepsilon$ there are
    $t \in \mathbb{N}$ and $\eta > 0$ such that the following holds. 1. If $\Psi$
    is from the YES case of Strongish Unique-Games, then $G$ has an independent set
    of weight at least $p - \varepsilon$. 2. If $\Psi$ is from the NO case of Strongish
    Unique-Games, then the heaviest independent set in $G$ has weight at most $\varepsilon$.
