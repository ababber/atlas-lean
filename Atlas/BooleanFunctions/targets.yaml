- description: 'For all $\varepsilon, \delta > 0$, there is $q = O\left(\frac{\log(1/\delta)}{\varepsilon^2}\right)$
    and an algorithm performing the following task. Given membership queries to $f:
    \{-1,1\}^n \to [-1,1]$, and sets $T \subseteq J \subseteq [n]$, the algorithm
    outputs a number $b_{T,J}$ such that $\Pr\left[ \left| b_{T,J} - \sum_{S: S \cap
    J = T} \widehat{f}(S)^2 \right| \geqslant \varepsilon \right] \leqslant \delta$.'
  kind: claim
  location: Lecture 3, Section 2
  name: Claim 2.1
- description: 'The following holds for any $f, g: \{-1, 1\}^n \to \mathbb{R}$: 1.
    Plancherel''s equality: $\langle f, g \rangle = \sum_{S \subseteq [n]} \widehat{f}(S)
    \widehat{g}(S)$. 2. Parseval''s equality: $\|f\|_2^2 = \sum_{S \subseteq [n]}
    \widehat{f}(S)^2$.'
  kind: claim
  location: Lecture 1, Section 2.1
  name: Claim 2.2
- description: 'Let $f: \{-1,1\}^n \to \mathbb{R}$, $J \subseteq [n]$, $z \in \{-1,1\}^{\overline{J}}$
    and $S \subseteq J$. We have $\widehat{f_{\bar{J}\to z}}(S) = \sum_{T\subseteq
    \bar{J}} \widehat{f}(S\cup T)\chi_T(z)$.'
  kind: claim
  location: Lecture 2, Section 2
  name: Claim 2.3
- description: For all $S \subseteq [n]$ it holds that $\widehat{f * g}(S) = \widehat{f}(S)\widehat{g}(S)$.
  kind: claim
  location: Lecture 2, Section 1
  name: Claim 1.1
- description: 'Suppose $f: \{-1,1\}^n \to \{-1,1\}$ is a function such that $\Pr_{x,y}
    [f(x)f(y) = f(xy)] \geqslant \frac{1}{2} + \delta$. Then there exists $S \subseteq
    [n]$ such that $\widehat{f}(S) \geqslant 2\delta$.'
  kind: theorem
  location: Lecture 2, Section 1
  name: Theorem 1.2
- description: 'Given a function $f: \{-1,1\}^n \to \mathbb{R}$ and $i \in [n]$, the
    discrete derivative of $f$ along $i$ is a function $\partial_i f: \{-1,1\}^{n-1}
    \to \mathbb{R}$ defined as $\partial_i f(y) = \frac{1}{2} (f(x_i = 1, x_{-i} =
    y) - f(x_i = -1, x_{-i} = y))$.'
  kind: definition
  location: Lecture 4, Section 2
  name: Definition 2.1 (Discrete derivatives)
- description: 'Given a function $f: \{-1,1\}^n \to \mathbb{R}$ and $i \in [n]$, the
    $L^2$ influence of $i$ on $f$ is defined as $I_i[f] = \|\partial_i f\|_2^2$. The
    total $L^2$ influence of $f$ is $I[f] = \sum_{i=1}^n I_i[f]$.'
  kind: definition
  location: Lecture 4, Section 2
  name: Definition 2.2
- description: 'Let $f: \{-1,1\}^n \to \mathbb{R}$, $J \subseteq [n]$ and $S \subseteq
    J$. We have $\mathbb{E}_{z}\left[\widehat{f_{\bar{J}\to z}}(S)^{2}\right] = \sum_{T\subseteq
    \bar{J}}\widehat{f}(S\cup T)^{2}$.'
  kind: claim
  location: Lecture 2, Section 2
  name: Claim 2.4
- description: 'Given a function $f: \{-1,1\}^n \to \mathbb{R}$ and a parameter $p
    \in [0,1]$, a $p$-random restriction is sampled by: taking $J \subseteq [n]$ randomly
    by including each $i \in [n]$ in $J$ with probability $p$, and then taking $z
    \in \{-1,1\}^{\overline{J}}$.'
  kind: definition
  location: Lecture 2, Section 2
  name: Definition 2.5
- description: 'Let $f: \{-1,1\}^n \to \mathbb{R}$ be a function, and $d \in \mathbb{N}$.
    The level $d$ Fourier weight of a function $f$ is defined as $W^{=d}[f] = \sum_{|S|=d}
    \widehat{f}(S)^2$. We also define $W^{\leqslant d}[f] = \sum_{i \leqslant d} W^{=i}[f]$
    and $W^{\geqslant d}[f] = \sum_{i \geqslant d} W^{=i}[f]$.'
  kind: definition
  location: Lecture 2, Section 2
  name: Definition 2.6
- description: 'Let $f: \{-1,1\}^n \to \mathbb{R}$, $d \in \mathbb{N}$, and let $(J,z)$
    be a $p$-random restriction. Then $\mathbb{E}_{J,z}\left[W^{=d}[f_{\bar{J}\to
    z}]\right] = \sum_{Q}\widehat{f}(Q)^{2}\Pr\left[\operatorname{Bin}(|Q|,p) = d\right]$.'
  kind: claim
  location: Lecture 2, Section 2
  name: Claim 2.7
- description: 'Suppose that $f: \{-1,1\}^n \to \{-1,1\}$ satisfies $W_{\geqslant
    d}[f] \leqslant \varepsilon$, and let $(J,z)$ be a $p$-random restriction. Then
    $\mathbb{E}_{J,z}\left[W^{\geqslant 2pd}[f_{\bar{J}\to z}]\right]\leqslant \varepsilon
    + \exp(-\Theta(pd))$.'
  kind: corollary
  location: Lecture 2, Section 2
  name: Corollary 2.8
- description: We define the weight around level $d$ to be $W^{\approx d}[f] = \sum_{d
    \leqslant k \leqslant 2d} W^{=k}[f]$.
  kind: definition
  location: Lecture 2, Section 2
  name: Definition 2.9
- description: 'Let $d \in \mathbb{N}$ and $p \in [0,1]$ be such that $pd \geqslant
    10$. Suppose that $f : \{-1,1\}^n \to \{-1,1\}$ satisfies $W_{\geqslant d}[f]
    \leqslant \varepsilon$, and let $(J,z)$ be a $p$-random restriction. Then $\mathbb{E}_{J,z}\left[W^{\approx
    pd}[f_{\bar{J}\to z}]\right]\geqslant \Omega(W^{\approx d}[f])$.'
  kind: corollary
  location: Lecture 2, Section 2
  name: Corollary 2.10
- description: Suppose $Y_1, \ldots, Y_n$ are independent random variables such that
    $|Y_i| \le 1$ almost surely. Then for every $\varepsilon > 0$, $\Pr\left[\sum_{i=1}^{n}
    Y_i - \sum_{i=1}^{n} \mathbb{E}\left[Y_i\right] \geqslant \varepsilon n\right]
    \leqslant 2e^{-\frac{\varepsilon^2}{2+\varepsilon}n}$.
  kind: claim
  location: Lecture 3, Section 1
  name: Fact 1.1
- description: 'For all $\varepsilon, \delta > 0$, there is $q = O\left(\frac{\log(1/\delta)}{\varepsilon^2}\right)$
    and an algorithm performing the following task. Given a sequence of random input-output
    pairs of $f: \{-1,1\}^n \to [-1,1]$ and a character $S \subseteq [n]$, the algorithm
    produces an estimate $a_S$ of $\widehat{f}(S)$ such that $\Pr\left[|\widehat{f}(S)
    - a_S| \geqslant \varepsilon\right] \leqslant \delta$.'
  kind: claim
  location: Lecture 3, Section 1
  name: Claim 1.2
- description: 'For all $t, \varepsilon, \delta > 0$ there exists an algorithm whose
    runtime is $\operatorname{poly}(n, t, 1/\varepsilon, 1/\delta)$ such that the
    following holds. Given an oracle access to a $(t, \varepsilon)$-sparse function
    $f: \{-1, 1\}^n \to \{-1, 1\}$, the algorithm produces a hypothesis function $H:
    \{-1, 1\}^n \to \{-1, 1\}$ such that $\|f - H\|_2^2 \leqslant 4\varepsilon + \delta$.'
  kind: theorem
  location: Lecture 3, Section 3
  name: Theorem 3.1
- description: 'For a function $f: \{-1,1\}^n \to \{0,1\}$ and a coordinate $i \in
    [n]$, the influence of $i$ is defined as $I_i[f] = \Pr_{x \in \{-1,1\}^n} [f(x)
    \neq f(x^{\oplus i})]$. Here, $x^{\oplus i}$ is the vector $x$ in which the $i$th
    coordinate has been flipped.'
  kind: definition
  location: Lecture 4, Section 1
  name: Definition 1.1
- description: 'For a function $f: \{-1,1\}^n \to \{0,1\}$, the total influence of
    $f$ is defined as $I[f] = \sum_{i=1}^{n} I_i[f]$.'
  kind: definition
  location: Lecture 4, Section 1
  name: Definition 1.2
- description: 'If $f: \{-1,1\}^n \to \{-1,1\}$, then $I[f] = \mathbb{E}_x[s_f(x)]$.'
  kind: claim
  location: Lecture 4, Section 3
  name: Claim 3.1
- description: 'Let $f: \{0,1\}^n \to \{0,1\}$ be a monotone function. Then $\frac{d}{dp}\mu_p(f)
    = I[f; \mu_p^{\otimes n}]$.'
  kind: lemma
  location: Lecture 4, Section 4
  name: Lemma 4.1 (Russo-Margulis)
- description: 'For a function $f: \{-1,1\}^n \to \mathbb{R}$ and $i \in [n]$, we
    have that $\partial_i f(y) = \sum_{S \ni i} \widehat{f}(S) \chi_{S \setminus \{i\}}(y)$.'
  kind: claim
  location: Lecture 4, Section 5
  name: Claim 5.1
- description: $I_i[f] = \sum_{S \ni i} \widehat{f}(S)^2$.
  kind: corollary
  location: Lecture 4, Section 5
  name: Corollary 5.2
- description: $I[f] = \sum_{S} |S| \, \widehat{f}(S)^2$.
  kind: corollary
  location: Lecture 4, Section 5
  name: Corollary 5.3
- description: 'For any $f: \{-1,1\}^n \to \mathbb{R}$ we have that $I[f] \geqslant
    \operatorname{var}(f)$.'
  kind: corollary
  location: Lecture 4, Section 5
  name: Corollary 5.4 (Poincaré inequality)
- description: There is an absolute constant $c>0$, such that for any $f:\{-1,1\}^n
    \to \{-1,1\}$, there is $i\in[n]$ such that $I_i[f]\geqslant c\frac{\log n}{n}\mathrm{var}(f)$.
  kind: theorem
  location: Lecture 4, Section 5
  name: Theorem 5.5 (KKL theorem)
- description: 'For any $p \ge 1$ we define the $L^p$ norm of $f: \{-1,1\}^n \to \mathbb{R}$
    as $$\|f\|_p = \left( \underset{x \sim \{-1,1\}^n}{\mathbb{E}} [|f(x)|^p] \right)^{1/p}.$$'
  kind: definition
  location: Lecture 5
  name: Definition 0.1
- description: 'If $f: \{-1,1\} \to \mathbb{R}$ has degree 1, then $\|f\|_4 \leqslant
    \sqrt{3}\|f\|_2$. More generally, for any $q \geqslant 2$, $\|f\|_q \leqslant
    \sqrt{q-1}\|f\|_2$.'
  kind: lemma
  location: Lecture 5, Section 1
  name: Lemma 1.1
- description: 'Let $f: \{-1,1\}^n \to \{-1,1\}$. Then for every $\varepsilon > 0$,
    there exists $J \subseteq [n]$ of size at most $2^{O\left(\frac{I[f]}{\varepsilon\operatorname{var}(f)}\right)}$
    and a $J$-junta $g: \{-1,1\}^n \to \{-1,1\}$ such that $\|f-g\|_2 \leqslant \varepsilon$.'
  kind: theorem
  location: Lecture 7, Section 2
  name: Theorem 2.1
- description: 'Let $x \in \{-1,1\}^n$, and let $\rho \in [0,1]$. The distribution
    of $\rho$-correlated inputs with $x$, denoted as $y \sim T_{\rho}x$, is defined
    as: for each $i \in [n]$ independently, set $y_i = x_i$ with probability $\rho$,
    and otherwise resample $y_i$ according to the uniform distribution over $\{-1,1\}$.'
  kind: definition
  location: Lecture 5, Section 2.2
  name: Definition 2.2
- description: 'For all $f: \{-1,1\} \to \mathbb{R}$, $1 \le p \le q$ and $0 \le \rho
    \le \sqrt{\frac{p-1}{q-1}}$ it holds that $\|T_{\rho}f\|_q \le \|f\|_p$.'
  kind: theorem
  location: Lecture 5, Section 2.2
  name: Theorem 2.3 (The hypercontractive inequality)
- description: 'For all $f: \{-1,1\} \to \mathbb{R}$ and $\rho \in [0,1]$ we have
    that $$T_{\rho}f(x) = \sum_{S \subseteq [n]} \rho^{|S|} \widehat{f}(S) \chi_S(x).$$'
  kind: claim
  location: Lecture 5, Section 2.2
  name: Claim 2.4
- description: For $\rho \in [0,1]$, the $\rho$-noisy hypercube graph is the graph
    on the vertex set $\{-1,1\}^n$, whose edges are sampled according to the $T_\rho$
    process. Namely, the distribution over the neighbours of a given vertex $x \in
    \{-1,1\}^n$ is given by $T_\rho x$.
  kind: definition
  location: Lecture 5, Section 3.1
  name: Definition 3.1 (Noisy hypercube)
- description: Let $G = (V, E, w)$ be a weighted regular graph, and let $S \subseteq
    V$ be a vertex set. The expansion of $S$ is defined as $$\Phi_G(S) = \Pr_{x \in
    S, y \sim_w N(x)} [y \notin S].$$
  kind: definition
  location: Lecture 5, Section 3.1
  name: Definition 3.2 (Edge expansion)
- description: A graph $G = (V, E, w)$ is called an $(\varepsilon, \delta)$-small
    set expander if for any $S \subseteq V$ of size at most $\delta n$, it holds that
    $\Phi_G(S) \geqslant 1 - \varepsilon$.
  kind: definition
  location: Lecture 5, Section 3.1
  name: Definition 3.3
- description: For $\rho = \frac{1}{\sqrt{3}}$, the noisy hypercube graph is a small-set
    expander.
  kind: claim
  location: Lecture 5, Section 3.1
  name: Claim 3.4
- description: 'Suppose $f: \{-1,1\}^n \to \mathbb{R}$ is a function of degree at
    most $d$, and let $t \geqslant 2^d$. Then $$\Pr_{x}[|f(x)| \ge t\|f\|_2] \le e^{-\frac{t^{2/d}}{2}}.$$'
  kind: theorem
  location: Lecture 5, Section 3.2
  name: Theorem 3.6
- description: 'Suppose $f: \{-1,1\}^n \to \mathbb{R}$ is a function of degree at
    most $d$, and let $0 < \theta < 1$. Then $$\Pr_{x} [|f(x)| \ge \theta \|f\|_2]
    \ge \frac{(1 - \theta^2)^2}{9^d}.$$'
  kind: theorem
  location: Lecture 5, Section 3.3
  name: Theorem 3.8
- description: 'Let $f: \{-1,1\}^n \to \mathbb{R}$ be a function of degree at most
    $d$. Then $\|f\|_2 \leqslant 3^d \|f\|_1$.'
  kind: lemma
  location: Lecture 5, Section 3.4
  name: Lemma 3.9
- description: 'There exists an absolute constant $C > 0$, such that for any $f :
    \{-1, 1\}^n \to \{-1, 1\}$ it holds that $$C\sum_{i=1}^{n} \frac{I_i[f]}{\log(1/I_i[f])}
    \geqslant \operatorname{var}(f).$$'
  kind: theorem
  location: Lecture 7, Section 1
  name: Theorem 1.1 (Talagrand)
- description: $\deg(1_S) \geqslant \Omega(\log(1/\delta))$.
  kind: claim
  location: Lecture 6, Section 2
  name: Claim 2.1
- description: 'Let $f: \{-1,1\}^n \to \{-1,0,1\}$ be a function such that $0 < \Pr_x
    [f(x) \neq 0] \leqslant \delta$. Then $$\sum_{|S| \leqslant \frac{1}{20} \log(1/\delta)}
    \widehat{f}(S)^2 \leqslant \delta^{24/20}.$$'
  kind: lemma
  location: Lecture 6, Section 2
  name: Lemma 2.2
- description: 'For all $f: \{-1,1\}^n \to \{-1,1\}$ it holds that $$I[f] \geqslant
    \Pr[f(x) = -1] \log \left(\frac{1}{\Pr[f(x) = -1]}\right).$$'
  kind: theorem
  location: Lecture 7, Section 3
  name: Theorem 3.1 (The edge isoperimetric inequality)
- description: 'For any $f: \{-1,1\}^n \to \{-1,1\}$, there is $i \in [n]$ such that
    $I_i[f] \geqslant \Omega\left(\frac{\log n}{n} \mathsf{var}(f)\right)$.'
  kind: corollary
  location: Lecture 6, Section 3
  name: Corollary 3.2
- description: 'There exists $f: \{0,1\}^n \to \{0,1\}$ with $\text{var}(f) \geqslant
    \Omega(1)$ and $I_i[f] = O(\log n/n)$ for all $i \in [n]$.'
  kind: claim
  location: Lecture 6, Section 4
  name: Claim 4.1
- description: 'Let $f: \{-1,1\}^n \to \{-1,1\}$ be a function such that $I[f] \leqslant
    K \cdot \text{var}(f)$. Then there is an $i \in [n]$ such that $I_i[f] \geqslant
    e^{-O(K)}$.'
  kind: theorem
  location: Lecture 7
  name: Theorem 0.1
- description: 'For all $f: \{-1,1\}^n \to \{-1,1\}$, $$\mu(V - \mathsf{boundary}(S))I[f]
    \geqslant \Omega(\mathsf{var}(f)^2).$$'
  kind: theorem
  location: Lecture 7, Section 3.1
  name: Theorem 3.2 (Margulis)
- description: For all $\zeta > 0$, $\varepsilon > 0$ there exists $J \in \mathbb{N}$
    such that the following holds. If $\mathcal{F} \subseteq \{0,1\}^n$ is an intersecting
    family, and $\zeta < p < 1 - \zeta$, then there exists an intersecting $J$-junta
    $\mathcal{J} \subseteq \{0,1\}^n$ such that $\mu_p(\mathcal{F} \setminus \mathcal{J})
    \leqslant \varepsilon$.
  kind: theorem
  location: Section 3, The main result (Erdős-Ko-Rado type theorem)
  name: Theorem 3.1 (Dinur-Friedgut)
- description: 'For all $f: \{-1,1\}^n \to \{-1,1\}$, $\mathbb{E}_{x}\left[\sqrt{s_f(x)}\right]
    \geqslant \Omega(\mathsf{var}(f))$.'
  kind: theorem
  location: Section 3.1, Other notions of boundary
  name: Theorem 3.3
- description: 'For all $f: \{-1, 1\}^n \to \{-1, 1\}$, $\mathbb{E}_{x}\left[\sqrt{s_{f}(x)}\right]
    \geqslant \Omega\left(\operatorname{var}(f)\sqrt{\log\left(\frac{1}{\operatorname{var}(f)}\right)}\right)$.'
  kind: theorem
  location: Section 3.1, Other notions of boundary
  name: Theorem 3.4
- description: 'There exists $0 < \alpha < 1/2$ such that for all $f: \{-1,1\}^n \to
    \{-1,1\}$, $\mathbb{E}_{x}\left[\sqrt{s_f(x)}\right] \geqslant \Omega\left(\operatorname{var}(f)\log^{1/2-\alpha}\left(\frac{1}{\operatorname{var}(f)}\right)\log^{\alpha}\left(\frac{1}{M(f)}\right)\right)$.'
  kind: theorem
  location: Section 3.3, Mixing everything together
  name: Theorem 3.5
- description: 'Let $f: \{-1,1\}^n \to \mathbb{R}$, and $\rho \in [0,1]$. The stability
    of $f$ with parameter $\rho$ is defined as $\mathsf{Stab}_{\rho}(f) = \langle
    f, \mathsf{T}_{\rho} f \rangle$.'
  kind: definition
  location: Section 1, Noise stability and noise sensitivity
  name: Definition 1.1 (Noise Stability)
- description: 'For all $\rho > 0$, $\delta > 0$ there is $\tau > 0$ such that if
    $f: \{-1,1\}^n \to \{-1,1\}$ is balanced, and $I_i[f] \leqslant \tau$ for all
    $i \in [n]$, then $\mathsf{Stab}_{\rho}(f) \leqslant \mathsf{Stab}_{\rho}(\mathsf{Majority})
    + \delta$.'
  kind: theorem
  location: Section 1, Noise stability and noise sensitivity
  name: Theorem 1.2
- description: 'Let $f: \{-1,1\}^n \to \mathbb{R}$, $\rho \in [0,1]$. Then $\operatorname{\mathsf{Stab}}_{\rho}(f)
    = \sum_{S} \rho^{|S|} \widehat{f}(S)^2$.'
  kind: claim
  location: Section 1, Noise stability and noise sensitivity
  name: Claim 1.3
- description: $\operatorname{Stab}_{\rho}(\operatorname{Majority}_n) = 1 - \frac{2}{\pi}\operatorname{arccos}(\rho)
    + o(1)$.
  kind: theorem
  location: Section 1.1, The noise stability of Majority
  name: Theorem 1.4 (Sheppards Formula)
- description: '[Arrow''s impossibility theorem] Suppose $f: \{-1,1\}^n \to \{-1,1\}$
    is an unanimous voting rule, i.e. such that $f(\vec{1}) = 1$, $f(-\vec{1}) = -1$.
    If in 3-candidate election $f$ always has a Condorcet winner, then $f$ is a dictatorship.'
  kind: theorem
  location: Section 2.1, Set up (Arrow's impossibility theorem)
  name: Theorem 2.1
- description: $\mathsf{NAE}_3(a, b, c) = \frac{3}{4} - \frac{1}{4}(ab + bc + ac)$.
  kind: claim
  location: Section 2.2, Preliminary facts
  name: Claim 2.2
- description: Let $-1 \le \rho < 0$. The distribution of $\rho$-correlated inputs
    is defined as the joint distribution of $(a,b) \in \{-1,1\}^2$ such that marginally
    each one of $a$ and $b$ is distributed uniformly, and $\mathbb{E}[ab] = \rho$.
  kind: definition
  location: Section 2.2, Preliminary facts
  name: Definition 2.3
- description: 'Suppose $f: \{-1,1\}^n \to \{-1,1\}$ is a voting rule such that the
    probability of reaching a Condorcet paradox when sampling the votes $x, y, z$
    as $(x_i, y_i, z_i) \sim \mathsf{NAE}_3^{-1}(1)$ for each $i$ independently is
    at most $\varepsilon$. Then, $f$ is $\varepsilon$-close to a dictatorship or an
    anti-dictatorship.'
  kind: theorem
  location: Section 2.4, Robust Arrow's theorem
  name: Theorem 2.4
- description: 'Let $f: \{-1,1\}^n \to \mathbb{R}$, and $\varepsilon > 0$. The noise
    sensitivity of $f$ with parameter $\rho$ is defined as $\mathsf{NS}_{\varepsilon}(f)
    = \frac{1}{2} - \frac{1}{2}\mathsf{Stab}_{1-2\varepsilon}(f)$.'
  kind: definition
  location: Section 3, Noise sensitivity
  name: Definition 3.1 (Noise Sensitivity)
- description: 'Let $f: \{-1,1\}^n \to \mathbb{R}$. Then $\mathsf{NS}_{\varepsilon}(f)
    = \frac{1}{2} \sum_{S} (1 - (1-2\varepsilon)^{|S|}) \widehat{f}(S)^2$.'
  kind: claim
  location: Section 3, Noise sensitivity
  name: Claim 3.2
- description: There exists an absolute constant $C > 0$, such that for all $k \in
    \mathbb{N}$, $W^{=k}[f] \leqslant \left(\frac{C}{k}\right)^k M(f) \log\left(\frac{k}{M(f)}\right)^{k-1}$.
  kind: theorem
  location: Section 4, The BKS theorem
  name: Theorem 4.1
- description: There exists an absolute constant $c > 0$, such that for all $k \le
    c \log(1/M(f))$ we have that $W^{=k}[f] \leqslant \sqrt{M(f)}$.
  kind: corollary
  location: Section 4, The BKS theorem
  name: Corollary 4.2
- description: 'There exists an absolute constant $\alpha > 0$ such that for all $\varepsilon
    > 0$ and $f: \{-1,1\}^n \to \{-1,1\}$, $\left|\frac{1}{2}\mathsf{var}(f) - \mathsf{NS}_{\varepsilon}(f)\right|
    \leqslant M(f)^{\alpha\varepsilon}$.'
  kind: corollary
  location: Section 4, The BKS theorem
  name: Corollary 4.3
- description: 'There exists $\alpha > 0$ such that for all monotone $f: \{-1,1\}^n
    \to \{-1,1\}$, $(1-\varepsilon)M(f)\leqslant \left|\frac{1}{2}\mathsf{var}(f)-\mathsf{NS}_{\varepsilon}(f)\right|\leqslant
    M(f)^{\alpha\varepsilon}$. Thus, $f$ is $(\varepsilon, o(1))$ noise sensitive
    if and only if $M(f) = o(1)$.'
  kind: theorem
  location: Section 4, The BKS theorem
  name: Theorem 4.4
- description: There exists an absolute constant $C > 0$, such that for all $k \in
    \mathbb{N}$, $W^{=k}[f] \leqslant C^k M(f) \log \left(\frac{1}{M(f)}\right)^{k-1}$.
  kind: theorem
  location: Section 4, The BKS theorem
  name: Theorem 4.5
- description: '[Level k inequality] Suppose $g: \{-1,1\}^n \to \{-1,0,1\}$ is non-zero
    with probability $\delta$, and let $k \in \mathbb{N}$. Then $W^{\leqslant k}[g]
    \leqslant \delta^2 (e \log(2/\delta))^k$.'
  kind: lemma
  location: Section 5.1, The level k inequalities
  name: Lemma 5.1
- description: There is a partition $(I, J)$ of $[n]$ such that $\sum_{\substack{|S|=k\\|S\cap
    I|=1}} \widehat{f}(S)^2 \geqslant \frac{1}{e} W^{=k}[f]$.
  kind: claim
  location: Section 6, Proof of Theorem 4.5
  name: Claim 6.1
- description: Suppose F is an intersecting family. Then F^↑ (the upwards closure
    of F) is also intersecting.
  kind: claim
  location: Section 3.1
  name: Claim 3.2
- description: 'Let r ∈ ℕ, ε > 0 and 0 < p < 1. We say a Boolean function f: {0,1}^n
    → {0,1} is (r,ε) quasi-random with respect to p if for any R ⊆ [n] of size at
    most r, and any z ∈ {0,1}^R it holds that |μ_p(f_{R→z}) - μ_p(f)| ≤ ε.'
  kind: definition
  location: Section 3.2
  name: Definition 3.3
- description: Let r ∈ ℕ, ε > 0 and 0 < p < 1. We say F is (r,ε) quasi-random with
    respect to p if 1_F is (r,ε) quasi-random with respect to p.
  kind: definition
  location: Section 3.2
  name: Definition 3.5
- description: 'For all r ∈ ℕ, ε > 0, δ, ζ > 0 there exists J ∈ ℕ such that the following
    holds. If ζ ≤ p ≤ 1 - ζ, and f: {0,1}^n → {0,1} is any Boolean function, then
    there exists a set T ⊆ [n] of size at most J, such that Pr_{z ~ μ_p^T}[f_{T→z}
    is not (r,ε) quasi-random] ≤ δ.'
  kind: lemma
  location: Section 3.2
  name: Lemma 3.6
- description: 'For all ζ, α > 0, there exists r ∈ ℕ, ε > 0 such that the following
    holds. Suppose ζ < p < 1/2 and f: {0,1}^n → {0,1} is monotone with μ_p(f) ≥ α.
    If f is (r,ε) quasi-random, then μ_{p+ζ/2}(f) ≥ 0.9.'
  kind: lemma
  location: Section 4 (Properties of quasi-random families), Section 4.1
  name: Lemma 4.1
- description: Suppose G, H ⊆ P([n]) are such that μ_{1/2}(G) + μ_{1/2}(H) > 1. Then
