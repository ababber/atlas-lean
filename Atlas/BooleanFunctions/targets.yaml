- description: 'An instance of Unique-Games, denoted by $\Psi$, is composed of a bipartite,
    bi-regular graph $G = (V = L \cup R, E)$, a finite alphabet $\Sigma$, and a collection
    of constraints $\Phi = (\phi_e)_{e \in E}$ one for each edge. Each one of the
    constraints $\phi_e$ is a 1-to-1 map, $\phi_e\colon \Sigma \to \Sigma$. For an
    edge $e$, the constraint $\phi_e$ defines a collection of tuples which are deemed
    as satisfactory assignments to the endpoints of the edge, which is $\{(\sigma,
    \phi_e(\sigma)) \mid \sigma \in \Sigma\}$. The goal in Unique-Games is to find
    an assignment $A: V \to \Sigma$ that satisfies as many of the constraints $\phi_e$.
    The value of a Unique-Games instance, denoted by $\operatorname{val}(\Psi)$, is
    defined to be $\max_{A: V\to\Sigma} \frac{\#\{e\mid A \text{ satisfies } \phi_e\}}{|E|}$.'
  kind: definition
  location: Lecture 15, Section 3.2
  name: Definition 3.5
- description: 'For all $\varepsilon, \delta > 0$, there exists $k \in \mathbb{N}$
    such that given a Unique-Games instance $\Psi$, it is NP-hard to distinguish between:
    (1) YES case: $\operatorname{val}(\Psi) \ge 1 - \varepsilon$; (2) NO case: $\operatorname{val}(\Psi)
    \leq \delta$. In other words, gap-UniqueGames$_k[1 - \varepsilon, \delta]$ is
    NP-hard.'
  kind: conjecture
  location: Lecture 15, Section 3.2
  name: Conjecture 3.6 (The Unique-Games Conjecture)
- description: 'Assuming the Unique-Games Conjecture, for all $\rho \in (0,1)$ and
    $\varepsilon > 0$, given a graph $G = (V, E)$ it is NP-hard to distinguish between
    the following two cases: (1) YES case: $G$ has a cut of fractional size at least
    $\frac{1}{2} + \frac{1}{2}\rho - \varepsilon$; (2) NO case: all cuts in $G$ have
    fractional size at most $1 - \frac{1}{\pi} \operatorname{Arccos}(\rho) + \varepsilon$.'
  kind: theorem
  location: Lecture 16, Section 2
  name: Theorem 2.1
- description: An instance of Unique-Games, denoted by $\Psi$, is composed of a bipartite,
    bi-regular graph $G = (V = L \cup R, E)$, a finite alphabet $\Sigma$, and a collection
    of constraints $\Phi = (\phi_e)_{e \in E}$ one for each edge. Each one of the
    constraints $\phi_e$ is a 1-to-1 map, $\phi_e\colon \Sigma \to \Sigma$. For an
    edge $e$, the constraint $\phi_e$ defines a collection of tuples which are deemed
    as satisfactory assignments to the endpoints of the edge, which is $\{(\sigma,
    \phi_e(\sigma)) \mid \sigma \in \Sigma\}$.
  kind: definition
  location: Lecture 16, Section 2.2
  name: Definition 2.2
- description: 'For all $\eta > 0$, there exists $k \in \mathbb{N}$ such that given
    a Unique-Games instance $\Psi$, it is NP-hard to distinguish between: (1) YES
    case: $\operatorname{val}(\Psi) \geqslant 1 - \eta$; (2) NO case: $\operatorname{val}(\Psi)
    \leq \eta$. In other words, gap-UniqueGames$_k[1-\varepsilon,\delta]$ is NP-hard.'
  kind: conjecture
  location: Lecture 16, Section 2.2
  name: Conjecture 2.3 (The Unique-Games Conjecture)
- description: 'For all $\rho \in (0,1)$, $\delta > 0$ there is $\eta > 0$ such that:
    (1) Completeness: if $\Psi$ is at least $1-\eta$ satisfiable, then there is a
    cut in $G$ of weight at least $\frac{1}{2}(1+\rho)-\delta$. (2) Soundness: if
    $\Psi$ is at most $\eta$ satisfiable, then $G$ has no cut whose weight exceeds
    $1 - \frac{1}{\pi}\mathsf{Arccos}(\rho) + \delta$.'
  kind: lemma
  location: Lecture 16, Section 2.2
  name: Lemma 2.4
- description: 'For all $\rho \in (0,1)$, $\delta > 0$ there exist $d \in \mathbb{N}$,
    $\tau > 0$ such that if $f : \{-1,1\}^n \to [-1,1]$ is a function for which $\max_i
    I_i^{\leqslant d}[f] \leqslant \tau$, then $\mathsf{Stab}_{-\rho}(f)\geqslant
    \frac{2}{\pi}\mathsf{Arccos}(\rho)-1-\delta$.'
  kind: theorem
  location: Lecture 16, Section 2.3
  name: Theorem 2.5
- description: $\widehat{g_u}(S) = \mathbb{E}_{w:(u,w)\in E}\left[\widehat{g_w}(\phi_{(u,w)}S)\right]$.
  kind: lemma
  location: Lecture 16, Section 2.3
  name: Lemma 2.6
- description: 'Assuming UGC, for all $\varepsilon > 0$, given a graph $G = (V, E)$
    it is NP-hard to distinguish between the cases: 1. YES case: $\mathsf{IS}(G) \geqslant
    \left(\frac{1}{2} - \varepsilon\right) n$. 2. NO case: $\mathsf{IS}(G) \leqslant
    \varepsilon n$.'
  kind: theorem
  location: Lecture 17, Section 1.1
  name: Theorem 1.1
- description: 'Assuming UGC, for all $\varepsilon > 0$, given a graph $G = (V, E)$
    it is NP-hard to distinguish between the cases: 1. YES case: $\mathsf{VC}(G) \leqslant
    \left(\frac{1}{2} + \varepsilon\right) n$. 2. NO case: $\mathsf{VC}(G) \geqslant
    (1 - \varepsilon)n$.'
  kind: corollary
  location: Lecture 17, Section 1.1
