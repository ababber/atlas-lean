- description: 'An absolute value on a field $k$ is a map $||: k \rightarrow \mathbb{R}_{\geq
    0}$ such that for all $x, y \in k$ the following hold:

    1. $|x|=0$ if and only if $x=0$;

    2. $|xy|=|x||y|$;

    3. $|x+y| \leq |x|+|y|$.

    If the stronger condition

    4. $|x+y| \leq \max(|x|,|y|)$

    also holds, then the absolute value is nonarchimedean; otherwise it is archimedean.'
  kind: definition
  location: Section 1.2
  name: Definition 1.2
- description: An absolute value $||$ on a field $k$ is nonarchimedean if and only
    if $|\underbrace{1+\cdots+1}_{n}| \leq 1$ for all $n \geq 1$.
  kind: lemma
  location: Section 1.2
  name: Lemma 1.4
- description: In a field of positive characteristic every absolute value is nonarchimedean,
    and the only absolute value on a finite field is the trivial one.
  kind: corollary
  location: Section 1.2
  name: Corollary 1.5
- description: Two absolute values $||$ and $||'$ on the same field $k$ are equivalent
    if there exists an $\alpha \in \mathbb{R}_{>0}$ for which $|x|' = |x|^\alpha$
    for all $x \in k$.
  kind: definition
  location: Section 1.2
  name: Definition 1.6
- description: 'For a prime $p$ the $p$-adic valuation $v_p: \mathbb{Q} \rightarrow
    \mathbb{Z}$ is defined by $v_p(\pm \prod_q q^{e_q}) := e_p$, and we define $v_p(0)
    := \infty$. The $p$-adic absolute value on $\mathbb{Q}$ is defined by $|x|_p :=
    p^{-v_p(x)}$, where $|0|_p = p^{-\infty}$ is understood to be 0.'
  kind: definition
  location: Section 1.3
  name: Definition 1.7
- description: Every nontrivial absolute value on $\mathbb{Q}$ is equivalent to $||_p$
    for some $p \leq \infty$.
  kind: theorem
  location: Section 1.3
  name: Theorem 1.8 (Ostrowski's Theorem)
- description: For every $x \in \mathbb{Q}^{\times}$ we have $\prod_{p \leq \infty}
    |x|_p = 1$.
  kind: theorem
  location: Section 1.3
  name: Theorem 1.9 (Product Formula)
- description: 'A valuation on a field $k$ is a group homomorphism $k^{\times} \rightarrow
    \mathbb{R}$ such that for all $x, y \in k$ we have $v(x+y) \geq \min(v(x), v(y))$.
    We may extend $v$ to a map $k \rightarrow \mathbb{R} \cup \{\infty\}$ by defining
    $v(0) := \infty$. For any $0 < c < 1$, defining $|x|_v := c^{v(x)}$ yields a nonarchimedean
    absolute value. The image of $v$ in $\mathbb{R}$ is the value group of $v$. We
    say that $v$ is a discrete valuation if its value group is equal to $\mathbb{Z}$.
    Given a field $k$ with valuation $v$, the set $A := \{x \in k : v(x) \geq 0\}$
    is the valuation ring of $k$ (with respect to $v$). A discrete valuation ring
    (DVR) is an integral domain that is the valuation ring of its fraction field with
    respect to a discrete valuation.'
  kind: definition
  location: Section 1.4
  name: Definition 1.10
- description: A valuation ring is an integral domain $A$ with fraction field $k$
    with the property that for every $x \in k$, either $x \in A$ or $x^{-1} \in A$.
  kind: definition
  location: Section 1.4
  name: Definition 1.11
- description: A local ring is a commutative ring with a unique maximal ideal.
  kind: definition
  location: Section 1.4
  name: Definition 1.12
- description: The residue field of a local ring $A$ with maximal ideal $\mathfrak{m}$
    is the field $A/\mathfrak{m}$.
  kind: definition
  location: Section 1.4
  name: Definition 1.13
- description: 'For an integral domain $A$, the following are equivalent:

    - $A$ is a DVR.

    - $A$ is a noetherian valuation ring that is not a field.

    - $A$ is a local PID that is not a field.

    - $A$ is an integrally closed noetherian local ring of dimension one.

    - $A$ is a regular noetherian local ring of dimension one.

    - $A$ is a noetherian local ring whose maximal ideal is nonzero and principal.

    - $A$ is a maximal noetherian ring of dimension one.'
  kind: theorem
  location: Section 1.5
  name: Theorem 1.16
- description: Given a ring extension $A \subseteq B$, an element $b \in B$ is integral
    over $A$ if it is a root of a monic polynomial in $A[x]$. The ring $B$ is integral
    over $A$ if all its elements are.
  kind: definition
  location: Section 1.6
  name: Definition 1.17
- description: Let $\alpha, \beta \in B$ be integral over $A \subseteq B$. Then $\alpha
    + \beta$ and $\alpha\beta$ are integral over $A$.
  kind: proposition
  location: Section 1.6
  name: Proposition 1.18
- description: 'Given a ring extension $B/A$, the ring $\tilde{A} = \{b \in B : b
    \text{ is integral over } A\}$ is the integral closure of $A$ in $B$. When $\tilde{A}
    = A$ we say that $A$ is integrally closed in $B$. For a domain $A$, its integral
    closure (or normalization) is its integral closure in its fraction field, and
    $A$ is integrally closed (or normal) if it is integrally closed in its fraction
    field.'
  kind: definition
  location: Section 1.6
  name: Definition 1.19
- description: If $C/B/A$ is a tower of ring extensions in which $B$ is integral over
    $A$ and $C$ is integral over $B$ then $C$ is integral over $A$.
  kind: proposition
  location: Section 1.6
  name: Proposition 1.20
- description: If $B/A$ is a ring extension, then the integral closure of $A$ in $B$
    is integrally closed in $B$.
  kind: corollary
  location: Section 1.6
  name: Corollary 1.21
- description: The ring $\mathbb{Z}$ is integrally closed.
  kind: proposition
  location: Section 1.6
  name: Proposition 1.22
- description: Every unique factorization domain is integrally closed. In particular,
    every PID is integrally closed.
  kind: corollary
  location: Section 1
  name: Corollary 1.23
- description: Every valuation ring is integrally closed.
  kind: proposition
  location: Section 1
  name: Proposition 1.25
- description: A number field $K$ is a finite extension of $\mathbb{Q}$. The ring
    of integers $\mathcal{O}_{K}$ is the integral closure of $\mathbb{Z}$ in $K$.
  kind: definition
  location: Section 1
  name: Definition 1.26
- description: Let $A$ be an integrally closed domain with fraction field $K$. Let
    $\alpha$ be an element of a finite extension $L/K$, and let $f \in K[x]$ be its
    minimal polynomial over $K$. Then $\alpha$ is integral over $A$ if and only if
    $f \in A[x]$.
  kind: proposition
  location: Section 1
  name: Proposition 1.28
- description: Let $S$ be a multiplicative subset of an integral domain $A$. There
    is a one-to-one correspondence between the prime ideals of $S^{-1}A$ and the prime
    ideals of $A$ that do not intersect $S$ given by the inverse maps $\mathfrak{q}
    \mapsto \mathfrak{q} \cap A$ and $\mathfrak{p} \mapsto \mathfrak{p} S^{-1}A$.
  kind: theorem
  location: Section 2.2
  name: Theorem 2.1
- description: Let $A$ be a subring of a field $K$, and let $M$ be an $A$-module contained
    in a $K$-vector space $V$ (equivalently, for which the map $M \rightarrow M \otimes_{A}
    K$ is injective). Then $M=\bigcap_{\mathfrak{m}} M_{\mathfrak{m}}=\bigcap_{\mathfrak{p}}
    M_{\mathfrak{p}}$, where $\mathfrak{m}$ ranges over the maximal ideals of $A$,
    $\mathfrak{p}$ ranges over the prime ideals of $A$, and the intersections take
    place in $V$.
  kind: proposition
  location: Section 2.3
  name: Proposition 2.6
- description: Let $A$ be an integral domain. Every ideal $I$ of $A$ (including $I=A$)
    is equal to the intersection of its localizations at the maximal ideals of $A$,
    and also to the intersection of its localizations at the prime ideals of $A$.
  kind: corollary
  location: Section 2.3
  name: Corollary 2.7
- description: 'Let $A$ be a noetherian domain. The following are equivalent: (i)
    For every nonzero prime ideal $\mathfrak{p} \subset A$ the local ring $A_{\mathfrak{p}}$
    is a DVR. (ii) The ring $A$ is integrally closed and $\dim A \leq 1$.'
  kind: proposition
  location: Section 2.4
  name: Proposition 2.9
- description: A noetherian domain satisfying either of the equivalent properties
    of Proposition 2.9 is called a Dedekind domain.
  kind: definition
  location: Section 2.4
  name: Definition 2.10
- description: Every PID is a Dedekind domain. In particular, $\mathbb{Z}$ is a Dedekind
    domain, as is $k[x]$ for any field $k$.
  kind: corollary
  location: Section 2.4
  name: Corollary 2.11
- description: A fractional ideal of a noetherian domain $A$ is a finitely generated
    $A$-submodule of its fraction field.
  kind: definition
  location: Section 2.5
  name: Definition 2.13
- description: Let $A$ be a noetherian domain with fraction field $K$, and let $I
    \subseteq K$ be an $A$-module. Then $I$ is finitely generated if and only if $aI
    \subseteq A$ for some nonzero $a \in A$.
  kind: lemma
  location: Section 2.5
  name: Lemma 2.14
- description: Every fractional ideal of $A$ can be written in the form $\frac{1}{a}
    I$, for some nonzero $a \in A$ and ideal $I$.
  kind: corollary
  location: Section 2.5
  name: Corollary 2.16
- description: A fractional ideal of $A$ is principal if it is generated by one element,
    that is, it has the form $xA$ for some $x \in K$. We will also use the notation
    $(x):=xA$ to denote the principal fractional ideal generated by $x \in K$.
  kind: definition
  location: Section 2.5
  name: Definition 2.17
- description: Let $I$ and $J$ be fractional ideals of a noetherian domain $A$ with
    $J$ nonzero. Then $(I:J)$ is a fractional ideal of $A$.
  kind: lemma
  location: Section 2.5
  name: Lemma 2.18
- description: A fractional ideal $I$ is invertible if $IJ=A$ for some fractional
    ideal $J$.
  kind: definition
  location: Section 2.5
  name: Definition 2.19
- description: A fractional ideal $I$ of $A$ is invertible if and only if $I(A:I)=A$
    (in which case $(A:I)$ is its inverse).
  kind: lemma
  location: Section 2.5
  name: Lemma 2.20
- description: The ideal group $\mathcal{I}_A$ of a noetherian domain $A$ is the group
    of invertible fractional ideals.
  kind: definition
  location: Section 2.6
  name: Definition 2.22
- description: Let $A$ be a noetherian domain. The quotient $\operatorname{cl}(A):=\mathcal{I}_A/\mathcal{P}_A$
    is the ideal class group of $A$; it is also called the Picard group of $A$ and
    denoted $\operatorname{Pic}(A)$.
  kind: definition
  location: Section 2.6
  name: Definition 2.23
- description: Let $I$ and $J$ be fractional ideals of a noetherian domain $A$, and
    let $\mathfrak{p}$ be a prime ideal of $A$. Then $I_{\mathfrak{p}}$ and $J_{\mathfrak{p}}$
    are fractional ideals of $A_{\mathfrak{p}}$, as are $(I+J)_{\mathfrak{p}}=I_{\mathfrak{p}}+J_{\mathfrak{p}}$,
    $(IJ)_{\mathfrak{p}}=I_{\mathfrak{p}}J_{\mathfrak{p}}$, $(I:J)_{\mathfrak{p}}=(I_{\mathfrak{p}}:J_{\mathfrak{p}})$.
    The same applies if we localize with respect to any multiplicative subset $S$
    of $A$.
  kind: lemma
  location: Section 3.1
  name: Lemma 3.1
- description: Let $I$ be a fractional ideal of a noetherian domain $A$. Then $I$
    is invertible if and only if its localization at every maximal ideal of $A$ is
    invertible, equivalently, if and only if its localization at every prime ideal
    of $A$ is invertible.
  kind: theorem
  location: Section 3.1
  name: Theorem 3.2
- description: In a Dedekind domain every nonzero fractional ideal is invertible.
  kind: corollary
  location: Section 3.1
  name: Corollary 3.3
- description: A nonzero fractional ideal $I$ in a noetherian local domain $A$ is
    invertible if and only if it is principal.
  kind: lemma
  location: Section 3.1
  name: Lemma 3.4
- description: A nonzero fractional ideal in a noetherian domain $A$ is invertible
    if and only if it is locally principal, that is, its localization at every maximal
    ideal of $A$ is principal.
  kind: corollary
  location: Section 3.1
  name: Corollary 3.5
- description: Let $A$ be a Dedekind domain and let $a \in A$ be nonzero. The set
    of prime ideals that contain $a$ is finite.
  kind: lemma
  location: Section 3.2
  name: Lemma 3.6
- description: Let $I$ be a nonzero ideal of a Dedekind domain $A$. The number of
    prime ideals of $A$ that contain $I$ is finite.
  kind: corollary
  location: Section 3.2
  name: Corollary 3.7
- description: Let $\mathfrak{p}$ be a nonzero prime ideal in a Dedekind domain $A$.
    If $I$ is an ideal of $A$ then $v_{\mathfrak{p}}(I)=0$ if and only if $\mathfrak{p}$
    does not contain $I$. In particular, if $\mathfrak{q}$ is any nonzero prime ideal
    different from $\mathfrak{p}$ then $v_{\mathfrak{q}}(\mathfrak{p})=v_{\mathfrak{p}}(\mathfrak{q})=0$.
  kind: lemma
  location: Section 3.2
  name: Lemma 3.9
- description: Let $A$ be a Dedekind domain with fraction field $K$. For each nonzero
    fractional ideal $I$ we have $v_{\mathfrak{p}}(I)=0$ for all but finitely many
    prime ideals $\mathfrak{p}$. In particular, if $x \in K^{\times}$ then $v_{\mathfrak{p}}(x)=0$
    for all but finitely many $\mathfrak{p}$.
  kind: corollary
  location: Section 3.2
  name: Corollary 3.10
- description: Let $A$ be a Dedekind domain. The ideal group $\mathcal{I}_{A}$ of
    $A$ is the free abelian group generated by its nonzero prime ideals $\mathfrak{p}$.
    The isomorphism $\mathcal{I}_{A} \simeq \bigoplus_{\mathfrak{p}} \mathbb{Z}$ is
    given by the inverse maps $I \mapsto (\ldots, v_{\mathfrak{p}}(I), \ldots)$ and
    $\prod_{\mathfrak{p}} \mathfrak{p}^{e_{\mathfrak{p}}} \leftarrow (\ldots, e_{\mathfrak{p}},
    \ldots)$.
  kind: theorem
  location: Section 3.2
  name: Theorem 3.11
- description: In a Dedekind domain every nonzero fractional ideal $I$ has a unique
    factorization $I = \prod_{\mathfrak{p}} \mathfrak{p}^{v_{\mathfrak{p}}(I)}$ into
    nonzero prime ideals $\mathfrak{p}$.
  kind: corollary
  location: Section 3.2
  name: Corollary 3.13
- description: A Dedekind domain is a UFD if and only if it is a PID, equivalently,
    if and only if its class group is trivial.
  kind: corollary
  location: Section 3.2
  name: Corollary 3.15
- description: Let $A$ be a Dedekind domain and let $I$ and $I'$ be nonzero ideals.
    There exists an ideal $J$ coprime to $I'$ such that $IJ$ is principal.
  kind: lemma
  location: Section 3.3
  name: Lemma 3.16
- description: Let $I$ be a nonzero fractional ideal in a Dedekind domain $A$ and
    let $\mathfrak{p}_1, \ldots, \mathfrak{p}_n$ be a finite set of nonzero prime
    ideals of $A$. Then $I$ contains an element $x$ for which $v_{\mathfrak{p}_i}(x)
    = v_{\mathfrak{p}_i}(I)$ for $1 \leq i \leq n$.
  kind: corollary
  location: Section 3.3
  name: Corollary 3.17 (Finite approximation)
- description: Let $I$ be a nonzero ideal in a Dedekind domain $A$. The quotient ring
    $A/I$ is a principal ideal ring (every ideal in $A/I$ is principal).
  kind: corollary
  location: Section 3.3
  name: Corollary 3.18
- description: A ring that has only finitely many maximal ideals is called semilocal.
  kind: definition
  location: Section 3.3
  name: Definition 3.19
- description: Every semilocal Dedekind domain is a principal ideal domain.
  kind: corollary
  location: Section 3.3
  name: Corollary 3.21
- description: Let $I$ be a nonzero ideal in a Dedekind domain $A$ and let $a \in
    I$ be nonzero. Then $I = (a, b)$ for some $b \in I$.
  kind: theorem
  location: Section 3.3
  name: Theorem 3.22
- description: 'Let $A$ be an integral domain. The following are equivalent: (1) $A$
    is an integrally closed noetherian domain of dimension at most one. (2) $A$ is
    noetherian and its localizations at nonzero prime ideals are DVRs. (3) Every nonzero
    ideal in $A$ is invertible. (4) Every nonzero ideal in $A$ is a (finite) product
    of prime ideals. (5) $A$ is noetherian and ''to contain is to divide'' holds for
    ideals in $A$. (6) For every ideal $I$ in $A$ there is an ideal $J$ in $A$ such
    that $IJ$ is principal.'
  kind: theorem
  location: Section 3.3
  name: Theorem 3.23
- description: A polynomial $f$ in $K[x]$ is separable if $(f, f') = (1)$, that is,
    $\gcd(f, f')$ is a unit in $K[x]$. Otherwise $f$ is inseparable.
  kind: definition
  location: Section 4.1
  name: Definition 4.1
- description: Let $L/K$ be an algebraic field extension. An element $\alpha \in L$
    is separable over $K$ if it is the root of a separable polynomial in $K[x]$ (in
    which case its minimal polynomial is necessarily separable). The extension $L/K$
    is separable if every $\alpha \in L$ is separable over $K$; otherwise it is inseparable.
  kind: definition
  location: Section 4.1
  name: Definition 4.3
- description: An irreducible polynomial $f \in K[x]$ is inseparable if and only if
    $f' = 0$.
  kind: lemma
  location: Section 4.1
  name: Lemma 4.4
- description: Let $f \in K[x]$ be irreducible and let $p \geq 0$ be the characteristic
    of $K$. We have $f(x) = g(x^{p^n})$ for some irreducible separable $g \in K[x]$
    and integer $n \geq 0$ that are uniquely determined by $f$.
  kind: corollary
  location: Section 4.1
  name: Corollary 4.5
- description: If $\operatorname{char} K = 0$ then every algebraic extension of $K$
    is separable.
  kind: corollary
  location: Section 4.1
  name: Corollary 4.6
- description: 'Let $L = K(\alpha)$ be an algebraic field extension contained in an
    algebraic closure $\bar{K}$ of $K$ and let $f \in K[x]$ be the minimal polynomial
    of $\alpha$ over $K$. Then

    $$\# \operatorname{Hom}_K(L, \bar{K}) = \#\{\beta \in \bar{K} : f(\beta) = 0\}
    \leq [L:K]$$

    with equality if and only if $\alpha$ is separable over $K$.'
  kind: lemma
  location: Section 4.1
  name: Lemma 4.7
- description: Let $L/K$ be a finite extension of fields. The separable degree of
    $L/K$ is $[L:K]_s := \# \operatorname{Hom}_K(L, \bar{K})$. The inseparable degree
    of $L/K$ is $[L:K]_i := [L:K]/[L:K]_s$.
  kind: definition
  location: Section 4.1
  name: Definition 4.8
- description: 'Let $L/K$ be an algebraic field extension and let $\phi_K : K \to
    \Omega$ be a homomorphism to an algebraically closed field $\Omega$. Then $\phi_K$
    extends to a homomorphism $\phi_L : L \to \Omega$.'
  kind: theorem
  location: Section 4.1
  name: Theorem 4.9
- description: 'Let $L/F/K$ be a tower of finite extensions of fields and $\bar{K}$
    be an algebraic closure of $K$ that contains $L$. Then

    $$\# \operatorname{Hom}_K(L, \bar{K}) = \# \operatorname{Hom}_K(F, \bar{K}) \cdot
    \# \operatorname{Hom}_F(L, \bar{K}).$$'
  kind: lemma
  location: Section 4.1
  name: Lemma 4.10
- description: 'Let $L/F/K$ be a tower of finite extensions of fields. Then

    $$[L:K]_s = [L:F]_s [F:K]_s$$

    $$[L:K]_i = [L:F]_i [F:K]_i$$'
  kind: corollary
  location: Section 4.1
  name: Corollary 4.11
- description: 'Let $L/K$ be a finite extension of fields. The following are equivalent:

    (a) $L/K$ is separable;

    (b) $[L:K]_s = [L:K]$;

    (c) $L = K(\alpha)$ for some $\alpha \in L$ separable over $K$;

    (d) $L \simeq K[x]/(f)$ for some monic irreducible separable polynomial $f \in
    K[x]$.'
  kind: theorem
  location: Section 4.1
  name: Theorem 4.12
- description: Let $L/K$ be a finite extension of fields. Then $[L:K]_s \leq [L:K]$
    with equality if and only if $L/K$ is separable.
  kind: corollary
  location: Section 4.1
  name: Corollary 4.13
- description: Let $L/F/K$ be a tower of finite extensions of fields. Then $L/K$ is
    separable if and only if both $L/F$ and $F/K$ are separable.
  kind: corollary
  location: Section 4.1
  name: Corollary 4.14
- description: Let $L/F/K$ be a tower of algebraic field extensions. Then $L/K$ is
    separable if and only if both $L/F$ and $F/K$ are separable.
  kind: corollary
  location: Section 4.1
  name: Corollary 4.15
- description: 'Let $L/K$ be an algebraic field extension, and let $F = \{\alpha \in
    L : \alpha \text{ is separable over } K\}$. Then $F$ is a separable field extension
    of $K$.'
  kind: corollary
  location: Section 4.1
  name: Corollary 4.16
- description: Let $L/K$ be an algebraic field extension. The field $F$ in Corollary
    4.16 is the separable closure of $K$ in $L$. When $L$ is an algebraic closure
    of $K$ it is simply called a separable closure of $K$ and denoted $K^{\text{sep}}$.
  kind: definition
  location: Section 4.1
  name: Definition 4.17
- description: A field $K$ is perfect if every algebraic extension of $K$ is separable.
  kind: definition
  location: Section 4.1
  name: Definition 4.18
- description: A field $K$ of characteristic $p > 0$ is perfect if and only if $K
    = K^p$, that is, every element of $K$ is a $p$th power, equivalently, the map
    $x \mapsto x^p$ is an automorphism.
  kind: theorem
  location: Section 4.1
  name: Theorem 4.19
- description: Every finite field is a perfect field.
  kind: corollary
  location: Section 4.1
  name: Corollary 4.20
- description: A field $K$ is separably closed if $K$ has no nontrivial finite separable
    extensions. Equivalently, $K$ is equal to its separable closure in any algebraic
    closure of $K$.
  kind: definition
  location: Section 4.1
  name: Definition 4.21
- description: An algebraic extension $L/K$ is purely inseparable if $[L:K]_s = 1$.
  kind: definition
  location: Section 4.1
  name: Definition 4.22
- description: Let $K$ be a field of characteristic $p>0$. If $L / K$ is purely inseparable
    of degree $p$ then $L=K\left(a^{1 / p}\right) \simeq K[x] /\left(x^{p}-a\right)$
    for some $a \in K-K^{p}$.
  kind: proposition
  location: Section 4
  name: Proposition 4.25
- description: Let $L / K$ be an algebraic extension and let $F$ be the separable
    closure of $K$ in $L$. Then $L / F$ is purely inseparable.
  kind: theorem
  location: Section 4
  name: Theorem 4.26
- description: Every algebraic extension $L / K$ can be uniquely decomposed into a
    tower of algebraic extensions $L / F / K$ with $F / K$ separable and $L / F$ purely
    inseparable.
  kind: corollary
  location: Section 4
  name: Corollary 4.27
- description: The inseparable degree of any finite extension of fields is a power
    of the characteristic.
  kind: corollary
  location: Section 4
  name: Corollary 4.28
- description: Let $K$ be a field. An étale $K$-algebra is a $K$-algebra $L$ that
    is isomorphic to a finite product of separable field extensions of $K$. The dimension
    of an étale $K$-algebra is its dimension as a $K$-vector space. When this dimension
    is finite we say that $L$ is a finite étale $K$-algebra. A homomorphism of étale
    $K$-algebras is a homomorphism of $K$-algebras (which means a ring homomorphism
    that commutes with scalar multiplication).
  kind: definition
  location: Section 4.2
  name: Definition 4.29
- description: 'Let $A=\prod K_{i}$ be a $K$-algebra written that is a product of
    field extensions $K_{i} / K$. Every surjective homomorphism $\varphi: A \rightarrow
    B$ of $K$-algebras corresponds to the projection of $A$ on to a subproduct of
    its factors.'
  kind: proposition
  location: Section 4.2
  name: Proposition 4.32
- description: The decomposition of an étale algebra into field extensions is unique
    up to permutation and isomorphisms of factors.
  kind: corollary
  location: Section 4.2
  name: Corollary 4.33
- description: 'Let $\varphi: A \rightarrow B$ be a homomorphism of rings (so $B$
    is an $A$-module), and let $M$ be any $A$-module. The tensor product of $A$-modules
    $M \otimes_{A} B$ is a $B$-module (with multiplication defined by $b\left(m \otimes
    b^{\prime}\right):=m \otimes b b^{\prime}$) called the base change (or extension
    of scalars) of $M$ from $A$ to $B$. If $M$ is an $A$-algebra then its base change
    to $B$ is a $B$-algebra.'
  kind: definition
  location: Section 4.2
  name: Definition 4.34
- description: Suppose $L$ is a finite étale $K$-algebra and $K^{\prime} / K$ is any
    field extension. Then $L \otimes_{K} K^{\prime}$ is a finite étale $K^{\prime}$-algebra
    of the same dimension as $L$.
  kind: proposition
  location: Section 4.2
  name: Proposition 4.36
- description: Let $L \simeq K[x] /(f)$ be a finite separable extension of a field
    $K$ defined by an irreducible separable polynomial $f \in K[x]$. Let $K^{\prime}
    / K$ be any field extension, and let $f=f_{1} \cdots f_{m}$ be the factorization
    of $f$ into distinct irreducible polynomials $f_{i} \in K^{\prime}[x]$. We have
    an isomorphism of finite étale $K^{\prime}$-algebras $L \otimes_{K} K^{\prime}
    \simeq \prod_{i} K^{\prime}[x] /\left(f_{i}\right)$ where each $K^{\prime}[x]
    /\left(f_{i}\right)$ is a finite separable field extension of $K^{\prime}$.
  kind: corollary
  location: Section 4.2
  name: Corollary 4.39
- description: 'Let $L$ be a commutative $K$-algebra of finite dimension and assume
    that the dimension of $L$ is less than the cardinality of $K$. The following are
    equivalent: (a) $L$ is a finite étale $K$-algebra. (b) Every element of $L$ is
    separable over $K$. (c) $L \otimes_{K} K^{\prime}$ is reduced for every extension
    $K^{\prime} / K$. (d) $L \otimes_{K} K^{\prime}$ is semisimple for every extension
    $K^{\prime} / K$. (e) $L=K[x] /(f)$ for some separable $f \in K[x]$. The implications
    $(a) \Leftrightarrow(b) \Leftrightarrow(c) \Leftrightarrow(d) \Leftarrow(e)$ hold
    regardless of the dimension of $L$.'
  kind: theorem
  location: Section 4.2
  name: Theorem 4.40
- description: Let $K$ be a field. A commutative $K$-algebra of finite dimension is
    semisimple if and only if it is reduced.
  kind: lemma
  location: Section 4.2
  name: Lemma 4.42
- description: Suppose $L$ is a finite étale $K$-algebra and $\Omega$ is a separably
    closed field extension of $K$. There is an isomorphism of finite étale $\Omega$-algebras
    $L \otimes_{K} \Omega \xrightarrow{\sim} \prod_{\sigma \in \operatorname{Hom}_{K}(L,
    \Omega)} \Omega$ that sends $\beta \otimes 1$ to the vector $(\sigma(\beta))_{\sigma}$
    for each $\beta \in L$.
  kind: proposition
  location: Section 4.2
  name: Proposition 4.43
- description: Let $B/A$ be a (commutative) ring extension in which $B$ is a free
    $A$-module of finite rank. The (relative) norm $\mathrm{N}_{B/A}(b)$ and trace
    $\mathrm{T}_{B/A}(b)$ of $b$ (down to $A$) are the determinant and trace of the
    $A$-linear multiplication-by-$b$ map $B \rightarrow B$ defined by $x \mapsto bx$.
  kind: definition
  location: Section 4.3
  name: Definition 4.46
- description: 'Let $B/A$ be a ring extension with $B$ free of rank $n$ over $A$,
    and let $\varphi: A \rightarrow A''$ be a ring homomorphism. The base change $B''
    = B \otimes_A A''$ of $B$ to $A''$ is a free $A''$-module of rank $n$, and for
    every $b \in B$ we have $\varphi(\mathrm{N}_{B/A}(b)) = \mathrm{N}_{B''/A''}(b
    \otimes 1)$ and $\varphi(\mathrm{T}_{B/A}(b)) = \mathrm{T}_{B''/A''}(b \otimes
    1)$.'
  kind: lemma
  location: Section 4.3
  name: Lemma 4.49
- description: Let $K$ be a field with separable closure $\Omega$ and let $L$ be a
    finite étale $K$-algebra. For all $\alpha \in L$ we have $\mathrm{N}_{L/K}(\alpha)
    = \prod_{\sigma \in \operatorname{Hom}_K(L,\Omega)} \sigma(\alpha)$ and $\mathrm{T}_{L/K}(\alpha)
    = \sum_{\sigma \in \operatorname{Hom}_K(L,\Omega)} \sigma(\alpha)$.
  kind: theorem
  location: Section 4.3
  name: Theorem 4.50
- description: Let $L/K$ be a (not necessarily separable) finite extension, let $\bar{K}$
    be an algebraic closure of $K$ containing $L$. Let $\alpha \in L^{\times}$ have
    minimal polynomial $f \in K[x]$ with factorization $f(x) = \prod_{i=1}^{d}(x -
    \alpha_i)$ in $\bar{K}[x]$, and let $e = [L:K(\alpha)]$. We have $\mathrm{N}_{L/K}(\alpha)
    = \prod_{i=1}^{d} \alpha_i^e$ and $\mathrm{T}_{L/K}(\alpha) = e \sum_{i=1}^{d}
    \alpha_i$. In particular, if $f(x) = \sum_{i=0}^{d} a_i x^i$, then $\mathrm{N}_{L/K}(\alpha)
    = (-1)^{de} a_0^e$ and $\mathrm{T}_{L/K}(\alpha) = -e a_{d-1}$.
  kind: proposition
  location: Section 4.3
  name: Proposition 4.51
- description: Let $A$ be an integrally closed domain with fraction field $K$ and
    let $L/K$ be a finite extension. If $\alpha \in L$ is integral over $A$ then $\mathrm{N}_{L/K}(\alpha)
    \in A$ and $\mathrm{T}_{L/K}(\alpha) \in A$.
  kind: corollary
  location: Section 4.3
  name: Corollary 4.52
- description: Let $A \subseteq B \subseteq C$ be rings with $C$ free of finite rank
    over $B$ and $B$ free of finite rank over $A$. Then $C$ is free of finite rank
    over $A$ and $\mathrm{N}_{C/A} = \mathrm{N}_{B/A} \circ \mathrm{N}_{C/B}$ and
    $\mathrm{T}_{C/A} = \mathrm{T}_{B/A} \circ \mathrm{T}_{C/B}$.
  kind: theorem
  location: Section 4.3
  name: Theorem 4.53 (Transitivity of Norm and Trace)
- description: 'Let $A$ be a commutative ring and $M$ an $A$-module. The dual module
    $M^{\vee}$ is the $A$-module $\operatorname{Hom}_A(M, A)$ with scalar multiplication
    $(af)(m) = af(m)$, where $a \in A$, $f \in \operatorname{Hom}_A(M, A)$, and $m
    \in M$. If $\varphi: M \rightarrow N$ is an $A$-module homomorphism, the dual
    homomorphism $\varphi^{\vee}: N^{\vee} \rightarrow M^{\vee}$ is defined by $\varphi^{\vee}(g)(m)
    = g(\varphi(m))$, for $g \in N^{\vee}$ and $m \in M$.'
  kind: definition
  location: Section 5.1
  name: Definition 5.1
- description: Let $A$ be a commutative ring. For all $A$-modules $M$ and $N$ the
    $A$-modules $(M \oplus N)^{\vee}$ and $M^{\vee} \oplus N^{\vee}$ are canonically
    isomorphic.
  kind: lemma
  location: Section 5.1
  name: Lemma 5.2
- description: 'Let $A$ be an integral domain with fraction field $K$ and let $M$
    be a nonzero $A$-submodule of $K$. Then $M^{\vee} \simeq (A:M) := \{x \in K :
    xM \subseteq A\}$; in particular, if $M$ is an invertible fractional ideal then
    $M^{\vee} \simeq M^{-1}$ and $M^{\vee\vee} \simeq M$.'
  kind: proposition
  location: Section 5.1
  name: Proposition 5.3
- description: Let $A$ be a commutative ring and let $M$ be a free $A$-module of rank
    $n$. Then $M^{\vee}$ is also a free $A$-module of rank $n$, and each basis $(e_1,
    \ldots, e_n)$ of $M$ uniquely determines a dual basis $(e_1^{\vee}, \ldots, e_n^{\vee})$
    of $M^{\vee}$ with the property $e_i^{\vee}(e_j) = \delta_{ij}$.
  kind: theorem
  location: Section 5.1
  name: Theorem 5.5
- description: 'Let $A$ be a commutative ring and $M$ an $A$-module. A (bilinear)
    pairing on $M$ is an $A$-linear map $\langle\cdot,\cdot\rangle: M \times M \rightarrow
    A$. Explicitly, this means that for all $u, v, w \in M$ and $\lambda \in A$ we
    have $\langle u+v, w\rangle = \langle u, w\rangle + \langle v, w\rangle$, $\langle
    u, v+w\rangle = \langle u, v\rangle + \langle u, w\rangle$, $\langle\lambda u,
    v\rangle = \langle u, \lambda v\rangle = \lambda\langle u, v\rangle$. If $\langle
    v,w\rangle = \langle w,v\rangle$ then $\langle\cdot,\cdot\rangle$ is symmetric,
    if $\langle v,w\rangle = -\langle w,v\rangle$ then $\langle\cdot,\cdot\rangle$
    is skew-symmetric, and if $\langle v,v\rangle = 0$ then $\langle\cdot,\cdot\rangle$
    is alternating. The pairing $\langle\cdot,\cdot\rangle$ induces an $A$-module
    homomorphism $\varphi: M \rightarrow M^{\vee}$ defined by $m \mapsto (n \mapsto
    \langle m, n\rangle)$. If $\ker \varphi = \{0\}$ then $\langle\cdot,\cdot\rangle$
    is nondegenerate, and if $\varphi$ is an isomorphism then $\langle\cdot,\cdot\rangle$
    is perfect.'
  kind: definition
  location: Section 5.1
  name: Definition 5.6
- description: Let $A$ be a commutative ring and let $M$ be a free $A$-module of rank
    $n$ with a perfect pairing $\langle\cdot,\cdot\rangle$. For each $A$-basis $(e_1,
    \ldots, e_n)$ of $M$ there is a unique basis $(e_1', \ldots, e_n')$ for $M$ such
    that $\langle e_i', e_j\rangle = \delta_{ij}$.
  kind: proposition
  location: Section 5.1
  name: Proposition 5.7
- description: Let $A$ be an integral domain with fraction field $K$ and let $V$ be
    a $K$-vector space of finite dimension. A (full) $A$-lattice in $V$ is a finitely
    generated $A$-submodule $M$ of $V$ that spans $V$ as a $K$-vector space.
  kind: definition
  location: Section 5
  name: Definition 5.9
- description: 'Let $A$ be a noetherian domain with fraction field $K$, and let $V$
    be a $K$-vector space of finite dimension with a perfect pairing $\langle\cdot,
    \cdot\rangle$. If $M$ is an $A$-lattice in $V$, its dual lattice (with respect
    to the perfect pairing $\langle\cdot, \cdot\rangle$ on $V$) is the $A$-module
    $M^* := \{x \in V : \langle x, m\rangle \in A \text{ for all } m \in M\}$.'
  kind: definition
  location: Section 5
  name: Definition 5.11
- description: Let $A$ be a noetherian domain with fraction field $K$, let $V$ be
    a $K$-vector space with a perfect pairing $\langle\cdot, \cdot\rangle$, and let
    $M$ be an $A$-lattice in $V$. The dual lattice $M^*$ is an $A$-lattice in $V$
    isomorphic to $M^{\vee}$.
  kind: theorem
  location: Section 5
  name: Theorem 5.12
- description: Let $A$ be a noetherian domain with fraction field $K$. If $M_1, M_2$
    are $A$-lattices in $K$-vector spaces $V_1, V_2$ with perfect pairings $\langle\cdot,
    \cdot\rangle_1, \langle\cdot, \cdot\rangle_2$ (resp.), then $\langle\cdot, \cdot\rangle_1
    + \langle\cdot, \cdot\rangle_2$ defines a perfect pairing on $V_1 \oplus V_2$
    and $(M \oplus N)^* \simeq M^* \oplus N^*$.
  kind: corollary
  location: Section 5
  name: Corollary 5.13
- description: Let $A$ be a noetherian domain with fraction field $K$, let $V$ be
    a $K$-vector space with a perfect pairing $\langle\cdot, \cdot\rangle$, and let
    $M$ be a free $A$-lattice in $V$ with $A$-basis $(e_1, \ldots, e_n)$. The dual
    lattice $M^*$ is a free $A$-lattice in $V$ that has a unique $A$-basis $(e_1^*,
    \ldots, e_n^*)$ that satisfies $\langle e_i^*, e_j\rangle = \delta_{ij}$.
  kind: corollary
  location: Section 5
  name: Corollary 5.14
- description: Let $A$ be a noetherian domain with fraction field $K$, let $V$ be
    a $K$-vector space of finite dimension with a perfect pairing $\langle\cdot, \cdot\rangle$,
    let $M$ be an $A$-lattice in $V$, and let $S$ be a multiplicative subset of $A$.
    Then $S^{-1}M$ and $S^{-1}M^*$ are $(S^{-1}A)$-lattices in $V$ satisfying $(S^{-1}M)^*
    = S^{-1}M^*$.
  kind: lemma
  location: Section 5
  name: Lemma 5.15
- description: Let $A$ be a Dedekind domain with fraction field $K$, let $V$ be a
    $K$-vector space of finite dimension with a symmetric perfect pairing $\langle\cdot,
    \cdot\rangle$, and let $M$ be an $A$-lattice in $V$. Then $M^{**} = M$.
  kind: proposition
  location: Section 5
  name: Proposition 5.16
- description: Let $A$ be a Dedekind domain with fraction field $K$, let $L/K$ be
    a finite extension, and let $B$ be the integral closure of $A$ in $L$. Every element
    of $L$ can be written as $b/a$ with $a \in A$ and $b \in B$. In particular, $B$
    spans $L$ as a $K$-vector space and $L$ is the fraction field of $B$.
  kind: proposition
  location: Section 5.2
  name: Proposition 5.17
- description: Let $A$ be a Dedekind domain with fraction field $K$, let $L/K$ be
    a finite extension of fields, and let $B$ be the integral closure of $A$ in $L$.
    Then $\mathrm{N}_{L/K}(b) \in A$ and $\mathrm{T}_{L/K}(b) \in A$ for all $b \in
    B$.
  kind: proposition
  location: Section 5.2
  name: Proposition 5.18
- description: Let $B/A$ be a ring extension with $B$ a free $A$-module of finite
    rank. The trace pairing on $B$ is the map $B \times B \rightarrow A$ defined by
    $\langle x, y\rangle_{B/A} := \mathrm{T}_{B/A}(xy)$.
  kind: definition
  location: Section 5.2
  name: Definition 5.19
- description: Let $L$ be a commutative $K$-algebra of finite dimension. The trace
    pairing $\langle\cdot, \cdot\rangle_{L/K}$ is a symmetric bilinear pairing. It
    is a perfect pairing if and only if $L$ is a finite étale $K$-algebra.
  kind: theorem
  location: Section 5.2
  name: Theorem 5.20
- description: Assume $AKLB$ (i.e., $A$ is a Dedekind domain with fraction field $K$,
    $L/K$ is a finite separable extension, and $B$ is the integral closure of $A$
    in $L$). Then $B$ is an $A$-lattice in $L$, and in particular, $B$ is finitely
    generated as an $A$-module.
  kind: proposition
  location: Section 5.2
  name: Proposition 5.22
- description: Let $B/A$ be an extension of domains with $B$ integral over $A$, and
    let $\mathfrak{q}_0 \subsetneq \mathfrak{q}_1$ be primes of $B$. Then $\mathfrak{q}_0
    \cap A \subsetneq \mathfrak{q}_1 \cap A$ and $\dim A \geq \dim B$.
  kind: lemma
  location: Section 5.2
  name: Lemma 5.24
- description: Let $A$ be a Dedekind domain with fraction field $K$, let $L/K$ be
    a finite separable extension, and let $B$ be the integral closure of $A$ in $L$.
    Then $B$ is a Dedekind domain.
  kind: theorem
  location: Section 5.2
  name: Theorem 5.25
- description: The ring of integers of a number field is a Dedekind domain.
  kind: corollary
  location: Section 5.2
  name: Corollary 5.27
- description: 'Assume $AKLB$, and let $\mathfrak{p}$ be a prime of $A$. The exponent
    $e_{\mathfrak{q}}$ in the factorization $\mathfrak{p}B = \prod_{\mathfrak{q} \mid
    \mathfrak{p}} \mathfrak{q}^{e_{\mathfrak{q}}}$ is the ramification index of $\mathfrak{q}$,
    and the degree $f_{\mathfrak{q}} = [B/\mathfrak{q} : A/\mathfrak{p}]$ of the corresponding
    residue field extension is the residue degree (or inertia degree) of $\mathfrak{q}$.
    In situations where more than one extension of Dedekind domains is under consideration,
    we may write $e_{\mathfrak{q}/\mathfrak{p}}$ for $e_{\mathfrak{q}}$ and $f_{\mathfrak{q}/\mathfrak{p}}$
    for $f_{\mathfrak{q}}$.'
  kind: definition
  location: Section 5.3
  name: Definition 5.29
- description: Let $A$ be a ring of dimension one contained in a Dedekind domain $B$.
    Let $\mathfrak{p}$ be a prime of $A$ and let $\mathfrak{q}$ be a prime of $B$.
    Then $\mathfrak{q} \mid \mathfrak{p}$ if and only if $\mathfrak{q} \cap A = \mathfrak{p}$.
  kind: lemma
  location: Section 5.3
  name: Lemma 5.28
- description: Let $A$ be a Dedekind domain with fraction field $K$, let $M/L/K$ be
    a tower of finite separable extensions, and let $B$ and $C$ be the integral closures
    of $A$ in $L$ and $M$ respectively. Then $C$ is the integral closure of $B$ in
    $M$, and if $\mathfrak{r}$ is a prime of $M$ lying above a prime $\mathfrak{q}$
    of $L$ lying above a prime $\mathfrak{p}$ of $K$ then $e_{\mathfrak{r}/\mathfrak{p}}
    = e_{\mathfrak{r}/\mathfrak{q}} e_{\mathfrak{q}/\mathfrak{p}}$ and $f_{\mathfrak{r}/\mathfrak{p}}
    = f_{\mathfrak{r}/\mathfrak{q}} f_{\mathfrak{q}/\mathfrak{p}}$.
  kind: lemma
  location: Section 5.3
  name: Lemma 5.30
- description: Assume $AKLB$ and let $\mathfrak{p}$ be a prime of $A$. The dimension
    of $B/\mathfrak{p}B$ as an $A/\mathfrak{p}$-vector space is equal to the dimension
    of $L$ as a $K$-vector space.
  kind: lemma
  location: Section 5
  name: Lemma 5.33
- description: Assume $AKLB$. For each prime $\mathfrak{p}$ of $A$ we have $$\sum_{\mathfrak{q}
    \mid \mathfrak{p}} e_{\mathfrak{q}} f_{\mathfrak{q}} = [L:K].$$
  kind: theorem
  location: Section 5
  name: Theorem 5.35
- description: Assume $AKLB$ and let $\mathfrak{p}$ be a prime of $A$. Then $g_{\mathfrak{p}}$
    is an integer in the interval $[1, n]$, where $n = [L:K]$, as are $e_{\mathfrak{q}}$
    and $f_{\mathfrak{q}}$ for each $\mathfrak{q} \mid \mathfrak{p}$.
  kind: corollary
  location: Section 5
  name: Corollary 5.36
- description: Assume $AKLB$, let $\mathfrak{p}$ be a prime of $A$. - $L/K$ is totally
    ramified at $\mathfrak{q}$ if $e_{\mathfrak{q}} = [L:K]$ (equivalently, $f_{\mathfrak{q}}
    = 1 = g_{\mathfrak{p}} = 1$). - $L/K$ is unramified at $\mathfrak{q}$ if $e_{\mathfrak{q}}
    = 1$ and $B/\mathfrak{q}$ is a separable extension of $A/\mathfrak{p}$. - $L/K$
    is unramified above $\mathfrak{p}$ if it is unramified at all $\mathfrak{q} \mid
    \mathfrak{p}$, equivalently, if $B/\mathfrak{p}B$ is a finite étale algebra over
    $A/\mathfrak{p}$. When $L/K$ is unramified above $\mathfrak{p}$ we say that -
    $\mathfrak{p}$ remains inert in $L$ if $\mathfrak{q} = \mathfrak{p}B$ is prime
    (equivalently, $e_{\mathfrak{q}} = g_{\mathfrak{p}} = 1$, and $f_{\mathfrak{q}}
    = [L:K]$). - $\mathfrak{p}$ splits completely in $L$ if $g_{\mathfrak{p}} = [L:K]$
    (equivalently, $e_{\mathfrak{q}} = f_{\mathfrak{q}} = 1$ for all $\mathfrak{q}
    \mid \mathfrak{p}$).
  kind: definition
  location: Section 5
  name: Definition 5.37
- description: 'Let $A$ be a Dedekind domain with fraction field $K$, let $V$ be an
    $n$-dimensional $K$-vector space, let $M$ and $N$ be $A$-lattices in $V$, and
    let $\mathfrak{p}$ be a prime of $A$. Then $A_{\mathfrak{p}}$ is a PID and we
    must have $M_{\mathfrak{p}} \simeq A_{\mathfrak{p}}^n \simeq N_{\mathfrak{p}}$.
    Choose an $A_{\mathfrak{p}}$-module isomorphism $\phi_{\mathfrak{p}}: M_{\mathfrak{p}}
    \xrightarrow{\sim} N_{\mathfrak{p}}$ and let $\hat{\phi}_{\mathfrak{p}}$ denote
    the unique $K$-linear map $V \to V$ extending $\phi_{\mathfrak{p}}$. The module
    index $[M_{\mathfrak{p}} : N_{\mathfrak{p}}]_{A_{\mathfrak{p}}}$ is the principal
    fractional $A_{\mathfrak{p}}$-ideal generated by $\det \hat{\phi}_{\mathfrak{p}}$:
    $[M_{\mathfrak{p}} : N_{\mathfrak{p}}]_{A_{\mathfrak{p}}} := (\det \hat{\phi}_{\mathfrak{p}})$.
    The module index $[M:N]_A$ is the $A$-module $[M:N]_A := \bigcap_{\mathfrak{p}}
    [M_{\mathfrak{p}} : N_{\mathfrak{p}}]_{A_{\mathfrak{p}}}$ where $\mathfrak{p}$
    ranges over primes of $A$ and the intersection takes place in $K$.'
  kind: definition
  location: Section 6.1
  name: Definition 6.1
- description: 'Let $A$ be a Dedekind domain with fraction field $K$ and let $M$ and
    $N$ be $A$-lattices in a $K$-vector space of finite dimension. The module index
    $[M:N]_A$ is a nonzero fractional ideal of $A$ whose localization at each prime
    $\mathfrak{p}$ of $A$ is equal to the local module index $[M_{\mathfrak{p}} :
    N_{\mathfrak{p}}]_{A_{\mathfrak{p}}}$.'
  kind: proposition
  location: Section 6.1
  name: Proposition 6.2
- description: 'Let $A$ be a Dedekind domain with fraction field $K$, and let $N \subseteq
    M$ be $A$-lattices in a $K$-vector space $V$ of dimension $r$ for which the quotient
    module $M / N$ is a direct sum of cyclic $A$-modules: $M / N \simeq A / I_{1}
    \oplus \cdots \oplus A / I_{n}$ where $I_{1}, \ldots, I_{n}$ are nonzero ideals
    of $A$. Then $[M: N]_{A}=I_{1} \cdots I_{n}$.'
  kind: theorem
  location: Section 6
  name: Theorem 6.4
- description: 'Assume $AKLB$. The ideal norm $N_{B/A}: \mathcal{I}_{B} \rightarrow
    \mathcal{I}_{A}$ is the map $I \mapsto [B: I]_{A}$. We extend $N_{B/A}$ to the
    zero ideal by defining $N_{B/A}((0))=(0)$.'
  kind: definition
  location: Section 6.2
  name: Definition 6.5
- description: Assume $AKLB$ and let $\alpha \in L$. Then $N_{B/A}((\alpha))=\left(\mathrm{N}_{L/K}(\alpha)\right)$.
  kind: proposition
  location: Section 6.2
  name: Proposition 6.6
- description: 'Assume $AKLB$. The map $N_{B/A}: \mathcal{I}_{B} \rightarrow \mathcal{I}_{A}$
    is a group homomorphism.'
  kind: proposition
  location: Section 6.2
  name: Proposition 6.7
- description: 'Assume $AKLB$. For all $I, J \in \mathcal{I}_{B}$ we have $[I: J]_{A}=N_{B/A}\left(I^{-1}
    J\right)=N_{B/A}((J: I))$.'
  kind: corollary
  location: Section 6.2
  name: Corollary 6.8
- description: 'Assume $AKLB$ and let $I$ be a fractional ideal of $B$. The ideal
    norm of $I$ is the fractional ideal of $A$ generated by the image of $I$ under
    the field norm $N_{L/K}$, that is, $N_{B/A}(I)=\left(\mathrm{N}_{L/K}(\alpha):
    \alpha \in I\right)$.'
  kind: corollary
  location: Section 6.2
  name: Corollary 6.9
- description: 'Assume $AKLB$ and let $\mathfrak{q}$ be a prime lying above $\mathfrak{p}$.
    Then $N_{B/A}(\mathfrak{q})=\mathfrak{p}^{f_{\mathfrak{q}}}$, where $f_{\mathfrak{q}}=[B/\mathfrak{q}:
    A/\mathfrak{p}]$ is the residue field degree of $\mathfrak{q}$.'
  kind: theorem
  location: Section 6.2
  name: Theorem 6.10
- description: 'Assume $AKLB$. For $I \in \mathcal{I}_{A}$ we have $N_{B/A}(IB)=I^{n}$,
    where $n=[L: K]$.'
  kind: corollary
  location: Section 6.2
  name: Corollary 6.11
- description: 'Let $L$ be a number field with ring of integers $\mathcal{O}_{L}$.
    For any nonzero $\mathcal{O}_{L}$-ideal $\mathfrak{a}$ we have $\mathrm{N}(\mathfrak{a})=\left(\left[\mathcal{O}_{L}:
    \mathfrak{a}\right]\right)$. If $\mathfrak{b} \subseteq \mathfrak{a}$ are nonzero
    fractional ideals of $\mathcal{O}_{L}$, then $[\mathfrak{a}: \mathfrak{b}]_{\mathbb{Z}}=([\mathfrak{a}:
    \mathfrak{b}])$.'
  kind: proposition
  location: Section 6.4
  name: Proposition 6.12
- description: Assume $AKLB$ with $L=K(\alpha)$ and $\alpha \in B$. Let $f \in A[x]$
    be the minimal polynomial of $\alpha$, let $\mathfrak{p}$ be a prime of $A$, and
    let $\bar{f}=\bar{g}_{1}^{e_{1}} \cdots \bar{g}_{r}^{e_{r}}$ be its factorization
    into monic irreducibles in $(A/\mathfrak{p})[x]$. Let $\mathfrak{q}_{i}:=(\mathfrak{p},
    g_{i}(\alpha))$, where $g_{i} \in A[x]$ is any lift of $\bar{g}_{i}$ in $(A/\mathfrak{p})[x]$
    under the reduction map $A[x] \rightarrow (A/\mathfrak{p})[x]$. If $B=A[\alpha]$
    then $\mathfrak{p} B=\mathfrak{q}_{1}^{e_{1}} \cdots \mathfrak{q}_{r}^{e_{r}}$
    is the prime factorization of $\mathfrak{p} B$ in $B$ and the residue field degree
    of $\mathfrak{q}_{i}$ is $\operatorname{deg} \bar{g}_{i}$.
  kind: theorem
  location: Section 6.5
  name: Theorem 6.14 (Dedekind-Kummer)
- description: 'Let $S/R$ be an extension of commutative rings. The conductor of $R$
    in $S$ is the largest $S$-ideal that is also an $R$-ideal; equivalently, it is
    the largest ideal of $S$ contained in $R$. It can be written as $\mathfrak{c}:=\{\alpha
    \in S: \alpha S \subseteq R\}=\{\alpha \in R: \alpha S \subseteq R\}$. If $R$
    is an integral domain, the conductor of $R$ is the conductor of $R$ in its integral
    closure.'
  kind: definition
  location: Section 6.6
  name: Definition 6.16
- description: Let $R$ be a noetherian domain. The conductor of $R$ in its integral
    closure $S$ is nonzero if and only if $S$ is finitely generated as an $R$-module.
  kind: lemma
  location: Section 6.6
  name: Lemma 6.18
- description: An order $\mathcal{O}$ is a noetherian domain of dimension one whose
    conductor is nonzero, equivalently, whose integral closure is finitely generated
    as an $\mathcal{O}$-module.
  kind: definition
  location: Section 6.7
  name: Definition 6.19
- description: Let $A$ be a noetherian domain with fraction field $K$, and let $L$
    be a (not necessarily commutative) $K$-algebra of finite dimension. An $A$-order
    in $L$ is an $A$-lattice that is also a ring.
  kind: definition
  location: Section 6.7
  name: Definition 6.20
- description: Assume $AKLB$ and let $\mathcal{O}$ be a subring of $L$. Then $\mathcal{O}$
    is an $A$-order in $L$ if and only if it is an order with integral closure $B$.
  kind: proposition
  location: Section 6.7
  name: Proposition 6.22
- description: In any order $\mathcal{O}$, only finitely many primes contain the conductor.
  kind: proposition
  location: Section 6.7
  name: Proposition 6.25
- description: Let $\mathcal{O}$ be an order with integral closure $B$ and conductor
    $\mathfrak{c}$ and let $\mathfrak{p}$ be a prime of $\mathcal{O}$ not containing
    $\mathfrak{c}$. Then $\mathfrak{p} B$ is a prime of $B$.
  kind: lemma
  location: Section 6.7
  name: Lemma 6.26
- description: Let $\mathcal{O}$ be an order with integral closure $B$ and conductor
    $\mathfrak{c}$. The restriction of the map $\operatorname{Spec} B \rightarrow
    \operatorname{Spec} \mathcal{O}$ defined by $\mathfrak{q} \mapsto \mathfrak{q}
    \cap \mathcal{O}$ to prime ideals not containing $\mathfrak{c}$ is a bijection
    with inverse $\mathfrak{p} \mapsto \mathfrak{p} B$.
  kind: corollary
  location: Section 6.7
  name: Corollary 6.27
- description: 'Let $\mathcal{O}$ be an order with integral closure $B$ and conductor
    $\mathfrak{c}$, and let $\mathfrak{p}$ be a prime of $\mathcal{O}$. The following
    are equivalent: (a) $\mathfrak{p}$ does not contain $\mathfrak{c}$; (b) $\mathcal{O}=\{x
    \in B: x \mathfrak{p} \subseteq \mathfrak{p}\}$; (c) $\mathfrak{p}$ is invertible;
    (d) $\mathcal{O}_{\mathfrak{p}}$ is a DVR; (e) $\mathfrak{p} \mathcal{O}_{\mathfrak{p}}$
    is principal. If any of these equivalent properties hold, then $\mathfrak{p} B$
    is a prime of $B$.'
  kind: theorem
  location: Section 6.7
  name: Theorem 6.28
- description: Let $A$ be a noetherian domain and let $J$ be an ideal of $A$. A fractional
    ideal $I$ of $A$ is prime to $J$ if $I A_{\mathfrak{p}}=A_{\mathfrak{p}}$ for
    all prime ideals $\mathfrak{p}$ that contain $J$. The set of invertible fractional
    ideals prime to $J$ is denoted $\mathcal{I}_{A}^{J}$; it is a subgroup of the
    ideal group $\mathcal{I}_{A}$.
  kind: definition
  location: Section 6.7
  name: Definition 6.30
- description: Let $\mathcal{O}$ be an order with integral closure $B$. Let $\mathfrak{c}$
    be any ideal of $B$ contained in the conductor of $\mathcal{O}$. The map $\mathfrak{q}
    \mapsto \mathfrak{q} \cap \mathcal{O}$ induces a group isomorphism from $\mathcal{I}_{B}^{\mathfrak{c}}$
    to $\mathcal{I}_{\mathcal{O}}^{\mathfrak{c}}$ and both groups are isomorphic to
    the free abelian group generated by their prime ideals. In particular, every fractional
    ideal of $\mathcal{O}$ prime to the conductor has a unique factorization into
    prime ideals $\prod \mathfrak{p}_{i}^{e_{i}}$ which matches the factorization
    $IB=\prod \mathfrak{q}_{i}^{e_{i}}$ with $\mathfrak{p}_{i}=\mathfrak{q}_{i} \cap
    \mathcal{O}$.
  kind: theorem
  location: Section 6.7
  name: Theorem 6.31
- description: 'Assume $AKLB$ and let $\mathcal{O}$ be an order with integral closure
    $B$. Let $\mathfrak{c}=(\mathfrak{c}^{\prime} \cap A)B$, where $\mathfrak{c}^{\prime}$
    is the conductor of $\mathcal{O}$. Then $\mathcal{O}$ is an $A$-lattice in $L$
    and the restrictions of the norm maps $N_{B/A}$ and $N_{\mathcal{O}/A}$ to $\mathcal{I}_{B}^{\mathfrak{c}}$
    and $\mathcal{I}_{\mathcal{O}}^{\mathfrak{c}}$ commute with the isomorphism $\mathcal{I}_{B}^{\mathfrak{c}}
    \rightarrow \mathcal{I}_{\mathcal{O}}^{\mathfrak{c}}$ defined by $\mathfrak{q}
    \mapsto \mathfrak{q} \cap \mathcal{O}$. If $\mathfrak{q}$ is a prime of $B$ that
    does not contain $\mathfrak{c}$ and $\mathfrak{q}^{\prime}=\mathfrak{q} \cap \mathcal{O}$
    and $\mathfrak{p}=\mathfrak{q} \cap A$, then $N_{B/A}(\mathfrak{q})=N_{\mathcal{O}/A}(\mathfrak{q}^{\prime})=\mathfrak{p}^{f_{\mathfrak{q}}}$
    and $[B/\mathfrak{q}: A/\mathfrak{p}]=[\mathcal{O}/\mathfrak{q}^{\prime}: A/\mathfrak{p}]$.'
  kind: proposition
  location: Section 6.7
  name: Proposition 6.32
- description: The assumption $B=A[\alpha]$ in the Dedekind-Kummer theorem can be
    replaced with the assumption that $\mathfrak{p} B$ is prime to the conductor of
    $A[\alpha]$ in $B$.
  kind: corollary
  location: Section 6
  name: Corollary 6.33
- description: Let $G$ be a group. A left $G$-module is an abelian group $M$ equipped
    with a left $G$-action that commutes with its group operation; in additive notation
    we have $\sigma(a+b)=\sigma(a)+\sigma(b)$ for all $\sigma \in G$ and $a, b \in
    M$. One similarly defines a right $G$-module as an abelian group with a right
    $G$-action that commutes with the group operation.
  kind: definition
  location: Section 7.1
  name: Definition 7.1
- description: 'Assume $AKLBG$. For each fractional ideal $I$ of $B$ and $\sigma \in
    G$ define $\sigma(I):=\{\sigma(x): x \in I\}$. The set $\sigma(I)$ is a fractional
    ideal of $B$, and this defines a group action on $\mathcal{I}_{B}$ that makes
    it a left $G$-module. Moreover, the restriction of this action to $\operatorname{Spec}
    B$ makes it a $G$-set.'
  kind: theorem
  location: Section 7.1
  name: Theorem 7.2
- description: Assume $AKLBG$. For each prime $\mathfrak{p}$ of $A$ the group $G$
    acts transitively on the set $\{\mathfrak{q} \mid \mathfrak{p}\}$; in other words,
    the orbits of the $G$-action on $\operatorname{Spec} B$ are the fibers of the
    contraction map $\operatorname{Spec} B \rightarrow \operatorname{Spec} A$.
  kind: corollary
  location: Section 7.1
  name: Corollary 7.3
- description: 'Assume $AKLBG$ and let $\mathfrak{p}$ be a prime of $A$. The residue
    field degrees $f_{\mathfrak{q}}:=[B/\mathfrak{q}: A/\mathfrak{p}]$ are the same
    for every $\mathfrak{q} \mid \mathfrak{p}$, as are the ramification indices $e_{\mathfrak{q}}:=v_{\mathfrak{q}}(\mathfrak{p}
    B)$.'
  kind: corollary
  location: Section 7.1
  name: Corollary 7.4
- description: 'Assume $AKLBG$. For each prime $\mathfrak{p}$ of $A$ we have $e_{\mathfrak{p}}
    f_{\mathfrak{p}} g_{\mathfrak{p}}=[L: K]$.'
  kind: corollary
  location: Section 7.1
  name: Corollary 7.5
- description: Assume $AKLBG$. For each prime $\mathfrak{q}$ of $B$ the decomposition
    group $D_{\mathfrak{q}}$ (also denoted $D_{\mathfrak{q}}(L/K)$) is the stabilizer
    of $\mathfrak{q}$ in $G$.
  kind: definition
  location: Section 7.2
  name: Definition 7.7
- description: 'Assume $AKLBG$ and let $\mathfrak{p}$ be a prime of $A$. The decomposition
    groups $D_{\mathfrak{q}}$ for $\mathfrak{q} \mid \mathfrak{p}$ are all conjugate
    in $G$, with $\# D_{\mathfrak{q}}=e_{\mathfrak{p}} f_{\mathfrak{p}}$ and $[G:
    D_{\mathfrak{q}}]=g_{\mathfrak{p}}$.'
  kind: lemma
  location: Section 7.2
  name: Lemma 7.8
- description: 'Assume $AKLBG$ and let $\mathfrak{q} \mid \mathfrak{p}$ be a prime
    of $B$. The group homomorphism $\pi_{\mathfrak{q}}: D_{\mathfrak{q}} \rightarrow
    \operatorname{Aut}_{A/\mathfrak{p}}(B/\mathfrak{q})$ defined by $\sigma \mapsto
    \bar{\sigma}$ is surjective and $B/\mathfrak{q}$ is normal over $A/\mathfrak{p}$.'
  kind: proposition
  location: Section 7.2
  name: Proposition 7.9
- description: 'Assume $AKLBG$, and let $\mathfrak{q} \mid \mathfrak{p}$ be a prime
    of $B$. The kernel of the surjective homomorphism $\pi_{\mathfrak{q}}: D_{\mathfrak{q}}
    \rightarrow \operatorname{Aut}_{A/\mathfrak{p}}(B/\mathfrak{q})$ is the inertia
    group $I_{\mathfrak{q}}$ of $\mathfrak{q}$.'
  kind: definition
  location: Section 7.2
  name: Definition 7.10
- description: 'Assume $AKLBG$ and let $\mathfrak{q} \mid \mathfrak{p}$ be a prime
    of $B$. We have an exact sequence $1 \longrightarrow I_{\mathfrak{q}} \longrightarrow
    D_{\mathfrak{q}} \longrightarrow \operatorname{Aut}_{A/\mathfrak{p}}(B/\mathfrak{q})
    \longrightarrow 1$, and $\# I_{\mathfrak{q}}=e_{\mathfrak{p}}[B/\mathfrak{q}:
    A/\mathfrak{p}]_{i}$.'
  kind: corollary
  location: Section 7.2
  name: Corollary 7.11
- description: 'Assume $AKLBG$, let $\mathfrak{q} \mid \mathfrak{p}$ be a prime of
    $B$, and suppose $B/\mathfrak{q}$ is a separable extension of $A/\mathfrak{p}$.
    We have a tower of field extensions $K \subseteq L^{D_{\mathfrak{q}}} \subseteq
    L^{I_{\mathfrak{q}}} \subseteq L$ with $e_{\mathfrak{p}}=[L: L^{I_{\mathfrak{q}}}]=\#
    I_{\mathfrak{q}}$; $f_{\mathfrak{p}}=[L^{I_{\mathfrak{q}}}: L^{D_{\mathfrak{q}}}]=\#
    D_{\mathfrak{q}}/\# I_{\mathfrak{q}}$; $g_{\mathfrak{p}}=[L^{D_{\mathfrak{q}}}:
    K]=\#\{\mathfrak{q} \mid \mathfrak{p}\}$. The fields $L^{D_{\mathfrak{q}}}$ and
    $L^{I_{\mathfrak{q}}}$ are the decomposition field and inertia field associated
    to $\mathfrak{q}$.'
  kind: proposition
  location: Section 7.2
  name: Proposition 7.12
- description: Assume $AKLBG$, let $E$ be an intermediate field between $K$ and $L$.
    Let $\mathfrak{q}$ be a prime of $B$ and let $\mathfrak{q}_{E}=\mathfrak{q} \cap
    E$ and $\mathfrak{p}=\mathfrak{q} \cap K$. Then $I_{\mathfrak{q}}(L/E)=I_{\mathfrak{q}}(L/K)
    \cap \operatorname{Gal}(L/E)$ and $D_{\mathfrak{q}}(L/E)=D_{\mathfrak{q}}(L/K)
    \cap \operatorname{Gal}(L/E)$.
  kind: proposition
  location: Section 7.2
  name: Proposition 7.13
- description: Assume AKLBG, let E be an intermediate field between K and L. Let q
    be a prime of B and let q_E = q ∩ E and p = q ∩ K. Then e_{q_E/p} = 1 if and only
    if E ⊆ L^{I_q}, and e_{q_E/p} = f_{q_E/p} = 1 if and only if E ⊆ L^{D_q}, where
    I_q and D_q are the inertia and decomposition groups of q.
  kind: corollary
  location: Section 7
  name: Corollary 7.14
- description: Assume AKLBG and let p be a prime of K. The fields L^{I_p} and L^{D_p}
    are Galois extensions of K, and for any intermediate field E we have e_{q_E/p}
    = 1 for all q_E | p if and only if E ⊆ L^{I_p}, and e_{q_E/p} = f_{q_E/p} = 1
    for all q_E | p if and only if E ⊆ L^{D_p}.
  kind: corollary
  location: Section 7
  name: Corollary 7.15
- description: 'Assume AKLBG with finite residue fields and q | p unramified. The
    inverse image of the Frobenius automorphism of Gal(F_q/F_p) under π_q: D_q → Gal(F_q/F_p)
    is the Frobenius element σ_q ∈ D_q ⊆ G (also called the Frobenius substitution).'
  kind: definition
  location: Section 7.3
  name: Definition 7.16
- description: Assume AKLBG with finite residue fields and q | p unramified. The Frobenius
    element σ_q is the unique σ ∈ G such that for all x ∈ B we have σ(x) ≡ x^{#F_p}
    mod q.
  kind: proposition
  location: Section 7.3
  name: Proposition 7.17
- description: 'Assume AKLBG with finite residue fields and let p be an unramified
    prime of A. The set of Frobenius elements {σ_q : q | p} is a conjugacy class of
    G.'
  kind: proposition
  location: Section 7.3
  name: Proposition 7.18
- description: 'Assume AKLBG with finite residue fields and let p be an unramified
    prime of A. The G-conjugacy class {σ_q : q | p} is the Frobenius class of p, denoted
    Frob_p.'
  kind: definition
  location: Section 7.3
  name: Definition 7.19
- description: Assume AKLBG with finite residue fields. For each unramified prime
    q of L we define the Artin symbol (L/K over q) := σ_q.
  kind: definition
  location: Section 7.4
  name: Definition 7.20
- description: Assume AKLBG with finite residue fields and q | p unramified. Then
    p splits completely if and only if (L/K over q) = 1.
  kind: proposition
  location: Section 7.4
  name: Proposition 7.21
- description: 'Assume AKLBG with finite residue fields and let q | p be unramified.
    Let E be an intermediate field between K and L, and define q_E := q ∩ E. Then
    (L/E over q) = (L/K over q)^{[F_{q_E} : F_p]} and if E/K is Galois then (E/K over
    q_E) is the restriction of (L/K over q) to E.'
  kind: proposition
  location: Section 7.4
  name: Proposition 7.22
- description: 'Let A be a Dedekind domain with finite residue fields. Let L be a
    finite abelian extension of K = Frac A, and let S be the set of primes of A that
    ramify in L. The Artin map is the homomorphism (L/K over ·): I_A^S → Gal(L/K)
    defined by ∏_{i=1}^m p_i^{e_i} ↦ ∏_{i=1}^m (L/K over p_i)^{e_i}.'
  kind: definition
  location: Section 7.4
  name: Definition 7.23
- description: Let $X$ be a metric space. A sequence $(x_n)$ of elements of $X$ converges
    (to $x$) if there is an $x \in X$ such that for every $\epsilon > 0$ there is
    an $N \in \mathbb{Z}_{>0}$ such that $d(x_n, x) < \epsilon$ for all $n \geq N$;
    the limit $x$ is necessarily unique. The sequence $(x_n)$ is Cauchy if for every
    $\epsilon > 0$ there is an $N \in \mathbb{Z}_{>0}$ such that $d(x_m, x_n) < \epsilon$
    for all $m, n \geq N$. Every convergent sequence is Cauchy, but the converse need
    not hold. A metric space in which every Cauchy sequence converges is said to be
    complete.
  kind: definition
  location: Section 8.1
  name: Definition 8.1
- description: An abelian group $G$ is a topological group if it is a topological
    space in which the map $G \times G \rightarrow G$ defined by $(g, h) \mapsto g+h$
    and the map $G \rightarrow G$ defined by $g \mapsto -g$ are both continuous (here
    $G \times G$ has the product topology). A commutative ring $R$ is a topological
    ring if it is a topological space in which the maps $R \times R \rightarrow R$
    defined by $(r, s) \mapsto r+s$ and $(r, s) \mapsto rs$ are both continuous; the
    additive group of $R$ is then a topological group, since $(-1, s) \mapsto -s$
    is continuous, but the unit group $R^{\times}$ need not be a topological group,
    in general. A field $K$ is a topological field if it is a topological ring whose
    unit group is a topological group.
  kind: definition
  location: Section 8.1
  name: Definition 8.2
- description: Let $X$ be a metric space. Cauchy sequences $(x_n)$ and $(y_n)$ are
    equivalent if $d(x_n, y_n) \rightarrow 0$ as $n \rightarrow \infty$; this defines
    an equivalence relation on the set of Cauchy sequences in $X$ and we use $[(x_n)]$
    to denote the equivalence class of $(x_n)$. The completion of $X$ is the metric
    space $\widehat{X}$ whose elements are equivalence classes of Cauchy sequences
    with the metric $d([(x_n)], [(y_n)]) := \lim_{n \rightarrow \infty} d(x_n, y_n)$
    (this limit exists and depends only on the equivalence classes of $(x_n)$ and
    $(y_n)$). We may canonically embed $X$ in its completion $\widehat{X}$ via the
    map $x \mapsto \hat{x} = [(x, x, \ldots)]$. When $X$ is a topological ring we
    extend the ring operations to $\widehat{X}$ by defining $[(x_n)] + [(y_n)] :=
    [(x_n + y_n)]$ and $[(x_n)][(y_n)] := [(x_n y_n)]$; the additive and multiplicative
    identities $0 := \hat{0}$ and $1 := \hat{1}$. When the metric on $X$ is induced
    by an absolute value $|\,|$, we extend $|\,|$ to an absolute value on $\widehat{X}$
    via $|[(x_n)]| := \lim_{n \rightarrow \infty} |x_n|$.
  kind: definition
  location: Section 8.1
  name: Definition 8.3
- description: 'Let $K$ be a field with an absolute value $|\,|$ viewed as a topological
    field under the induced topology, and let $\widehat{K}$ be the completion of $K$.
    The field $\widehat{K}$ is complete, and has the following universal property:
    every embedding of $K$ as a topological field into a complete field $L$ can be
    uniquely extended to an embedding of $\widehat{K}$ into $L$ which is an isomorphism
    whenever $K$ is dense in $L$. Up to a canonical isomorphism, $\widehat{K}$ is
    the unique topological field with this property.'
  kind: proposition
  location: Section 8.1.1
  name: Proposition 8.4
- description: Let $K$ be a field and let $|\cdot|_1, \ldots, |\cdot|_n$ be pairwise
    inequivalent nontrivial absolute values on $K$. Let $a_1, \ldots, a_n \in K$ and
    let $\epsilon_1, \ldots, \epsilon_n$ be positive real numbers. Then there exists
    an $x \in K$ such that $|x - a_i|_i < \epsilon_i$ for $1 \leq i \leq n$.
  kind: theorem
  location: Section 8.1.1
  name: Theorem 8.5 (Weak Approximation)
- description: Let $K$ be a field with absolute values $|\,|_1$ and $|\,|_2$. The
    induced topologies on $K$ coincide if and only if $|\,|_1$ and $|\,|_2$ are equivalent.
  kind: corollary
  location: Section 8.1.1
  name: Corollary 8.6
- description: A directed set is a set $I$ with a relation "$\leq$" that is reflexive
    ($i \leq i$), antisymmetric ($i \leq j \leq i \Rightarrow i = j$), and transitive
    ($i \leq j \leq k \Rightarrow i \leq k$), in which every finite subset has an
    upper bound (in particular, $I$ is non-empty).
  kind: definition
  location: Section 8.1.2
  name: Definition 8.7
- description: 'An inverse system (projective system) in a category is a family of
    objects $\{X_i : i \in I\}$ indexed by a directed set $I$ and a family of morphisms
    $\{f_{ij} : X_i \leftarrow X_j : i \leq j\}$ (note the direction) such that each
    $f_{ii}$ is the identity and $f_{ik} = f_{ij} \circ f_{jk}$ for all $i \leq j
    \leq k$.'
  kind: definition
  location: Section 8.1.2
  name: Definition 8.8
- description: 'Let $(X_i, f_{ij})$ be an inverse system in a concrete category with
    products. The inverse limit (or projective limit) of $(X_i, f_{ij})$ is the object
    $X := \varprojlim X_i := \{x \in \prod_{i \in I} X_i : x_i = f_{ij}(x_j) \text{
    for all } i \leq j\} \subseteq \prod_{i \in I} X_i$ (whenever such an object $X$
    exists in the category). The restrictions $\pi_i : X \rightarrow X_i$ of the projections
    $\prod X_i \rightarrow X_i$ satisfy $\pi_i = f_{ij} \circ \pi_j$ for $i \leq j$.'
  kind: definition
  location: Section 8.1.2
  name: Definition 8.9
- description: Let $(X_i, f_{ij})$ be an inverse system of Hausdorff topological spaces.
    Then $X := \varprojlim X_i$ is a closed subset of $\prod X_i$, and if the $X_i$
    are compact then $X$ is compact.
  kind: proposition
  location: Section 8.1.2
  name: Proposition 8.10
- description: Let $K$ be a field with absolute value $|\,|_v$ induced by a discrete
    valuation $v$, let $A$ be the valuation ring of $K$, and let $\pi$ be a uniformizer.
    The valuation ring of the completion $K_v$ of $K$ with respect to $|\,|_v$ is
    a complete discrete valuation ring $A_v$ with uniformizer $\pi$, and we have an
    isomorphism of topological rings $A_v \simeq \varprojlim_{n} A / \pi^n A$.
  kind: proposition
  location: Section 8.2
  name: Proposition 8.11
- description: Let $a = (a_n)$ be a $p$-adic integer with each $a_n$ uniquely represented
    by an integer in $[0, p^n - 1]$. The sequence $(b_0, b_1, b_2, \ldots)$ with $b_0
    = a_1$ and $b_n = (a_{n+1} - a_n)/p^n$ is called the $p$-adic expansion of $a$.
  kind: definition
  location: Section 8
  name: Definition 8.16
- description: Every element of $\mathbb{Z}_p$ has a unique $p$-adic expansion and
    every sequence $(b_0, b_1, b_2, \ldots)$ of integers in $[0, p-1]$ is the $p$-adic
    expansion of an element of $\mathbb{Z}_p$.
  kind: proposition
  location: Section 8
  name: Proposition 8.17
- description: Let $L/K$ be a finite separable extension, and let $v$ and $w$ be discrete
    valuations on $K$ and $L$ respectively. If $w|_K = ev$ for some $e \in \mathbb{Z}_{>0}$,
    then we say that $w$ extends $v$ with index $e$.
  kind: definition
  location: Section 8.3
  name: Definition 8.19
- description: Assume $AKLB$ and let $\mathfrak{p}$ be a prime of $A$. For each prime
    $\mathfrak{q} \mid \mathfrak{p}$, the discrete valuation $v_{\mathfrak{q}}$ extends
    $v_{\mathfrak{p}}$ with index $e_{\mathfrak{q}}$, and every discrete valuation
    on $L$ that extends $v_{\mathfrak{p}}$ arises in this way. In other words, the
    map $\mathfrak{q} \mapsto v_{\mathfrak{q}}$ gives a bijection from $\{\mathfrak{q}
    \mid \mathfrak{p}\}$ to the set of discrete valuations of $L$ that extend $v_{\mathfrak{p}}$.
  kind: theorem
  location: Section 8.3
  name: Theorem 8.20
- description: A local field is a field with a nontrivial absolute value $|\;|$ that
    is locally compact under the topology induced by $|\;|$.
  kind: definition
  location: Section 9.1
  name: Definition 9.1
- description: Let $K$ be a field with a nontrivial absolute value $|\;|$. Then $K$
    is a local field if and only if every (equivalently, any) closed ball in $K$ is
    compact.
  kind: lemma
  location: Section 9.1
  name: Lemma 9.4
- description: Let $K$ be a local field with nontrivial absolute value $|\;|$. Then
    $K$ is complete.
  kind: corollary
  location: Section 9.1
  name: Corollary 9.5
- description: Let $K$ be a field with absolute value $|\;|_v$ induced by a discrete
    valuation $v$ with valuation ring $A$ and uniformizer $\pi$. Then $K$ is a local
    field if and only if $K$ is complete and the residue field $A/\pi A$ is finite.
  kind: proposition
  location: Section 9.1
  name: Proposition 9.6
- description: Let $L$ be a global field with a nontrivial absolute value $|\;|_v$.
    Then the completion $L_v$ of $L$ with respect to $|\;|_v$ is a local field.
  kind: corollary
  location: Section 9.1
  name: Corollary 9.7
- description: A locally compact topological vector space over a nondiscrete locally
    compact field has finite dimension.
  kind: proposition
  location: Section 9.1
  name: Proposition 9.8
- description: Let $L$ be a local field. If $L$ is archimedean then it is isomorphic
    to $\mathbb{R}$ or $\mathbb{C}$; otherwise, $L$ is isomorphic to a finite extension
    of $\mathbb{Q}_p$ or $\mathbb{F}_q((t))$.
  kind: theorem
  location: Section 9.1
  name: Theorem 9.9
- description: Let $R$ be a (commutative) ring, and let $f(x) = \sum f_i x^i \in R[x]$
    be a polynomial. The (formal) derivative $f'$ of $f$ is the polynomial $f'(x)
    := \sum i f_i x^{i-1} \in R[x]$.
  kind: definition
  location: Section 9.2
  name: Definition 9.10
- description: Let $R$ be a ring, let $f = \sum f_i x^i \in R[x]$ be a polynomial,
    and let $a \in R$. Then $f(x) = f(a) + f'(a)(x - a) + g(x)(x - a)^2$ for a unique
    $g \in R[x]$.
  kind: lemma
  location: Section 9.2
  name: Lemma 9.11
- description: Let $R$ be a ring, $f \in R[x]$, and $a \in R$. Then $f(a)=f'(a)=0$
    if and only if $a$ is (at least) a double root of $f$, that is, $f(x)=(x-a)^{2}
    g(x)$ for some $g \in R[x]$.
  kind: corollary
  location: Section 9.2
  name: Corollary 9.13
- description: Let $f \in R[x]$ be a polynomial over a ring $R$ and let $a \in R$.
    If $f(a)=0$ and $f'(a) \neq 0$ then $a$ is a simple root of $f$.
  kind: definition
  location: Section 9.2
  name: Definition 9.14
- description: Let $A$ be a complete DVR with maximal ideal $\mathfrak{p}$ and residue
    field $k:=A/\mathfrak{p}$. Suppose $f \in A[x]$ is a monic polynomial whose reduction
    to $k[x]$ has a simple root $\bar{a} \in k$. Then $\bar{a}$ can be lifted to a
    root of $f$ in $A$.
  kind: lemma
  location: Section 9.2
  name: Lemma 9.15 (Hensel's Lemma I)
- description: Let $A$ be a complete DVR. Let $f \in A[x]$, and suppose $a_{0} \in
    A$ satisfies $|f(a_{0})| < |f'(a_{0})|^{2}$ (so in particular, $f'(a_{0})$ divides
    $f(a_{0})$), and for $n \geq 0$ define $a_{n+1}:=a_{n}-f(a_{n})/f'(a_{n})$. The
    sequence $(a_{n})$ is well-defined and converges to the unique root $a \in A$
    of $f$ for which $|a-a_{0}| \leq \epsilon:=|f(a_{0})|/|f'(a_{0})|^{2}$. Moreover,
    $|f(a_{n})| \leq \epsilon^{2^{n}}|f'(a_{0})|^{2}$ for all $n \geq 0$.
  kind: lemma
  location: Section 9.2
  name: Lemma 9.16 (Hensel's Lemma II)
- description: Let $A$ be a complete DVR with maximal ideal $\mathfrak{p}$ and residue
    field $k$, let $f \in A[x]$ have image $\bar{f}$ in $k[x]$, and suppose $\bar{f}=\bar{g}\bar{h}$
    for some coprime $\bar{g}, \bar{h} \in k[x]$. Then there exist polynomials $g,
    h \in A[x]$ for which $f=gh$ with $g \equiv \bar{g} \bmod \mathfrak{p}$ and $h
    \equiv \bar{h} \bmod \mathfrak{p}$ such that $\deg g=\deg \bar{g}$.
  kind: lemma
  location: Section 9.2
  name: Lemma 9.19 (Hensel's lemma III)
- description: Let $A$ be a complete DVR with fraction field $K$, and let $f \in K[x]$
    be an irreducible polynomial whose leading and constant coefficients lie in $A$.
    Then $f \in A[x]$.
  kind: lemma
  location: Section 9.2
  name: Lemma 9.20 (Hensel-Kürschák lemma)
- description: Let $A$ be a complete DVR with fraction field $K$, and let $L/K$ be
    a finite extension of degree $n$. Then $\alpha \in L$ is integral over $A$ if
    and only if $\mathrm{N}_{L/K}(\alpha) \in A$.
  kind: corollary
  location: Section 9.2
  name: Corollary 9.21
- description: Assume AKLB and that $A$ is a complete DVR with maximal ideal $\mathfrak{p}$.
    Then $B$ is a DVR whose maximal ideal $\mathfrak{q}$ is necessarily the unique
    prime above $\mathfrak{p}$.
  kind: theorem
  location: Section 9.2
  name: Theorem 9.22
- description: 'Let $K$ be a field with absolute value $|\;|$ and let $V$ be a $K$-vector
    space. A norm on $V$ is a function $\|\;\|: V \rightarrow \mathbb{R}_{\geq 0}$
    such that: (1) $\|v\|=0$ if and only if $v=0$; (2) $\|\lambda v\|=|\lambda|\|v\|$
    for all $\lambda \in K$ and $v \in V$; (3) $\|v+w\| \leq \|v\|+\|w\|$ for all
    $v, w \in V$.'
  kind: definition
  location: Section 10
  name: Definition 10.1
- description: Let $V$ be a vector space of finite dimension over a complete field
    $K$. Every norm on $V$ induces the same topology, in which $V$ is a complete metric
    space.
  kind: proposition
  location: Section 10
  name: Proposition 10.3
- description: 'Let $A$ be a complete DVR with fraction field $K$, maximal ideal $\mathfrak{p}$,
    discrete valuation $v_{\mathfrak{p}}$, and absolute value $|x|_{\mathfrak{p}}:=c^{v_{\mathfrak{p}}(x)}$,
    with $0<c<1$. Let $L/K$ be a finite extension of degree $n$. The following hold:
    (i) There is a unique absolute value $|x|:=|\mathrm{N}_{L/K}(x)|_{\mathfrak{p}}^{1/n}$
    on $L$ that extends $|\;|_{\mathfrak{p}}$; (ii) The field $L$ is complete with
    respect to $|\;|$, and its valuation ring $\{x \in L:|x| \leq 1\}$ is equal to
    the integral closure $B$ of $A$ in $L$; (iii) If $L/K$ is separable then $B$ is
    a complete DVR whose maximal ideal $\mathfrak{q}$ induces $|x|=|x|_{\mathfrak{q}}:=c^{\frac{1}{e_{\mathfrak{q}}}
    v_{\mathfrak{q}}(x)}$, where $e_{\mathfrak{q}}$ is the ramification index of $\mathfrak{q}$,
    that is, $\mathfrak{p} B=\mathfrak{q}^{e_{\mathfrak{q}}}$.'
  kind: theorem
  location: Section 10
  name: Theorem 10.4
- description: Assume AKLB and that $A$ is a complete DVR with maximal ideal $\mathfrak{p}$
    and let $\mathfrak{q} \mid \mathfrak{p}$. Then $v_{\mathfrak{q}}(x)=\frac{1}{f_{\mathfrak{q}}}
    v_{\mathfrak{p}}(\mathrm{N}_{L/K}(x))$ for all $x \in L$.
  kind: corollary
  location: Section 10
  name: Corollary 10.6
- description: Let $A$ be a local ring with maximal ideal $\mathfrak{p}$, and let
    $M$ be a finitely generated $A$-module. If the images of $x_{1}, \ldots, x_{n}
    \in M$ generate $M/\mathfrak{p} M$ as an $(A/\mathfrak{p})$-vector space then
    $x_{1}, \ldots, x_{n}$ generate $M$ as an $A$-module.
  kind: lemma
  location: Section 10.1
  name: Lemma 10.9 (Nakayama's Lemma)
- description: Let $A$ be a local noetherian ring with maximal ideal $\mathfrak{p}$,
    let $g \in A[x]$, and let $B:=A[x]/(g(x))$. Every maximal ideal $\mathfrak{m}$
    of $B$ contains the ideal $\mathfrak{p} B$.
  kind: corollary
  location: Section 10.1
  name: Corollary 10.10
- description: Let $A$ be a local noetherian ring with maximal ideal $\mathfrak{p}$,
    let $g \in A[x]$ be a polynomial with reduction $\bar{g} \in (A/\mathfrak{p})[x]$,
    and let $\alpha$ be the image of $x$ in the ring $B:=A[x]/(g(x))=A[\alpha]$. The
    maximal ideals of $B$ are $(\mathfrak{p}, g_i(\alpha))$, where $g_1, \ldots, g_m
    \in A[x]$ are lifts of the distinct irreducible polynomials $\bar{g}_i \in (A/\mathfrak{p})[x]$
    that divide $\bar{g}$.
  kind: corollary
  location: Section 10.1
  name: Corollary 10.11
- description: Assume $AKLB$, with $A$ and $B$ DVRs with residue fields $k:=A/\mathfrak{p}$
    and $l:=B/\mathfrak{q}$. If $l/k$ is separable then $B=A[\alpha]$ for some $\alpha
    \in B$; if $L/K$ is unramified this holds for every lift $\alpha$ of any generator
    $\bar{\alpha}$ for $l=k(\bar{\alpha})$.
  kind: theorem
  location: Section 10.1
  name: Theorem 10.12
- description: 'Let $A$ be a complete DVR with fraction field $K$ and residue field
    $k:=A/\mathfrak{p}$. The categories $\mathcal{C}_{K}^{\text{unr}}$ and $\mathcal{C}_{k}^{\text{sep}}$
    are equivalent via the functor $\mathcal{F}: \mathcal{C}_{K}^{\text{unr}} \rightarrow
    \mathcal{C}_{k}^{\text{sep}}$ that sends each unramified extension $L$ of $K$
    to its residue field $l$, and each $K$-algebra homomorphism $\varphi: L_1 \rightarrow
    L_2$ to the $k$-algebra homomorphism $\bar{\varphi}: l_1 \rightarrow l_2$ defined
    by $\bar{\varphi}(\bar{\alpha}):=\overline{\varphi(\alpha)}$, where $\alpha$ is
    any lift of $\bar{\alpha} \in l_1:=B_1/\mathfrak{q}_1$ to $B_1$ and $\overline{\varphi(\alpha)}$
    is the reduction of $\varphi(\alpha) \in B_2$ to $l_2:=B_2/\mathfrak{q}_2$; here
    $\mathfrak{q}_1, \mathfrak{q}_2$ are the maximal ideals of the valuation rings
    $B_1, B_2$ of $L_1, L_2$, respectively. In particular, $\mathcal{F}$ gives a bijection
    between the isomorphism classes in $\mathcal{C}_{K}^{\text{unr}}$ and $\mathcal{C}_{k}^{\text{sep}}$,
    and if $L_1, L_2$ have residue fields $l_1, l_2$ then $\mathcal{F}$ induces a
    bijection of finite sets $\operatorname{Hom}_K(L_1, L_2) \xrightarrow{\sim} \operatorname{Hom}_k(l_1,
    l_2)$.'
  kind: theorem
  location: Section 10.2
  name: Theorem 10.13
- description: Assume $AKLB$ with $A$ a complete DVR with residue field $k$. Then
    $L/K$ is unramified if and only if $B=A[\alpha]$ for some $\alpha \in L$ whose
    minimal polynomial $g \in A[x]$ has separable image $\bar{g}$ in $k[x]$.
  kind: corollary
  location: Section 10.2
  name: Corollary 10.15
- description: Let $A$ be a complete DVR with fraction field $K$ and residue field
    $k$, and let $\zeta_n$ be a primitive $n$th root of unity in some algebraic closure
    of $K$, with $n$ prime to the characteristic of $k$. The extension $K(\zeta_n)/K$
    is unramified.
  kind: corollary
  location: Section 10.2
  name: Corollary 10.16
- description: Let $A$ be a complete DVR with fraction field $K$ and finite residue
    field $\mathbb{F}_q$, and let $L$ be a degree $n$ extension of $K$. Then $L/K$
    is unramified if and only if $L \simeq K(\zeta_{q^n-1})$. When this holds, $A[\zeta_{q^n-1}]$
    is the integral closure of $A$ in $L$ and $L/K$ is a Galois extension with $\operatorname{Gal}(L/K)
    \simeq \mathbb{Z}/n\mathbb{Z}$.
  kind: corollary
  location: Section 10.2
  name: Corollary 10.17
- description: Let $A$ be a complete DVR with fraction field $K$ and finite residue
    field of characteristic $p$, and suppose that $K$ does not contain a primitive
    $p$th root of unity. The extension $K(\zeta_m)/K$ is ramified if and only if $p$
    divides $m$.
  kind: corollary
  location: Section 10.2
  name: Corollary 10.18
- description: Assume $AKLB$ with $A$ a complete DVR with finite residue field. Then
    $L/K$ is unramified if and only if $\mathrm{N}_{L/K}(B^{\times})=A^{\times}$.
  kind: theorem
  location: Section 10.2
  name: Theorem 10.20
- description: Let $L/K$ be a separable extension. The maximal unramified extension
    of $K$ in $L$ is the subfield $\bigcup_{\substack{K \subseteq E \subseteq L \\
    E/K \text{ fin. unram.}}} E \subseteq L$ where the union is over finite unramified
    subextensions $E/K$. When $L=K^{\text{sep}}$ is the separable closure of $K$,
    this is the maximal unramified extension of $K$, denoted $K^{\mathrm{unr}}$.
  kind: definition
  location: Section 10.2
  name: Definition 10.21
- description: 'Assume $AKLB$ with $A$ a complete DVR and separable residue field
    extension $l/k$. Let $e$ and $f$ be the ramification index and residue field degrees,
    respectively, and let $\mathfrak{q}$ be the unique prime of $B$. The following
    hold:

    (i) There is a unique intermediate field extension $E/K$ that contains every unramified
    extension of $K$ in $L$ and it has degree $[E:K]=f$.

    (ii) The extension $L/E$ is totally ramified and has degree $[L:E]=e$.

    (iii) If $L/K$ is Galois then $\operatorname{Gal}(L/K)$ is the decomposition group
    $D_{\mathfrak{q}}$, $\operatorname{Gal}(L/E)$ is the inertia subgroup $I_{\mathfrak{q}}$,
    and $E/K$ is Galois with $\operatorname{Gal}(E/K) \simeq D_{\mathfrak{q}}/I_{\mathfrak{q}}
    \simeq \operatorname{Gal}(l/k)$.'
  kind: theorem
  location: Section 10.2
  name: Theorem 10.23
- description: Let $A$ be a DVR with maximal ideal $\mathfrak{p}$. A monic polynomial
    $f(x)=x^{n}+a_{n-1}x^{n-1}+\cdots+a_{1}x+a_{0} \in A[x]$ is Eisenstein (or an
    Eisenstein polynomial) if $a_{i} \in \mathfrak{p}$ for $0 \leq i<n$ and $a_{0}
    \notin \mathfrak{p}^{2}$; equivalently, $v_{\mathfrak{p}}(a_{i}) \geq 1$ for $0
    \leq i<n$ and $v_{\mathfrak{p}}(a_{0})=1$. Note that this means $a_{0}$ is a uniformizer.
  kind: definition
  location: Section 11.1
  name: Definition 11.1
- description: Let $A$ be a DVR with fraction field $K$ and let $f \in A[x]$ be Eisenstein.
    Then $f$ is irreducible in both $A[x]$ and $K[x]$.
  kind: lemma
  location: Section 11.1
  name: Lemma 11.2 (Eisenstein irreducibility)
- description: Let $A$ be a DVR and let $f \in A[x]$ be an Eisenstein polynomial.
    Then $B=A[\pi]:=A[x]/(f)$ is a DVR with uniformizer $\pi$, where $\pi$ is the
    image of $x$ in $A[x]/(f)$.
  kind: lemma
  location: Section 11.1
  name: Lemma 11.4
- description: Assume $AKLB$ with $A$ a complete DVR and $\pi$ a uniformizer for $B$.
    The extension $L/K$ is totally ramified if and only if $B=A[\pi]$ and the minimal
    polynomial of $\pi$ is Eisenstein.
  kind: theorem
  location: Section 11.1
  name: Theorem 11.5
- description: Assume $AKLB$ with $A$ a complete DVR and separable residue field extension
    of characteristic $p \geq 0$. The extension $L/K$ is tamely ramified if $p \nmid
    e_{L/K}$ (always true if $p=0$); note that unramified extensions are tamely ramified.
    Otherwise $L/K$ is wildly ramified if $p \mid e_{L/K}$. A totally ramified extension
    $L/K$ is totally tamely ramified if $p \nmid e_{L/K}$, and it is totally wildly
    ramified if $e_{L/K}$ is a power of $p$ (a totally ramified extension that is
    wildly ramified need not be totally wildly ramified).
  kind: definition
  location: Section 11.1
  name: Definition 11.7
- description: The properties of being unramified, tamely ramified, wildly ramified,
    totally ramified, totally tamely ramified, and totally wildly ramified are all
    transitive in towers of extensions of fraction fields of complete DVRs with separable
    residue field extensions.
  kind: proposition
  location: Section 11.1
  name: Proposition 11.8
- description: Assume $AKLB$ with $A$ a complete DVR and separable residue field extension
    of characteristic $p \geq 0$ not dividing $n:=[L:K]$. The extension $L/K$ is totally
    tamely ramified if and only if $L=K(\pi_A^{1/n})$ for some uniformizer $\pi_A$
    of $A$.
  kind: theorem
  location: Section 11.1
  name: Theorem 11.10
- description: Let $L$ be a totally ramified extension of the fraction field $K$ of
    a complete DVR. There is a unique intermediate field $E$ such that $E/K$ is totally
    tamely ramified and $L/E$ is totally wildly ramified.
  kind: proposition
  location: Section 11.1
  name: Proposition 11.11
- description: Let $L$ be a finite separable extension of the fraction field $K$ of
    a complete DVR with separable residue field extension. There is a unique intermediate
    field $E$ such that $E/K$ is tamely ramified and $L/E$ is totally wildly ramified.
  kind: corollary
  location: Section 11.1
  name: Corollary 11.12
- description: Let $K$ be the fraction field of a complete DVR with algebraic closure
    $\bar{K}$ and absolute value $|\;|$ extended to $\bar{K}$. For all $\alpha \in
    \bar{K}$ and $\sigma \in \operatorname{Aut}_{K}(\bar{K})$ we have $|\sigma(\alpha)|=|\alpha|$.
  kind: lemma
  location: Section 11.2
  name: Lemma 11.13
- description: Let $K$ be the fraction field of a complete DVR with absolute value
    $|\;|$ extended to an algebraic closure $\bar{K}$. For $\alpha, \beta \in \bar{K}$,
    we say $\beta$ belongs to $\alpha$ if $|\beta-\alpha|<|\beta-\sigma(\alpha)|$
    for all $\sigma \in \operatorname{Aut}_{K}(\bar{K})$ with $\sigma(\alpha) \neq
    \alpha$, that is, $\beta$ is strictly closer to $\alpha$ than it is to any of
    its conjugates. This is equivalent to requiring that $|\beta-\alpha|<|\alpha-\sigma(\alpha)|$
    for all $\sigma(\alpha) \neq \alpha$, since every nonarchimedean triangle is isosceles
    (if one side is shorter than another, it is the shortest of all three sides).
  kind: definition
  location: Section 11.2
  name: Definition 11.14
- description: Let $K$ be the fraction field of a complete DVR and let $\alpha, \beta
    \in \bar{K}$, with $\alpha$ separable over $K$. If $\beta$ belongs to $\alpha$
    then $K(\alpha) \subseteq K(\beta)$.
  kind: lemma
  location: Section 11.2
  name: Lemma 11.15 (Krasner's lemma)
- description: For a field $K$ with absolute value $|\;|$ the $L^1$-norm of $f=\sum
    f_i x^i \in K[x]$ is $\|f\|_1 := \sum_i |f_i|$.
  kind: definition
  location: Section 11.2
  name: Definition 11.17
- description: Let $K$ be a field with absolute value $|\;|$ and let $f:=\prod_{i=1}^{n}(x-\alpha_i)
    \in K[x]$ be a monic polynomial with roots $\alpha_1, \ldots, \alpha_n \in L$,
    where $L/K$ is a field with an absolute value that extends $|\;|$. Then $|\alpha|<\|f\|_1$
    for every root $\alpha$ of $f$.
  kind: lemma
  location: Section 11.2
  name: Lemma 11.18
- description: 'Let $K$ be the fraction field of a complete DVR and $f \in K[x]$ a
    monic irreducible separable polynomial. There exists $\delta=\delta(f) \in \mathbb{R}_{>0}$
    such that for every monic polynomial $g \in K[x]$ with $\|f-g\|_1<\delta$ the
    following holds: Every root $\beta$ of $g$ belongs to a root $\alpha$ of $f$ for
    which $K(\beta)=K(\alpha)$. In particular, every such $g$ is separable, irreducible,
    and has the same splitting field as $f$.'
  kind: theorem
  location: Section 11.2
  name: Theorem 11.19 (Continuity of roots)
- description: Let $K$ be a global field with a nontrivial absolute value $|\;|$,
    and let $\hat{K}$ be the completion of $K$ with respect to $|\;|$. Every finite
    separable extension $\hat{L}$ of $\hat{K}$ is the completion of a finite separable
    extension $L$ of $K$ with respect to an absolute value that restricts to $|\;|$.
    One can choose $L$ so that $[L:K]=[\hat{L}:\hat{K}]$, in which case $\hat{L}=\hat{K}
    \cdot L$.
  kind: theorem
  location: Section 11.3
  name: Theorem 11.20
- description: For every finite Galois extension $\hat{L}/\hat{K}$ of local fields
    there is a finite Galois extension of global fields $L/K$ and an absolute value
    $|\,|$ on $L$ such that $\hat{L}$ is the completion of $L$ with respect to $|\,|$,
    $\hat{K}$ is the completion of $K$ with respect to the restriction of $|\,|$ to
    $K$, and $\operatorname{Gal}(L/K) \simeq \operatorname{Gal}(\hat{L}/\hat{K})$.
  kind: corollary
  location: Section 11.3
  name: Corollary 11.22
- description: 'Assume $AKLB$, let $\mathfrak{p}$ be a prime of $A$, and let $\mathfrak{p}B
    = \prod_{\mathfrak{q}|\mathfrak{p}} \mathfrak{q}^{e_{\mathfrak{q}}}$ be the factorization
    of $\mathfrak{p}B$ in $B$. Let $K_{\mathfrak{p}}$ be the completion of $K$ with
    respect to $|\,|_{\mathfrak{p}}$, and let $\hat{\mathfrak{p}}$ be the maximal
    ideal of its valuation ring. For each $\mathfrak{q}|\mathfrak{p}$, let $L_{\mathfrak{q}}$
    denote the completion of $L$ with respect to $|\,|_{\mathfrak{q}}$, and $\hat{\mathfrak{q}}$
    the maximal ideal of its valuation ring. The following hold: (1) Each $L_{\mathfrak{q}}$
    is a finite separable extension of $K_{\mathfrak{p}}$ with $[L_{\mathfrak{q}}:K_{\mathfrak{p}}]
    \leq [L:K]$. (2) Each $\hat{\mathfrak{q}}$ is the unique prime of $L_{\mathfrak{q}}$
    lying over $\hat{\mathfrak{p}}$. (3) Each $\hat{\mathfrak{q}}$ has ramification
    index $e_{\hat{\mathfrak{q}}}=e_{\mathfrak{q}}$ and residue field degree $f_{\hat{\mathfrak{q}}}=f_{\mathfrak{q}}$.
    (4) $[L_{\mathfrak{q}}:K_{\mathfrak{p}}]=e_{\mathfrak{q}}f_{\mathfrak{q}}$. (5)
    The map $L \otimes_K K_{\mathfrak{p}} \rightarrow \prod_{\mathfrak{q}|\mathfrak{p}}
    L_{\mathfrak{q}}$ defined by $\ell \otimes x \mapsto (\ell x, \ldots, \ell x)$
    is an isomorphism of finite étale $K_{\mathfrak{p}}$-algebras. (6) If $L/K$ is
    Galois then each $L_{\mathfrak{q}}/K_{\mathfrak{p}}$ is Galois and we have isomorphisms
    of decomposition groups $D_{\mathfrak{q}} \simeq D_{\hat{\mathfrak{q}}} = \operatorname{Gal}(L_{\mathfrak{q}}/K_{\mathfrak{p}})$
    and inertia groups $I_{\mathfrak{q}} \simeq I_{\hat{\mathfrak{q}}}$.'
  kind: theorem
  location: Section 11.4
  name: Theorem 11.23
- description: Assume $AKLB$ and let $\mathfrak{p}$ be a prime of $A$. For every $\alpha
    \in L$ we have $\mathrm{N}_{L/K}(\alpha) = \prod_{\mathfrak{q}|\mathfrak{p}} \mathrm{N}_{L_{\mathfrak{q}}/K_{\mathfrak{p}}}(\alpha)$
    and $\mathrm{T}_{L/K}(\alpha) = \sum_{\mathfrak{q}|\mathfrak{p}} \mathrm{T}_{L_{\mathfrak{q}}/K_{\mathfrak{q}}}(\alpha)$
    where we view $\alpha$ as an element of $L_{\mathfrak{q}}$ and $\mathrm{N}_{L/K}(\alpha)$
    as an element of $K_{\mathfrak{p}}$ via the canonical embeddings $L \hookrightarrow
    L_{\mathfrak{q}}$ and $K \hookrightarrow K_{\mathfrak{p}}$.
  kind: corollary
  location: Section 11.4
  name: Corollary 11.24
- description: Assume $AKLB$ and let $\mathfrak{p}$ be a prime of $A$. Let $\mathfrak{p}B
    = \prod \mathfrak{q}^{e_{\mathfrak{q}}}$ be the factorization of $\mathfrak{p}B$
    in $B$. Let $\hat{A}_{\mathfrak{p}}$ denote the completion of $A$ with respect
    to $|\,|_{\mathfrak{p}}$, and for each $\mathfrak{q}|\mathfrak{p}$, let $\hat{B}_{\mathfrak{q}}$
    denote the completion of $B$ with respect to $|\,|_{\mathfrak{q}}$. Then $B \otimes_A
    \hat{A}_{\mathfrak{p}} \simeq \prod_{\mathfrak{q}|\mathfrak{p}} \hat{B}_{\mathfrak{q}}$,
    as $\hat{A}_{\mathfrak{p}}$-algebras.
  kind: corollary
  location: Section 11.4
  name: Corollary 11.26
- description: Assume $AKLB$. If $I \in \mathcal{I}_B$ then $I^* \in \mathcal{I}_B$.
  kind: lemma
  location: Section 12.1
  name: Lemma 12.1
- description: 'Assume $AKLB$. The different $\mathcal{D}_{L/K}$ of $L/K$ (and the
    different $\mathcal{D}_{B/A}$ of $B/A$), is the inverse of $B^*$ in $\mathcal{I}_B$.
    Explicitly, we have $B^* := \{x \in L : \mathrm{T}_{L/K}(xb) \in A \text{ for
    all } b \in B\}$ and we define $\mathcal{D}_{L/K} := \mathcal{D}_{B/A} := (B^*)^{-1}
    = (B:B^*) = \{x \in L : xB^* \subseteq B\}$.'
  kind: definition
  location: Section 12.1
  name: Definition 12.2
- description: Assume $AKLB$ and let $S$ be a multiplicative subset of $A$. Then $S^{-1}\mathcal{D}_{B/A}
    = \mathcal{D}_{S^{-1}B/S^{-1}A}$.
  kind: proposition
  location: Section 12.1
  name: Proposition 12.3
- description: Assume $AKLB$ and let $\mathfrak{q}|\mathfrak{p}$ be a prime of $B$.
    Then $\mathcal{D}_{\hat{B}_{\mathfrak{q}}/\hat{A}_{\mathfrak{p}}} = \mathcal{D}_{B/A}\hat{B}_{\mathfrak{q}}$
    where $\hat{A}_{\mathfrak{p}}$ and $\hat{B}_{\mathfrak{q}}$ are the completions
    of $A$ and $B$ at $\mathfrak{p}$ and $\mathfrak{q}$, respectively.
  kind: proposition
  location: Section 12.1
  name: Proposition 12.4
- description: Let $S/R$ be a ring extension in which $S$ is a free $R$-module of
    rank $n$. For any $x_1, \ldots, x_n \in S$ we define the discriminant $\operatorname{disc}(x_1,
    \ldots, x_n) := \operatorname{disc}_{S/R}(x_1, \ldots, x_n) := \det[\mathrm{T}_{S/R}(x_i
    x_j)]_{i,j} \in R$.
  kind: definition
  location: Section 12.2
  name: Definition 12.5
- description: Let $L/K$ be a finite separable extension of degree $n$, and let $\Omega/K$
    be a field extension for which there are distinct $\sigma_1, \ldots, \sigma_n
    \in \operatorname{Hom}_K(L, \Omega)$. For any $e_1, \ldots, e_n \in L$ we have
    $\operatorname{disc}(e_1, \ldots, e_n) = \det[\sigma_i(e_j)]_{ij}^2$, and for
    any $x \in L$ we have $\operatorname{disc}(1, x, x^2, \ldots, x^{n-1}) = \prod_{i<j}(\sigma_i(x)
    - \sigma_j(x))^2$. Such a field extension $\Omega/K$ always exists, since $L/K$
    is separable ($\Omega = K^{\text{sep}}$ works).
  kind: proposition
  location: Section 12.2
  name: Proposition 12.6
- description: For a polynomial $f(x) = \prod_i (x - \alpha_i)$, the discriminant
    of $f$ is defined (definition is cut off at the end of the provided text).
  kind: definition
  location: Section 12.2
  name: Definition 12.7
- description: 'Assume $AKLB$, let $M$ be an $A$-lattice in $L$, and let $n := [L:K]$.
    The discriminant $D(M)$ of $M$ is the $A$-module generated by $\{\operatorname{disc}(x_1,
    \ldots, x_n) : x_1, \ldots, x_n \in M\}$.'
  kind: definition
  location: Section 12
  name: Definition 12.9
- description: Assume $AKLB$ and let $M' \subseteq M$ be free $A$-lattices in $L$.
    The discriminants $D(M') \subseteq D(M)$ are nonzero principal fractional ideals.
    If $D(M') = D(M)$ then $M' = M$.
  kind: lemma
  location: Section 12
  name: Lemma 12.10
- description: Assume $AKLB$ and let $M$ be an $A$-lattice in $L$. Then $D(M) \in
    \mathcal{I}_A$.
  kind: proposition
  location: Section 12
  name: Proposition 12.11
- description: 'Assume $AKLB$. The discriminant $D_{L/K}$ of $L/K$ (and the discriminant
    $D_{B/A}$ of $B/A$) is the discriminant of $B$ as an $A$-module: $$D_{L/K} :=
    D_{B/A} := D(B) \in \mathcal{I}_A$$ which is an $A$-ideal, since $\operatorname{disc}(x_1,
    \ldots, x_n) = \det[T_{B/A}(x_i x_j)]_{i,j} \in A$ for all $x_1, \ldots, x_n \in
    B$.'
  kind: definition
  location: Section 12
  name: Definition 12.12
- description: Assume $AKLB$ and let $S$ be a multiplicative subset of $A$. Then $$S^{-1}
    D_{B/A} = D_{S^{-1}B/S^{-1}A}.$$
  kind: proposition
  location: Section 12
  name: Proposition 12.15
- description: Assume $AKLB$ and let $\mathfrak{p}$ be a prime of $A$. Then $$D_{B/A}
    \hat{A}_{\mathfrak{p}} = \prod_{\mathfrak{q} \mid \mathfrak{p}} D_{\hat{B}_{\mathfrak{q}}/\hat{A}_{\mathfrak{p}}}$$
    where $\hat{A}_{\mathfrak{p}}$ and $\hat{B}_{\mathfrak{q}}$ are the completions
    of $A$ and $B$ at $\mathfrak{p}$ and $\mathfrak{q}$, respectively.
  kind: proposition
  location: Section 12
  name: Proposition 12.16
- description: Assume $AKLB$. Then $D_{B/A} = N_{B/A}(\mathcal{D}_{B/A})$.
  kind: theorem
  location: Section 12
  name: Theorem 12.17
- description: Let $k$ be a field and let $R$ be a commutative $k$-algebra with $k$-basis
    $r_1, \ldots, r_n$. Then $R$ is a finite étale $k$-algebra if and only if $\operatorname{disc}(r_1,
    \ldots, r_n) \neq 0$.
  kind: lemma
  location: Section 12.3
  name: Lemma 12.18
- description: Assume $AKLB$, let $\mathfrak{q}$ be a prime of $B$ lying above a prime
    $\mathfrak{p}$ of $A$ such that $B/\mathfrak{q}$ is a separable extension of $A/\mathfrak{p}$.
    The extension $L/K$ is unramified at $\mathfrak{q}$ if and only if $\mathfrak{q}$
    does not divide $\mathcal{D}_{B/A}$, and it is unramified at $\mathfrak{p}$ if
    and only if $\mathfrak{p}$ does not divide $D_{B/A}$.
  kind: theorem
  location: Section 12.3
  name: Theorem 12.19
- description: Assume $AKLB$. Only finitely many primes of $A$ (or $B$) ramify.
  kind: corollary
  location: Section 12.3
  name: Corollary 12.20
- description: Assume $AKLB$ and let $\mathcal{O}$ be an order with integral closure
    $B$ and conductor $\mathfrak{c}$. Then $D_{\mathcal{O}/A} = \mathrm{N}_{B/A}(\mathfrak{c})
    D_{B/A}$.
  kind: theorem
  location: Section 12.4
  name: Theorem 12.22
- description: Let $K=\mathbb{Q}(\alpha)$ be a number field, let $f$ be the minimal
    polynomial of $\alpha$, let $p$ be a prime, let $\bar{f}=\prod_{i=1}^{r} \bar{f}_{i}^{e_{i}}$
    be the factorization of $\bar{f}:=f \bmod p$ in $\mathbb{F}_{p}[x]$. Let $f_{i}$
    be any monic lift of $\bar{f}_{i}$ to $\mathbb{Z}[x]$, let $u:=\prod f_{i}$, let
    $v$ be any monic lift of $\bar{f}/\bar{g}$ to $\mathbb{Z}[x]$, and let $w=(uv-f)/p
    \in \mathbb{Z}[x]$. Then $p$ divides $[\mathcal{O}_{K}:\mathbb{Z}[\alpha]]$ if
    and only if $\bar{u}, \bar{v}, \bar{w}$ have no common factor in $\mathbb{F}_{p}[x]$.
  kind: theorem
  location: Section 12.4
  name: Theorem 12.23 (Dedekind)
- description: Assume $AKLB$. If $B=A[\alpha]$ for some $\alpha \in L$ and $f \in
    A[x]$ is the minimal polynomial of $\alpha$, then $\mathcal{D}_{B/A}=(f'(\alpha))$
    is the $B$-ideal generated by $f'(\alpha)$.
  kind: proposition
  location: Section 12.5
  name: Proposition 12.24
- description: Assume $AKLB$ and let $\alpha \in B$ have minimal polynomial $f \in
    A[x]$. The different of $\alpha$ is defined by $\delta_{B/A}(\alpha) := f'(\alpha)$
    if $L=K(\alpha)$, and $\delta_{B/A}(\alpha) := 0$ otherwise.
  kind: definition
  location: Section 12.5
  name: Definition 12.25
- description: 'Assume $AKLB$. Then $\mathcal{D}_{B/A}=(\delta_{B/A}(\alpha): \alpha
    \in B)$.'
  kind: proposition
  location: Section 12.5
  name: Proposition 12.26
- description: Assume $AKLB$ and let $\mathfrak{q}$ be a prime of $L$ lying above
    $\mathfrak{p}=\mathfrak{q} \cap A$ for which the residue field extension $(B/\mathfrak{q})/(A/\mathfrak{p})$
    is separable. Then $e_{\mathfrak{q}}-1 \leq v_{\mathfrak{q}}(\mathcal{D}_{B/A})
    \leq e_{\mathfrak{q}}-1+v_{\mathfrak{q}}(e_{\mathfrak{q}})$, and the lower bound
    is an equality if and only if $\mathfrak{q}$ is tamely ramified.
  kind: theorem
  location: Section 12.5
  name: Theorem 12.27
- description: Assume $AKLB$ and let $M/L$ be a finite separable extension and let
    $C$ be the integral closure of $A$ in $M$. Then $\mathcal{D}_{C/A}=\mathcal{D}_{C/B}
    \cdot \mathcal{D}_{B/A}$ (where the product on the right is taken in $C$), and
    $D_{C/A}=(D_{B/A})^{[M:L]} N_{B/A}(D_{C/B})$.
  kind: proposition
  location: Section 12.5
  name: Proposition 12.28
- description: Let $K$ be a field. A place of $K$ is an equivalence class of nontrivial
    absolute values on $K$. We may use $M_K$ to denote the set of places of $K$, and
    for each place $v$ we use $|\,|_v$ to denote any representative absolute value
    and $K_v$ to denote the completion of $K$ with respect to $|\,|_v$. We call a
    place $v$ archimedean when $K_v$ is archimedean and nonarchimedean otherwise.
  kind: definition
  location: Section 13.1
  name: Definition 13.1
- description: If $L/K$ is an extension of global fields, for every place $w$ of $L$,
    any absolute value $|\,|_w$ that represents the equivalence class $w$ restricts
    to an absolute value on $K$ that represents a place $v$ of $K$ that is independent
    of the choice of $|\,|_w$. We write $w \mid v$ to indicate this relationship and
    say that $w$ extends $v$ or that $w$ lies above $v$.
  kind: definition
  location: Section 13.1
  name: Definition 13.4
- description: Let $L/K$ be a finite separable extension of global fields and let
    $v$ be a place of $K$. We have an isomorphism of finite étale $K_v$-algebras $L
    \otimes_{K} K_v \xrightarrow{\sim} \prod_{w \mid v} L_w$ defined by $\ell \otimes
    x \mapsto (\ell x, \ldots, \ell x)$.
  kind: theorem
  location: Section 13.1
  name: Theorem 13.5
- description: Let $L/K$ be a finite separable extension of global fields, $v$ be
    a place of $K$, and $f \in K[x]$ be a monic irreducible polynomial such that $L
    \simeq K[x]/(f(x))$. There is a one-to-one correspondence between the irreducible
    factors of $f$ in $K_v[x]$ and the places of $L$ lying above $v$. If $f=f_1 \cdots
    f_r$ is the factorization of $f$ in $K_v[x]$, then we can order the set $\{w \mid
    v\}=\{w_1, \ldots, w_r\}$ so that $L_{w_i} \simeq K_v[x]/(f_i(x))$ for $1 \leq
    i \leq r$.
  kind: corollary
  location: Section 13.1
  name: Corollary 13.6
- description: Let $L/K$ be a finite separable extension of global fields and $v$
    a place of $K$. We have a bijection $\operatorname{Hom}_{K}(L, \bar{K}_v)/\operatorname{Gal}(\bar{K}_v/K_v)
    \longleftrightarrow \{w \mid v\}$, between $\operatorname{Gal}(\bar{K}_v/K_v)$-orbits
    of $K$-embeddings of $L$ into $\bar{K}_v$ and the places of $L$ above $v$.
  kind: corollary
  location: Section 13.1
  name: Corollary 13.7
- description: Let $K$ be a number field. Elements of $\operatorname{Hom}_{\mathbb{Q}}(K,
    \mathbb{R})$ are real embeddings, and elements of $\operatorname{Hom}_{\mathbb{Q}}(K,
    \mathbb{C})$ whose image does not lie in $\mathbb{R}$ are complex embeddings.
  kind: definition
  location: Section 13.1
  name: Definition 13.8
- description: Let $K$ be a number field with $r$ real places and $s$ complex places.
    Then $[K:\mathbb{Q}]=r+2s$.
  kind: corollary
  location: Section 13.1
  name: Corollary 13.9
- description: Let $K$ be a number field with $s$ complex places. The sign of the
    absolute discriminant $D_K \in \mathbb{Z}$ is $(-1)^s$.
  kind: proposition
  location: Section 13.1
  name: Proposition 13.11
- description: 'Let $X$ be a locally compact Hausdorff space. The $\sigma$-algebra
    $\Sigma$ of $X$ is the collection of subsets of $X$ generated by the open and
    closed sets under countable unions and countable intersections. Its elements are
    Borel sets, or measurable sets. A Borel measure on $X$ is a countably additive
    function $\mu: \Sigma \rightarrow \mathbb{R}_{\geq 0} \cup\{\infty\}$. A Radon
    measure on $X$ is a Borel measure on $X$ that additionally satisfies (1) $\mu(S)<\infty$
    if $S$ is compact, (2) $\mu(S)=\inf\{\mu(U): S \subseteq U, U$ open$\}$, (3) $\mu(S)=\sup\{\mu(C):
    C \subseteq S, C$ compact$\}$, for all Borel sets $S$.'
  kind: definition
  location: Section 13.2
  name: Definition 13.12
- description: A locally compact group is a topological group that is Hausdorff and
    locally compact. A (left) Haar measure $\mu$ on a locally compact group $G$ is
    a nonzero Radon measure that is translation invariant, meaning that $\mu(S)=\mu(x+S)$
    for all $x \in G$ and measurable $S \subseteq G$ (we write the group operation
    additively because we have in mind the additive group of a local field). A compact
    group is a locally compact group that is compact; in compact groups every measurable
    set has finite measure.
  kind: definition
  location: Section 13.2
  name: Definition 13.13
- description: Every locally compact group $G$ has a Haar measure. If $\mu$ and $\mu^{\prime}$
    are two Haar measures on $G$, then there is a positive real number $\lambda$ such
    that $\mu^{\prime}(S)=\lambda \mu(S)$ for all measurable sets $S$.
  kind: theorem
  location: Section 13.2
  name: Theorem 13.14 (Weil)
- description: Let $K$ be a local field with discrete valuation $v$, residue field
    $k$, and absolute value $|\cdot|_{v}:=(\# k)^{-v(\cdot)}$ and let $\mu$ be a Haar
    measure on $K$. For every $x \in K$ and measurable set $S \subseteq K$ we have
    $\mu(xS)=|x|_{v} \mu(S)$. Moreover, the absolute value $|\,|_{v}$ is the unique
    absolute value compatible with the topology on $K$ for which this is true.
  kind: proposition
  location: Section 13.2
  name: Proposition 13.16
- description: 'Let $K$ be a global field. For each place $v$ of $K$ the normalized
    absolute value $\|\,\|_{v}: K_{v} \rightarrow \mathbb{R}_{\geq 0}$ on the completion
    of $K$ at $v$ is defined by $\|x\|_{v}:=\frac{\mu(xS)}{\mu(S)}$ where $\mu$ is
    a Haar measure on $K_{v}$ and $S \subseteq K_{v}$ is a measurable set with finite
    nonzero measure (such as the set $\{x \in K_{v}:|x|_{v} \leq 1\}$, for example).'
  kind: definition
  location: Section 13.3
  name: Definition 13.17
- description: Let $L/K$ be a finite separable extension of global fields, let $v$
    be a place of $K$ and let $w \mid v$ be a place of $L$. Then $\|x\|_{w}=\left\|\mathrm{N}_{L_{w}/K_{v}}(x)\right\|_{v}$.
  kind: lemma
  location: Section 13.3
  name: Lemma 13.19
- description: Let $L$ be a global field. For all $x \in L^{\times}$ we have $\prod_{v
    \in M_{L}}\|x\|_{v}=1$ where $\|\,\|_{v}$ denotes the normalized absolute value
    for each place $v \in M_{L}$.
  kind: theorem
  location: Section 13.3
  name: Theorem 13.21 (Product Formula)
- description: 'A global field is a field $K$ with at least one place whose completion
    at each of its places $v \in M_{K}$ is a local field $K_{v}$, and which has a
    product formula of the form $\prod_{v \in M_{K}}\|x\|_{v}=1$ where each normalized
    absolute value $\|\,\|_{v}: K_{v} \rightarrow \mathbb{R}_{\geq 0}$ satisfies $\|\,\|_{v}=|\,|_{v}^{m_{v}}$
    for some absolute value $|\,|_{v}$ representing $v$ and some fixed $m_{v} \in
    \mathbb{R}_{>0}$.'
  kind: definition
  location: Section 13.3
  name: Definition 13.22
- description: Every global field is a finite extension of $\mathbb{Q}$ or $\mathbb{F}_{q}(t)$.
  kind: theorem
  location: Section 13.3
  name: Theorem 13.23 (Artin-Whaples)
- description: A subgroup $H$ of a topological group $G$ is discrete if the subspace
    topology on $H$ is the discrete topology (every point is open), and cocompact
    if $H$ is a normal subgroup of $G$ and the quotient $G/H$ is compact (here $G/H$
    denotes the group $G/H$ with the quotient topology given by identifying elements
    of $G$ that lie in the same coset of $H$).
  kind: definition
  location: Section 14.1
  name: Definition 14.2
- description: A subgroup $G \subseteq V \simeq \mathbb{R}^{n}$ is finitely generated
    if and only if it is discrete, in which case $G \simeq \mathbb{Z}^{m}$ for some
    $m \leq n$ and $G$ is then cocompact if and only if $m=n$.
  kind: lemma
  location: Section 14.1
  name: Lemma 14.3
- description: A (full) lattice in $V \simeq \mathbb{R}^{n}$ is a $\mathbb{Z}$-submodule
    generated by an $\mathbb{R}$-basis, equivalently, a discrete cocompact subgroup.
  kind: definition
  location: Section 14.1
  name: Definition 14.4
- description: 'Let $T: V \rightarrow V$ be a linear transformation of $V \simeq \mathbb{R}^{n}$.
    For any Haar measure $\mu$ on $V$ and every measurable set $S \subseteq V$ we
    have $\mu(T(S))=|\det T| \mu(S)$.'
  kind: proposition
  location: Section 14.1
  name: Proposition 14.7
- description: Let $\Lambda$ be a lattice in $V \simeq \mathbb{R}^{n}$. A fundamental
    domain for $\Lambda$ is a measurable set $F \subseteq V$ such that $V=\bigsqcup_{\lambda
    \in \Lambda}(F+\lambda)$.
  kind: definition
  location: Section 14.1
  name: Definition 14.8
- description: Let $\Lambda$ be a lattice in $V \simeq \mathbb{R}^{n}$ and let $\mu$
    be a Haar measure on $V$. Every fundamental domain for $\Lambda$ has the same
    measure, and this measure is finite and nonzero.
  kind: proposition
  location: Section 14.1
  name: Proposition 14.9
- description: Let $\Lambda$ be a lattice in $V \simeq \mathbb{R}^{n}$ and fix a Haar
    measure $\mu$ on $V$. The covolume $\operatorname{covol}(\Lambda) \in \mathbb{R}_{>0}$
    of $\Lambda$ is the measure $\mu(F)$ of any fundamental domain $F$ for $\Lambda$.
  kind: definition
  location: Section 14.1
  name: Definition 14.10
- description: If $\Lambda' \subseteq \Lambda$ are lattices in $V \simeq \mathbb{R}^{n}$,
    then $\operatorname{covol}(\Lambda')=[\Lambda:\Lambda'] \operatorname{covol}(\Lambda)$.
  kind: proposition
  location: Section 14.1
  name: Proposition 14.11
- description: 'Let $S$ be a subset of a real vector space. The set $S$ is symmetric
    if it is closed under negation, and convex if for all $x, y \in S$ we have $\{tx+(1-t)y:
    t \in [0,1]\} \subseteq S$.'
  kind: definition
  location: Section 14.1
  name: Definition 14.12
- description: Let $\Lambda$ be a lattice in $V \simeq \mathbb{R}^{n}$ and $\mu$ a
    Haar measure on $V$. If $S \subseteq V$ is a symmetric convex measurable set that
    satisfies $\mu(S)>2^{n} \operatorname{covol}(\Lambda)$, then $S$ contains a nonzero
    element of $\Lambda$.
  kind: theorem
  location: Section 14.1
  name: Theorem 14.13 (Minkowski's Lattice Point Theorem)
- description: Let $K$ be a number field. Using the normalized Haar measure on $K_{\mathbb{R}}$
    defined in (6), $\operatorname{covol}(\mathcal{O}_{K})=\sqrt{|D_{K}|}$.
  kind: proposition
  location: Section 14.3
  name: Proposition 14.16
- description: Let $K$ be a number field and let $I$ be a nonzero fractional ideal
    of $\mathcal{O}_{K}$. Then $\operatorname{covol}(I)=\mathrm{N}(I) \sqrt{|D_{K}|}$.
  kind: corollary
  location: Section 14.3
  name: Corollary 14.17
- description: Let $K$ be a number field of degree $n$ with $s$ complex places. Define
    the Minkowski constant $m_{K}$ for $K$ as the positive real number $m_{K}:=\frac{n!}{n^{n}}\left(\frac{4}{\pi}\right)^{s}
    \sqrt{|D_{K}|}$. For every nonzero fractional ideal $I$ of $\mathcal{O}_{K}$ there
    is a nonzero $a \in I$ for which $\mathrm{N}(a) \leq m_{K} \mathrm{N}(I)$.
  kind: theorem
  location: Section 14.4
  name: Theorem 14.18 (Minkowski bound)
- description: 'Let $K$ be a number field of degree $n$ with $r$ real and $s$ complex
    places. For each $t \in \mathbb{R}_{>0}$, the measure of the convex symmetric
    set $S_{t}:=\{(z_{\sigma}) \in K_{\mathbb{R}}: \sum |z_{\sigma}| \leq t\} \subseteq
    K_{\mathbb{R}}$ with respect to the normalized Haar measure $\mu$ on $K_{\mathbb{R}}$
    is $\mu(S_{t})=2^{r} \pi^{s} \frac{t^{n}}{n!}$.'
  kind: lemma
  location: Section 14.4
  name: Lemma 14.19
- description: Let $K$ be a number field. Every ideal class in $\mathrm{cl}\, \mathcal{O}_{K}$
    contains an ideal $I \subseteq \mathcal{O}_{K}$ of absolute norm $\mathrm{N}(I)
    \leq m_{K}$, where $m_{K}$ is the Minkowski constant for $K$.
  kind: theorem
  location: Section 14.5
  name: Theorem 14.20
- description: Let $K$ be a number field of degree $n$ and let $M \in \mathbb{R}_{>0}$.
    The number of $\mathcal{O}_{K}$-ideals of norm $\mathrm{N}(I) \leq M$ is bounded
    by $(nM)^{\log_{2} M}$ (and in particular, finite).
  kind: lemma
  location: Section 14.5
  name: Lemma 14.21
- description: Let $K$ be a number field. The ideal class group of $\mathcal{O}_{K}$
    is finite.
  kind: corollary
  location: Section 14.5
  name: Corollary 14.22
- description: Let $A$ be the ring $\mathbb{Z}$ or $\mathbb{F}_{q}[t]$ and let $B$
    be the integral closure of $A$ in a finite separable extension of its fraction
    field. The ideal class group of $B$ is finite.
  kind: theorem
  location: Section 14.5
  name: Theorem 14.23
- description: Let $K$ be a number field of degree $n$ with $s$ complex places. Then
    $|D_{K}| \geq \left(\frac{n^{n}}{n!}\right)^{2}\left(\frac{\pi}{4}\right)^{2s}
    > \frac{1}{e^{2} n}\left(\frac{\pi e^{2}}{4}\right)^{n}$.
  kind: corollary
  location: Section 14.5
  name: Corollary 14.26
- description: If $K$ is a number field other than $\mathbb{Q}$ then $|D_{K}|>1$;
    equivalently, there are no nontrivial unramified extensions of $\mathbb{Q}$.
  kind: corollary
  location: Section 14.5
  name: Corollary 14.27
- description: For every real $M$ the set of number fields $K$ with $|D_{K}|<M$ is
    finite.
  kind: theorem
  location: Section 14.5
  name: Theorem 14.28
- description: Let $K$ be a number field of degree $n$. For each prime number $p$
    we have $v_p(D_K) \leq n\lfloor \log_p n \rfloor + n - 1$. In particular, $v_p(D_K)
    \leq n\lfloor \log_2 n \rfloor + n - 1$ for all $p$.
  kind: lemma
  location: Section 14
  name: Lemma 14.29
- description: Let $S$ be a finite set of places of $\mathbb{Q}$, and let $n$ be an
    integer. The number of extensions $K/\mathbb{Q}$ of degree $n$ unramified outside
    of $S$ is finite.
  kind: theorem
  location: Section 14
  name: Theorem 14.31 (Hermite)
- description: 'Let $K$ be a global field. A (multiplicative) Arakelov divisor is
    a sequence of positive real numbers $c = (c_v)$ indexed by $v \in M_K$ with all
    but finitely many $c_v = 1$ and $c_v \in \|K_v^\times\| := \{\|x\|_v : x \in K_v^\times\}$.
    The set of Arakelov divisors $\operatorname{Div} K$ forms an abelian group under
    pointwise multiplication $(c_v)(d_v) := (c_v d_v)$. The multiplicative group $K^\times$
    is canonically embedded in $\operatorname{Div} K$ via the map $x \mapsto (\|x\|_v)$,
    where it forms the subgroup $\operatorname{Princ} K$ of principal Arakelov divisors.'
  kind: definition
  location: Section 15.1
  name: Definition 15.1
- description: 'Let $K$ be a global field. The size of an Arakelov divisor $c$ is
    $\|c\| := \prod_{v \in M_K} c_v \in \mathbb{R}_{>0}$. The map $\operatorname{Div}
    K \to \mathbb{R}_{>0}^\times$ defined by $c \mapsto \|c\|$ is a group homomorphism
    whose kernel contains $\operatorname{Princ} K$ (by the product formula). Corresponding
    to each Arakelov divisor $c$ is a subset $L(c)$ of $K$ defined by $L(c) := \{x
    \in K : \|x\|_v \leq c_v \text{ for all } v \in M_K\}$, and a nonzero fractional
    ideal of $\mathcal{O}_K$ defined by $I_c := \prod_{v \nmid \infty} \mathfrak{q}_v^{v(c)}$,
    where $\mathfrak{q}_v := \{a \in \mathcal{O}_K : v(a) > 0\}$ is the prime ideal
    corresponding to the discrete valuation $v$ that induces $\|\cdot\|_v$, and $v(c)
    := -\log_{\# k_v}(c_v) \in \mathbb{Z}$. We have $L(c) \subseteq I_c \subseteq
    K$, and the map $c \mapsto I_c$ defines a group homomorphism $\operatorname{Div}
    K \to \mathcal{I}_K$.'
  kind: definition
  location: Section 15.1
  name: Definition 15.3
- description: Let $c$ be an Arakelov divisor of a global field $K$. The set $L(c)$
    is finite.
  kind: lemma
  location: Section 15.1
  name: Lemma 15.7
- description: Let $K$ be a global field, and let $\mu_K$ denote the torsion subgroup
    of $K^\times$ (equivalently, the roots of unity in $K$). The group $\mu_K$ is
    finite and equal to the kernel of the map $K^\times \to \operatorname{Div} K$
    defined by $x \mapsto (\|x\|_v)$; it is also the torsion subgroup of $\mathcal{O}_K^\times$.
  kind: corollary
  location: Section 15.1
  name: Corollary 15.8
- description: Let $K$ be a number field with $s$ complex places, define $B_K := \left(\frac{2}{\pi}\right)^s
    \sqrt{|D_K|}$. If $c$ is an Arakelov divisor of size $\|c\| > B_K$ then $L(c)$
    contains an element of $K^\times$.
  kind: proposition
  location: Section 15.1
  name: Proposition 15.9
- description: 'Let $K$ be a number field with $r$ real and $s$ complex places, and
    let $\Lambda_{K}$ be the image of the unit group $\mathcal{O}_{K}^{\times}$ in
    $\mathbb{R}_{0}^{r+s}$ under the $\operatorname{Log}$ map. The following hold:
    (1) We have a split exact sequence of finitely generated abelian groups $1 \rightarrow
    \mu_{K} \rightarrow \mathcal{O}_{K}^{\times} \xrightarrow{\operatorname{Log}}
    \Lambda_{K} \rightarrow 0$. (2) $\Lambda_{K}$ is a lattice in the trace zero hyperplane
    $\mathbb{R}_{0}^{r+s}$.'
  kind: proposition
  location: Section 15.2
  name: Proposition 15.11
- description: Let $K$ be a number field with $r$ real and $s$ complex places. Then
    $\mathcal{O}_{K}^{\times} \simeq \mu_{K} \times \mathbb{Z}^{r+s-1}$ is a finitely
    generated abelian group.
  kind: theorem
  location: Section 15.2
  name: Theorem 15.12 (Dirichlet's Unit Theorem)
- description: 'Let $K/F$ be a finite separable extension, with $F=\mathbb{Q}$ or
    $F=\mathbb{F}_{q}(t)$, let $S \subseteq M_{K}$ be the set of places of $K$ lying
    above the unique infinite place of $F$, and define $\mathcal{O}_{K}^{\times}:=\{x
    \in K^{\times}: v(x)=0 \text{ for all } v \in M_{K}-S\}$. Then $\mathcal{O}_{K}^{\times}
    \simeq \mu_{K} \times \mathbb{Z}^{\# S-1}$ is a finitely generated abelian group.'
  kind: theorem
  location: Section 15.2
  name: Theorem 15.13 (Unit Theorem for Global Fields)
- description: 'The regulator of a number field $K$ is $R_{K}:=\operatorname{covol}(\pi(\operatorname{Log}(\mathcal{O}_{K}^{\times})))
    \in \mathbb{R}_{>0}$ where $\pi: \mathbb{R}^{r+s} \rightarrow \mathbb{R}^{r+s-1}$
    is any coordinate projection; the value of $R_{K}$ does not depend on the choice
    of $\pi$, since we use $\pi$ to normalize the Haar measure on $\mathbb{R}_{0}^{r+s}
    \simeq \mathbb{R}^{r+s-1}$. If $\epsilon_{1}, \ldots, \epsilon_{r+s-1}$ is a fundamental
    system of units (a $\mathbb{Z}$-basis for the free part of $\mathcal{O}_{K}^{\times}$),
    then $R_{K}$ can be computed as the absolute value of the determinant of any $(r+s-1)
    \times (r+s-1)$ minor of the $(r+s) \times (r+s-1)$ matrix whose columns are the
    vectors $\operatorname{Log}(\epsilon_{i}) \in \mathbb{R}^{r+s}$.'
  kind: definition
  location: Section 15.3
  name: Definition 15.16
- description: The Riemann zeta function is the complex function defined by the series
    $\zeta(s):=\sum_{n \geq 1} n^{-s}$ for $\operatorname{Re}(s)>1$, where $n$ varies
    over positive integers. It is easy to verify that this series converges absolutely
    and locally uniformly on $\operatorname{Re}(s)>1$ (use the integral test on an
    open ball strictly to the right of the line $\operatorname{Re}(s)=1$). By Theorem
    16.17, it defines a holomorphic function on $\operatorname{Re}(s)>1$, since each
    term $n^{-s}=e^{-s \log n}$ is holomorphic.
  kind: definition
  location: Section 16.1
  name: Definition 16.1
- description: For $\operatorname{Re}(s)>1$ we have $\zeta(s)=\sum_{n \geq 1} n^{-s}=\prod_{p}\left(1-p^{-s}\right)^{-1}$
    where the product converges absolutely. In particular, $\zeta(s) \neq 0$ for $\operatorname{Re}(s)>1$.
  kind: theorem
  location: Section 16.1
  name: Theorem 16.2 (Euler product)
- description: For $\operatorname{Re}(s)>1$ we have $\zeta(s)=\frac{1}{s-1}+\phi(s)$
    where $\phi(s)$ is a holomorphic function on $\operatorname{Re}(s)>0$. Thus $\zeta(s)$
    extends to a meromorphic function on $\operatorname{Re}(s)>0$ that has a simple
    pole at $s=1$ with residue 1 and no other poles.
  kind: theorem
  location: Section 16.1
  name: Theorem 16.3 (Analytic continuation I)
- description: For $x, y \in \mathbb{R}$ with $x>1$ we have $\left|\zeta(x)^{3} \zeta(x+i
    y)^{4} \zeta(x+2 i y)\right| \geq 1$.
  kind: lemma
  location: Section 16.1
  name: Lemma 16.4 (Mertens)
- description: $\zeta(s)$ has no zeros on $\operatorname{Re}(s) \geq 1$.
  kind: corollary
  location: Section 16.1
  name: Corollary 16.5
- description: $\pi(x) \sim \frac{x}{\log x}$ if and only if $\vartheta(x) \sim x$.
  kind: theorem
  location: Section 16.2
  name: Theorem 16.6 (Chebyshev)
- description: For $x \geq 1$ we have $\vartheta(x) \leq (4 \log 2) x$, thus $\vartheta(x)
    = O(x)$.
  kind: lemma
  location: Section 16
  name: Lemma 16.7 (Chebyshev)
- description: 'Let $f: \mathbb{R}_{\geq 1} \rightarrow \mathbb{R}$ be a nondecreasing
    function. If the integral $\int_{1}^{\infty} \frac{f(t)-t}{t^{2}} dt$ converges
    then $f(x) \sim x$.'
  kind: lemma
  location: Section 16
  name: Lemma 16.8
- description: 'Let $h: \mathbb{R}_{>0} \rightarrow \mathbb{R}$ be a piecewise continuous
    function. The Laplace transform $\mathcal{L} h$ of $h$ is the complex function
    defined by $\mathcal{L} h(s) := \int_{0}^{\infty} e^{-st} h(t) dt$, which is holomorphic
    on $\operatorname{Re}(s) > c$ for any $c \in \mathbb{R}$ for which $h(t) = O(e^{ct})$.'
  kind: definition
  location: Section 16
  name: Definition 16.9
- description: $\mathcal{L}(\vartheta(e^{t}))(s) = \frac{\Phi(s)}{s}$ is holomorphic
    on $\operatorname{Re}(s) > 1$.
  kind: lemma
  location: Section 16
  name: Lemma 16.10
- description: The function $\Phi(s) - \frac{1}{s-1}$ extends to a meromorphic function
    on $\operatorname{Re}(s) > \frac{1}{2}$ that is holomorphic on $\operatorname{Re}(s)
    \geq 1$.
  kind: lemma
  location: Section 16
  name: Lemma 16.11
- description: The functions $\Phi(s+1) - \frac{1}{s}$ and $(\mathcal{L} H)(s) = \frac{\Phi(s+1)}{s+1}
    - \frac{1}{s}$ both extend to meromorphic functions on $\operatorname{Re}(s) >
    -\frac{1}{2}$ that are holomorphic on $\operatorname{Re}(s) \geq 0$.
  kind: corollary
  location: Section 16
  name: Corollary 16.12
- description: 'Let $f: \mathbb{R}_{\geq 0} \rightarrow \mathbb{R}$ be a bounded piecewise
    continuous function, and suppose its Laplace transform extends to a holomorphic
    function $g(s)$ on $\operatorname{Re}(s) \geq 0$. Then the integral $\int_{0}^{\infty}
    f(t) dt$ converges and is equal to $g(0)$.'
  kind: theorem
  location: Section 16
  name: Theorem 16.13
- description: $\pi(x) \sim \frac{x}{\log x}$.
  kind: theorem
  location: Section 16, prior to Section 16.3
  name: Theorem 16.15 (Prime Number Theorem)
- description: A sequence of complex functions $(f_n)$ converges uniformly on $S$
    if there is a function $f$ such that for every $\epsilon > 0$ there is an integer
    $N$ for which $\sup_{z \in S} |f_n(z) - f(z)| < \epsilon$ for all $n \geq N$.
    The sequence $(f_n)$ converges locally uniformly on $S$ if every $z_0 \in S$ has
    an open neighborhood $U$ for which $(f_n)$ converges uniformly on $U \cap S$.
    When applied to a series of functions these terms refer to the sequence of partial
    sums.
  kind: definition
  location: Section 16.3.2
  name: Definition 16.16
- description: A sequence or series of holomorphic functions $f_n$ that converges
    locally uniformly on an open set $U$ converges to a holomorphic function $f$ on
    $U$, and the sequence or series of derivatives $f_n'$ then converges locally uniformly
    to $f'$ (and if none of the $f_n$ has a zero in $U$ and $f \neq 0$, then $f$ has
    no zeros in $U$).
  kind: theorem
  location: Section 16.3.2
  name: Theorem 16.17
- description: A series of complex functions $\sum_n f_n(z)$ converges normally on
    a set $S$ if $\sum_n \|f_n\| := \sum_n \sup_{z \in S} |f_n(z)|$ converges. The
    series $\sum_n f_n(z)$ converges locally normally on $S$ if every $z_0 \in S$
    has an open neighborhood $U$ on which $\sum_n f_n(z)$ converges normally.
  kind: definition
  location: Section 16.3.2
  name: Definition 16.18
- description: Every locally normally convergent series of functions converges absolutely
    and locally uniformly. Moreover, a series $\sum_n f_n$ of holomorphic functions
    on $S$ that converges locally normally converges to a holomorphic function $f$
    on $S$, and then $\sum_n f_n'$ converges locally normally to $f'$.
  kind: theorem
  location: Section 16.3.2
  name: Theorem 16.19 (Weierstrass M-test)
- description: A parameterized curve is a continuous function $\gamma:[a,b] \rightarrow
    \mathbb{C}$ whose domain is a compact interval $[a,b] \subseteq \mathbb{R}$. We
    say that $\gamma$ is smooth if it has a continuous nonzero derivative on $[a,b]$,
    and piecewise-smooth if $[a,b]$ can be partitioned into finitely many subintervals
    on which the restriction of $\gamma$ is smooth. We say that $\gamma$ is closed
    if $\gamma(a) = \gamma(b)$, and simple if it is injective on $[a,b)$ and $(a,b]$.
    Henceforth we will use the term curve to refer to any piecewise-smooth parameterized
    curve $\gamma$, or to its oriented image in the complex plane (directed from $\gamma(a)$
    to $\gamma(b)$), which we may also denote $\gamma$.
  kind: definition
  location: Section 16.3.3
  name: Definition 16.21
- description: 'Let $f: \Omega \rightarrow \mathbb{C}$ be a continuous function and
    let $\gamma$ be a curve in $\Omega$. We define the contour integral $$\int_{\gamma}
    f(z)\, dz := \int_a^b f(\gamma(t))\gamma''(t)\, dt$$ whenever the integral on
    the RHS (which is defined as a Riemann sum in the usual way) converges. Whether
    $\int_{\gamma} f(z)\, dz$ converges, and if so, to what value, does not depend
    on the parameterization of $\gamma$: if $\gamma''$ is another parameterized curve
    with the same (oriented) image as $\gamma$, then $\int_{\gamma''} f(z)\, dz =
    \int_{\gamma} f(z)\, dz$.'
  kind: definition
  location: Section 16.3.3
  name: Definition 16.22
- description: 'Let $\gamma:[a,b] \rightarrow \mathbb{C}$ be a curve in an open set
    $\Omega$ and let $f: \Omega \rightarrow \mathbb{C}$ be a holomorphic function.
    Then $$\int_{\gamma} f''(z)\, dz = f(\gamma(b)) - f(\gamma(a)).$$'
  kind: theorem
  location: Section 16.3.3
  name: Theorem 16.23
- description: Let $U$ be an open set containing a simple closed curve $\gamma$. For
    any function $f$ that is holomorphic on $U$ we have $$\int_{\gamma} f(z)\, dz
    = 0.$$
  kind: theorem
  location: Section 16.3.3
  name: Theorem 16.24 (Cauchy's Theorem)
- description: Let $U$ be an open set containing a simple closed curve $\gamma$. Let
    $f$ be a function that is meromorphic on $U$, let $z_1, \ldots, z_n$ be the poles
    of $f$ that lie in the interior of $\gamma$, and suppose that no pole of $f$ lies
    on $\gamma$. Then $$\int_{\gamma} f(z)\, dz = 2\pi i \sum_{i=1}^n \operatorname{res}_{z_i}(f).$$
  kind: theorem
  location: Section 16.3.3
  name: Theorem 16.25 (Cauchy Residue Formula)
- description: Let $U$ be an open set containing a simple closed curve $\gamma$. For
    any function $f$ holomorphic on $U$ and $a$ in the interior of $\gamma$, $$f(a)
    = \frac{1}{2\pi i} \int_{\gamma} \frac{f(z)}{z - a}\, dz.$$
  kind: theorem
  location: Section 16.3.3
  name: Theorem 16.26 (Cauchy's Integral Formula)
- description: Bounded entire functions are constant.
  kind: theorem
  location: Section 16.3.3
  name: Theorem 16.27 (Liouville's theorem)
- description: Let $f$ be a continuous function on an open set $U$, and suppose that
    for every simple closed curve $\gamma$ contained in $U$ we have $$\int_{\gamma}
    f(z)\, dz = 0.$$ Then $f$ is holomorphic on $U$.
  kind: theorem
  location: Section 16.3.3
  name: Theorem 16.28 (Morera's Theorem)
- description: 'A Schwartz function on $\mathbb{R}$ is a complex-valued $C^{\infty}$
    function $f: \mathbb{R} \rightarrow \mathbb{C}$ that decays rapidly to zero: for
    all $m, n \in \mathbb{Z}_{\geq 0}$ we have $$\sup_{x \in \mathbb{R}}\left|x^{m}
    f^{(n)}(x)\right|<\infty$$ where $f^{(n)}$ denotes the $n$th derivative of $f$.
    The Schwartz space $\mathcal{S}(\mathbb{R})$ of all Schwartz functions on $\mathbb{R}$
    is a (non-unital) $\mathbb{C}$-algebra of infinite dimension.'
  kind: definition
  location: Section 17.1
  name: Definition 17.1
- description: The Fourier transform of a Schwartz function $f \in \mathcal{S}(\mathbb{R})$
    is the function $$\hat{f}(y):=\int_{\mathbb{R}} f(x) e^{-2 \pi i x y} d x$$ which
    is also a Schwartz function. We can recover $f(x)$ from $\hat{f}(y)$ via the inverse
    transform $$f(x)=\int_{\mathbb{R}} \hat{f}(y) e^{+2 \pi i x y} d y.$$ The maps
    $f \mapsto \hat{f}$ and $\hat{f} \mapsto f$ are thus inverse linear operators
    on $\mathcal{S}(\mathbb{R})$ (they are also continuous in the metric topology
    of $\mathcal{S}(\mathbb{R})$ and thus homeomorphisms).
  kind: definition
  location: Section 17.1
  name: Definition 17.4
- description: For all $a \in \mathbb{R}_{>0}$ and $f \in \mathcal{S}(\mathbb{R})$,
    we have $\widehat{f(a x)}(y)=\frac{1}{a} \hat{f}\left(\frac{y}{a}\right)$.
  kind: lemma
  location: Section 17.1
  name: Lemma 17.6
- description: For $f \in \mathcal{S}(\mathbb{R})$ we have $\frac{d}{d y} \hat{f}(y)=-2
    \pi i \widehat{x f(x)}(y)$ and $\widehat{\frac{d}{d x} f(x)}(y)=2 \pi i y \hat{f}(y)$.
  kind: lemma
  location: Section 17.1
  name: Lemma 17.7
- description: For all $f \in \mathcal{S}(\mathbb{R})$ we have the identity $$\sum_{n
    \in \mathbb{Z}} f(n)=\sum_{n \in \mathbb{Z}} \hat{f}(n).$$
  kind: theorem
  location: Section 17.1
  name: Theorem 17.8 (Poisson Summation Formula)
- description: Let $g(x):=e^{-\pi x^{2}}$. Then $\hat{g}(y)=g(y)$.
  kind: lemma
  location: Section 17.1
  name: Lemma 17.9
- description: For all $a \in \mathbb{R}_{>0}$ we have $\Theta(i a)=\Theta(i / a)
    / \sqrt{a}$.
  kind: lemma
  location: Section 17.1.1
  name: Lemma 17.10
- description: 'The Mellin transform of a function $f: \mathbb{R}_{>0} \rightarrow
    \mathbb{C}$ is the complex function defined by $$\mathcal{M}(f)(s):=\int_{0}^{\infty}
    f(t) t^{s-1} d t$$ whenever this integral converges. It is holomorphic on $\operatorname{Re}
    s \in (a, b)$ for any interval $(a, b)$ in which the integral $\int_{0}^{\infty}|f(t)|
    t^{\sigma-1} d t$ converges for all $\sigma \in (a, b)$.'
  kind: definition
  location: Section 17.1.2
  name: Definition 17.11
- description: The Gamma function $$\Gamma(s):=\mathcal{M}\left(e^{-t}\right)(s)=\int_{0}^{\infty}
    e^{-t} t^{s-1} d t$$ is the Mellin transform of $e^{-t}$. Since $\int_{0}^{\infty}\left|e^{-t}\right|
    t^{\sigma-1} d t$ converges for all $\sigma>0$, the integral defines a holomorphic
    function on $\operatorname{Re}(s)>0$.
  kind: definition
  location: Section 17.1.2
  name: Definition 17.12
- description: We have $$\Gamma(s) \Gamma(1-s)=\frac{\pi}{\sin (\pi s)}$$ as meromorphic
    functions on $\mathbb{C}$ with simple poles at each integer $s \in \mathbb{Z}$.
  kind: theorem
  location: Section 17.1.2
  name: Theorem 17.13 (Euler's Reflection Formula)
- description: Let $f(s)$ be a holomorphic function on $\mathbb{C}$ such that $f(s+1)=f(s)$
    and $|f(s)|=O\left(e^{\operatorname{Im}(s)}\right)$ as $\operatorname{Im}(s) \rightarrow
    \infty$ in the vertical strip $\operatorname{Re}(s) \in[0,1]$. Then $f$ is constant.
  kind: lemma
  location: Section 17.1
  name: Lemma 17.14
- description: The function $\Gamma(s)$ has no zeros on $\mathbb{C}$.
  kind: corollary
  location: Section 17.1
  name: Corollary 17.16
- description: The function $$\xi(s):=\binom{s}{2} \Gamma_{\mathbb{R}}(s) \zeta(s)$$
    is holomorphic on $\mathbb{C}$ and satisfies the functional equation $$\xi(s)=\xi(1-s).$$
    The zeros of $\xi(s)$ all lie in the critical strip $0<\operatorname{Re}(s)<1$.
  kind: theorem
  location: Section 17.2
  name: Theorem 17.17 (Analytic Continuation II)
- description: For all coprime integers a and m there are infinitely many primes p
    ≡ a mod m.
  kind: theorem
  location: Section 18
  name: Theorem 18.1 (Dirichlet 1837)
- description: As x → ∞ we have (1) ∑_{p ≤ x} (log p)/p = log x + R(x), where |R(x)|
    < 2. (2) ∑_{p ≤ x} 1/p = log log x + B + O(1/log x), where B = 0.261497… is Mertens'
    constant; (3) ∑_{p ≤ x} log(1 − 1/p) = −log log x − γ + O(1/log x), where γ =
    0.577216… is Euler's constant.
  kind: theorem
  location: Section 18.1
  name: Theorem 18.3 (Mertens 1874)
- description: 'A function f: ℤ → ℂ is called an arithmetic function. The function
    f is multiplicative if f(1) = 1 and f(mn) = f(m)f(n) for all coprime m, n ∈ ℤ;
    it is totally multiplicative (or completely multiplicative) if f(1) = 1 and f(mn)
    = f(m)f(n) for all m, n ∈ ℤ. For m ∈ ℤ_{>0} we say that f is m-periodic if f(n+m)
    = f(n) for all n ∈ ℤ, and we call m the period of f if it is the least m > 0 for
    which this holds.'
  kind: definition
  location: Section 18.2
  name: Definition 18.4
- description: 'A Dirichlet character is a periodic totally multiplicative arithmetic
    function χ: ℤ → ℂ.'
  kind: definition
  location: Section 18.2
  name: Definition 18.5
- description: A Dirichlet character of modulus m is an m-periodic Dirichlet character
    χ that is the extension by zero of a group character on (ℤ/mℤ)×; equivalently,
    an m-periodic Dirichlet character for which χ(n) ≠ 0 ⟺ m ⊥ n.
  kind: definition
  location: Section 18.2
  name: Definition 18.6
- description: Let χ be a Dirichlet character of period m. Then χ is a Dirichlet character
    of modulus m′ if and only if m | m′ | m^k for some k (which holds in particular
    for m′ = m).
  kind: lemma
  location: Section 18.2
  name: Lemma 18.8
- description: Let χ₁ and χ₂ be Dirichlet characters of modulus m₁ and m₂, respectively,
    with m₁ | m₂. If χ₂(n) = χ₁(n) for n ∈ (ℤ/m₂ℤ)× then χ₂ is induced by χ₁. A Dirichlet
    character that is not induced by any character other than itself is primitive.
  kind: definition
  location: Section 18.2.1
  name: Definition 18.9
- description: A Dirichlet character χ₂ of modulus m₂ is induced by a Dirichlet character
    of modulus m₁ | m₂ if and only if χ₂ is constant on residue classes in (ℤ/m₂ℤ)×
    that are congruent modulo m₁. When this holds, the Dirichlet character χ₁ of modulus
    m₁ that induces χ₂ is uniquely determined.
  kind: lemma
  location: Section 18.2.1
  name: Lemma 18.10
- description: A Dirichlet character χ induced by 𝟙 is called principal (and is primitive
    if and only if χ = 𝟙). For m ∈ ℤ_{>0} we use 𝟙_m to denote the principal Dirichlet
    character of modulus m; it corresponds to the trivial character of (ℤ/mℤ)×.
  kind: definition
  location: Section 18.2.1
  name: Definition 18.11
- description: Let χ be a Dirichlet character of modulus m. Then ∑_{n ∈ ℤ/mℤ} χ(n)
    ≠ 0 if and only if χ = 𝟙_m.
  kind: lemma
  location: Section 18.2.1
  name: Lemma 18.12
- description: Every Dirichlet character χ is induced by a primitive Dirichlet character
    χ̃ that is uniquely determined by χ.
  kind: theorem
  location: Section 18.2.1
  name: Theorem 18.13
- description: The conductor of a Dirichlet character χ is the period of the unique
    primitive Dirichlet character χ̃ that induces χ.
  kind: definition
  location: Section 18.2.1
  name: Definition 18.14
- description: For a Dirichlet character χ of modulus m we have ∑_{n ∈ ℤ/mℤ} χ(n)
    ≠ 0 if and only if χ has conductor 1.
  kind: corollary
  location: Section 18.2.1
  name: Corollary 18.15
- description: Let M(m) denote the set of Dirichlet characters of modulus m, let X(m)
    denote the set of primitive Dirichlet characters of conductor dividing m, and
    let Ĝ(m) denote the character group of (ℤ/mℤ)×. We have canonical bijections M(m)
    → X(m) → Ĝ(m) given by χ ↦ χ̃ ↦ (n ↦ χ̃(n)).
  kind: corollary
  location: Section 18.2.1
  name: Corollary 18.16
- description: The Dirichlet $L$-function associated to a Dirichlet character $\chi$
    is $$L(s, \chi):=\prod_{p}\left(1-\chi(p) p^{-s}\right)^{-1}=\sum_{n \geq 1} \chi(n)
    n^{-s}.$$ The sum and product converge absolutely for $\operatorname{Re} s>1$,
    since $|\chi(n)| \leq 1$, thus $L(s, \chi)$ is holomorphic on $\operatorname{Re}(s)>1$.
  kind: definition
  location: Section 18.3
  name: Definition 18.19
- description: Let $\chi$ be a non-principal Dirichlet character of modulus $m$. Then
    $L(s, \chi)$ extends to a holomorphic function on $\operatorname{Re} s > 0$.
  kind: proposition
  location: Section 18.3
  name: Proposition 18.20
- description: 'The Dirichlet density of a set of primes $S$ is given by $$d(S):=\lim_{s
    \rightarrow 1^{+}} \frac{\sum_{p \in S} p^{-s}}{\sum_{p} p^{-s}}$$ defined whenever
    this limit exists (one can also define notions of lower and upper Dirichlet density
    using liminf and lim sup which both agree with $d(S)$ whenever it is defined).
    This definition differs from the more common notion of natural density $$\delta(S):=\lim_{x
    \rightarrow \infty} \frac{\#\{p \leq x: p \in S\}}{\#\{p \leq x\}}.$$'
  kind: definition
  location: Section 18.4
  name: Definition 18.22
- description: Let $f$ and $g$ be (real or complex valued) functions defined on a
    nonempty real interval $[a, b]$. For any partition $P=(x_0, \ldots, x_n)$ of $[a,
    b]$ and sequence $T=(t_1, \ldots, t_n)$ with $t_k \in [x_{k-1}, x_k]$, we define
    the Riemann-Stieltjes sum $$S(P, T, f, g):=\sum_{k=1}^{n} f(t_k)(g(x_k)-g(x_{k-1})).$$
    We say that $f$ is Riemann-Stieltjes integrable with respect to $g$ and write
    $f \in S(g)$ if there is a (real or complex) number $S$ such that for every $\epsilon>0$
    there is a partition $P_{\epsilon}$ of $[a, b]$ such that for every refinement
    $P=(x_0, \ldots, x_n)$ of $P_{\epsilon}$ and every sequence $T=(t_1, \ldots, t_n)$
    with $t_k \in [x_{k-1}, x_k]$ we have $|S(P, T, f, g)-S|<\epsilon$. When such
    an $S$ exists it is necessarily unique and we denote it by $\int_a^b f\, dg$,
    the Riemann-Stieltjes integral of $f$ with respect to $g$. Improper Riemann-Stieltjes
    integrals are then defined as limits $\int_a^{\infty} f\, dg:=\lim_{b \rightarrow
    \infty} \int_a^b f\, dg$ (and similarly for the lower limit), and we define $\int_b^a
    f\, dg=-\int_a^b f\, dg$ and $\int_a^a f\, dg=0$.
  kind: definition
  location: Section 18.5
  name: Definition 18.23
- description: 'Let $f, g$, and $h$ be functions on $[a, b]$ and let $c_1$ and $c_2$
    be constants. The following hold: (1) If $f, g \in S(h)$ then $\int_a^b (c_1 f
    + c_2 g)\,dh = c_1 \int_a^b f\,dh + c_2 \int_a^b g\,dh$. (2) If $f \in S(g), S(h)$
    then $\int_a^b f\,d(c_1 g + c_2 h) = c_1 \int_a^b f\,dg + c_2 \int_a^b f\,dh$.
    (3) If $f \in S(g)$ then for any $c \in [a, b]$ we have $\int_a^b f\,dg = \int_a^c
    f\,dg + \int_c^b f\,dg$. (4) If $f \in S(g)$ then $g \in S(f)$ and $\int_a^b f\,dg
    + \int_a^b g\,df = f(b)g(b) - f(a)g(a)$. (5) If $f = f_1 + if_2$ and $g = g_1
    + ig_2$ with $f_1, f_2 \in S(g_1), S(g_2)$ then $\int_a^b f\,dg = \left(\int_a^b
    f_1\,dg_1 - \int_a^b f_2\,dg_2\right) + i\left(\int_a^b f_2\,dg_1 + \int_a^b f_1\,dg_2\right)$.'
  kind: proposition
  location: Section 18.5
  name: Proposition 18.24
- description: Let $f$ and $g$ be real-valued functions on $[a, b]$ and suppose $g$
    has a continuous derivative $g'$ on $[a, b]$. Then $$\int_a^b f\,dg = \int_a^b
    f(x) g'(x)\,dx.$$
  kind: proposition
  location: Section 18.5
  name: Proposition 18.25
- description: Let $f$ be a (real or complex valued) function defined on a nonempty
    real interval $[a, b]$. Then $f$ is of bounded variation if there exists a real
    number $M$ such that $$\sum_{i=0}^{n-1} |f(x_{i+1}) - f(x_i)| < M$$ for every
    partition $P = (x_0, \ldots, x_n)$ of $[a, b]$. If $f$ has a continuous derivative
    $f'$ on $[a, b]$ this is equivalent to requiring $\int_a^b |f'(x)|\,dx < \infty$.
    Every piecewise monotone function is of bounded variation. In particular, any
    step function with finitely many discontinuities on $[a, b]$ is of bounded variation.
  kind: definition
  location: Section 18.5
  name: Definition 18.26
- description: Let $f$ and $g$ be functions on $[a, b]$ of bounded variation such
    that for every $c \in [a, b]$ the function $f$ is continuous from the left at
    $c$ and the function $g$ is continuous from the right at $c$. Then $\int_{a}^{b}
    f\,dg$ and $\int_{a}^{b} g\,df$ both exist.
  kind: theorem
  location: Section 18.5
  name: Theorem 18.27
- description: Let $f$ and $g$ be functions on $[a, b]$ such that $f$ and $g$ are
    not both discontinuous from the left or from the right at integers $n \in [a,
    b]$, and let $G(x) = \sum_{a < n \leq x} g(n)$. Then $\sum_{a < n \leq b} f(n)
    g(n) = \int_{a}^{b} f(x)\,dG(x)$. In particular, the integral on the RHS always
    exists.
  kind: corollary
  location: Section 18.5
  name: Corollary 18.28
- description: For $x \in \mathbb{R}_{\geq 1}$, as $x \to \infty$ we have $H(x) =
    \log x + \gamma + O\left(\frac{1}{x}\right)$ where $\gamma = \lim_{x \to \infty}(H(x)
    - \log x) = 0.577216\ldots$ is Euler's constant.
  kind: theorem
  location: Section 18.5
  name: Theorem 18.29
- description: 'A character of a group $G$ is a homomorphism $\chi: G \to \mathrm{U}(1)$.
    The character group (or dual group) of $G$ is the abelian group $\widehat{G} :=
    \operatorname{Hom}(G, \mathrm{U}(1))$ under pointwise multiplication: $(\chi_{1}\chi_{2})(g)
    := \chi_{1}(g)\chi_{2}(g)$. The inverse of $\chi$ is given by complex conjugation:
    $\chi^{-1}(g) = \bar{\chi}(g) := \overline{\chi(g)}$. The identity element of
    $\widehat{G}$ is the trivial character $g \mapsto 1$.'
  kind: definition
  location: Section 18.6
  name: Definition 18.31
- description: Let $G$ be a finite abelian group with character group $\widehat{G}$.
    Then $G \simeq \widehat{G}$.
  kind: proposition
  location: Section 18.6
  name: Proposition 18.33
- description: Let $G$ be a finite abelian group. Then $g \in G$ is the identity if
    and only if $\chi(g) = 1$ for all $\chi \in \widehat{G}$ and $\chi \in \widehat{G}$
    is the identity if and only if $\chi(g) = 1$ for all $g \in G$.
  kind: corollary
  location: Section 18.6
  name: Corollary 18.34
- description: Let $G$ be a finite abelian group. The evaluation map $g \mapsto (\chi
    \mapsto \chi(g))$ is a canonical isomorphism from $G$ to its double dual.
  kind: corollary
  location: Section 18.6
  name: Corollary 18.35
- description: Let $G$ be a finite abelian group. For all $g_{1}, g_{2} \in G$ we
    have $\langle g_{1}, g_{2}\rangle := \frac{1}{\# G} \sum_{\chi \in \widehat{G}}
    \chi(g_{1}) \overline{\chi(g_{2})} = \begin{cases} 1 & \text{if } g_{1} = g_{2}
    \\ 0 & \text{if } g_{1} \neq g_{2} \end{cases}$ and for all $\chi_{1}, \chi_{2}
    \in \widehat{G}$ we have $\langle \chi_{1}, \chi_{2}\rangle := \frac{1}{\# G}
    \sum_{g \in G} \chi_{1}(g) \overline{\chi_{2}(g)} = \begin{cases} 1 & \text{if
    } \chi_{1} = \chi_{2} \\ 0 & \text{if } \chi_{1} \neq \chi_{2} \end{cases}$.
  kind: proposition
  location: Section 18.6
  name: Proposition 18.37
- description: For $\chi \in \widehat{G}$ we have $\sum_{g \in G} \chi(g) \neq 0$
    if and only if $\chi$ is the trivial character. For $g \in G$ we have $\sum_{\chi
    \in \widehat{G}} \chi(g) \neq 0$ if and only if $g$ is the trivial element.
  kind: corollary
  location: Section 18.6
  name: Corollary 18.38
- description: 'Let $G$ be a finite abelian group. There is an inclusion reversing
    bijection $\varphi$ between subgroups $H$ of $G$ and subgroups $K$ of $\widehat{G}$
    defined by $\varphi(H) := \{\chi \in \widehat{G} : \chi(h) = 1 \text{ for all
    } h \in H\}$. The inverse bijection $\phi$ is given by $\phi(K) := \{g \in G :
    \chi(g) = 1 \text{ for all } \chi \in K\}$ and $\widehat{H} \simeq \widehat{G}/\varphi(H)$
    and $\widehat{K} \simeq G/\phi(K)$; in particular, $\# H = [\widehat{G} : \varphi(H)]$
    and $\# K = [G : \phi(K)]$.'
  kind: proposition
  location: Section 18.6
  name: Proposition 18.40
- description: Let $K$ be a number field of degree $n$. The Dedekind zeta function
    $\zeta_{K}(z)$ extends to a meromorphic function on $\operatorname{Re}(z) > 1
    - \frac{1}{n}$ that is holomorphic except for a simple pole at $z = 1$ with residue
    $\lim_{z \to 1^{+}}(z-1)\zeta_{K}(z) = \frac{2^{r}(2\pi)^{s} h_{K} R_{K}}{w_{K}
    |D_{K}|^{1/2}}$ where $r$ and $s$ are the number of real and complex places of
    $K$, respectively, $h_{K} := \# \operatorname{cl} \mathcal{O}_{K}$ is the class
    number, $R_{K}$ is the regulator, $w_{K} := \# \mu_{K}$ is the number of roots
    of unity, and $D_{K} := \operatorname{disc} \mathcal{O}_{K}$ is the absolute discriminant.
  kind: theorem
  location: Section 19
  name: Theorem (Analytic Class Number Formula)
- description: 'Let $X$ and $Y$ be metric spaces. A function $f: X \rightarrow Y$
    is Lipschitz continuous if there exists $c \in \mathbb{R}_{>0}$ such that for
    all $x_{1}, x_{2} \in X$ we have $$d\left(f\left(x_{1}\right), f\left(x_{2}\right)\right)
    \leq c \cdot d\left(x_{1}, x_{2}\right).$$'
  kind: definition
  location: Section 19.1
  name: Definition 19.3
- description: A set $B$ in a metric space $X$ is $d$-Lipschitz parametrizable if
    it is the union of the images of a finite number of Lipschitz continuous functions
    $f_{i}:[0,1]^{d} \rightarrow X$.
  kind: definition
  location: Section 19.1
  name: Definition 19.4
- description: Let $S \subseteq \mathbb{R}^{n}$ be a measurable set whose boundary
    $\partial S:=\bar{S}-S^{0}$ is $(n-1)$-Lipschitz parametrizable. Then $$\#\left(t
    S \cap \mathbb{Z}^{n}\right)=\mu(S) t^{n}+O\left(t^{n-1}\right)$$ as $t \rightarrow
    \infty$, where $\mu$ is the standard Lebesgue measure on $\mathbb{R}^{n}$.
  kind: lemma
  location: Section 19.1
  name: Lemma 19.5
- description: Let $\Lambda$ be a lattice in an $\mathbb{R}$-vector space $V \simeq
    \mathbb{R}^{n}$ and let $S \subseteq V$ be a measurable set whose boundary is
    $(n-1)$-Lipschitz parametrizable. Then $$\#(t S \cap \Lambda)=\frac{\mu(S)}{\operatorname{covol}(\Lambda)}
    t^{n}+O\left(t^{n-1}\right).$$
  kind: corollary
  location: Section 19.1
  name: Corollary 19.6
- description: Let $K$ be a number field of degree $n$. As $t \rightarrow \infty$,
    the number of nonzero $\mathcal{O}_{K}$-ideals $\mathfrak{a}$ of absolute norm
    $\mathrm{N}(\mathfrak{a}) \leq t$ is $$\left(\frac{2^{r}(2\pi)^{s} h_{K} R_{K}}{w_{K}\left|D_{K}\right|^{1
    / 2}}\right) t+O\left(t^{1-1 / n}\right)$$ where $r$ and $s$ are the number of
    real and complex places of $K$, respectively, $h_{K}=\# \operatorname{cl} \mathcal{O}_{K}$
    is the class number, $R_{K}$ is the regulator, $w_{K}:=\# \mu_{K}$ is the number
    of roots of unity, and $D_{K}:=\operatorname{disc} \mathcal{O}_{K}$ is the absolute
    discriminant.
  kind: theorem
  location: Section 19.2
  name: Theorem 19.8
- description: Let $a_{1}, a_{2}, \ldots$ be a sequence of complex numbers and let
    $\sigma$ be a real number. Suppose that $a_{1}+\cdots+a_{t}=O\left(t^{\sigma}\right)$
    as $t \rightarrow \infty$. Then the Dirichlet series $\sum a_{n} n^{-s}$ defines
    a holomorphic function on $\operatorname{Re} s>\sigma$.
  kind: lemma
  location: Section 19.2
  name: Lemma 19.9
- description: Let $a_{1}, a_{2}, \ldots$ be a sequence of complex numbers that satisfies
    $a_{1}+\cdots+a_{t}=\rho t+O\left(t^{\sigma}\right)$ as $t \rightarrow \infty$
    for some $\sigma \in[0,1)$ and $\rho \in \mathbb{C}^{\times}$. The Dirichlet series
    $\sum a_{n} n^{-s}$ converges on $\operatorname{Re}(s)>1$ and has a meromorphic
    continuation to $\operatorname{Re}(s)>\sigma$ that is holomorphic except for a
    simple pole at $s=1$ with residue $\rho$.
  kind: lemma
  location: Section 19.2
  name: Lemma 19.11
- description: Let $p$ be a prime, let $m$ be a positive integer, and let $m^{\prime}=m
    / p^{v_{p}(m)}$. Then $\mathbb{Q}(\zeta_{m^{\prime}})$ is the maximal extension
    of $\mathbb{Q}$ in $\mathbb{Q}(\zeta_{m})$ unramified at $p$. In particular, if
    $p$ does not divide $m$ then $\mathbb{Q}(\zeta_{m})$ is unramified at $p$.
  kind: proposition
  location: Section 19.3
  name: Proposition 19.14
- description: Let $H \subseteq X(m)$ be a group of primitive Dirichlet characters
    and let $K= \mathbb{Q}(\zeta_{m})^{\phi(H)}$ be the corresponding subfield of
    $\mathbb{Q}(\zeta_{m})$, with $\phi(H)$ defined as above. Then $$\zeta_{K}(s)=\prod_{\chi
    \in H} L(s, \chi).$$
  kind: theorem
  location: Section 19.3
  name: Theorem 19.15
- description: Let $\psi$ be any non-principal Dirichlet character. Then $L(1, \psi)
    \neq 0$.
  kind: theorem
  location: Section 19.4
  name: Theorem 19.16
- description: Every finite abelian extension of $\mathbb{Q}$ lies in a cyclotomic
    field $\mathbb{Q}(\zeta_{m})$.
  kind: theorem
  location: Section 20.1
  name: Theorem 20.1
- description: Every finite abelian extension of $\mathbb{Q}_{p}$ lies in a cyclotomic
    field $\mathbb{Q}_{p}(\zeta_{m})$.
  kind: theorem
  location: Section 20.1
  name: Theorem 20.2
- description: The local Kronecker-Weber theorem implies the global Kronecker-Weber
    theorem.
  kind: proposition
  location: Section 20.1
  name: Proposition 20.3
- description: Let $K/\mathbb{Q}_{p}$ be a cyclic extension of degree $\ell^{r}$ for
    some prime $\ell \neq p$. Then $K$ lies in a cyclotomic field $\mathbb{Q}_{p}(\zeta_{m})$.
  kind: proposition
  location: Section 20.2
  name: Proposition 20.4
- description: For any prime $p$ we have $\mathbb{Q}_{p}((-p)^{1/(p-1)}) = \mathbb{Q}_{p}(\zeta_{p})$.
  kind: lemma
  location: Section 20.2
  name: Lemma 20.5
- description: Let $K/\mathbb{Q}_{p}$ be a cyclic extension of odd degree $p^{r}$.
    Then $K$ lies in a cyclotomic field $\mathbb{Q}_{p}(\zeta_{m})$.
  kind: theorem
  location: Section 20.3
  name: Theorem 20.6
- description: For odd $p$ every totally wildly ramified Galois extension of $\mathbb{Q}_{p}$
    is cyclic. In particular, there is no abelian extension of $\mathbb{Q}_{p}$ with
    Galois group $(\mathbb{Z}/p\mathbb{Z})^{3}$ when $p$ is odd.
  kind: proposition
  location: Section 20.3
  name: Proposition 20.7
- description: Let $K/\mathbb{Q}_{2}$ be a cyclic extension of degree $2^{r}$. Then
    $K$ lies in a cyclotomic field $\mathbb{Q}_{2}(\zeta_{m})$.
  kind: theorem
  location: Section 20.3
  name: Theorem 20.10
- description: No extension of $\mathbb{Q}_{2}$ has Galois group isomorphic to $(\mathbb{Z}/2\mathbb{Z})^{4}$
    or $(\mathbb{Z}/4\mathbb{Z})^{3}$.
  kind: lemma
  location: Section 20.3
  name: Lemma 20.11
- description: 'Let $K \subseteq L \subseteq M$ be a tower of finite abelian extensions
    of global fields and let $\mathfrak{m}$ be an $\mathcal{O}_{K}$-ideal divisible
    by all primes $\mathfrak{p}$ of $K$ that ramify in $M$. We have a commutative
    diagram where the Artin maps $\psi_{M/K}^{\mathfrak{m}}: \mathcal{I}_{K}^{\mathfrak{m}}
    \to \operatorname{Gal}(M/K)$ and $\psi_{L/K}^{\mathfrak{m}}: \mathcal{I}_{K}^{\mathfrak{m}}
    \to \operatorname{Gal}(L/K)$ are related by the vertical map $\sigma \mapsto \sigma|_{L}$
    induced by restriction.'
  kind: proposition
  location: Section 21.1
  name: Proposition 21.1
- description: 'Let $K$ be a number field. A modulus (or cycle) $\mathfrak{m}$ for
    $K$ is a function $M_{K} \to \mathbb{Z}_{\geq 0}$ with finite support such that
    for $v \mid \infty$ we have $\mathfrak{m}(v) \leq 1$ with $\mathfrak{m}(v) = 0$
    unless $v$ is a real place. We view $\mathfrak{m}$ as a formal product $\prod
    v^{\mathfrak{m}(v)}$ over $M_{K}$, which we may factor as $\mathfrak{m} = \mathfrak{m}_{0}\mathfrak{m}_{\infty}$,
    where $\mathfrak{m}_{0} := \prod_{\mathfrak{p} \nmid \infty} \mathfrak{p}^{\mathfrak{m}(\mathfrak{p})}$
    is an $\mathcal{O}_{K}$-ideal and $\mathfrak{m}_{\infty} := \prod_{v \mid \infty}
    v^{\mathfrak{m}(v)}$ represents a subset of the real places of $K$. Divisibility,
    product, gcd, and lcm of moduli are defined componentwise (with the constraint
    that $\mathfrak{m}\mathfrak{n}(v) := \max(\mathfrak{m}(v)+\mathfrak{n}(v),1)$
    for $v \mid \infty$). The zero function is the trivial modulus. Additionally:
    $\mathcal{I}_{K}^{\mathfrak{m}} \subseteq \mathcal{I}_{K}$ is the subgroup of
    fractional ideals coprime to $\mathfrak{m}$; $K^{\mathfrak{m}} \subseteq K^{\times}$
    is the subgroup of elements $\alpha$ with $(\alpha) \in \mathcal{I}_{K}^{\mathfrak{m}}$;
    $K^{\mathfrak{m},1} \subseteq K^{\mathfrak{m}}$ is the subgroup of $\alpha \in
    K^{\mathfrak{m}}$ with $v_{\mathfrak{p}}(\alpha - 1) \geq v_{\mathfrak{p}}(\mathfrak{m}_{0})$
    for all $\mathfrak{p} \mid \mathfrak{m}_{0}$ and $\alpha_{v} > 0$ for $v \mid
    \mathfrak{m}_{\infty}$; $\mathcal{R}_{K}^{\mathfrak{m}} \subseteq \mathcal{I}_{K}^{\mathfrak{m}}$
    is the subgroup of principal fractional ideals $(\alpha)$ with $\alpha \in K^{\mathfrak{m},1}$.
    The groups $\mathcal{R}_{K}^{\mathfrak{m}}$ are called rays or ray groups.'
  kind: definition
  location: Section 21.3
  name: Definition 21.2
- description: Let $\mathfrak{m}$ be a modulus for a number field $K$. The ray class
    group for the modulus $\mathfrak{m}$ is the quotient $\mathrm{Cl}_{K}^{\mathfrak{m}}
    := \mathcal{I}_{K}^{\mathfrak{m}} / \mathcal{R}_{K}^{\mathfrak{m}}$.
  kind: definition
  location: Section 21.3
  name: Definition 21.3
- description: Let $A$ be a Dedekind domain and let $\mathfrak{a}$ be an $A$-ideal.
    Every ideal class in $\operatorname{cl}(A)$ contains an $A$-ideal coprime to $\mathfrak{a}$.
  kind: lemma
  location: Section 21.3
  name: Lemma 21.7
- description: Let $\mathfrak{m}$ be a modulus for a number field $K$. We have an
    exact sequence $1 \longrightarrow \mathcal{O}_{K}^{\times} \cap K^{\mathfrak{m},
    1} \longrightarrow \mathcal{O}_{K}^{\times} \longrightarrow K^{\mathfrak{m}} /
    K^{\mathfrak{m}, 1} \longrightarrow \mathrm{Cl}_{K}^{\mathfrak{m}} \longrightarrow
    \mathrm{Cl}_{K} \longrightarrow 1$ and a canonical isomorphism $K^{\mathfrak{m}}
    / K^{\mathfrak{m}, 1} \simeq \{ \pm 1\}^{\# \mathfrak{m}_{\infty}} \times (\mathcal{O}_{K}
    / \mathfrak{m}_{0})^{\times}$.
  kind: theorem
  location: Section 21.3
  name: Theorem 21.8
- description: 'Let $K$ be a number field and let $\mathfrak{m}$ be a modulus for
    $K$. The ray class group $\mathrm{Cl}_{K}^{\mathfrak{m}}$ is a finite abelian
    group whose cardinality $h_{K}^{\mathfrak{m}}:=\# \mathrm{Cl}_{K}^{\mathfrak{m}}$
    is given by $h_{K}^{\mathfrak{m}}=\frac{\phi(\mathfrak{m}) h_{K}}{[\mathcal{O}_{K}^{\times}:
    \mathcal{O}_{K}^{\times} \cap K^{\mathfrak{m}, 1}]}$, where $h_{K}:=\# \mathrm{Cl}_{K}$
    and $\phi(\mathfrak{m}):=\#(K^{\mathfrak{m}} / K^{\mathfrak{m}, 1})=\phi(\mathfrak{m}_{\infty})
    \phi(\mathfrak{m}_{0})$, with $\phi(\mathfrak{m}_{\infty})=2^{\# \mathfrak{m}_{\infty}}$,
    $\phi(\mathfrak{m}_{0})=\#(\mathcal{O}_{K} / \mathfrak{m}_{0})^{\times}=\mathrm{N}(\mathfrak{m}_{0})
    \prod_{\mathfrak{p} \mid \mathfrak{m}_{0}}(1-\mathrm{N}(\mathfrak{p})^{-1})$.
    In particular, $h_{K}$ divides $h_{K}^{\mathfrak{m}}$ and $h_{K}^{\mathfrak{m}}$
    divides $h_{K} \phi(\mathfrak{m})$.'
  kind: corollary
  location: Section 21.3
  name: Corollary 21.9
- description: Let $K$ be a number field and let $S$ be a set of primes of $K$. The
    partial Dedekind zeta function associated to $S$ is the complex function $\zeta_{K,
    S}(s):=\prod_{\mathfrak{p} \in S}(1-\mathrm{N}(\mathfrak{p})^{-s})^{-1}$ which
    converges to a holomorphic function on $\operatorname{Re}(s)>1$.
  kind: definition
  location: Section 21.4
  name: Definition 21.10
- description: If for some integer $n \geq 1$ the function $\zeta_{K, S}^{n}$ extends
    to a meromorphic function on a neighborhood of 1, the polar density of $S$ is
    defined by $\rho(S):=\frac{m}{n}$, $m=-\operatorname{ord}_{s=1} \zeta_{K, S}^{n}(s)$
    (so $m$ is the order of the pole at $s=1$, if one is present). Note that if $\zeta_{K,
    S}^{n_{1}}$ and $\zeta_{K, S}^{n_{2}}$ both extend to a meromorphic function on
    a neighborhood of 1 then we necessarily have $n_{2} \operatorname{ord}_{s=1} \zeta_{K,
    S}^{n_{1}}(s)=\operatorname{ord}_{s=1} \zeta_{K, S}^{n_{1} n_{2}}=n_{1} \operatorname{ord}_{s=1}
    \zeta_{K, S}^{n_{2}}(s)$ which implies that $\rho(S)$ does not depend on the choice
    of $n$.
  kind: definition
  location: Section 21.4
  name: Definition 21.11
- description: Let $S$ be a set of primes of a number field $K$. If $S$ has a polar
    density then it has a Dirichlet density and the two are equal. In particular,
    $\rho(S) \in [0,1]$ whenever it is defined.
  kind: proposition
  location: Section 21.4
  name: Proposition 21.12
- description: Let $S$ be a set of primes of a number field $K$. If $S$ has both a
    polar density and a natural density then the two coincide.
  kind: corollary
  location: Section 21.4
  name: Corollary 21.13
- description: 'Let $S$ and $T$ denote sets of primes in a number field $K$, let $\mathcal{P}$
    be the set of all primes of $K$, and let $\mathcal{P}_{1}$ be the set of degree-1
    primes of $K$. The following hold: (a) If $S$ is finite then $\rho(S)=0$; if $\mathcal{P}-S$
    is finite then $\rho(S)=1$. (b) If $S \subseteq T$ both have polar densities,
    then $\rho(S) \leq \rho(T)$. (c) If two sets $S$ and $T$ have finite intersection
    and any two of the sets $S$, $T$, and $S \cup T$ have polar densities then so
    does the third and $\rho(S \cup T)=\rho(S)+\rho(T)$. (d) We have $\rho(\mathcal{P}_{1})=1$,
    and $\rho(S \cap \mathcal{P}_{1})=\rho(S)$ whenever $S$ has a polar density.'
  kind: proposition
  location: Section 21.4
  name: Proposition 21.14
- description: Let $L/K$ be a Galois extension of number fields of degree $n$. Then
    $\rho(\operatorname{Spl}(L/K))=1/n$.
  kind: theorem
  location: Section 21.4
  name: Theorem 21.15
- description: If $L/K$ is a finite extension of number fields with Galois closure
    $M/K$ of degree $n$, then $\rho(\operatorname{Spl}(L))=\rho(\operatorname{Spl}(M))=1/n$.
  kind: corollary
  location: Section 21.4
  name: Corollary 21.16
- description: Let $L/K$ be a finite Galois extension of number fields with Galois
    group $G:=\operatorname{Gal}(L/K)$ and let $H$ be a normal subgroup of $G$. The
    set $S$ of primes for which $\operatorname{Frob}_{\mathfrak{p}} \subseteq H$ has
    polar density $\rho(S)=\# H / \# G$.
  kind: corollary
  location: Section 21.4
  name: Corollary 21.17
- description: If $L/K$ and $M/K$ are two finite Galois extensions of number fields
    then $L \subseteq M \Longleftrightarrow \operatorname{Spl}(M) \precsim \operatorname{Spl}(L)
    \Longleftrightarrow \operatorname{Spl}(M) \subseteq \operatorname{Spl}(L)$, $L=M
    \Longleftrightarrow \operatorname{Spl}(M) \sim \operatorname{Spl}(L) \Longleftrightarrow
    \operatorname{Spl}(M)=\operatorname{Spl}(L)$, and the map $L \mapsto \operatorname{Spl}(L)$
    is an injection from the set of finite Galois extensions of $K$ (inside some fixed
    algebraic closure) to sets of primes of $K$ that have a positive polar density.
  kind: theorem
  location: Section 21
  name: Theorem 21.18
- description: 'Let $L/K$ be an abelian extension of number fields and $\mathfrak{m}$
    a modulus divisible by all ramified primes. Then the Artin map $\psi_{L/K}^{\mathfrak{m}}:
    \mathcal{I}_{K}^{\mathfrak{m}} \rightarrow \operatorname{Gal}(L/K)$ is surjective.'
  kind: theorem
  location: Section 21.5
  name: Theorem 21.19
- description: Let $\mathfrak{m}$ be a modulus for a number field $K$ and let $L$
    and $M$ be finite abelian extensions of $K$ unramified at all primes not in the
    support of $\mathfrak{m}$. If $\operatorname{ker} \psi_{L/K}^{\mathfrak{m}}=\operatorname{ker}
    \psi_{M/K}^{\mathfrak{m}}$ then $L=M$. In particular, ray class fields are unique
    whenever they exist.
  kind: theorem
  location: Section 21.5
  name: Theorem 21.20
- description: Let $K$ be a number field and let $\mathfrak{m}$ be a modulus for $K$.
    A congruence subgroup for the modulus $\mathfrak{m}$ is a subgroup $\mathcal{C}$
    of $\mathcal{I}_{K}^{\mathfrak{m}}$ that contains $\mathcal{R}_{K}^{\mathfrak{m}}$.
    We use $\overline{\mathcal{C}}$ to denote the image of $\mathcal{C}$ in $\mathcal{I}_{K}^{\mathfrak{m}}
    / \mathcal{R}_{K}^{\mathfrak{m}}=\mathrm{Cl}_{K}^{\mathfrak{m}}$ under the quotient
    map.
  kind: definition
  location: Section 22.1
  name: Definition 22.1
- description: Let $K$ be a number field with moduli $\mathfrak{m}_{1}$ and $\mathfrak{m}_{2}$.
    If $\mathcal{C}_{1}$ is a congruence subgroup for $\mathfrak{m}_{1}$ and $\mathcal{C}_{2}$
    is a congruence subgroup for $\mathfrak{m}_{2}$, then we say that $(\mathcal{C}_{1},
    \mathfrak{m}_{1})$ and $(\mathcal{C}_{2}, \mathfrak{m}_{2})$ are equivalent and
    write $(\mathcal{C}_{1}, \mathfrak{m}_{1}) \sim (\mathcal{C}_{2}, \mathfrak{m}_{2})$
    whenever $\mathcal{I}_{K}^{\mathfrak{m}_{1}} \cap \mathcal{C}_{2}=\mathcal{I}_{K}^{\mathfrak{m}_{2}}
    \cap \mathcal{C}_{1}$.
  kind: definition
  location: Section 22.1
  name: Definition 22.3
- description: Let $K$ be a number field. The relation $(\mathcal{C}_{1}, \mathfrak{m}_{1})
    \sim (\mathcal{C}_{2}, \mathfrak{m}_{2})$ is an equivalence relation. If $(\mathcal{C}_{1},
    \mathfrak{m}_{1}) \sim (\mathcal{C}_{2}, \mathfrak{m}_{2})$ then $\mathcal{I}_{K}^{\mathfrak{m}_{1}}
    / \mathcal{C}_{1} \simeq \mathcal{I}_{K}^{\mathfrak{m}_{2}} / \mathcal{C}_{2}$
    are related by a canonical isomorphism that preserves cosets of fractional ideals
    prime to both $\mathfrak{m}_{1}$ and $\mathfrak{m}_{2}$.
  kind: proposition
  location: Section 22.1
  name: Proposition 22.4
- description: Let $\mathcal{C}_{1}$ be a congruence subgroup of modulus $\mathfrak{m}_{1}$
    for a number field $K$. There exists a congruence subgroup $\mathcal{C}_{2}$ of
    modulus $\mathfrak{m}_{2} \mid \mathfrak{m}_{1}$ equivalent to $\mathcal{C}_{1}$
    if and only if $\mathcal{I}_{K}^{\mathfrak{m}_{1}} \cap \mathcal{R}_{K}^{\mathfrak{m}_{2}}
    \subseteq \mathcal{C}_{1}$, in which case $\mathcal{C}_{2}=\mathcal{C}_{1} \mathcal{R}_{K}^{\mathfrak{m}_{2}}$.
  kind: lemma
  location: Section 22.1
  name: Lemma 22.5
- description: Let $\mathcal{C}_{1} \sim \mathcal{C}_{2}$ be congruence subgroups
    of modulus $\mathfrak{m}_{1}$ and $\mathfrak{m}_{2}$, respectively. There exists
    a congruence subgroup $\mathcal{C} \sim \mathcal{C}_{1} \sim \mathcal{C}_{2}$
    with modulus $\mathfrak{n}:=\operatorname{gcd}(\mathfrak{m}_{1}, \mathfrak{m}_{2})$.
  kind: proposition
  location: Section 22.1
  name: Proposition 22.6
- description: Let $\mathcal{C}$ be a congruence subgroup of modulus $\mathfrak{m}$
    for a number field $K$. There is a unique congruence subgroup in the equivalence
    class of $\mathcal{C}$ whose modulus $\mathfrak{c}$ divides the modulus of every
    congruence subgroup equivalent to $\mathcal{C}$.
  kind: corollary
  location: Section 22.1
  name: Corollary 22.7
- description: Let $\mathcal{C}$ be a congruence subgroup for a number field $K$.
    The unique modulus $\mathfrak{c}:=\mathfrak{c}(\mathcal{C})$ given by Corollary
    22.7 is the conductor of $\mathcal{C}$, and we say that $\mathcal{C}$ is primitive
    if $\mathcal{C}=\mathcal{C} \mathcal{R}_{K}^{\mathfrak{c}}$ (the unique congruence
    subgroup of modulus $\mathfrak{c}$ equivalent to $\mathcal{C}$).
  kind: definition
  location: Section 22.1
  name: Definition 22.8
- description: Let $\mathcal{C}$ be a primitive congruence subgroup of modulus $\mathfrak{m}$
    for a number field $K$. Then $\mathfrak{m}$ is the conductor of every congruence
    subgroup of modulus $\mathfrak{m}$ contained in $\mathcal{C}$; in particular,
    $\mathfrak{m}$ is the conductor of $\mathcal{R}_{K}^{\mathfrak{m}}$.
  kind: proposition
  location: Section 22.1
  name: Proposition 22.9
- description: 'Let $K$ be a number field and let $\chi: \mathcal{I}_{K} \rightarrow
    \mathbb{C}$ be a totally multiplicative function with finite image; so $\chi(\mathcal{O}_{K})=1$,
    $\chi(IJ)=\chi(I)\chi(J)$ for all $I, J \in \mathcal{I}_{K}$, and $\chi$ restricts
    to a homomorphism from a subgroup of $\mathcal{I}_{K}$ to a finite subgroup of
    $\mathrm{U}(1)$ whose kernel we denote $\operatorname{ker} \chi$. If $\mathfrak{m}$
    is a modulus for $K$ such that $\chi^{-1}(\mathrm{U}(1))=\mathcal{I}_{K}^{\mathfrak{m}}$
    and $\mathcal{R}_{K}^{\mathfrak{m}} \subseteq \operatorname{ker} \chi$, then $\chi$
    is a ray class character of modulus $\mathfrak{m}$ and its kernel is a congruence
    subgroup of modulus $\mathfrak{m}$. Equivalently, $\chi$ is the extension by zero
    of a character of the finite abelian group $\mathrm{Cl}_{K}^{\mathfrak{m}}=\mathcal{I}_{K}^{\mathfrak{m}}/\mathcal{R}_{K}^{\mathfrak{m}}$
    defined by setting $\chi(I)=0$ for $I \notin \mathcal{I}_{K}^{\mathfrak{m}}$.'
  kind: definition
  location: Section 22.2
  name: Definition 22.10
- description: Let $\chi_{1}, \chi_{2}$ be ray class characters of moduli $\mathfrak{m}_{1},
    \mathfrak{m}_{2}$ of a number field $K$, with $\mathfrak{m}_{1} \mid \mathfrak{m}_{2}$.
    If $\chi_{2}(I)=\chi_{1}(I)$ for all $I \in \mathcal{I}_{K}^{\mathfrak{m}_{2}}$,
    then $\chi_{2}$ is induced by $\chi_{1}$. A ray class character is primitive if
    it is not induced by any ray class character other than itself.
  kind: definition
  location: Section 22.2
  name: Definition 22.12
- description: The conductor of a ray class character $\chi$ is the conductor $\mathfrak{c}(\chi):=\mathfrak{c}(\operatorname{ker}
    \chi)$ of its kernel (as a congruence subgroup).
  kind: definition
  location: Section 22.2
  name: Definition 22.13
- description: A ray class character is primitive if and only if its kernel is primitive.
    Every ray class character $\chi$ is induced by a unique primitive ray class character
    $\widetilde{\chi}$.
  kind: theorem
  location: Section 22.2
  name: Theorem 22.14
- description: A ray class character $\chi$ is principal if $\operatorname{ker} \chi=\chi^{-1}(\mathrm{U}(1))$.
    We use $\mathbb{1}$ to denote the unique primitive principal ray class character.
  kind: definition
  location: Section 22.2
  name: Definition 22.15
- description: The Weber $L$-function $L(s, \chi)$ of a ray class character $\chi$
    for a number field $K$ is the complex function $L(s, \chi):=\prod_{\mathfrak{p}}(1-\chi(\mathfrak{p})\mathrm{N}(\mathfrak{p})^{-s})^{-1}=\sum_{\mathfrak{a}}
    \chi(\mathfrak{a})\mathrm{N}(\mathfrak{a})^{-s}$ where the product is over prime
    ideals of $\mathcal{O}_{K}$ and the sum is over nonzero $\mathcal{O}_{K}$-ideals;
    the product and sum both converge to a non-vanishing holomorphic function on $\operatorname{Re}(s)>1$.
  kind: definition
  location: Section 22.2
  name: Definition 22.17
- description: Let $\chi$ be a ray class character of modulus $\mathfrak{m}$ for a
    number field $K$ of degree $n$. Then $L(s, \chi)$ extends to a meromorphic function
    on $\operatorname{Re}(s)>1-\frac{1}{n}$ that has at most a simple pole at $s=1$
    and is holomorphic if $\chi$ is non-principal.
  kind: proposition
  location: Section 22.2
  name: Proposition 22.19
- description: 'Let $\mathcal{C}$ be a congruence subgroup of modulus $\mathfrak{m}$
    for a number field $K$ and let $n:=\left[\mathcal{I}_{K}^{\mathfrak{m}}: \mathcal{C}\right]$.
    The set of primes $\{\mathfrak{p} \in \mathcal{C}\}$ has Dirichlet density $d(\mathcal{C})=
    \begin{cases}\frac{1}{n} & \text{if } L(1, \chi) \neq 0 \text{ for all } \chi
    \neq \mathbb{1} \text{ in } X(\mathcal{C}) \\ 0 & \text{otherwise}\end{cases}$'
  kind: theorem
  location: Section 22.2
  name: Theorem 22.20
- description: 'Let $\mathcal{C}$ be a congruence subgroup of modulus $\mathfrak{m}$
    for a number field $K$ and let $n:=\left[\mathcal{I}_{K}^{\mathfrak{m}}: \mathcal{C}\right]$.
    For every $I \in \mathcal{I}_{K}^{\mathfrak{m}}$ the set $\{\mathfrak{p} \in I\mathcal{C}\}$
    has Dirichlet density $d(I\mathcal{C})= \begin{cases}\frac{1}{n} & \text{if }
    L(1, \chi) \neq 0 \text{ for all characters } \chi \neq \mathbb{1} \text{ in }
    X(\mathcal{C}) \\ 0 & \text{otherwise}\end{cases}$'
  kind: proposition
  location: Section 22.2
  name: Proposition 22.21
- description: 'Let $\mathcal{C}$ be a congruence subgroup of modulus $\mathfrak{m}$
    for a number field $K$ and let $n:=\left[\mathcal{I}_{K}^{\mathfrak{m}}: \mathcal{C}\right]$.
    For every ideal $I \in \mathcal{I}_{K}^{\mathfrak{m}}$ the set $\{\mathfrak{p}
    \in I\mathcal{C}\}$ has Dirichlet density $\frac{1}{n}$, and for every $\chi \neq
    \mathbb{1}$ in $X(\mathcal{C})$ we have $L(1, \chi) \neq 0$.'
  kind: corollary
  location: Section 22.2
  name: Corollary 22.22
- description: 'Let $L/K$ be a finite Galois extension of number fields and let $\mathcal{C}$
    be a congruence subgroup for a modulus $\mathfrak{m}$ of $K$. If $\operatorname{Spl}(L)
    \precsim \{\mathfrak{p} \in \mathcal{C}\}$ then $\left[\mathcal{I}_{K}^{\mathfrak{m}}:
    \mathcal{C}\right] \leq [L:K]$.'
  kind: corollary
  location: Section 22.2
  name: Corollary 22.23
- description: 'Let $L/K$ be a finite abelian extension of local fields. The conductor
    $\mathfrak{c}(L/K)$ is defined as follows. If $K$ is archimedean then $\mathfrak{c}(L/K)=1$
    when $K \simeq \mathbb{R}$ and $L \simeq \mathbb{C}$ and $\mathfrak{c}(L/K)=0$
    otherwise. If $K$ is nonarchimedean and $\mathfrak{p}$ is the maximal ideal of
    its valuation ring $\mathcal{O}_{K}$, then $\mathfrak{c}(L/K):=\min\{n: 1+\mathfrak{p}^{n}
    \subseteq \mathrm{N}_{L/K}(L^{\times})\}$ (here $1+\mathfrak{p}^{n}$ is a subgroup
    of $\mathcal{O}_{K}^{\times}$, with $1+\mathfrak{p}^{0}:=\mathcal{O}_{K}^{\times}$).
    If $L/K$ is a finite abelian extension of global fields then its conductor is
    the modulus $\mathfrak{c}(L/K): M_{K} \rightarrow \mathbb{Z}$, $v \mapsto \mathfrak{c}(L_{w}/K_{v})$
    where $K_{v}$ is the completion of $K$ at $v$ and $L_{w}$ is the completion of
    $L$ at a place $w \mid v$. As with any modulus, we may view the finite part of
    $\mathfrak{c}(L/K)$ as an $\mathcal{O}_{K}$-ideal and the infinite part as a subset
    of ramified infinite places.'
  kind: definition
  location: Section 22.3
  name: Definition 22.24
- description: Let $L/K$ be a finite abelian extension of local or global fields.
    For each prime $\mathfrak{p}$ of $K$ we have $v_{\mathfrak{p}}(\mathfrak{c}(L/K))=
    \begin{cases}0 & \text{if and only if } \mathfrak{p} \text{ is unramified} \\
    1 & \text{if and only if } \mathfrak{p} \text{ is ramified tamely} \\ \geq 2 &
    \text{if and only if } \mathfrak{p} \text{ is ramified wildly.}\end{cases}$
  kind: proposition
  location: Section 22.3
  name: Proposition 22.25
- description: Let $L_{1}/K$ and $L_{2}/K$ be two finite abelian extensions of a local
    or global field $K$. If $L_{1} \subseteq L_{2}$ then $\mathfrak{c}(L_{1}/K)$ divides
    $\mathfrak{c}(L_{2}/K)$.
  kind: lemma
  location: Section 22.3
  name: Lemma 22.26
- description: Let $L / K$ be a finite abelian extension of number fields and let
    $\mathfrak{m}$ be a modulus for $K$ divisible by the conductor of $L / K$. The
    norm group (or Takagi group) associated to $\mathfrak{m}$ is the congruence subgroup
    $T_{L / K}^{\mathfrak{m}}:=\mathcal{R}_{K}^{\mathfrak{m}} N_{L / K}(\mathcal{I}_{L}^{\mathfrak{m}})$,
    where $\mathcal{I}_{L}^{\mathfrak{m}}$ denotes the subgroup of fractional ideals
    in $\mathcal{I}_{L}$ that are coprime to $\mathfrak{m} \mathcal{O}_{L}$.
  kind: definition
  location: Section 22.4
  name: Definition 22.27
- description: Let $L / K$ be a finite abelian extension of number fields and let
    $\mathfrak{m}$ be a modulus for $K$ divisible by the conductor of $L / K$. Then
    $\operatorname{Spl}(L / K) \precsim T_{L / K}^{\mathfrak{m}}$.
  kind: proposition
  location: Section 22.4
  name: Proposition 22.28
- description: 'Let $L / K$ be a finite abelian extension of number fields and let
    $\mathfrak{m}$ be a modulus for $K$ divisible by the conductor of $L / K$. Then
    $[\mathcal{I}_{K}^{\mathfrak{m}}: T_{L / K}^{\mathfrak{m}}] \leq [L: K]$.'
  kind: theorem
  location: Section 22.4
  name: Theorem 22.29 (Norm Index Inequality)
- description: Let $K$ be a global field. The Hilbert class field of $K$ is the maximal
    unramified abelian extension of $K$ (the compositum of all finite unramified abelian
    extensions of $K$ inside a fixed separable closure of $K$).
  kind: definition
  location: Section 22.6
  name: Definition 22.30
- description: 'Let $G$ be a group. A $G$-module is an abelian group $A$ equipped
    with a $G$-action compatible with its group structure: $g(a+b)=ga+gb$ for all
    $g \in G$, $a, b \in A$. This implies $|ga|=|a|$ (where $|a|:=\#\langle a\rangle$
    is the order of $a$); in particular $ga=0 \Leftrightarrow a=0$. A trivial $G$-module
    is an abelian group with trivial $G$-action: $ga=a$ for all $g \in G$, $a \in
    A$ (so every abelian group can be viewed as a trivial $G$-module). A morphism
    of $G$-modules is a morphism of abelian groups $\alpha: A \rightarrow B$ satisfying
    $\alpha(ga)=g\alpha(a)$. Kernels, images, quotients, and direct sums of $G$-modules
    are also $G$-modules.'
  kind: definition
  location: Section 23.1
  name: Definition 23.1
- description: 'Let $A$ be a $G$-module. The $G$-invariants of $A$ constitute the
    $G$-module $A^{G}:=\{a \in A: ga=a \text{ for all } g \in G\}$ consisting of elements
    fixed by $G$. It is the largest trivial $G$-submodule of $A$.'
  kind: definition
  location: Section 23.1
  name: Definition 23.2
- description: 'Let $A$ be a $G$-module and let $n \in \mathbb{Z}_{\geq 0}$. The group
    of $n$-cochains is the abelian group $C^{n}(G, A):=\operatorname{Map}(G^{n}, A)$
    of maps of sets $f: G^{n} \rightarrow A$ under pointwise addition. We have $C^{0}(G,
    A) \simeq A$, since $G^{0}=\{1\}$ is a singleton set. The $n$th coboundary map
    $d^{n}: C^{n}(G, A) \rightarrow C^{n+1}(G, A)$ is the homomorphism of abelian
    groups defined by $d^{n}(f)(g_{0}, \ldots, g_{n}):= g_{0} f(g_{1}, \ldots, g_{n})-f(g_{0}
    g_{1}, g_{2}, \ldots, g_{n})+f(g_{0}, g_{1} g_{2}, \ldots, g_{n}) \cdots+(-1)^{n}
    f(g_{0}, \ldots, g_{n-2}, g_{n-1} g_{n})+(-1)^{n+1} f(g_{0}, \ldots, g_{n-1})$.
    The group $C^{n}(G, A)$ contains subgroups of $n$-cocycles and $n$-coboundaries
    defined by $Z^{n}(G, A):=\ker d^{n}$ and $B^{n}(G, A):=\operatorname{im} d^{n-1}$
    with $B^{0}(G, A):=\{0\}$.'
  kind: definition
  location: Section 23.1
  name: Definition 23.3
- description: Let $A$ be a $G$-module. The $n$th cohomology group of $G$ with coefficients
    in $A$ is the abelian group $H^{n}(G, A):=Z^{n}(G, A) / B^{n}(G, A)$.
  kind: definition
  location: Section 23.1
  name: Definition 23.4
- description: 'Let $\alpha: A \rightarrow B$ be a morphism of $G$-modules. We have
    induced group homomorphisms $\alpha^{n}: C^{n}(G, A) \rightarrow C^{n}(G, B)$
    defined by $f \mapsto \alpha \circ f$ that commute with the coboundary maps. In
    particular, $\alpha^{n}$ maps cocycles to cocycles and coboundaries to coboundaries
    and thus induces homomorphisms $\alpha^{n}: H^{n}(G, A) \rightarrow H^{n}(G, B)$
    of cohomology groups, and we have a morphism of cochain complexes $\alpha: \mathcal{C}_{A}
    \rightarrow \mathcal{C}_{B}$.'
  kind: lemma
  location: Section 23.1
  name: Lemma 23.6
- description: Suppose that we have a short exact sequence of $G$-modules $0 \longrightarrow
    A \xrightarrow{\alpha} B \xrightarrow{\beta} C \longrightarrow 0$. Then for every
    $n \geq 0$ we have a corresponding exact sequence of $n$-cochains $0 \longrightarrow
    C^{n}(G, A) \xrightarrow{\alpha^{n}} C^{n}(G, B) \xrightarrow{\beta^{n}} C^{n}(G,
    C) \longrightarrow 0$.
  kind: lemma
  location: Section 23.1
  name: Lemma 23.7
- description: Every short exact sequence of $G$-modules $0 \longrightarrow A \xrightarrow{\alpha}
    B \xrightarrow{\beta} C \longrightarrow 0$ induces a long exact sequence of cohomology
    groups $0 \rightarrow H^{0}(G, A) \xrightarrow{\alpha^{0}} H^{0}(G, B) \xrightarrow{\beta^{0}}
    H^{0}(G, C) \xrightarrow{\delta^{0}} H^{1}(G, A) \longrightarrow \cdots$ and commutative
    diagrams of short exact sequences of $G$-modules induce corresponding commutative
    diagrams of long exact sequences of cohomology groups.
  kind: theorem
  location: Section 23.1
  name: Theorem 23.8
- description: 'A family of functors $F^{n}$ from the category of $G$-modules to the
    category of abelian groups that associates to each short exact sequence of $G$-modules
    a long exact sequence of abelian groups such that commutative diagrams of short
    exact sequences yield commutative diagrams of long exact sequences is called a
    $\delta$-functor. A $\delta$-functor is said to be cohomological if the connecting
    homomorphisms in long exact sequences are of the form $\delta^{n}: F^{n}(G, C)
    \rightarrow F^{n+1}(G, A)$. If we instead have $\delta_{n}: F_{n+1}(G, C) \rightarrow
    F_{n}(G, A)$ then the $\delta$-functor is homological.'
  kind: definition
  location: Section 23
  name: Definition 23.9
- description: Let $G$ be a group. The standard resolution of $\mathbb{Z}$ by $G$-modules
    is the exact sequence of $G$-module homomorphisms $\cdots \longrightarrow \mathbb{Z}[G^{n+1}]
    \xrightarrow{d_{n}} \mathbb{Z}[G^{n}] \longrightarrow \cdots \xrightarrow{d_{1}}
    \mathbb{Z}[G] \xrightarrow{d_{0}} \mathbb{Z} \longrightarrow 0$ where the boundary
    maps $d_{n}$ are defined by $d_{n}(g_{0}, \ldots, g_{n}):=\sum_{i=0}^{n}(-1)^{i}(g_{0},
    \ldots, \hat{g}_{i}, \ldots, g_{n})$ and extended $\mathbb{Z}$-linearly (the notation
    $\hat{g}_{i}$ means omit $g_{i}$ from the tuple). The map $d_{0}$ sends each $g
    \in G$ to 1, and extends to the map $\sum_{g} a_{g} g \mapsto \sum_{g} a_{g}$,
    which is also known as the augmentation map and may be denoted $\varepsilon$.
  kind: definition
  location: Section 23.2
  name: Definition 23.10
- description: The standard resolution of $\mathbb{Z}$ by $G$-modules is exact.
  kind: lemma
  location: Section 23.2
  name: Lemma 23.11
- description: 'Let $R$ be a (not necessarily commutative) ring. A free resolution
    $P$ of a (left) $R$-module $M$ is an exact sequence of free (left) $R$-modules
    $P_{n}$: $\cdots \xrightarrow{d_{n+1}} P_{n+1} \xrightarrow{d_{n}} P_{n} \xrightarrow{d_{n-1}}
    \cdots \xrightarrow{d_{1}} P_{1} \xrightarrow{d_{0}} M \longrightarrow 0$.'
  kind: definition
  location: Section 23.2
  name: Definition 23.12
- description: 'Let $A$ be a $G$-module. For every $n \geq 0$ we have an isomorphism
    of abelian groups $\Phi^{n}: \operatorname{Hom}_{\mathbb{Z}[G]}(\mathbb{Z}[G^{n+1}],
    A) \xrightarrow{\sim} C^{n}(G, A)$ that sends $\varphi: \mathbb{Z}[G^{n+1}] \rightarrow
    A$ to the function $f: G^{n} \rightarrow A$ defined by $f(g_{1}, \ldots, g_{n}):=\varphi(1,
    g_{1}, g_{1} g_{2}, \ldots, g_{1} g_{2} \cdots g_{n})$. The isomorphisms $\Phi^{n}$
    satisfy $\Phi^{n+1} \circ d_{n+1}^{*}=d^{n} \circ \Phi^{n}$ for all $n \geq 0$
    and thus define an isomorphism of cochain complexes $\Phi_{A}: \mathcal{S}_{A}
    \rightarrow \mathcal{C}_{A}$.'
  kind: proposition
  location: Section 23.2
  name: Proposition 23.13
- description: Let $A$ be a $G$-module. The cochain complexes $\mathcal{S}_{A}$ and
    $\mathcal{C}_{A}$ have the same cohomology groups, in other words, $H^{n}(G, A)
    \simeq \operatorname{Ext}_{\mathbb{Z}[G]}^{n}(\mathbb{Z}, A)$ for all $n \geq
    0$, and we can compute $H^{n}(G, A)$ using any free resolution of $\mathbb{Z}$
    by $G$-modules.
  kind: corollary
  location: Section 23.2
  name: Corollary 23.14
- description: For any $G$-modules $A$ and $B$ we have $H^{n}(G, A \oplus B) \simeq
    H^{n}(G, A) \oplus H^{n}(G, B)$ for all $n \geq 0$, and the isomorphism commutes
    with the natural inclusion and projection maps for the direct sums on both sides.
  kind: corollary
  location: Section 23.2
  name: Corollary 23.15
- description: A category containing finite coproducts (such as direct sums) in which
    each set of morphisms between objects has the structure of an abelian group whose
    addition distributes over composition (and vice versa) is called an additive category.
    A functor $F$ between additive categories is an additive functor if it maps zero
    objects to zero objects and satisfies $F(X \oplus Y) \simeq F(X) \oplus F(Y)$,
    where the isomorphism commutes with the natural inclusion and projection maps
    for the direct sums on both sides.
  kind: definition
  location: Section 23.2
  name: Definition 23.16
- description: Let $G$ be a group and let $A$ be an abelian group. The abelian group
    $\operatorname{CoInd}^{G}(A):=\operatorname{Hom}_{\mathbb{Z}}(\mathbb{Z}[G], A)$
    with $G$-action defined by $(g \varphi)(z):=\varphi(zg)$ is the coinduced $G$-module
    associated to $A$.
  kind: definition
  location: Section 23.2
  name: Definition 23.17
- description: Let $G$ be a group and $A$ an abelian group. Then $H^{0}(G, \operatorname{CoInd}^{G}(A))
    \simeq A$ and $H^{n}(G, \operatorname{CoInd}^{G}(A))=0$ for all $n \geq 1$.
  kind: lemma
  location: Section 23.2
  name: Lemma 23.19
- description: 'Let $A$ be a $G$-module. The $n$th homology group of $G$ with coefficients
    in $A$ is the abelian group $H_{n}(G, A):=\operatorname{Tor}_{n}^{\mathbb{Z}[G]}(\mathbb{Z},
    A)$. If $\alpha: A \rightarrow B$ is a morphism of $G$-modules, the natural morphism
    $\alpha_{n}: H_{n}(G, A) \rightarrow H_{n}(G, B)$ is given by $x \otimes a \mapsto
    x \otimes \alpha(a)$. Each $H_{n}(G, \bullet)$ is a functor from the category
    of $G$-modules to the category of abelian groups.'
  kind: definition
  location: Section 23.4
  name: Definition 23.20
- description: Every short exact sequence of $G$-modules $0 \longrightarrow A \xrightarrow{\alpha}
    B \xrightarrow{\beta} C \longrightarrow 0$ induces a long exact sequence of homology
    groups $\cdots \longrightarrow H_{1}(G, C) \xrightarrow{\delta_{0}} H_{0}(G, A)
    \xrightarrow{\alpha_{0}} H_{0}(G, B) \xrightarrow{\beta_{0}} H_{0}(G, C) \longrightarrow
    0$, and commutative diagrams of short exact sequences of $G$-modules induce corresponding
    commutative diagrams of long exact sequences of homology groups.
  kind: theorem
  location: Section 23.4
  name: Theorem 23.21
- description: For any $G$-modules $A$ and $B$ we have $H_{n}(G, A \oplus B) \simeq
    H_{n}(G, A) \oplus H_{n}(G, B)$ for all $n \geq 0$, and the isomorphism commutes
    with the natural inclusion and projection maps for the direct sums on both sides.
  kind: corollary
  location: Section 23.4
  name: Corollary 23.22
- description: 'Let $G$ be a group. The augmentation map $\varepsilon: \mathbb{Z}[G]
    \rightarrow \mathbb{Z}$ is the ring homomorphism $\sum a_{g} g \mapsto \sum a_{g}$.
    The augmentation ideal $I_{G}$ is the kernel of the augmentation map; it is a
    free $\mathbb{Z}$-module with basis $\{g-1: g \in G\}$.'
  kind: definition
  location: Section 23.4
  name: Definition 23.23
- description: Let $A$ be a $G$-module. The group of $G$-coinvariants of $A$ is the
    $G$-module $A_{G}:=A/I_{G} A$; it is the largest trivial $G$-module that is a
    quotient of $A$.
  kind: definition
  location: Section 23.4
  name: Definition 23.24
- description: Let $G$ be a group and let $A$ be an abelian group. The abelian group
    $\operatorname{Ind}^{G}(A):=\mathbb{Z}[G] \otimes_{\mathbb{Z}} A$ with $G$-action
    defined by $g(z \otimes a)=(gz) \otimes a$ is the induced $G$-module associated
    to $A$.
  kind: definition
  location: Section 23.4
  name: Definition 23.25
- description: Let $G$ be a group and $A$ an abelian group. Then $H_{0}(G, \operatorname{Ind}^{G}(A))
    \simeq A$ and $H_{n}(G, \operatorname{Ind}^{G}(A))=0$ for all $n \geq 1$.
  kind: lemma
  location: Section 23.4
  name: Lemma 23.26
- description: Let $G$ be a finite group and $A$ an abelian group. The $G$-modules
    $\operatorname{Ind}^{G}(A)$ and $\operatorname{CoInd}^{G}(A)$ are isomorphic.
  kind: lemma
  location: Section 23.4
  name: Lemma 23.27
- description: Let $G$ be a finite group, $A$ be an abelian group, and let $B$ be
    $\operatorname{Ind}^{G}(A)$ or $\operatorname{CoInd}^{G}(A)$. Then $H_{0}(G, B)
    \simeq H^{0}(G, B) \simeq A$ and $H_{n}(G, B)=H^{n}(G, B)=0$ for all $n \geq 1$.
  kind: corollary
  location: Section 23.4
  name: Corollary 23.28
- description: The norm element of $\mathbb{Z}[G]$ is $N_{G}:=\sum_{g \in G} g$.
  kind: definition
  location: Section 23.5
  name: Definition 23.29
- description: 'Let $A$ be a $G$-module and let $N_{G}: A \rightarrow A$ be the $G$-module
    endomorphism $a \mapsto N_{G} a$. We then have $I_{G} A \subseteq \ker N_{G}$
    and $\operatorname{im} N_{G} \subseteq A^{G}$, thus $N_{G}$ induces a morphism
    $\hat{N}_{G}: A_{G} \rightarrow A^{G}$ of trivial $G$-modules.'
  kind: lemma
  location: Section 23.5
  name: Lemma 23.30
- description: Let $A$ be a $G$-module for a finite group $G$. For $n \geq 0$ the
    Tate cohomology and homology groups are defined by $\hat{H}^{n}(G, A):=\begin{cases}
    \operatorname{coker} \hat{N}_{G} & \text{for } n=0 \\ H^{n}(G, A) & \text{for
    } n>0 \end{cases}$ and $\hat{H}_{n}(G, A):=\begin{cases} \ker \hat{N}_{G} & \text{for
    } n=0 \\ H_{n}(G, A) & \text{for } n>0 \end{cases}$ with $\hat{H}^{-n}(G, A):=\hat{H}_{n-1}(G,
    A)$ and $\hat{H}_{-n}(G, A):=\hat{H}^{n-1}(G, A)$.
  kind: definition
  location: Section 23.5
  name: Definition 23.31
- description: Let $G$ be a finite group. Every short exact sequence of $G$-modules
    $0 \longrightarrow A \xrightarrow{\alpha} B \xrightarrow{\beta} C \longrightarrow
    0$ induces a long exact sequence of Tate cohomology groups $\cdots \longrightarrow
    \hat{H}^{n}(G, A) \xrightarrow{\hat{\alpha}^{n}} \hat{H}^{n}(G, B) \xrightarrow{\hat{\beta}^{n}}
    \hat{H}^{n}(G, C) \xrightarrow{\hat{\delta}^{n}} \hat{H}^{n+1}(G, A) \longrightarrow
    \cdots$, equivalently, a long exact sequence of Tate homology groups $\cdots \longrightarrow
    \hat{H}_{n}(G, A) \xrightarrow{\hat{\alpha}_{n}} \hat{H}_{n}(G, B) \xrightarrow{\hat{\beta}_{n}}
    \hat{H}_{n}(G, C) \xrightarrow{\hat{\delta}_{n}} \hat{H}_{n-1}(G, A) \longrightarrow
    \cdots$. Commutative diagrams of short exact sequences of $G$-modules induce commutative
    diagrams of long exact sequences of Tate cohomology groups (equivalently, Tate
    homology groups).
  kind: theorem
  location: Section 23.5
  name: Theorem 23.32
- description: Let $G$ be a finite group. For any $G$-modules $A$ and $B$ we have
    $\hat{H}^{n}(G, A \oplus B) \simeq \hat{H}^{n}(G, A) \oplus \hat{H}^{n}(G, B)$
    for all $n \in \mathbb{Z}$, and the isomorphisms commute with the natural inclusion
    and projection maps for the direct sums on both sides.
  kind: corollary
  location: Section 23.5
  name: Corollary 23.33
- description: Let $G$ be a finite group and let $B$ be an induced or co-induced $G$-module
    associated to some abelian group $A$. Then $\hat{H}^{n}(G, B)=\hat{H}_{n}(G, B)=0$
    for all $n \in \mathbb{Z}$.
  kind: theorem
  location: Section 23.5
  name: Theorem 23.34
- description: Let $G$ be a finite group and let $A$ be a free $\mathbb{Z}[G]$-module.
    Then we have $\hat{H}_{n}(G, A)=\hat{H}^{n}(G, A)=0$ for all $n \in \mathbb{Z}$.
  kind: corollary
  location: Section 23.5
  name: Corollary 23.36
- description: Let $G=\langle g\rangle$ be a finite cyclic group and let $A$ be a
    $G$-module. For all $n \in \mathbb{Z}$ we have $\hat{H}^{2n}(G, A) \simeq \hat{H}_{2n-1}(G,
    A) \simeq \hat{H}^{0}(G, A)$ and $\hat{H}_{2n}(G, A) \simeq \hat{H}^{2n-1}(G,
    A) \simeq \hat{H}_{0}(G, A)$.
  kind: theorem
  location: Section 23.6
  name: Theorem 23.37
- description: Let $G$ be a finite cyclic group and let $A$ be a $G$-module. We define
    $h^{n}(A):=h^{n}(G, A):=\# \hat{H}^{n}(G, A)$ and $h_{n}(A):=h_{n}(G, A):=\# \hat{H}_{n}(G,
    A)$. Whenever $h^{0}(A)$ and $h_{0}(A)$ are both finite, we also define the Herbrand
    quotient $h(A):=h^{0}(A) / h_{0}(A) \in \mathbb{Q}$.
  kind: definition
  location: Section 23.6
  name: Definition 23.38
- description: Let $G$ be a finite cyclic group. Given an exact sequence of $G$-modules
    $0 \longrightarrow A \xrightarrow{\alpha} B \xrightarrow{\beta} C \longrightarrow
    0$ we have a corresponding exact hexagon relating $\hat{H}^{0}(G, A)$, $\hat{H}^{0}(G,
    B)$, $\hat{H}^{0}(G, C)$, $\hat{H}_{0}(G, A)$, $\hat{H}_{0}(G, B)$, $\hat{H}_{0}(G,
    C)$.
  kind: corollary
  location: Section 23.6
  name: Corollary 23.40
- description: Let $G$ be a finite cyclic group. For any exact sequence of $G$-modules
    $0 \longrightarrow A \xrightarrow{\alpha} B \xrightarrow{\beta} C \longrightarrow
    0$, if any two of $h(A), h(B), h(C)$ are defined then so is the third and $h(B)=h(A)
    h(C)$.
  kind: corollary
  location: Section 23.6
  name: Corollary 23.41
- description: Let $G$ be a finite cyclic group, and let $A$ and $B$ be $G$-modules.
    If $h(A)$ and $h(B)$ are defined then so is $h(A \oplus B)=h(A) h(B)$.
  kind: corollary
  location: Section 23.6
  name: Corollary 23.42
- description: Let $G=\langle g\rangle$ be a finite cyclic group. If $A$ is an induced,
    coinduced, or finite $G$-module then $h(A)=1$.
  kind: lemma
  location: Section 23.6
  name: Lemma 23.43
- description: Let $G$ be a finite cyclic group and let $A$ be a $G$-module that is
    a finitely generated abelian group. Then $h(A)=h(A/A_{\text{tor}})$ whenever either
    is defined.
  kind: corollary
  location: Section 23.6
  name: Corollary 23.44
- description: Let $G$ be a finite cyclic group and let $A$ be a trivial $G$-module
    that is a finitely generated abelian group. Then $h(A)=(\# G)^{r}$, where $r$
    is the rank of $A$.
  kind: corollary
  location: Section 23.6
  name: Corollary 23.46
- description: 'Let $G$ be a finite cyclic group and let $\alpha: A \rightarrow B$
    be a morphism of $G$-modules with finite kernel and cokernel. If either $h(A)$
    or $h(B)$ is defined then $h(A)=h(B)$.'
  kind: lemma
  location: Section 23.6
  name: Lemma 23.47
- description: Let $G$ be a finite cyclic group and let $A$ be a $G$-module containing
    a sub-$G$-module $B$ of finite index. Then $h(A)=h(B)$ whenever either is defined.
  kind: corollary
  location: Section 23
  name: Corollary 23.48
- description: 'A chain complex $C$ is a sequence of $R$-module morphisms $\cdots
    \xrightarrow{d_{2}} C_{2} \xrightarrow{d_{1}} C_{1} \xrightarrow{d_{0}} C_{0}
    \longrightarrow 0$, with $d_{n} \circ d_{n+1}=0$; the $d_{n}$ are boundary maps.
    The $n$th homology group of $C$ is the $R$-module $H_{n}(C):=Z_{n}(C)/B_{n}(C)$,
    where $Z_{n}(C):=\ker d_{n-1}$ and $B_{n}(C):=\operatorname{im} d_{n}$ are the
    $R$-modules of cycles and boundaries, respectively; for $n<0$ we define $C_{n}=0$
    and $d_{n}$ is the zero map. A morphism of chain complexes $f: C \rightarrow D$
    is a sequence of $R$-module morphisms $f_{n}: C_{n} \rightarrow D_{n}$ that commute
    with boundary maps (so $f_{n} \circ d_{n}=d_{n} \circ f_{n+1}$). Such a morphism
    necessarily maps cycles to cycles and boundaries to boundaries, yielding natural
    morphisms $H_{n}(f): H_{n}(C) \rightarrow H_{n}(D)$ of homology groups.'
  kind: definition
  location: Section 23.7, Subsection 23.7.1
  name: Definition 23.49
- description: Associated to each short exact sequence of chain complexes $0 \longrightarrow
    A \xrightarrow{\alpha} B \xrightarrow{\beta} C \longrightarrow 0$ is a long exact
    sequence of homology groups $\cdots \longrightarrow H_{n+1}(A) \xrightarrow{H_{n+1}(\alpha)}
    H_{n+1}(B) \xrightarrow{H_{n+1}(\beta)} H_{n+1}(C) \xrightarrow{\delta_{n}} H_{n}(A)
    \xrightarrow{H_{n}(\alpha)} H_{n}(B) \xrightarrow{H_{n}(\beta)} H_{n}(C) \longrightarrow
    \cdots$ and this association maps morphisms of short exact sequences to morphisms
    of long exact sequences. In other words, the family of functors $H_{n}(\bullet)$
    is a homological $\delta$-functor. For $n<0$ we have $H_{n}(\bullet)=0$, by definition,
    so this sequence ends at $H_{0}(C) \rightarrow 0$.
  kind: theorem
  location: Section 23.7, Subsection 23.7.1
  name: Theorem 23.50
- description: 'Two morphisms $f, g: C \rightarrow D$ of chain complexes are homotopic
    if there exist morphisms $h_{n}: C_{n} \rightarrow D_{n+1}$ such that $f_{n}-g_{n}=d_{n}
    \circ h_{n}+h_{n-1} \circ d_{n-1}$ for all $n \geq 0$ (where $h_{-1}:=0$); this
    defines an equivalence relation $f \sim g$, since (a) $f \sim f$ (take $h=0$),
    (b) if $f \sim g$ via $h$ then $g \sim f$ via $-h$, and (c) if $f_{1} \sim f_{2}$
    via $h_{1}$ and $f_{2} \sim f_{3}$ via $h_{2}$ then $f_{1} \sim f_{3}$ via $h_{1}+h_{2}$.'
  kind: definition
  location: Section 23.7, Subsection 23.7.1
  name: Definition 23.51
- description: 'Homotopic morphisms of chain complexes $f, g: C \rightarrow D$ induce
    the same morphisms of homology groups $H_{n}(C) \rightarrow H_{n}(D)$; we have
    $H_{n}(f)=H_{n}(g)$ for all $n \geq 0$.'
  kind: lemma
  location: Section 23.7, Subsection 23.7.1
  name: Lemma 23.52
- description: 'A cochain complex $C$ is a sequence of $R$-module morphisms $0 \longrightarrow
    C^{0} \xrightarrow{d^{0}} C^{1} \xrightarrow{d^{1}} C^{2} \xrightarrow{d^{2}}
    \cdots$ with $d^{n+1} \circ d^{n}=0$. The $n$th cohomology group of $C$ is the
    $R$-module $H^{n}(C):=Z^{n}(C)/B^{n}(C)$, where $Z^{n}(C):=\ker d^{n}$ and $B^{n}(C):=\operatorname{im}
    d^{n-1}$ are the $R$-modules of cocycles and coboundaries; for $n<0$ we define
    $C^{n}=0$ and $d^{n}$ is the zero map. A morphism of cochain complexes $f: C \rightarrow
    D$ consists of $R$-module morphisms $f^{n}: C^{n} \rightarrow D^{n}$ that commute
    with coboundary maps, yielding natural morphisms $H^{n}(f): H^{n}(C) \rightarrow
    H^{n}(D)$ and functors $H^{n}(\bullet)$ from the category of cochain complexes
    to the category of abelian groups. Morphisms of cochain complexes $f, g: C \rightarrow
    D$ are homotopic if there are morphisms $h^{n}: C^{n+1} \rightarrow D^{n}$ such
    that $f^{n}-g^{n}=h^{n} \circ d^{n}+d^{n-1} \circ h^{n-1}$ for all $n \geq 0$
    (where $h^{-1}:=0$); this defines an equivalence relation $f \sim g$.'
  kind: definition
  location: Section 23.7, Subsection 23.7.1
  name: Definition 23.53
- description: Associated to every short exact sequence of cochain complexes $0 \longrightarrow
    A \xrightarrow{\alpha} B \xrightarrow{\beta} C \longrightarrow 0$ is a long exact
    sequence of cohomology groups $\cdots \longrightarrow H^{n}(A) \xrightarrow{H^{n}(\alpha)}
    H^{n}(B) \xrightarrow{H^{n}(\beta)} H^{n}(C) \xrightarrow{\delta^{n}} H^{n+1}(A)
    \xrightarrow{H^{n+1}(\alpha)} H^{n+1}(B) \xrightarrow{H^{n+1}(\beta)} H^{n+1}(C)
    \longrightarrow \cdots$ and this association maps morphisms of short exact sequences
    to morphisms of long exact sequences, that is, the family of functors $H^{n}(\bullet)$
    is a cohomological $\delta$-functor. For $n<0$ we have $H^{n}(\bullet)=0$, by
    definition, so this sequence begins with $0 \rightarrow H^{0}(A)$.
  kind: theorem
  location: Section 23.7, Subsection 23.7.1
  name: Theorem 23.54
- description: 'Homotopic morphisms of cochain complexes $f, g: C \rightarrow D$ induce
    the same morphisms of cohomology groups $H^{n}(C) \rightarrow H^{n}(D)$; we have
    $H^{n}(f)=H^{n}(g)$ for all $n \geq 0$.'
  kind: lemma
  location: Section 23.7, Subsection 23.7.1
  name: Lemma 23.55
- description: Let $M$ be an $R$-module. A projective resolution of $M$ is an exact
    chain complex $P$ with $P_{0}=M$ and $P_{n}$ projective for all $n>0$. An injective
    resolution of $M$ is an exact cochain complex $I$ with $I^{0}=M$ and $I^{n}$ injective
    for all $n>0$. When we refer to $P$ as a projective resolution (rather than an
    exact chain complex), we refer only to the chain complex $\cdots \rightarrow P_{2}
    \rightarrow P_{1} \rightarrow 0$, and when we refer to $I$ as an injective resolution
    (rather than an exact cochain complex), we refer only to the cochain complex $0
    \rightarrow I_{1} \rightarrow I_{2} \rightarrow \cdots$.
  kind: definition
  location: Section 23.7, Subsection 23.7.2
  name: Definition 23.56
- description: 'Let $M$ and $N$ be $R$-modules with projective resolutions $P$ and
    $Q$ and injective resolutions $I$ and $J$, respectively. Every $R$-module morphism
    $\alpha_{0}: M \rightarrow N$ extends to a morphism $\alpha: P \rightarrow Q$
    of chain complexes, and to a morphism $\alpha: I \rightarrow J$ of cochain complexes,
    both of which are unique up to homotopy.'
  kind: proposition
  location: Section 23.7, Subsection 23.7.2
  name: Proposition 23.57
- description: 'Let $\varphi: M \rightarrow N$ and $\phi: N \rightarrow P$ be morphisms
    of $R$-modules. The sequence $M \xrightarrow{\varphi} N \xrightarrow{\phi} P \longrightarrow
    0$ is exact if and only if for every $R$-module $A$ the sequence $0 \longrightarrow
    \operatorname{Hom}_{R}(P, A) \xrightarrow{\phi^{*}} \operatorname{Hom}_{R}(N,
    A) \xrightarrow{\varphi^{*}} \operatorname{Hom}_{R}(M, A)$ is exact.'
  kind: lemma
  location: Section 23.7, Subsection 23.7.3
  name: Lemma 23.58
- description: A sequence of morphisms $0 \rightarrow A \xrightarrow{f} B \xrightarrow{g}
    C \rightarrow 0$ is left exact if it is exact at $A$ and $B$ ($\ker f=0$ and $\operatorname{im}
    f=\ker g$), and right exact if it is exact at $B$ and $C$ ($\operatorname{im}
    f=\ker g$ and $\operatorname{im} g=C$). A functor that takes exact sequences to
    left (resp. right) exact sequences is said to be left exact (resp. right exact).
  kind: definition
  location: Section 23.7, Subsection 23.7.3
  name: Definition 23.59
- description: For any $R$-module $A$ the functor $\operatorname{Hom}_{R}(\bullet,
    A)$ is left exact.
  kind: corollary
  location: Section 23.7, Subsection 23.7.3
  name: Corollary 23.60
- description: For any $R$-module $A$, the functor $\operatorname{Hom}_{R}(\bullet,
    A)$ is an additive functor.
  kind: corollary
  location: Section 23.7, Subsection 23.7.3
  name: Corollary 23.61
- description: For any left $R$-module $A$ the functor $\bullet \otimes_{R} A$ is
    right exact.
  kind: lemma
  location: Section 23.7
  name: Lemma 23.64
- description: For any left $R$-module $A$, the functor $\bullet \otimes_{R} A$ is
    an additive functor.
  kind: corollary
  location: Section 23.7
  name: Corollary 23.65
- description: 'Let $A$ be an $R$-module and let $\bullet^{*}$ denote the application
    of the functor $\operatorname{Hom}(\bullet, A)$. Let $f, g: C \rightarrow D$ be
    homotopic morphisms of chain complexes of $R$-modules. Then $f^{*}, g^{*}: D^{*}
    \rightarrow C^{*}$ are homotopic morphisms of cochain complexes of $\mathbb{Z}$-modules.'
  kind: proposition
  location: Section 23.7
  name: Proposition 23.68
- description: 'Let $A$ be a left $R$-module and let $\bullet_*$ denote the application
    of the functor $\bullet \otimes_{R} A$. Let $f, g: C \rightarrow D$ be homotopic
    morphisms of chain complexes of right $R$-modules. Then $f_{*}, g_{*}: C_{*} \rightarrow
    D_{*}$ are homotopic morphisms of chain complexes of $\mathbb{Z}$-modules.'
  kind: proposition
  location: Section 23.7
  name: Proposition 23.69
- description: Let $P$, $Q$ be projective resolutions of an $R$-module $M$, let $A$
    be an $R$-module, and let $\bullet_{A}^{*}$ denote $\operatorname{Hom}_{R}(\bullet,
    A)$. Then $H^{n}(P_{A}^{*}) \simeq H^{n}(Q_{A}^{*})$ for all $n \geq 0$.
  kind: theorem
  location: Section 23.7.4
  name: Theorem 23.70
- description: 'Let $A$ and $M$ be $R$-modules. $\operatorname{Ext}_{R}^{n}(M, A)$
    is the abelian group $H^{n}(P_{A}^{*})$ uniquely determined by Theorem 23.70 using
    any projective resolution $P$ of $M$. If $\alpha: A \rightarrow B$ is a morphism
    of $R$-modules the map $\varphi \mapsto \alpha \circ \varphi$ induces a morphism
    of cochain complexes $P_{A}^{*} \rightarrow P_{B}^{*}$ and morphisms $\operatorname{Ext}_{R}^{n}(M,
    \alpha): \operatorname{Ext}_{R}^{n}(M, A) \rightarrow \operatorname{Ext}_{R}^{n}(M,
    B)$ for each $n \geq 0$.'
  kind: definition
  location: Section 23.7.4
  name: Definition 23.71
- description: Let $M$ be an $R$-module. The functors $\operatorname{Ext}_{R}^{n}(M,
    \bullet)$ are additive functors and thus commute with finite direct sums and products.
  kind: lemma
  location: Section 23.7.4
  name: Lemma 23.73
- description: For any two $R$-modules $M$ and $A$ we have $\operatorname{Ext}_{R}^{0}(M,
    A) \simeq \operatorname{Hom}_{R}(M, A)$.
  kind: lemma
  location: Section 23.7.4
  name: Lemma 23.74
- description: Let $P, Q$ be projective resolutions of a right $R$-module $M$. Let
    $A$ be a left $R$-module, and let $\bullet_{*}^{A}$ denote $\bullet \otimes_{R}
    A$. Then $H_{n}(P_{*}^{A}) \simeq H_{n}(Q_{*}^{A})$ for $n \geq 0$.
  kind: theorem
  location: Section 23.7.4
  name: Theorem 23.75
- description: 'Let $A$ be a left $R$-module and let $M$ be a right $R$-module. $\operatorname{Tor}_{n}^{R}(M,
    A)$ is the abelian group $H_{n}(P_{*}^{A})$ uniquely determined by Theorem 23.75
    using any projective resolution $P$ of $M$. If $\alpha: A \rightarrow B$ is a
    morphism of left $R$-modules the map $x \otimes a \mapsto x \otimes \varphi(a)$
    induces a morphism $P_{*}^{A} \rightarrow P_{*}^{B}$ and morphisms $\operatorname{Tor}_{n}^{R}(M,
    \alpha): \operatorname{Tor}_{n}^{R}(M, A) \rightarrow \operatorname{Ext}_{n}^{R}(M,
    B)$ for each $n \geq 0$. This yields a family of functors $\operatorname{Tor}_{n}^{R}(M,
    \bullet)$ from the category of left $R$-modules to the category of abelian groups
    that is a homological $\delta$-functor.'
  kind: definition
  location: Section 23.7.4
  name: Definition 23.76
- description: Let $M$ be a right $R$-module. The functors $\operatorname{Tor}_{n}^{R}(M,
    \bullet)$ are additive functors and thus commute with finite direct sums and products.
  kind: lemma
  location: Section 23.7.4
  name: Lemma 23.77
- description: For any two $R$-modules $M$ and $A$ we have $\operatorname{Tor}_{0}^{R}(M,
    A) \simeq M \otimes_{R} A$.
  kind: lemma
  location: Section 23.7.4
  name: Lemma 23.78
- description: Let $L / K$ be a cyclic Galois extension with Galois group $G := \operatorname{Gal}(L
    / K)$. (i) $\hat{H}^{0}(L)$ and $\hat{H}_{0}(L)$ are both trivial. (ii) $\hat{H}^{0}(L^{\times})
    \simeq K^{\times} / N(L^{\times})$ and $\hat{H}_{0}(L^{\times})$ is trivial.
  kind: theorem
  location: Section 24.1
  name: Theorem 24.1
- description: Let $L / K$ be a finite cyclic extension with Galois group $\operatorname{Gal}(L
    / K) = \langle\sigma\rangle$. Then $N(\alpha) = 1$ if and only if $\alpha = \beta
    / \sigma(\beta)$ for some $\beta \in L^{\times}$.
  kind: corollary
  location: Section 24.1
  name: Corollary 24.3 (Hilbert Theorem 90)
- description: 'Let $L / K$ be a Galois extension of global fields and let $w$ be
    a place of $L$. The decomposition group of $w$ is its stabilizer in $\operatorname{Gal}(L
    / K)$: $D_{w} := \{\sigma \in \operatorname{Gal}(L / K) : \sigma(w) = w\}$. If
    $w$ corresponds to a prime $\mathfrak{q}$ of $\mathcal{O}_{L}$ then $D_{w} = D_{\mathfrak{q}}$
    is also the decomposition group of $\mathfrak{q}$.'
  kind: definition
  location: Section 24.1
  name: Definition 24.4
- description: For a Galois extension of number fields $L / K$ we define the integers
    $e_{0}(L / K) := \prod_{v \nmid \infty} e_{v}$, $e_{\infty}(L / K) := \prod_{v
    \mid \infty} e_{v}$, $e(L / K) := e_{0}(L / K) e_{\infty}(L / K)$.
  kind: definition
  location: Section 24.1
  name: Definition 24.5
- description: Let $L / K$ be a Galois extension of number fields. Let $w_{1}, \ldots,
    w_{r+s}$ be the archimedean places of $L$, where $r$ and $s$ are the number of
    real and complex places of $L$, respectively. There exist units $\varepsilon_{1},
    \ldots, \varepsilon_{r+s} \in \mathcal{O}_{L}^{\times}$ such that (i) $\sigma(\varepsilon_{i})
    = \varepsilon_{j}$ if and only if $\sigma(w_{i}) = w_{j}$, for all $\sigma \in
    \operatorname{Gal}(L / K)$; (ii) The set $\{\varepsilon_{1}, \ldots, \varepsilon_{r+s}\}$
    generates a finite index subgroup of $\mathcal{O}_{L}^{\times}$; (iii) $\prod_{i}
    \varepsilon_{i} = 1$, and every relation among the $\varepsilon_{i}$ is a multiple
    of this one.
  kind: theorem
  location: Section 24.1
  name: Theorem 24.6 (Herbrand unit theorem)
- description: Let $K$ be a number field with archimedean places $v_{1}, \ldots, v_{r+s}$.
    Any units $u_{1}, \ldots, u_{r+s} \in \mathcal{O}_{L}^{\times}$ that satisfy $\|u_{i}\|_{v_{j}}
    < 1$ for $j \neq i$ generate a finite index subgroup of $\mathcal{O}_{K}^{\times}$.
  kind: lemma
  location: Section 24.1
  name: Lemma 24.7
- description: 'Let $L / K$ be an extension of number fields with cyclic Galois group
    $G = \langle\sigma\rangle$. The Herbrand quotient of the $G$-module $\mathcal{O}_{L}^{\times}$
    is $h(\mathcal{O}_{L}^{\times}) = \frac{e_{\infty}(L / K)}{[L : K]}$.'
  kind: theorem
  location: Section 24.1
  name: Theorem 24.8
- description: 'Let $L / K$ be a cyclic extension of global fields with Galois group
    $\langle\sigma\rangle$. We have $h_{0}(\mathcal{I}_{L}) = 1$ and $h(\mathcal{I}_{L})
    = h^{0}(\mathcal{I}_{L}) = e_{0}(L / K)[\mathcal{I}_{K} : N(\mathcal{I}_{L})]$.'
  kind: lemma
  location: Section 24.1
  name: Lemma 24.9
- description: 'Let $L / K$ be a cyclic extension of global fields and let $\mathfrak{m}$
    be a modulus for $K$ divisible by all the primes that ramify in $L$. Then $h(\mathcal{I}_{L}^{\mathfrak{m}})
    = [\mathcal{I}_{K}^{\mathfrak{m}} : N(\mathcal{I}_{L}^{\mathfrak{m}})]$.'
  kind: corollary
  location: Section 24.1
  name: Corollary 24.10
- description: 'Let $L / K$ be a cyclic extension of number fields with Galois group
    $G$. The $G$-invariant subgroup of the $G$-module $\mathrm{Cl}_{L}$ has cardinality
    $\# \mathrm{Cl}_{L}^{G} = \frac{e(L / K) \# \mathrm{Cl}_{K}}{n(L / K)[L : K]}$
    where $n(L / K) := [\mathcal{O}_{K}^{\times} : N(L^{\times}) \cap \mathcal{O}_{K}^{\times}]
    \in \mathbb{Z}_{\geq 1}$.'
  kind: theorem
  location: Section 24.1
  name: Theorem 24.11 (Ambiguous class number formula)
- description: 'Let $f: A \rightarrow C$ be a homomorphism of abelian groups and let
    $B$ be a subgroup of $A$ containing the kernel of $f$. Then $A / B \simeq f(A)
    / f(B)$.'
  kind: lemma
  location: Section 24.2
  name: Lemma 24.14
- description: 'Let $L/K$ be a totally unramified cyclic extension of number fields.
    Then $\left[\mathcal{I}_{K}: N\left(\mathcal{I}_{L}\right) \mathcal{P}_{K}\right]
    \geq [L: K]$.'
  kind: theorem
  location: Section 24.2
  name: Theorem 24.15
- description: Let $L/K$ be a totally unramified cyclic extension of number fields.
    Then $\# \mathrm{Cl}_{L}^{G} = \# \mathrm{Cl}_{K} / [L:K]$ and the Tate cohomology
    groups of $\mathrm{Cl}_{L}$ are all trivial.
  kind: corollary
  location: Section 24.2
  name: Corollary 24.16
- description: Let $L/K$ be a totally unramified cyclic extension of number fields.
    Then every unit in $\mathcal{O}_{K}^{\times}$ is the norm of an element of $L$.
  kind: corollary
  location: Section 24.2
  name: Corollary 24.17
- description: 'Let $(X_i)$ be a family of topological spaces indexed by $i \in I$,
    and let $(U_i)$ be a family of open sets $U_i \subseteq X_i$. The restricted product
    $\prod(X_i, U_i)$ is the topological space $\prod(X_i, U_i) := \{(x_i): x_i \in
    U_i \text{ for almost all } i \in I\} \subseteq \prod X_i$ with the basis of open
    sets $\mathcal{B} := \{\prod V_i: V_i \subseteq X_i \text{ is open for all } i
    \in I \text{ and } V_i = U_i \text{ for almost all } i \in I\}$ where almost all
    means all but finitely many.'
  kind: definition
  location: Section 25.2
  name: Definition 25.1
- description: 'A direct system (or inductive system) in a category is a family of
    objects $\{X_i: i \in I\}$ indexed by a directed set $I$ and a family of morphisms
    $\{f_{ij}: X_i \rightarrow X_j: i \leq j\}$ such that each $f_{ii}$ is the identity
    and $f_{ik} = f_{jk} \circ f_{ij}$ for all $i \leq j \leq k$.'
  kind: definition
  location: Section 25.2
  name: Definition 25.3
- description: 'Let $(X_i, f_{ij})$ be a direct system of topological spaces. The
    direct limit (or inductive limit) of $(X_i, f_{ij})$ is the quotient space $X
    = \varinjlim X_i := \coprod_{i \in I} X_i / \sim$, where $x_i \sim f_{ij}(x_i)$
    for all $i \leq j$. It is equipped with continuous maps $\phi_i: X_i \rightarrow
    X$ that are compositions of the inclusion maps $X_i \hookrightarrow \coprod X_i$
    and quotient maps $\coprod X_i \rightarrow \coprod X_i / \sim$ and satisfy $\phi_i
    = \phi_j \circ f_{ij}$ for $i \leq j$.'
  kind: definition
  location: Section 25.2
  name: Definition 25.4
- description: Let $(X_i)$ be a family of topological spaces indexed by $i \in I$,
    let $(U_i)$ be a family of open sets $U_i \subseteq X_i$, and let $X := \prod(X_i,
    U_i)$ be the corresponding restricted product. For each finite $S \subseteq I$
    define $X_S := \prod_{i \in S} X_i \times \prod_{i \notin S} U_i$. Then $\prod(X_i,
    U_i) \simeq \varinjlim_S X_S$.
  kind: proposition
  location: Section 25.2
  name: Proposition 25.5
- description: Let $(X_{i})_{i \in I}$ be a family of locally compact topological
    spaces and let $(U_{i})_{i \in I}$ be a corresponding family of open subsets $U_{i}
    \subseteq X_{i}$ almost all of which are compact. Then the restricted product
    $X := \coprod(X_{i}, U_{i})$ is locally compact.
  kind: proposition
  location: Section 25
  name: Proposition 25.6
- description: 'Let $K$ be a global field. The adele ring of $K$ is the restricted
    product $\mathbb{A}_{K} := \prod(K_{v}, \mathcal{O}_{v})_{v \in M_{K}}$ which
    we may view as a subset (but not a subspace!) of $\prod_{v} K_{v}$; indeed $\mathbb{A}_{K}
    = \{(a_{v}) \in \prod K_{v}: a_{v} \in \mathcal{O}_{v} \text{ for almost all }
    v\}$.'
  kind: definition
  location: Section 25.3
  name: Definition 25.7
- description: The adele ring $\mathbb{A}_{K}$ of a global field $K$ is locally compact
    and Hausdorff.
  kind: proposition
  location: Section 25.3
  name: Proposition 25.9
- description: Let $L$ be a finite separable extension of a global field $K$. There
    is a natural isomorphism of topological rings $\mathbb{A}_{L} \simeq \mathbb{A}_{K}
    \otimes_{K} L$ that makes the diagram with canonical embeddings $L \hookrightarrow
    \mathbb{A}_{L}$ and $L \hookrightarrow \mathbb{A}_{K} \otimes_{K} L$ commute.
  kind: proposition
  location: Section 25.3
  name: Proposition 25.10
- description: Let $L$ be a finite separable extension of a global field $K$ of degree
    $n$. There is a natural isomorphism of topological $K$-vector spaces (and locally
    compact groups) $\mathbb{A}_{L} \simeq \mathbb{A}_{K} \oplus \cdots \oplus \mathbb{A}_{K}$
    that identifies $\mathbb{A}_{L}$ with the direct sum of $n$ copies of $\mathbb{A}_{K}$,
    and this isomorphism restricts to an isomorphism $L \simeq K \oplus \cdots \oplus
    K$ of the principal adeles of $\mathbb{A}_{L}$ with the $n$-fold direct sum of
    the principal adeles of $\mathbb{A}_{K}$.
  kind: corollary
  location: Section 25.3
  name: Corollary 25.11
- description: For each global field $L$ the principal adeles $L \subseteq \mathbb{A}_{L}$
    form a discrete cocompact subgroup of the additive group of the adele ring $\mathbb{A}_{L}$.
  kind: theorem
  location: Section 25.3
  name: Theorem 25.12
- description: For any global field $K$ the quotient $\mathbb{A}_{K} / K$ is a compact
    group.
  kind: corollary
  location: Section 25 (before Section 25.4)
  name: Corollary 25.13
- description: Let $K$ be a global field. There is a positive constant $B_{K}$ such
    that for any $a \in \mathbb{A}_{K}$ with $\|a\|>B_{K}$ there exists a nonzero
    principal adele $x \in K \subseteq \mathbb{A}_{K}$ for which $\|x\|_{v} \leq \|a\|_{v}$
    for all $v \in M_{K}$.
  kind: lemma
  location: Section 25.4
  name: Lemma 25.14 (Adelic Blichfeldt-Minkowski lemma)
- description: Let $M_{K}=S \sqcup T \sqcup\{w\}$ be a partition of the places of
    a global field $K$ with $S$ finite. Fix $a_{v} \in K$ and $\epsilon_{v} \in \mathbb{R}_{>0}$
    for each $v \in S$. There exists an $x \in K$ for which $\|x-a_{v}\|_{v} \leq
    \epsilon_{v}$ for all $v \in S$, and $\|x\|_{v} \leq 1$ for all $v \in T$ (note
    that there is no constraint on $\|x\|_{w}$).
  kind: theorem
  location: Section 25.4
  name: Theorem 25.16 (Strong Approximation)
- description: Let $K$ be a global field and let $w$ be any place of $K$. Then $K$
    is dense in the restricted product $\prod_{v \neq w}(K_{v}, \mathcal{O}_{v})$.
  kind: corollary
  location: Section 25.4
  name: Corollary 25.17
- description: Let $K$ be a global field. The idele group of $K$ is the topological
    group $\mathbb{I}_{K}:=\prod_{v}(K_{v}^{\times}, \mathcal{O}_{v}^{\times})$ with
    multiplication defined component-wise, which we view as the subgroup $\mathbb{A}_{K}^{\times}$
    of $\mathbb{A}_{K}$ endowed with the restricted product topology rather than the
    subspace topology. The canonical embedding $K \hookrightarrow \mathbb{A}_{K}$
    restricts to a canonical embedding $K^{\times} \hookrightarrow \mathbb{I}_{K}$,
    and we define the idele class group $C_{K}:=\mathbb{I}_{K} / K^{\times}$, a topological
    group.
  kind: definition
  location: Section 26.1
  name: Definition 26.2
- description: Let $K$ be a global field. The idele group $\mathbb{I}_{K}$ is a locally
    compact group.
  kind: proposition
  location: Section 26.1
  name: Proposition 26.5
- description: Let $K$ be a global field. Then $K^{\times}$ is a discrete subgroup
    of $\mathbb{I}_{K}$.
  kind: proposition
  location: Section 26.1
  name: Proposition 26.6
- description: Let $K$ be a global field. The group of 1-ideles is the topological
    group $\mathbb{I}_{K}^{1}:=\ker\|\cdot\|=\{a \in \mathbb{I}_{K}:\|a\|=1\}$ which
    contains $K^{\times}$, by the product formula (Theorem 13.21).
  kind: definition
  location: Section 26
  name: Definition 26.7
- description: The group of 1-ideles $\mathbb{I}_{K}^{1}$ is a closed subset of $\mathbb{A}_{K}$
    and $\mathbb{I}_{K}$, and the two subspace topologies on $\mathbb{I}_{K}^{1}$
    coincide.
  kind: lemma
  location: Section 26
  name: Lemma 26.8
- description: For any global field $K$, the principal ideles $K^{\times} \subseteq
    \mathbb{I}_{K}$ are a discrete cocompact subgroup of the group of 1-ideles $\mathbb{I}_{K}^{1}$.
  kind: theorem
  location: Section 26
  name: Theorem 26.9 (Fujisaki's Lemma)
- description: For a global field $K$ the compact group $C_{K}^{1}:=\mathbb{I}_{K}^{1}
    / K^{\times}$ is the norm-1 idele class group.
  kind: definition
  location: Section 26
  name: Definition 26.11
- description: A profinite group is a topological group that is an inverse limit of
    finite groups with the discrete topology. Given any topological group $G$, we
    can construct a profinite group by taking the profinite completion $\widehat{G}:=\varprojlim_{N}
    G / N \subseteq \prod_{N} G / N$ where $N$ ranges over finite index open normal
    subgroups, ordered by containment. If we are given a group $G$ without a specified
    topology, we can make it a topological group by giving it the profinite topology.
    This is the weakest topology that makes every finite quotient discrete and is
    obtained by taking all cosets of finite-index normal subgroups as a basis.
  kind: definition
  location: Section 26.2
  name: Definition 26.13
- description: 'Let $G$ be a topological group with profinite completion $\widehat{G}$.
    The image of $G$ under the natural map $\phi: G \rightarrow \widehat{G}$ is dense
    in $\widehat{G}$.'
  kind: lemma
  location: Section 26.2
  name: Lemma 26.18
- description: A topological group is profinite if and only if it is a totally disconnected
    compact group.
  kind: theorem
  location: Section 26.2
  name: Theorem 26.19
- description: Let $G$ be a profinite group. Then $G$ is naturally isomorphic to its
    profinite completion. In fact, $G \simeq \varprojlim G / U$, where $U$ ranges
    over open normal subgroups (ordered by containment). However, $G$ is isomorphic
    to its profinite completion as a group (in other words, strongly complete) if
    and only if every finite index subgroup of $G$ is open.
  kind: corollary
  location: Section 26.2
  name: Corollary 26.20
- description: Let $L/K$ be a Galois extension with Galois group $G=\operatorname{Gal}(L/K)$.
    If $F/K$ is a normal subextension of $L/K$, then $H=\operatorname{Gal}(L/F)$ is
    a normal subgroup of $G$ with fixed field $F$, and we have an exact sequence $1
    \rightarrow \operatorname{Gal}(L/F) \rightarrow \operatorname{Gal}(L/K) \rightarrow
    \operatorname{Gal}(F/K) \rightarrow 1$, where the first map is inclusion, the
    second map is induced by restriction, and we have $G/H \simeq \operatorname{Gal}(F/K)$.
  kind: lemma
  location: Section 26.3
  name: Lemma 26.21
- description: Let $L/K$ be a Galois extension with Galois group $G:=\operatorname{Gal}(L/K)$.
    The Krull topology on $G$ has the basis consisting of all cosets of subgroups
    $H_{F}:=\operatorname{Gal}(L/F)$, where $F$ ranges over finite normal extensions
    of $K$ in $L$.
  kind: definition
  location: Section 26.3
  name: Definition 26.22
- description: 'Let $L/K$ be a Galois extension. Under the Krull topology, the restriction
    maps induce a natural isomorphism of topological groups $\phi: \operatorname{Gal}(L/K)
    \rightarrow \varprojlim \operatorname{Gal}(F/K)$, where $F$ ranges over finite
    Galois extensions of $K$ in $L$. In particular, $\operatorname{Gal}(L/K)$ is a
    profinite group whose open normal subgroups are precisely those of the form $\operatorname{Gal}(L/F)$
    for some finite normal extension $F/K$.'
  kind: theorem
  location: Section 26.3
  name: Theorem 26.23
- description: Let $L/K$ be a Galois extension and let $G:=\operatorname{Gal}(L/K)$
    be endowed with the Krull topology. The maps $F \mapsto \operatorname{Gal}(L/F)$
    and $H \mapsto L^{H}$ define an inclusion reversing bijection between subextensions
    $F/K$ of $L/K$ and closed subgroups $H$ of $G$. Under this correspondence, subextensions
    of finite degree $n$ correspond to subgroups of finite index $n$, and normal subextensions
    $F/K$ correspond to normal subgroups $H \subseteq G$ such that $\operatorname{Gal}(F/K)
    \simeq G/H$ as topological groups.
  kind: theorem
  location: Section 26.3
  name: Theorem 26.24 (Fundamental theorem of Galois theory)
- description: Let $L/K$ be a Galois extension and let $H$ be a subgroup of $\operatorname{Gal}(L/K)$
    with fixed field $F$. The closure $\bar{H}$ of $H$ in the Krull topology is $\operatorname{Gal}(L/F)$.
  kind: corollary
  location: Section 26.3
  name: Corollary 26.25
- description: Every profinite group $G$ is isomorphic to the Galois group of some
    Galois extension $L/K$.
  kind: theorem
  location: Section 26.3
  name: Theorem 26.26 (Waterhouse 1973)
- description: Let $K$ be a local field with separable closure $K^{\text{sep}}$. The
    field $K^{\mathrm{ab}}:=\bigcup_{\substack{L \subseteq K^{\text{sep}} \\ L / K
    \text{ finite abelian}}} L$ is the maximal abelian extension of $K$ (in $K^{\text{sep}}$).
    We also define $K^{\mathrm{unr}}:=\bigcup_{\substack{L \subseteq K^{\mathrm{sep}}
    \\ L / K \text{ finite unramified}}} L$ the maximal unramified extension of $K$
    (in $K^{\text{sep}}$).
  kind: definition
  location: Section 27
  name: Definition 27.1
- description: 'Let $K$ be a local field. There is a unique continuous homomorphism
    $\theta_{K}: K^{\times} \rightarrow \operatorname{Gal}\left(K^{\mathrm{ab}} /
    K\right)$ with the property that for each finite extension $L / K$ in $K^{\mathrm{ab}}$,
    the homomorphism $\theta_{L / K}: K^{\times} \rightarrow \operatorname{Gal}(L
    / K)$ given by composing $\theta_{K}$ with the natural map $\operatorname{res}_{L
    / K}: \operatorname{Gal}\left(K^{\mathrm{ab}} / K\right) \rightarrow \operatorname{Gal}(L
    / K)$ satisfies: (1) if $K$ is nonarchimedean and $L / K$ is unramified then $\theta_{L
    / K}(\pi)=\operatorname{Frob}_{L / K}$ for every uniformizer $\pi$ of $\mathcal{O}_{K}$;
    (2) $\theta_{L / K}$ is surjective with kernel $\mathrm{N}_{L / K}\left(L^{\times}\right)$,
    inducing $K^{\times} / \mathrm{N}_{L / K}\left(L^{\times}\right) \simeq \operatorname{Gal}(L
    / K)$.'
  kind: theorem
  location: Section 27.1
  name: Theorem 27.2 (Local Artin Reciprocity)
- description: A norm group of a local field $K$ is a subgroup of the form $\mathrm{N}\left(L^{\times}\right):=\mathrm{N}_{L
    / K}\left(L^{\times}\right) \subseteq K^{\times}$ for some finite abelian extension
    $L / K$.
  kind: definition
  location: Section 27.2
  name: Definition 27.3
- description: The map $L \mapsto \mathrm{N}\left(L^{\times}\right)$ defines an inclusion
    reversing bijection between the finite abelian extensions $L / K$ in $K^{\mathrm{ab}}$
    and the norm groups in $K^{\times}$ which satisfies (a) $\mathrm{N}\left(\left(L_{1}
    L_{2}\right)^{\times}\right)=\mathrm{N}\left(L_{1}^{\times}\right) \cap \mathrm{N}\left(L_{2}^{\times}\right)$
    and (b) $\mathrm{N}\left(\left(L_{1} \cap L_{2}\right)^{\times}\right)=\mathrm{N}\left(L_{1}^{\times}\right)
    \mathrm{N}\left(L_{2}^{\times}\right)$. In particular, every norm group of $K$
    has finite index in $K^{\times}$, and every subgroup of $K^{\times}$ that contains
    a norm group is a norm group.
  kind: corollary
  location: Section 27.2
  name: Corollary 27.5
- description: Let $L / K$ be any extension of local fields. If $\mathrm{N}\left(L^{\times}\right)$
    has finite index in $K^{\times}$ then it is open.
  kind: lemma
  location: Section 27.2
  name: Lemma 27.6
- description: Let $K$ be a local field and let $H$ be a finite index open subgroup
    of $K^{\times}$. There is a unique extension $L/K$ in $K^{\text{ab}}$ with $\mathrm{N}_{L/K}(L^{\times})=H$.
  kind: theorem
  location: Section 27.3
  name: Theorem 27.8 (Local Existence Theorem)
- description: 'Let $K$ be a local field. The local Artin homomorphism induces a canonical
    isomorphism $\widehat{\theta}_{K}: \widehat{K^{\times}} \xrightarrow{\sim} \operatorname{Gal}(K^{\mathrm{ab}}/K)$
    of profinite groups.'
  kind: theorem
  location: Section 27.3
  name: Theorem 27.9 (Main Theorem of Local Class Field Theory)
- description: 'Let $K$ be a local field and assume every finite index open subgroup
    of $K^{\times}$ is a norm group. There is at most one homomorphism $\theta: K^{\times}
    \rightarrow \operatorname{Gal}(K^{\mathrm{ab}}/K)$ of topological groups that
    has the properties given in Theorem 27.2.'
  kind: proposition
  location: Section 27.3
  name: Proposition 27.12
- description: 'Let $L/K$ be a finite separable extension of global fields. The idele
    norm $\mathrm{N}_{L/K}: \mathbb{I}_{L} \rightarrow \mathbb{I}_{K}$ is defined
    by $\mathrm{N}_{L/K}(b_{w})=(a_{v})$, where each $a_{v}:=\prod_{w \mid v} \mathrm{N}_{L_{w}/K_{v}}(b_{w})$
    is a product over places $w$ of $L$ that extend the place $v$ of $K$ and $\mathrm{N}_{L_{w}/K_{v}}:
    L_{w} \rightarrow K_{v}$ is the field norm of the corresponding finite separable
    extension of local fields $L_{w}/K_{v}$.'
  kind: definition
  location: Section 28.1
  name: Definition 28.1
- description: 'Let $K$ be a global field. The global Artin homomorphism is the continuous
    homomorphism $\theta_{K}: \mathbb{I}_{K} \rightarrow \varprojlim_{L} \operatorname{Gal}(L
    / K) \simeq \operatorname{Gal}\left(K^{\mathrm{ab}} / K\right)$ defined by the
    compatible system of homomorphisms $\theta_{L / K}: \mathbb{I}_{K} \rightarrow
    \operatorname{Gal}(L / K)$, where $L$ ranges over finite abelian extensions of
    $K$ in $K^{\mathrm{ab}}$.'
  kind: definition
  location: Section 28.2
  name: Definition 28.2
- description: Let $K$ be a global field. The global Artin homomorphism $\theta_{K}$
    is the unique continuous homomorphism $\mathbb{I}_{K} \rightarrow \operatorname{Gal}\left(K^{\mathrm{ab}}
    / K\right)$ with the property that for every finite abelian extension $L / K$
    in $K^{\mathrm{ab}}$ and every place $w$ of $L$ lying over a place $v$ of $K$
    the diagram $K_{v}^{\times} \xrightarrow{\theta_{L_{w} / K_{v}}} \operatorname{Gal}\left(L_{w}
    / K_{v}\right)$, $K_{v}^{\times} \xrightarrow{\iota_v} \mathbb{I}_{K}$, $\operatorname{Gal}(L_{w}/K_v)
    \xrightarrow{\varphi_w} \operatorname{Gal}(L/K)$, $\mathbb{I}_{K} \xrightarrow{\theta_{L/K}}
    \operatorname{Gal}(L/K)$ commutes, where the homomorphism $\theta_{L / K}$ is
    defined by $\theta_{L / K}(a):=\theta_{K}(a)_{|_{L}}$.
  kind: proposition
  location: Section 28.2
  name: Proposition 28.3
- description: 'Let $K$ be a global field. The kernel of the global Artin homomorphism
    $\theta_{K}$ contains $K^{\times}$, and we thus have a continuous homomorphism
    $\theta_{K}: C_{K} \rightarrow \operatorname{Gal}\left(K^{\mathrm{ab}} / K\right)$,
    with the property that for every finite abelian extension $L / K$ in $K^{\mathrm{ab}}$
    the homomorphism $\theta_{L / K}: C_{K} \rightarrow \operatorname{Gal}(L / K)$
    obtained by composing $\theta_{K}$ with the natural map $\operatorname{Gal}\left(K^{\mathrm{ab}}
    / K\right) \rightarrow \operatorname{Gal}(L / K)$ is surjective with kernel $\mathrm{N}_{L
    / K}\left(C_{L}\right)$, inducing an isomorphism $C_{K} / \mathrm{N}_{L / K}\left(C_{L}\right)
    \simeq \operatorname{Gal}(L / K)$.'
  kind: theorem
  location: Section 28.3
  name: Theorem 28.4 (Global Artin Reciprocity)
- description: Let $K$ be a global field. For every finite index open subgroup $H$
    of $C_{K}$ there is a unique finite abelian extension $L / K$ in $K^{\mathrm{ab}}$
    for which $\mathrm{N}_{L / K}\left(C_{L}\right)=H$.
  kind: theorem
  location: Section 28.3
  name: Theorem 28.6 (Global Existence Theorem)
- description: 'Let $K$ be a global field. The global Artin homomorphism $\theta_{K}$
    induces a canonical isomorphism $\widehat{\theta}_{K}: \widehat{C_{K}} \xrightarrow{\sim}
    \operatorname{Gal}\left(K^{\mathrm{ab}} / K\right)$ of profinite groups. We then
    have an inclusion reversing bijection between finite index open subgroups $H$
    of $C_{K}$ and finite abelian extensions $L / K$ in $K^{\mathrm{ab}}$, given by
    $H \mapsto\left(K^{\mathrm{ab}}\right)^{\theta_{K}(H)}$ and $L \mapsto \mathrm{N}_{L
    / K}\left(C_{L}\right)$, and corresponding isomorphisms $C_{K} / H \simeq \operatorname{Gal}(L
    / K)$, where $H=\mathrm{N}_{L / K}\left(C_{L}\right)$.'
  kind: theorem
  location: Section 28.3
  name: Theorem 28.7 (Main theorem of global class field theory)
- description: 'Let $K$ be a global field and let $L / K$ be any finite separable
    extension (not necessarily abelian). Then the following diagram commutes: $C_L
    \xrightarrow{\theta_L} \operatorname{Gal}(L^{\mathrm{ab}}/L)$ with $C_L \xrightarrow{\mathrm{N}_{L/K}}
    C_K$ and $\operatorname{Gal}(L^{\mathrm{ab}}/L) \to \operatorname{Gal}(K^{\mathrm{ab}}/K)$,
    $C_K \xrightarrow{\theta_K} \operatorname{Gal}(K^{\mathrm{ab}}/K)$.'
  kind: theorem
  location: Section 28.3
  name: Theorem 28.8 (Functoriality)
- description: Let $L / K$ be a finite Galois extension of number fields with Galois
    group $G:=\operatorname{Gal}(L / K)$. Let $C \subseteq G$ be stable under conjugation,
    and let $S$ be the set of primes $\mathfrak{p}$ of $K$ unramified in $L$ with
    $\operatorname{Frob}_{\mathfrak{p}} \subseteq C$. Then $d(S)=\# C / \# G$.
  kind: theorem
  location: Section 28.5
  name: Theorem 28.9 (Chebotarev density theorem)
- description: Let $\mathfrak{m}$ be a modulus for a number field $K$ and let $\mathrm{Cl}_{K}^{\mathfrak{m}}$
    be the corresponding ray class group. For every ray class $c \in \mathrm{Cl}_{K}^{\mathfrak{m}}$
    the Dirichlet density of the set of primes $\mathfrak{p}$ of $K$ that lie in $c$
    is $1 / \# \mathrm{Cl}_{K}^{\mathfrak{m}}$.
  kind: proposition
  location: Section 28.5
  name: Proposition 28.10
- description: Let $L / K$ be a finite abelian extension of number fields with Galois
    group $G$. For every $\sigma \in G$ the Dirichlet density of the set $S$ of primes
    $\mathfrak{p}$ of $K$ unramified in $L$ for which $\operatorname{Frob}_{\mathfrak{p}}=\{\sigma\}$
    is $1 / \# G$.
  kind: corollary
  location: Section 28.5
  name: Corollary 28.11
