- description: 'For $n \geq 0$, the standard $n$-simplex $\Delta^{n}$ is the convex
    hull of the standard basis $\{e_{0}, \ldots, e_{n}\}$ in $\mathbf{R}^{n+1}$: $$\Delta^{n}=\left\{\sum
    t_{i} e_{i}: \sum t_{i}=1, t_{i} \geq 0\right\} \subseteq \mathbf{R}^{n+1}$$'
  kind: definition
  location: Chapter 1, Section 1
  name: Definition 1.1
- description: 'Let $X$ be any topological space. A singular $n$-simplex in $X$ is
    a continuous map $\sigma: \Delta^{n} \rightarrow X$. Denote by $\operatorname{Sin}_{n}(X)$
    the set of all $n$-simplices in $X$.'
  kind: definition
  location: Chapter 1, Section 1
  name: Definition 1.2
- description: The abelian group $S_{n}(X)$ of singular $n$-chains in $X$ is the free
    abelian group generated by $n$-simplices $$S_{n}(X)=\mathbf{Z} \operatorname{Sin}_{n}(X)$$
    So an $n$-chain is a finite linear combination of simplices, $\sum_{i=1}^{k} a_{i}
    \sigma_{i}$, $a_{i} \in \mathbf{Z}$, $\sigma_{i} \in \operatorname{Sin}_{n}(X)$.
    If $n<0$, $\operatorname{Sin}_{n}(X)$ is declared to be empty, so $S_{n}(X)=0$.
  kind: definition
  location: Chapter 1, Section 1
  name: Definition 1.3
- description: 'An $n$-cycle in $X$ is an $n$-chain $c$ with $dc=0$. Notation: $$Z_{n}(X)=\operatorname{ker}\left(d:
    S_{n}(X) \rightarrow S_{n-1}(X)\right)$$'
  kind: definition
  location: Chapter 1, Section 1
  name: Definition 1.4
- description: Any boundary is a cycle; that is, $d^{2}=0$.
  kind: theorem
  location: Chapter 1, Section 1
  name: Theorem 1.5
- description: 'A graded abelian group is a sequence of abelian groups, indexed by
    the integers. A chain complex is a graded abelian group $\{A_{n}\}$ together with
    homomorphisms $d: A_{n} \rightarrow A_{n-1}$ with the property that $d^{2}=0$.'
  kind: definition
  location: Chapter 1, Section 1
  name: Definition 1.6
- description: 'The $n$th singular homology group of $X$ is: $$H_{n}(X)=\frac{Z_{n}(X)}{B_{n}(X)}=\frac{\operatorname{ker}\left(d:
    S_{n}(X) \rightarrow S_{n-1}(X)\right)}{\operatorname{im}\left(d: S_{n+1}(X) \rightarrow
    S_{n}(X)\right)}$$'
  kind: definition
  location: Chapter 1, Section 1
  name: Definition 1.7
- description: 'A category $\mathcal{C}$ consists of the following data: a class $\operatorname{ob}(\mathcal{C})$
    of objects; for every pair of objects $X$ and $Y$, a set of morphisms $\mathcal{C}(X,
    Y)$; for every object $X$ an identity morphism $1_{X} \in \mathcal{C}(X, X)$;
    and for every triple of objects $X, Y, Z$, a composition map $\mathcal{C}(X, Y)
    \times \mathcal{C}(Y, Z) \rightarrow \mathcal{C}(X, Z)$, written $(f, g) \mapsto
    g \circ f$. These data are required to satisfy the following: $1_{Y} \circ f=f$,
    and $f \circ 1_{X}=f$; composition is associative: $(h \circ g) \circ f=h \circ(g
    \circ f)$.'
  kind: definition
  location: Chapter 1, Section 3
  name: Definition 3.1
- description: 'If $X, Y \in \mathcal{C}$, then $f: X \rightarrow Y$ is an isomorphism
    if there exists $g: Y \rightarrow X$ with $f \circ g=1_{Y}$ and $g \circ f=1_{X}$.
    We may write $f: X \xrightarrow{\cong} Y$ to indicate that $f$ is an isomorphism.'
  kind: definition
  location: Chapter 1, Section 3
  name: Definition 3.2
- description: 'Let $\mathcal{C}, \mathcal{D}$ be categories. A functor $F: \mathcal{C}
    \rightarrow \mathcal{D}$ consists of the data of an assignment $F: \operatorname{ob}(\mathcal{C})
    \rightarrow \operatorname{ob}(\mathcal{D})$, and for all $X, Y \in \operatorname{ob}(\mathcal{C})$,
    a function $F: \mathcal{C}(X, Y) \rightarrow \mathcal{D}(F(X), F(Y))$. These data
    are required to satisfy: for all $X \in \operatorname{ob}(\mathcal{C})$, $F(1_{X})=1_{F(X)}
    \in \mathcal{D}(F(X), F(X))$, and for all composable pairs of morphisms $f, g$
    in $\mathcal{C}$, $F(g \circ f)=F(g) \circ F(f)$.'
  kind: definition
  location: Chapter 1, Section 3
  name: Definition 3.4
- description: 'Let $F, G: \mathcal{C} \rightarrow \mathcal{D}$ be two functors. A
    natural transformation or natural map $\theta: F \rightarrow G$ consists of maps
    $\theta_{X}: F(X) \rightarrow G(X)$ for all $X \in \operatorname{ob}(\mathcal{C})$
    such that for all $f: X \rightarrow Y$ the following diagram commutes: $G(f) \circ
    \theta_X = \theta_Y \circ F(f)$.'
  kind: definition
  location: Chapter 1, Section 3
  name: Definition 3.5
- description: 'Let $\mathcal{C}$ be any category. A simplicial object in $\mathcal{C}$
    is a functor $K: \Delta^{op} \rightarrow \mathcal{C}$. Simplicial objects in $\mathcal{C}$
    form a category with natural transformations as morphisms. Similarly, a semi-simplicial
    object in $\mathcal{C}$ is a functor $\boldsymbol{\Delta}_{\text{inj}}^{\text{op}}
    \rightarrow \mathcal{C}$.'
  kind: definition
  location: Chapter 1, Section 4
  name: Definition 4.2
- description: 'A morphism $f: X \rightarrow Y$ in a category $\mathcal{C}$ is a split
    epimorphism ("split epi" for short) if there exists $g: Y \rightarrow X$ (called
    a section or a splitting) such that the composite $Y \xrightarrow{g} X \xrightarrow{f}
    Y$ is the identity.'
  kind: definition
  location: Chapter 1, Section 4
  name: Definition 4.3
- description: 'A map $g: Y \rightarrow X$ is a split monomorphism ("split mono" for
    short) if there is $f: X \rightarrow Y$ such that $f \circ g=1_{Y}$.'
  kind: definition
  location: Chapter 1, Section 4
  name: Definition 4.5
- description: A map is an isomorphism if and only if it is both a split epimorphism
    and a split monomorphism.
  kind: lemma
  location: Chapter 1, Section 4
  name: Lemma 4.7
- description: Any functor sends split epis to split epis and split monos to split
    monos.
  kind: lemma
  location: Chapter 1, Section 4
  name: Lemma 4.8
- description: 'Let $f_{0}, f_{1}: X \rightarrow Y$ be two maps. A homotopy from $f_{0}$
    to $f_{1}$ is a map $h: X \times I \rightarrow Y$ (continuous, of course) such
    that $h(x, 0)=f_{0}(x)$ and $h(x, 1)=f_{1}(x)$. We say that $f_{0}$ and $f_{1}$
    are homotopic, and that $h$ is a homotopy between them. This relation is denoted
    by $f_{0} \simeq f_{1}$.'
  kind: definition
  location: Chapter 1, Section 5
  name: Definition 5.1
- description: 'If $f_{0} \simeq f_{1}$, then $H_{*}(f_{0})=H_{*}(f_{1})$: homology
    cannot distinguish between homotopic maps.'
  kind: theorem
  location: Chapter 1, Section 5
  name: Theorem 5.2 (Homotopy invariance of homology)
- description: The homotopy category (of topological spaces) $\mathrm{Ho}(\mathbf{Top})$
    has the same objects as Top, but $\operatorname{Ho}(\operatorname{Top})(X, Y)=[X,
    Y]=\operatorname{Top}(X, Y) / \simeq$.
  kind: definition
  location: Chapter 1, Section 5
  name: Definition 5.3
- description: 'A map $f: X \rightarrow Y$ is a homotopy equivalence if $[f] \in [X,
    Y]$ is an isomorphism in $\operatorname{Ho}(\operatorname{Top})$. In other words,
    there is a map $g: Y \rightarrow X$ such that $fg \simeq 1_{Y}$ and $gf \simeq
    1_{X}$.'
  kind: definition
  location: Chapter 1, Section 5
  name: Definition 5.4
- description: Homotopy equivalences induce isomorphisms in homology.
  kind: corollary
  location: Chapter 1, Section 5
  name: Corollary 5.5
- description: A space $X$ is contractible if the map $X \rightarrow *$ is a homotopy
    equivalence.
  kind: definition
  location: Chapter 1, Section 5
  name: Definition 5.6
- description: 'Let $X$ be a contractible space. The augmentation $\epsilon: H_{*}(X)
    \rightarrow \mathbf{Z}$ is an isomorphism.'
  kind: corollary
  location: Chapter 1, Section 5
  name: Corollary 5.7
- description: 'An inclusion $A \hookrightarrow X$ is a deformation retract provided
    that there is a map $h: X \times I \rightarrow X$ such that $h(x, 0)=x$ and $h(x,
    1) \in A$ for all $x \in X$ and $h(a, t)=a$ for all $a \in A$ and $t \in I$.'
  kind: definition
  location: Chapter 1, Section 5
  name: Definition 5.8
- description: 'Let $C_{*}, D_{*}$ be chain complexes, and $f_{0}, f_{1}: C_{*} \rightarrow
    D_{*}$ be chain maps. A chain homotopy $h: f_{0} \simeq f_{1}$ is a collection
    of homomorphisms $h: C_{n} \rightarrow D_{n+1}$ such that $dh+hd=f_{1}-f_{0}$.'
  kind: definition
  location: Chapter 1, Section 5
  name: Definition 5.9
- description: 'If $f_{0}, f_{1}: C_{*} \rightarrow D_{*}$ are chain homotopic, then
    $f_{0*}=f_{1*}: H_{*}(C) \rightarrow H_{*}(D)$.'
  kind: lemma
  location: Chapter 1, Section 5
  name: Lemma 5.10
- description: 'Let $f_{0}, f_{1}: X \rightarrow Y$ be homotopic. Then $f_{0*}, f_{1*}:
    S_{*}(X) \rightarrow S_{*}(Y)$ are chain homotopic.'
  kind: proposition
  location: Chapter 1, Section 5
  name: Proposition 5.11
- description: 'A subset $X \subseteq \mathbf{R}^{n}$ is star-shaped with respect
    to $b \in X$ if for every $x \in X$ the interval $\{tb+(1-t)x: t \in [0,1]\}$
    lies in $X$.'
  kind: definition
  location: Chapter 1, Section 5
  name: Definition 5.12
- description: $S_{*}(X) \rightarrow \mathbf{Z}$ is a chain homotopy equivalence,
    where $X$ is a star-shaped region.
  kind: proposition
  location: Chapter 1, Section 5
  name: Proposition 5.13
- description: 'A homotopy $h: f_{0} \simeq f_{1}: X \rightarrow Y$ determines a natural
    chain homotopy $f_{0*} \simeq f_{1*}: S_{*}(X) \rightarrow S_{*}(Y)$.'
  kind: theorem
  location: Chapter 1, Section 6
  name: Theorem 6.1
- description: 'There exists a map $\times: S_{p}(X) \times S_{q}(Y) \rightarrow S_{p+q}(X
    \times Y)$, the cross product, that is: Natural, in the sense that if $f: X \rightarrow
    X''$ and $g: Y \rightarrow Y''$, and $a \in S_{p}(X)$ and $b \in S_{q}(Y)$ so
    that $a \times b \in S_{p+q}(X \times Y)$, then $f_{*}(a) \times g_{*}(b)=(f \times
    g)_{*}(a \times b)$. Bilinear, in the sense that $(a+a'') \times b=(a \times b)+(a''
    \times b)$, and $a \times (b+b'')=a \times b+a \times b''$. The Leibniz rule is
    satisfied, i.e., $d(a \times b)=(da) \times b+(-1)^{p} a \times db$. Normalized,
    in the following sense: Let $x \in X$ and $y \in Y$. Write $j_{x}: Y \rightarrow
    X \times Y$ for $y \mapsto (x,y)$, and write $i_{y}: X \rightarrow X \times Y$
    for $x \mapsto (x,y)$. If $b \in S_{q}(Y)$, then $c_{x}^{0} \times b=(j_{x})_{*}
    b \in S_{q}(X \times Y)$, and if $a \in S_{p}(X)$, then $a \times c_{y}^{0}=(i_{y})_{*}
    a \in S_{p}(X \times Y)$.'
  kind: theorem
  location: Chapter 1, Section 6
  name: Theorem 6.2
- description: 'Given three chain complexes $A_{*}, B_{*}$, and $C_{*}$, and maps
    $\times : A_{p} \times B_{q} \rightarrow C_{p+q}$ that satisfy bilinearity and
    the Leibniz formula, these data determine a bilinear map $\times: H_{p}(A) \times
    H_{q}(B) \rightarrow H_{p+q}(C)$.'
  kind: lemma
  location: Section 7, Homology cross product
  name: Lemma 7.1
- description: 'There is a map $\times: H_{p}(X) \times H_{q}(Y) \rightarrow H_{p+q}(X
    \times Y)$ that is natural, bilinear, and normalized.'
  kind: theorem
  location: Section 7, Homology cross product
  name: Theorem 7.2
- description: A sequence of abelian groups is a diagram of abelian groups of the
    form $\cdots \rightarrow C_{n+1} \xrightarrow{f_{n}} C_{n} \xrightarrow{f_{n-1}}
    C_{n-1} \rightarrow \cdots$, in which all composites are zero; that is, $\operatorname{im}
    f_{n} \subseteq \operatorname{ker} f_{n-1}$ for all $n$. It is exact at $C_{n}$
    provided that this inequality is an equality.
  kind: definition
  location: Section 8, Relative homology
  name: Definition 8.1
- description: A short exact sequence is an exact sequence of the form $0 \rightarrow
    A \xrightarrow{i} B \xrightarrow{p} C \rightarrow 0$.
  kind: definition
  location: Section 8, Relative homology
  name: Definition 8.3
- description: Let $A_{*}$ be a subcomplex of the chain complex $B_{*}$. There is
    a unique structure of chain complex on the quotient graded abelian group $C_{*}$
    with entries $C_{n}=B_{n}/A_{n}$ such that $B_{*} \rightarrow C_{*}$ is a chain
    map.
  kind: lemma
  location: Section 8, Relative homology
  name: Lemma 8.4
- description: The relative singular chain complex of the pair $(X, A)$ is $S_{*}(X,
    A) = S_{*}(X)/S_{*}(A)$. This is a functor from pairs of spaces to chain complexes.
  kind: definition
  location: Section 8, Relative homology
  name: Definition 8.5
- description: 'The relative singular homology of the pair $(X, A)$ is the homology
    of the relative singular chain complex: $H_{n}(X, A) = H_{n}(S_{*}(X, A))$.'
  kind: definition
  location: Section 8, Relative homology
  name: Definition 8.6
- description: 'Let $0 \rightarrow A_{*} \rightarrow B_{*} \rightarrow C_{*} \rightarrow
    0$ be a short exact sequence of chain complexes. Then there is a natural homomorphism
    $\partial: H_{n}(C) \rightarrow H_{n-1}(A)$ such that the sequence $\cdots \rightarrow
    H_{n}(A) \rightarrow H_{n}(B) \rightarrow H_{n}(C) \xrightarrow{\partial} H_{n-1}(A)
    \rightarrow \cdots$ is exact.'
  kind: theorem
  location: Section 9, The homology long exact sequence
  name: Theorem 9.1 (The homology long exact sequence)
- description: 'In a map of exact sequences $A_4 \rightarrow A_3 \rightarrow A_2 \rightarrow
    A_1 \rightarrow A_0$ and $B_4 \rightarrow B_3 \rightarrow B_2 \rightarrow B_1
    \rightarrow B_0$ with vertical maps $f_i: A_i \rightarrow B_i$: (1) If $f_0$ is
    injective and $f_1$ and $f_3$ are surjective, then $f_2$ is surjective. (2) If
    $f_4$ is surjective and $f_3$ and $f_1$ are injective, then $f_2$ is injective.'
  kind: proposition
  location: Section 9, The homology long exact sequence
  name: Proposition 9.4 (Five lemma)
- description: Let $0 \rightarrow A_{*} \xrightarrow{f} A'_{*} \rightarrow 0$, $0
    \rightarrow B_{*} \xrightarrow{g} B'_{*} \rightarrow 0$, $0 \rightarrow C_{*}
    \xrightarrow{h} C'_{*} \rightarrow 0$ be a map of short exact sequences of chain
    complexes. If two of the three maps induced in homology by $f, g$, and $h$ are
    isomorphisms, then so is the third.
  kind: corollary
  location: Section 9, The homology long exact sequence
  name: Corollary 9.5
- description: Let $(A, X) \rightarrow (B, Y)$ be a map of pairs, and assume that
    two of $A \rightarrow B$, $X \rightarrow Y$, and $(X, A) \rightarrow (Y, B)$ induce
    isomorphisms in homology. Then the third one does as well.
  kind: proposition
  location: Section 9, The homology long exact sequence
  name: Proposition 9.6
- description: A triple $(X, A, U)$ where $U \subseteq A \subseteq X$, is excisive
    if $\bar{U} \subseteq \operatorname{Int}(A)$. The inclusion $(X-U, A-U) \subseteq
    (X, A)$ is then called an excision.
  kind: definition
  location: Section 10, Excision and applications
  name: Definition 10.1
- description: An excision induces an isomorphism in homology, $H_{*}(X-U, A-U) \xrightarrow{\cong}
    H_{*}(X, A)$.
  kind: theorem
  location: Section 10, Excision and applications
  name: Theorem 10.2
- description: Assume that there is a subspace $B$ of $X$ such that (1) $\bar{A} \subseteq
    \operatorname{Int} B$ and (2) $A \rightarrow B$ is a deformation retract. Then
    $H_{*}(X, A) \rightarrow H_{*}(X/A, *)$ is an isomorphism.
  kind: corollary
  location: Section 10, Excision and applications
  name: Corollary 10.3
- description: 'Let $n>0$ and let $* \in S^{n-1}$ be any point. Then: $H_{q}(S^{n})
    = \begin{cases} \mathbf{Z}=\langle[\partial \iota_{n+1}]\rangle & \text{if } q=n>0
    \\ \mathbf{Z}=\langle[c_{*}^{0}]\rangle & \text{if } q=0, n>0 \\ \mathbf{Z} \oplus
    \mathbf{Z}=\langle[c_{*}^{0}],[\partial \iota_{1}]\rangle & \text{if } q=n=0 \\
    0 & \text{otherwise} \end{cases}$ and $H_{q}(D^{n}, S^{n-1}) = \begin{cases} \mathbf{Z}=\langle[\iota_{n}]\rangle
    & \text{if } q=n \\ 0 & \text{otherwise} \end{cases}$'
  kind: proposition
  location: Section 10, Excision and applications
  name: Proposition 10.4
- description: If $m \neq n$, then $S^{m}$ and $S^{n}$ are not homotopy equivalent.
  kind: corollary
  location: Section 10, Excision and applications
  name: Corollary 10.5
- description: If $m \neq n$, then $\mathbf{R}^{m}$ and $\mathbf{R}^{n}$ are not homeomorphic.
  kind: corollary
  location: Section 10, Excision and applications
  name: Corollary 10.6
- description: 'If $f: D^{n} \rightarrow D^{n}$ is continuous, then there is some
    point $x \in D^{n}$ such that $f(x) = x$.'
  kind: theorem
  location: Section 10, Excision and applications
  name: Theorem 10.7 (Brouwer fixed-point theorem)
- description: 'Let $n \geq 1$. The degree map provides us with a surjective monoid
    homomorphism $\operatorname{deg}: [S^{n}, S^{n}] \rightarrow \mathbf{Z}_{\times}$.'
  kind: theorem
  location: Section 10, Excision and applications
  name: Theorem 10.8
- description: 'A homology theory (on Top) is: a sequence of functors $h_{n}: \mathbf{Top}_{2}
    \rightarrow \mathbf{Ab}$ for all $n \in \mathbf{Z}$ and a sequence of natural
    transformations $\partial: h_{n}(X, A) \rightarrow h_{n-1}(A, \varnothing)$ such
    that: (1) If $f_{0}, f_{1}:(X, A) \rightarrow (Y, B)$ are homotopic, then $f_{0*}=f_{1*}:
    h_{n}(X, A) \rightarrow h_{n}(Y, B)$. (2) Excisions induce isomorphisms. (3) For
    any pair $(X, A)$, the sequence $\cdots \rightarrow h_{q+1}(X, A) \xrightarrow{\partial}
    h_{q}(A) \rightarrow h_{q}(X) \rightarrow h_{q}(X, A) \xrightarrow{\partial} \cdots$
    is exact. (4) The dimension axiom: The group $h_{n}(*)$ is nonzero only for $n=0$.
    Additionally, the Milnor axiom: the map $\alpha: \bigoplus_{i \in I} h_{n}(X_{i})
    \rightarrow h_{n}(\coprod_{i \in I} X_{i})$ induced by the inclusion maps is an
    isomorphism for all $n$.'
  kind: definition
  location: Section 11, The Eilenberg Steenrod axioms and the locality principle
  name: Definition 11.1
- description: Let $X$ be a topological space. A family $\mathcal{A}$ of subsets of
    $X$ is a cover if $X$ is the union of the interiors of elements of $\mathcal{A}$.
  kind: definition
  location: Section 11, The Eilenberg Steenrod axioms and the locality principle
  name: Definition 11.2
- description: Let $\mathcal{A}$ be a cover of $X$. An $n$-simplex $\sigma$ is $\mathcal{A}$-small
    if there is $A \in \mathcal{A}$ such that the image of $\sigma$ is entirely in
    $A$.
  kind: definition
  location: Section 11, The Eilenberg Steenrod axioms and the locality principle
  name: Definition 11.3
- description: The inclusion $S_{*}^{\mathcal{A}}(X) \subseteq S_{*}(X)$ induces an
    isomorphism in homology, $H_{*}^{\mathcal{A}}(X) \xrightarrow{\cong} H_{*}(X)$.
  kind: theorem
  location: Section 11, The Eilenberg Steenrod axioms and the locality principle
  name: Theorem 11.4 (The locality principle)
- description: 'Assume that $\mathcal{A} = \{A, B\}$ is a cover of $X$. There are
    natural maps $\partial: H_{n}(X) \rightarrow H_{n-1}(A \cap B)$ such that the
    sequence $\cdots \rightarrow H_{n}(A \cap B) \xrightarrow{\alpha} H_{n}(A) \oplus
    H_{n}(B) \xrightarrow{\beta} H_{n}(X) \xrightarrow{\partial} H_{n-1}(A \cap B)
    \rightarrow \cdots$ is exact, where $\alpha = \begin{bmatrix} j_{1*} \\ -j_{2*}
    \end{bmatrix}$ and $\beta = \begin{bmatrix} i_{1*} & i_{2*} \end{bmatrix}$.'
  kind: theorem
  location: Section 11, The Eilenberg Steenrod axioms and the locality principle
  name: Theorem 11.5 (Mayer-Vietoris)
- description: The sequence $\cdots \longrightarrow C_{n+1}^{\prime} \xrightarrow{\left[\begin{array}{c}
    h \\ -k \end{array}\right]} C_{n+1} \oplus A_{n}^{\prime} \xrightarrow{\left[\begin{array}{ll}
    k & f \end{array}\right]} A_{n} \xrightarrow{\partial} C_{n}^{\prime} \longrightarrow
    \cdots$ is exact.
  kind: lemma
  location: Section 11
  name: Lemma 11.6
- description: $\$$ is a natural chain map $S_{*}(X) \rightarrow S_{*}(X)$ that is
    naturally chain-homotopic to the identity.
  kind: proposition
  location: Section 12
  name: Proposition 12.1
- description: Let $\sigma$ be an affine $n$-simplex, and $\tau$ a simplex in $\$\sigma$.
    Then $\operatorname{diam}(\tau) \leq \frac{n}{n+1} \operatorname{diam}(\sigma)$.
  kind: lemma
  location: Section 13
  name: Lemma 13.1
- description: For any singular chain $c$, some iterate of the subdivision operator
    sends $c$ to an $\mathcal{A}$-small chain.
  kind: lemma
  location: Section 13
  name: Lemma 13.2
- description: Let $M$ be a compact metric space, and let $\mathcal{U}$ be an open
    cover. Then there is $\epsilon>0$ such that for all $x \in M$, $B_{\epsilon}(x)
    \subseteq U$ for some $U \in \mathcal{U}$.
  kind: lemma
  location: Section 13
  name: Lemma 13.3 (Lebesgue covering lemma)
- description: 'For any $k \geq 1$, $\$^{k} \simeq 1: S_{*}(X) \rightarrow S_{*}(X)$.'
  kind: lemma
  location: Section 13
  name: Lemma 13.4
- description: Let $\mathcal{A}$ be a cover of a space $X$. The inclusion $S_{*}^{\mathcal{A}}(X)
    \subseteq S_{*}(X)$ is a quasi-isomorphism; that is, $H_{*}^{\mathcal{A}}(X) \rightarrow
    H_{*}(X)$ is an isomorphism.
  kind: theorem
  location: Section 13
  name: Theorem 13.5 (The locality principle)
- description: A CW-complex is a space $X$ equipped with a sequence of subspaces $\varnothing=\operatorname{Sk}_{-1}
    X \subseteq \operatorname{Sk}_{0} X \subseteq \operatorname{Sk}_{1} X \subseteq
    \cdots \subseteq X$ such that $X$ is the union of the $\mathrm{Sk}_{n} X$'s, and
    for all $n$, there is a pushout diagram in which $\mathrm{Sk}_{n} X$ is obtained
    from $\mathrm{Sk}_{n-1} X$ by attaching $n$-cells. The subspace $\mathrm{Sk}_{n}
    X$ is the $n$-skeleton of $X$. The maps $f_{n}$ are the attaching maps and the
    maps $g_{n}$ are characteristic maps.
  kind: definition
  location: Chapter 2, Section 14
  name: Definition 14.5
- description: A CW-complex is finite-dimensional if $\mathrm{Sk}_{n} X=X$ for some
    $n$; of finite type if each $A_{n}$ is finite, i.e., finitely many cells in each
    dimension; and finite if it's finite-dimensional and of finite type.
  kind: definition
  location: Chapter 2, Section 14
  name: Definition 14.7
- description: Any CW-complex is Hausdorff, and it's compact if and only if it's finite.
    Any compact smooth manifold admits a CW structure.
  kind: theorem
  location: Chapter 2, Section 14
  name: Theorem 14.8
- description: 'Let $X$ be a CW-complex with a cell structure $\{g_{\alpha}: D_{\alpha}^{n}
    \rightarrow X_{n}: \alpha \in A_{n}, n \geq 0\}$. A subcomplex is a subspace $Y
    \subseteq X$ such that for all $n$, there is a subset $B_{n}$ of $A_{n}$ such
    that $Y_{n}=Y \cap X_{n}$ provides $Y$ with a CW-structure with characteristic
    maps $\{g_{\beta}: \beta \in B_{n}, n \geq 0\}$.'
  kind: definition
  location: Chapter 2, Section 15
  name: Definition 15.1
- description: Let $X$ be a CW-complex with a chosen cell structure. Any compact subspace
    of $X$ lies in some finite subcomplex.
  kind: proposition
  location: Chapter 2, Section 15
  name: Proposition 15.3
- description: $S^{\infty}$ is contractible.
  kind: proposition
  location: Chapter 2, Section 15
  name: Proposition 15.5
- description: The group of cellular $n$-chains in a CW complex $X$ is $C_{k}(X):=H_{k}(X_{k},
    X_{k-1})=\mathbf{Z}[A_{k}]$.
  kind: definition
  location: Chapter 2, Section 16
  name: Definition 16.1
- description: Let $k, q \geq 0$. Then $H_{q}(X_{k})=0$ for $k<q$ and $H_{q}(X_{k})
    \xrightarrow{\cong} H_{q}(X)$ for $k>q$. In particular, $H_{q}(X)=0$ if $q$ exceeds
    the dimension of $X$.
  kind: proposition
  location: Chapter 2, Section 16
  name: Proposition 16.2
- description: For a CW complex $X$, there is an isomorphism $H_{*}(C_{*}(X)) \cong
    H_{*}(X)$ natural with respect to filtration-preserving maps between CW complexes.
  kind: theorem
  location: Chapter 2, Section 16
  name: Theorem 16.3
- description: Suppose that the CW complex $X$ has only even cells - that is, $X_{2k}
    \hookrightarrow X_{2k+1}$ is an isomorphism for all $k$. Then $H_{*}(X) \cong
    C_{*}(X)$. That is, $H_{n}(X)=0$ for $n$ odd, is free abelian for all $n$, and
    the rank of $H_{n}(X)$ for $n$ even is the number of $n$-cells.
  kind: corollary
  location: Chapter 2, Section 16
  name: Corollary 16.4
- description: The homology of real projective space is as follows. $H_{k}(\mathbf{RP}^{n})
    = \begin{cases} \mathbf{Z} & k=0 \\ \mathbf{Z} & k=n \text{ odd} \\ \mathbf{Z}/2\mathbf{Z}
    & k \text{ odd}, 0<k<n \\ 0 & \text{otherwise} \end{cases}$
  kind: proposition
  location: Section 17
  name: Proposition 17.1
- description: Let $X$ be a finite CW-complex with $a_{n}$ $n$-cells. Then $\chi(X)=\sum_{k=0}^{\infty}(-1)^{k}
    a_{k}$ depends only on the homotopy type of $X$; it is independent of the choice
    of CW structure.
  kind: theorem
  location: Section 18
  name: Theorem 18.1
- description: Let $0 \rightarrow A \rightarrow B \rightarrow C \rightarrow 0$ be
    a short exact sequence of finitely generated abelian groups. Then $\operatorname{rank}
    A - \operatorname{rank} B + \operatorname{rank} C = 0$.
  kind: lemma
  location: Section 18
  name: Lemma 18.2
- description: Let $X$ be a finite CW complex. Then $\chi(X)=\sum_{k}(-1)^{k} \operatorname{rank}
    H_{k}(X)$.
  kind: theorem
  location: Section 18
  name: Theorem 18.3
- description: Let $X$ be a simply connected CW-complex of finite type. Then there
    exists a CW complex $Y$ with $r(k)+t(k)+t(k-1)$ $k$-cells, for all $k$, and a
    homotopy equivalence $Y \rightarrow X$.
  kind: theorem
  location: Section 18
  name: Theorem 18.4 (Wall, 10)
- description: For any graded abelian group $A_{*}$ with $A_{k}=0$ for $k \leq 0$,
    there exists a CW complex $X$ with $\widetilde{H}_{*}(X)=A_{*}$.
  kind: proposition
  location: Section 18
  name: Proposition 18.5
- description: 'Given three $R$-modules, $M, N, P$, a bilinear map (or, to be explicit,
    $R$-bilinear map) is a function $\beta: M \times N \rightarrow P$ such that $\beta(x+x'',
    y)=\beta(x, y)+\beta(x'', y)$, $\beta(x, y+y'')=\beta(x, y)+\beta(x, y'')$ and
    $\beta(rx, y)=r\beta(x, y)$, $\beta(x, ry)=r\beta(x, y)$, for $x, x'' \in M, y,
    y'' \in N$, and $r \in R$.'
  kind: definition
  location: Section 20
  name: Definition 20.1
- description: 'Let $M, N$ be $R$-modules. A tensor product of $M$ and $N$ is an $R$-module
    $P$ and a bilinear map $\beta_{0}: M \times N \rightarrow P$ such that for every
    $R$-bilinear map $\beta: M \times N \rightarrow Q$ there is a unique factorization
    through an $R$-module homomorphism $f: P \rightarrow Q$ with $\beta = f \circ
    \beta_0$.'
  kind: definition
  location: Section 20
  name: Definition 20.3
- description: 'The universal $R$-bilinear map out of $M \times N$ is constructed
    as follows. Let $S$ be the sub-$R$-module of the free $R$-module $R\langle M \times
    N\rangle$ generated by: (1) $[(x+x'', y)] - [(x,y)] - [(x'',y)]$, (2) $[(x, y+y'')]
    - [(x,y)] - [(x,y'')]$, (3) $[(rx, y)] - r[(x,y)]$, (4) $[(x, ry)] - r[(x,y)]$
    for $x, x'' \in M$, $y, y'' \in N$, $r \in R$. Then the composite $M \times N
    \rightarrow R\langle M \times N\rangle / S$ is the universal $R$-bilinear map,
    and $M \otimes_R N = R\langle M \times N\rangle / S$.'
  kind: construction
  location: Section 20
  name: Construction 20.4
- description: For any abelian group $M$, $(X, A) \mapsto H_{*}(X, A; M)$ provides
    a homology theory satisfying the Eilenberg-Steenrod axioms with $H_{0}(*; M)=M$.
  kind: proposition
  location: Section 20
  name: Proposition 20.11
- description: The functor $N \mapsto M \otimes_{R} N$ preserves cokernels; it is
    right exact.
  kind: proposition
  location: Section 21
  name: Proposition 21.1
- description: If $M_{i}' \rightarrow M_{i} \rightarrow M_{i}''$ is exact for all
    $i \in I$, then so is $\bigoplus M_{i}' \rightarrow \bigoplus M_{i} \rightarrow
    \bigoplus M_{i}''$.
  kind: lemma
  location: Section 21
  name: Lemma 21.2
- description: 'Let $M$ and $N$ be $R$-modules; let $0 \leftarrow M \leftarrow E_{0}
    \leftarrow E_{1} \leftarrow \cdots$ be a sequence in which each $E_{n}$ is free;
    let $0 \leftarrow N \leftarrow F_{0} \leftarrow F_{1} \leftarrow \cdots$ be an
    exact sequence; and let $f: M \rightarrow N$ be a homomorphism. Then we can lift
    $f$ to a chain map $f_{*}: E_{*} \rightarrow F_{*}$, uniquely up to chain homotopy.'
  kind: theorem
  location: Section 22
  name: Theorem 22.1 (Fundamental Theorem of Homological Algebra)
- description: An $R$-module $P$ is projective if any map out of $P$ factors through
    any surjection.
  kind: definition
  location: Section 22
  name: Definition 22.2
- description: The natural map $\operatorname{Hom}(L, \operatorname{Hom}(M, N)) \rightarrow
    \operatorname{Hom}(L \otimes M, N)$ is an isomorphism.
  kind: lemma
  location: Section 23
  name: Lemma 23.1
- description: A poset $(\mathcal{I}, \leq)$ is directed if for every $i, j \in \mathcal{I}$
    there exists $k \in \mathcal{I}$ such that $i \leq k$ and $j \leq k$.
  kind: definition
  location: Section 23
  name: Definition 23.2
- description: 'Let $\mathcal{I}$ be a directed set. An $\mathcal{I}$-directed system
    in a category $\mathcal{C}$ is a functor $\mathcal{I} \rightarrow \mathcal{C}$.
    This means that for every $i \in \mathcal{I}$ we are given an object $X_{i} \in
    \mathcal{C}$, and for every $i \leq j$ we are given a map $f_{i,j}: X_{i} \rightarrow
    X_{j}$, in such a way that $f_{i,i}=1_{X_{i}}$ and if $i \leq j \leq k$ then $f_{i,k}=f_{j,k}
    \circ f_{i,j}: X_{i} \rightarrow X_{k}$.'
  kind: definition
  location: Section 23
  name: Definition 23.4
- description: 'Let $X: \mathcal{I} \rightarrow \mathcal{C}$ be a directed system.
    A direct limit is an object $L$ and a map $X \rightarrow c_{L}$ that is initial
    among maps to constant systems. This means that given any other map to a constant
    system, say $X \rightarrow c_{A}$, there is a unique map $f: L \rightarrow A$
    such that the corresponding diagram commutes.'
  kind: definition
  location: Section 23
  name: Definition 23.8
- description: 'Let $\mathcal{I}$ be a direct set, and let $M: \mathcal{I} \rightarrow
    \mathbf{Mod}_{R}$ be a $\mathcal{I}$-directed system of $R$-modules. There is
    a natural isomorphism $(\varinjlim_{I} M_{i}) \otimes_{R} N \cong \varinjlim_{I}
    (M_{i} \otimes_{R} N)$.'
  kind: proposition
  location: Section 23
  name: Proposition 23.10
- description: 'Let $X: \mathcal{I} \rightarrow \mathbf{Ab}$ (or $\mathbf{Mod}_{R}$).
    A map $f: X \rightarrow c_{L}$ (given by $f_{i}: X_{i} \rightarrow L$ for $i \in
    \mathcal{I}$) is the direct limit if and only if: 1. For every $x \in L$, there
    exists an $i$ and an $x_{i} \in X_{i}$ such that $f_{i}(x_{i})=x$. 2. Let $x_{i}
    \in X_{i}$ be such that $f_{i}(x_{i})=0$ in $L$. Then there exists some $j \geq
    i$ such that $f_{ij}(x_{i})=0$ in $X_{j}$.'
  kind: lemma
  location: Section 23
  name: Lemma 23.11
- description: 'The direct limit functor $\varinjlim_{I}: \operatorname{Fun}(\mathcal{I},
    \mathbf{Ab}) \rightarrow \mathbf{Ab}$ is exact. In other words, if $X \xrightarrow{p}
    Y \xrightarrow{q} Z$ is an exact sequence of $\mathcal{I}$-directed systems (meaning
    that at every degree we get an exact sequence of abelian groups), then $\varinjlim
    X \rightarrow \varinjlim Y \rightarrow \varinjlim Z$ is exact.'
  kind: proposition
  location: Section 23
  name: Proposition 23.12
- description: Let $i \mapsto C(i)$ be a directed system of chain complexes. Then
    there is a natural isomorphism $\varinjlim_{i \in \mathcal{I}} H_{*}(C(i)) \rightarrow
    H_{*}(\varinjlim_{i \in \mathcal{I}} C(i))$.
  kind: corollary
  location: Section 23
  name: Corollary 23.13
- description: $H_{*}(X; \mathbf{Q})=H_{*}(X) \otimes \mathbf{Q}$.
  kind: corollary
  location: Section 23
  name: Corollary 23.14
- description: Let $R$ be a PID and $C_{*}$ a chain complex of $R$-modules such that
    $C_{n}$ is free for all $n$. Then there is a natural short exact sequence of $R$-modules
    $0 \rightarrow H_{n}(C_{*}) \otimes M \xrightarrow{\alpha} H_{n}(C_{*} \otimes
    M) \xrightarrow{\partial} \operatorname{Tor}_{1}^{R}(H_{n-1}(C_{*}), M) \rightarrow
    0$ that splits (but not naturally).
  kind: theorem
  location: Section 24
  name: Theorem 24.1 (Universal Coefficient Theorem)
- description: Let $C_{*}, D_{*}$ be two chain complexes. Their tensor product is
    the chain complex with $(C_{*} \otimes D_{*})_{n}=\bigoplus_{p+q=n} C_{p} \otimes
    D_{q}$. The differential $(C_{*} \otimes D_{*})_{n} \rightarrow (C_{*} \otimes
    D_{*})_{n-1}$ sends $C_{p} \otimes D_{q}$ into the submodule $C_{p-1} \otimes
    D_{q} \bigoplus C_{p} \otimes D_{q-1}$ by $x \otimes y \mapsto d x \otimes y+(-1)^{p}
    x \otimes d y$.
  kind: definition
  location: Section 25
  name: Definition 25.1
- description: Let $R$ be a PID and $C_{*}, D_{*}$ be chain complexes of $R$-modules.
    Assume that $C_{n}$ is a free $R$-module for all $n$. There is a short exact sequence
    $0 \rightarrow \bigoplus_{p+q=n} H_{p}(C) \otimes H_{q}(D) \rightarrow H_{n}(C_{*}
    \otimes D_{*}) \rightarrow \bigoplus_{p+q=n-1} \operatorname{Tor}_{1}^{R}(H_{p}(C),
    H_{q}(D)) \rightarrow 0$ natural in these data, that splits (but not naturally).
  kind: theorem
  location: Section 25
  name: Theorem 25.2
- description: Let $R$ be a PID and assume $C_{n}'$ and $C_{n}$ are $R$ free for all
    $n$. If $C_{*}' \rightarrow C_{*}$ and $D_{*}' \rightarrow D_{*}$ are homology
    isomorphisms then so is $C_{*}' \otimes D_{*}' \rightarrow C_{*} \otimes D_{*}$.
  kind: corollary
  location: Section 25
  name: Corollary 25.3
- description: 'Let $\mathcal{C}$ be a category, and fix a set $\mathcal{M}$ of objects
    in $\mathcal{C}$, to be called the "models." A functor $F: \mathcal{C} \rightarrow
    \mathbf{Ab}$ is $\mathcal{M}$-free if it is the free abelian group generated by
    a coproduct of corepresentable functors. That is, $F$ is a direct sum of functors
    of the form $\mathbf{Z} \mathcal{C}(M,-)$ where $M \in \mathcal{M}$.'
  kind: definition
  location: Section 25
  name: Definition 25.4
- description: 'A natural transformation of functors $\theta: F \rightarrow G$ is
    an $\mathcal{M}$-epimorphism if $\theta_{M}: F(M) \rightarrow G(M)$ is a surjection
    of abelian groups for every $M \in \mathcal{M}$. A sequence of natural transformations
    is a composable pair $G'' \rightarrow G \rightarrow G''''$ with trivial composition.
    Let $K$ be the objectwise kernel of $G \rightarrow G''''$. There is a factorization
    $G'' \rightarrow K$. The sequence is $\mathcal{M}$-exact if $G'' \rightarrow K$
    is a $\mathcal{M}$-epimorphism. Equivalently, $G''(M) \rightarrow G(M) \rightarrow
    G''''(M)$ is exact for all $M \in \mathcal{M}$.'
  kind: definition
  location: Section 25
  name: Definition 25.7
- description: 'Let $\mathcal{C}$ be a category with a set of models $\mathcal{M}$
    and let $F, G, G'': \mathcal{C} \rightarrow \mathbf{Ab}$ be functors. Suppose
    that $F$ is $\mathcal{M}$-free, let $G'' \rightarrow G$ be a $\mathcal{M}$-epimorphism,
    and let $f: F \rightarrow G$ be any natural transformation. Then there is a lifting
    of $f$ through $G'' \rightarrow G$.'
  kind: lemma
  location: Section 25
  name: Lemma 25.10
- description: 'Let $\mathcal{M}$ be a set of models in a category $\mathcal{C}$.
    Let $\theta: F \rightarrow G$ be a natural transformation of functors from $\mathcal{C}$
    to $\mathbf{Ab}$. Let $F_{*}$ and $G_{*}$ be functors from $\mathcal{C}$ to chain
    complexes, with augmentations $F_{0} \rightarrow F$ and $G_{0} \rightarrow G$.
    Assume that $F_{n}$ is $\mathcal{M}$-free for all $n$, and that $G_{*} \rightarrow
    G \rightarrow 0$ is an $\mathcal{M}$-exact sequence. Then there is a unique chain
    homotopy class of chain maps $F_{*} \rightarrow G_{*}$ covering $\theta$.'
  kind: theorem
  location: Section 25
  name: Theorem 25.11 (Acyclic Models)
- description: Suppose furthermore that $\theta$ is a natural isomorphism. If each
    $G_{n}$ is $\mathcal{M}$-free and $F_{*} \rightarrow F \rightarrow 0$ is an $\mathcal{M}$-exact
    sequence, then any natural chain map $F_{*} \rightarrow G_{*}$ covering $\theta$
    is a natural chain homotopy equivalence.
  kind: corollary
  location: Section 25
  name: Corollary 25.12
- description: 'There are unique chain homotopy classes of natural chain maps: $S_{*}(X)
    \otimes S_{*}(Y) \leftrightarrows S_{*}(X \times Y)$ covering the usual isomorphism
    $H_{0}(X) \otimes H_{0}(Y) \cong H_{0}(X \times Y)$ and they are natural chain
    homotopy inverses.'
  kind: theorem
  location: Section 25
  name: Theorem 25.13 (Eilenberg-Zilber theorem)
- description: There is a canonical natural isomorphism $H(S_{*}(X) \otimes S_{*}(Y))
    \cong H_{*}(X \times Y)$.
  kind: corollary
  location: Section 25
  name: Corollary 25.14
- description: Take coefficients in a PID $R$. There is a short exact sequence $0
    \rightarrow \bigoplus_{p+q=n} H_{p}(X) \otimes_{R} H_{q}(Y) \rightarrow H_{n}(X
    \times Y) \rightarrow \bigoplus_{p+q=n-1} \operatorname{Tor}_{1}^{R}(H_{p}(X),
    H_{q}(Y)) \rightarrow 0$ natural in $X, Y$. It splits as $R$-modules, but not
    naturally.
  kind: theorem
  location: Section 25
  name: Theorem 25.15 (Künneth theorem)
- description: Suppose $R$ is a PID and $H_{*}(X; R)$ is free over $R$. Then $H_{*}(X;
    R)$ has the natural structure of a commutative graded coalgebra over $R$.
  kind: corollary
  location: Section 26
  name: Corollary 26.2
- description: 'Let $R$ be a ring. A (graded) coalgebra over $R$ is a (graded) $R$-module
    $M$ equipped with a "comultiplication" $\Delta: M \rightarrow M \otimes_{R} M$
    and a "counit" map $\varepsilon: M \rightarrow R$ such that the coassociativity
    and counit diagrams commute. It is commutative if in addition the diagram involving
    the twist map $\tau(x \otimes y)=(-1)^{|x| \cdot |y|} y \otimes x$ commutes.'
  kind: definition
  location: Section 26
  name: Definition 26.1
- description: Let $N$ be an abelian group. A singular $n$-cochain on $X$ with values
    in $N$ is a function $\operatorname{Sin}_{n}(X) \rightarrow N$.
  kind: definition
  location: Section 26
  name: Definition 26.3
- description: The $n$th singular cohomology group of $X$ with coefficients in an
    abelian group $N$ is $H^{n}(X; N)=\frac{\ker(S^{n}(X; N) \rightarrow S^{n+1}(X;
    N))}{\operatorname{im}(S^{n-1}(X; N) \rightarrow S^{n}(X; N))}$. If $N$ is an
    $R$-module, then $H^{n}(X; N)$ is again an $R$-module.
  kind: definition
  location: Section 26
  name: Definition 26.5
- description: $H^{0}(X; N)=\operatorname{Map}(\pi_{0}(X), N)$.
  kind: lemma
  location: Section 26
  name: Lemma 26.6
- description: The relative $n$-cochain group with coefficients in $N$ is $S^{n}(X,
    A; N)=\ker(S^{n}(X; N) \rightarrow S^{n}(A; N))$. This defines a sub cochain complex
    of $S^{*}(X; N)$, and we define $H^{n}(X, A; N)=H^{n}(S^{*}(X, A; N))$.
  kind: definition
  location: Section 26
  name: Definition 26.8
- description: Let $R$ be a PID and $N$ an $R$-module, and let $C_{*}$ be a chain-complex
    of free $R$-modules. Then there is a short exact sequence of $R$-modules, $0 \rightarrow
    \operatorname{Ext}_{R}^{1}(H_{n-1}(C_{*}), N) \rightarrow H^{n}(\operatorname{Hom}_{R}(C_{*},
    N)) \rightarrow \operatorname{Hom}_{R}(H_{n}(C_{*}), N) \rightarrow 0$, natural
    in $C_{*}$ and $N$, that splits (but not naturally). Taking $C_{*}=S_{*}(X; R)$,
    we have the short exact sequence $0 \rightarrow \operatorname{Ext}_{R}^{1}(H_{n-1}(X;
    R), N) \rightarrow H^{n}(X; N) \xrightarrow{\beta} \operatorname{Hom}_{R}(H_{n}(X;
    R), N) \rightarrow 0$ that splits, but not naturally. This also holds for relative
    cohomology.
  kind: theorem
  location: Section 27
  name: Theorem 27.1 (Mixed variance Universal Coefficient Theorem)
- description: $\operatorname{Ext}_{R}^{n}(M, N)=H^{n}(\operatorname{Hom}_{R}(F_{*},
    N))$, where $0 \leftarrow M \leftarrow F_{0} \leftarrow F_{1} \leftarrow \cdots$
    is a free resolution of $M$.
  kind: definition
  location: Section 27
  name: Definition 27.2
- description: 'For each pair of natural numbers $p, q$, we define a natural homomorphism
    $\alpha: S_{p+q}(X \times Y) \rightarrow S_{p}(X) \otimes S_{q}(Y)$. Given a singular
    $(p+q)$-simplex $\sigma: \Delta^{p+q} \rightarrow X \times Y$, let $\sigma_{1}=\mathrm{pr}_{1}
    \circ \sigma$ and $\sigma_{2}=\mathrm{pr}_{2} \circ \sigma$. Define the "front
    face" $\alpha_{p}:[p] \rightarrow [p+q]$ sending $i$ to $i$ for $0 \leq i \leq
    p$, and the "back face" $\omega_{q}:[q] \rightarrow [p+q]$ sending $j$ to $j+p$
    for $0 \leq j \leq q$. Then $\alpha(\sigma)=(\sigma_{1} \circ \alpha_{p}) \otimes
    (\sigma_{2} \circ \omega_{q})$.'
  kind: definition
  location: Section 28
  name: Construction 28.1
- description: 'The cup product is the map obtained by taking $X=Y$ and composing
    with the map induced by the diagonal $\Delta: X \rightarrow X \times X$: $\cup:
    H^{p}(X) \otimes H^{q}(X) \xrightarrow{\times} H^{p+q}(X \times X) \xrightarrow{\Delta^{*}}
    H^{p+q}(X)$.'
  kind: definition
  location: Section 28
  name: Definition 28.2
- description: 'Let $f \in S^{p}(X)$, $g \in S^{q}(Y)$, and $h \in S^{r}(Z)$, and
    let $\sigma: \Delta^{p+q+r} \rightarrow X \times Y \times Z$ be any simplex. Then
    $((f \times g) \times h)(\sigma)=(f \times (g \times h))(\sigma)$.'
  kind: proposition
  location: Section 28
  name: Proposition 28.3
- description: 'Let $R$ be a commutative ring. A graded $R$-algebra is a graded $R$-module
    $\ldots, A_{-1}, A_{0}, A_{1}, A_{2}, \ldots$ equipped with maps $A_{p} \otimes_{R}
    A_{q} \rightarrow A_{p+q}$ and a map $\eta: R \rightarrow A_{0}$ satisfying associativity
    and unit diagrams. A graded $R$-algebra $A$ is commutative if $\tau(x \otimes
    y)=(-1)^{pq} y \otimes x$ and the appropriate diagram commutes.'
  kind: definition
  location: Section 29
  name: Definition 29.1
- description: 'The cohomology cross product $\times: H^{*}(X) \otimes H^{*}(Y) \rightarrow
    H^{*}(X \times Y)$ is an $R$-algebra homomorphism.'
  kind: proposition
  location: Section 29
  name: Proposition 29.2
- description: Let $p, q > 0$. Any map $S^{p+q} \rightarrow S^{p} \times S^{q}$ induces
    the zero map in $H^{p+q}(-)$.
  kind: corollary
  location: Section 29
  name: Corollary 29.4
- description: A (topological) manifold is a Hausdorff space such that every point
    has an open neighborhood that is homeomorphic to some (finite dimensional) Euclidean
    space. If all these Euclidean spaces can be chosen to be $\mathbf{R}^{n}$, we
    have an $n$-manifold.
  kind: definition
  location: Section 30
  name: Definition 30.1
- description: Let $M$ be a compact manifold of dimension $n$. There exists a unique
    class $[M] \in H_{n}(M)$, called the fundamental class, such that for every $p,
    q$ with $p+q=n$ the pairing $H^{p}(M) \otimes H^{q}(M) \xrightarrow{\cup} H^{n}(M)
    \xrightarrow{\langle-,[M]\rangle} \mathbf{F}_{2}$ is perfect. This means that
    the adjoint map $H^{p}(M) \rightarrow \operatorname{Hom}(H^{q}(M), \mathbf{F}_{2})$
    is an isomorphism.
  kind: theorem
  location: Section 30
  name: Theorem 30.2
- description: The restriction of a nondegenerate bilinear form on $V$ to a subspace
    $W$ is nondegenerate exactly when $W \cap W^{\perp}=0$. In that case $W^{\perp}$
    is also nondegenerate, and the splitting $V \cong W \oplus W^{\perp}$ respects
    the forms.
  kind: lemma
  location: Lecture 30
  name: Lemma 30.5
- description: Any finite dimensional nondegenerate symmetric bilinear form over $\mathbf{F}_{2}$
    splits as an orthogonal direct sum of forms with matrices $[1]$ and $\left[\begin{array}{ll}0
    & 1 \\ 1 & 0\end{array}\right]$.
  kind: proposition
  location: Lecture 30
  name: Proposition 30.6
- description: $\left[\begin{array}{lll} & 1 & \\ 1 & & \\ & & 1 \end{array}\right]
    \sim \left[\begin{array}{lll}1 & & \\ & 1 & \\ & & 1 \end{array}\right]$
  kind: claim
  location: Lecture 30
  name: Claim 30.7
- description: There is an isomorphism $H^{1}(\Sigma_{1} \# \Sigma_{2}) \cong H^{1}(\Sigma_{1})
    \oplus H^{1}(\Sigma_{2})$ compatible with the intersection forms.
  kind: proposition
  location: Lecture 30
  name: Proposition 30.8
- description: Formation of the intersection bilinear form gives an isomorphism of
    commutative monoids Surf $\to$ Bil.
  kind: theorem
  location: Lecture 30
  name: Theorem 30.9
- description: 'A continuous map $p: E \rightarrow B$ is a covering space if (1) every
    point pre-image is a discrete subspace of $E$, and (2) every $b \in B$ has a neighborhood
    $V$ admitting a map $p^{-1}(V) \rightarrow p^{-1}(b)$ such that the induced map
    $p^{-1}(V) \rightarrow V \times p^{-1}(b)$ is a homeomorphism.'
  kind: definition
  location: Section 31
  name: Definition 31.1
- description: An action of a group $\pi$ on a space $X$ is principal or totally discontinuous
    provided every element $x \in X$ has a neighborhood $U$ such that the only time
    $U$ and $gU$ intersect is when $g=1$.
  kind: definition
  location: Section 31
  name: Definition 31.3
- description: If $\pi$ acts principally on $X$ then the orbit projection map $X \rightarrow
    \pi \backslash X$ is a covering space.
  kind: lemma
  location: Section 31
  name: Lemma 31.4
- description: 'Let $p: E \rightarrow B$ be a covering space, and $\omega: I \rightarrow
    B$ a path in the base. For any $e \in E$ such that $p(e)=\omega(0)$, there is
    a unique path $\widetilde{\omega}: I \rightarrow E$ in $E$ such that $p\widetilde{\omega}=\omega$
    and $\widetilde{\omega}(0)=e$.'
  kind: theorem
  location: Section 31
  name: Theorem 31.5 (Unique path lifting)
- description: Assume that $B$ is semi-locally simply connected. Then the functor
    $\mathbf{Cov}_{B} \rightarrow \mathbf{Set}-\pi_{1}(B, b)$ is an equivalence of
    categories.
  kind: theorem
  location: Section 31
  name: Theorem 31.6
- description: Let $B$ be path connected and semi-locally simply connected. Then forming
    the fiber over a point gives an equivalence of categories from the category of
    local coefficient systems of $R$-modules over $B$ and the category of modules
    over the group algebra $R[\pi_{1}(B, b)]$.
  kind: theorem
  location: Section 31
  name: Theorem 31.7
- description: An $R$-orientation of an $n$-manifold $M$ is a section of $(o_{M} \otimes
    R)^{\times}$.
  kind: definition
  location: Section 31
  name: Definition 31.8
- description: 'If $M$ is compact, the map $j: H_{n}(M; R) \rightarrow \Gamma(M; o_{M}
    \otimes R)$ is an isomorphism.'
  kind: theorem
  location: Section 31
  name: Theorem 31.9 (Orientation Theorem)
- description: If $M$ is a compact connected $n$-manifold, then $H_{n}(M; R) \cong
    \begin{cases} R & \text{if } M \text{ is orientable} \\ R[2] & \text{if not.}
    \end{cases}$
  kind: corollary
  location: Section 31
  name: Corollary 31.10
- description: 'Let $M$ be an $n$-manifold and let $A$ be a compact subset of $M$.
    Then $H_{q}(M \mid A; R)=0$ for $q>n$, and the map $j_{A}: H_{n}(M \mid A; R)
    \rightarrow \Gamma(A; o_{M} \otimes R)$ is an isomorphism.'
  kind: theorem
  location: Section 32
  name: Theorem 32.1
- description: Let $A$ and $B$ be closed subspaces of $M$, and suppose the result
    holds for $A$, $B$, and $A \cap B$. Then it holds for $A \cup B$.
  kind: proposition
  location: Section 32
  name: Proposition 32.2
- description: Let $A_{1} \supseteq A_{2} \supseteq \cdots$ be a decreasing sequence
    of compact subsets of $M$, and assume that the theorem holds for each $A_{n}$.
    Then it holds for the intersection $A = \bigcap A_{i}$.
  kind: proposition
  location: Section 32
  name: Proposition 32.3
- description: Let $A_{1} \supseteq A_{2} \supseteq \cdots$ be a decreasing sequence
    of compact subsets of a space $X$, with intersection $A$. Then $\varinjlim_{i}
    H_{q}(X, X-A_{i}) \xrightarrow{\cong} H_{q}(X, X-A)$.
  kind: lemma
  location: Section 32
  name: Lemma 32.4
- description: Let $A_{1} \supseteq A_{2} \supseteq \cdots$ be a decreasing sequence
    of compact subsets in a Hausdorff space $X$ with intersection $A$. For any open
    neighborhood $U$ of $A$ there exists $i$ such that $A_{i} \subseteq U$.
  kind: lemma
  location: Section 32
  name: Lemma 32.5
- description: $\langle f^{*} b, x \rangle = \langle b, f_{*} x \rangle$.
  kind: claim
  location: Section 33
  name: Claim 33.1
- description: 'Let $a \in H^{p}(X), b \in H^{q}(Y), x \in H_{p}(X), y \in H_{q}(Y)$.
    Then: $\langle a \times b, x \times y \rangle = (-1)^{|x| \cdot |b|} \langle a,
    x \rangle \langle b, y \rangle$.'
  kind: lemma
  location: Section 33
  name: Lemma 33.2
- description: 'Let $R$ be a PID. Assume that $H_{p}(X)$ is a finitely generated free
    $R$-module for all $p$. Then $\times: H^{*}(X; R) \otimes_{R} H^{*}(Y; R) \rightarrow
    H^{*}(X \times Y; R)$ is an isomorphism.'
  kind: theorem
  location: Section 33
  name: Theorem 33.3
- description: 'The cap product enjoys the following properties. (1) $(a \cup b) \cap
    x = a \cap (b \cap x)$ and $1 \cap x = x$: $H_{*}(X)$ is a module for $H^{*}(X)$.
    (2) Given a map $f: X \rightarrow Y$, $b \in H^{p}(Y)$, and $x \in H_{n}(X)$,
    $f_{*}(f^{*}(b) \cap x) = b \cap f_{*}(x)$. (3) Let $\epsilon: H_{*}(X) \rightarrow
    R$ be the augmentation. Then $\varepsilon(b \cap x) = \langle b, x \rangle$. (4)
    Cap and cup are adjoint: $\langle a \cap b, x \rangle = \langle a, b \cap x \rangle$.'
  kind: proposition
  location: Section 34
  name: Proposition 34.1
- description: 'Let $M$ be a topological $n$-manifold that is compact and oriented
    with respect to a PID $R$. Then there is a unique class $[M] \in H_{n}(M; R)$
    that restricts to the orientation class in $H_{n}(M, M-a; R)$ for every $a \in
    M$. It has the property that $- \cap [M]: H^{p}(M; R) \rightarrow H_{q}(M; R)$,
    $p+q=n$, is an isomorphism for all $p$.'
  kind: theorem
  location: Section 34
  name: Theorem 34.2 (Poincaré duality)
- description: Let $K \subseteq V \subseteq U \subseteq X$, with $K$ closed and $U,
    V$ open. Then the diagram involving the cap product actions by $H^{*}(U)$ and
    $H^{*}(V)$ on $H_{*}(X, X-K)$ commutes.
  kind: lemma
  location: Section 34
  name: Lemma 34.3
- description: The Čech cohomology of $K$ is $\check{H}^{p}(K) = \varinjlim_{U \in
    \mathcal{U}_{K}} H^{p}(U)$, where $\mathcal{U}_{K}$ is the set of open neighborhoods
    of $K$ in $X$, partially ordered by reverse inclusion.
  kind: definition
  location: Section 34
  name: Definition 34.4
- description: Under the regular neighborhood condition (for every open $U \supseteq
    K$, there exists an open $V$ with $U \supseteq V \supseteq K$ such that $K \hookrightarrow
    V$ is a homotopy equivalence), $\check{H}^{*}(K) \rightarrow H^{*}(K)$ is an isomorphism.
  kind: lemma
  location: Section 34
  name: Lemma 34.5
- description: Let $X$ be a compact subset of some Euclidean space. If there is an
    open neighborhood of which it is a retract, then $\check{H}^{*}(X; R)$ is canonically
    isomorphic to the cohomology defined using the Čech construction, and is therefore
    independent of the embedding into Euclidean space.
  kind: theorem
  location: Section 34
  name: Theorem 34.6
- description: Let $(K, L)$ be a closed pair in $X$. There is a long exact sequence
    $\cdots \rightarrow \check{H}^{p}(K, L) \rightarrow \check{H}^{p}(K) \rightarrow
    \check{H}^{p}(L) \xrightarrow{\delta} \check{H}^{p+1}(K, L) \rightarrow \cdots$
    that is natural in the pair.
  kind: theorem
  location: Section 35
  name: Theorem 35.2 (Long exact sequence)
- description: Suppose $A$ and $B$ are closed subsets of a normal space, or compact
    subsets of a Hausdorff space. Then the map $\check{H}^{p}(A \cup B, A) \xrightarrow{\cong}
    \check{H}^{p}(B, A \cap B)$ induced by the inclusion is an isomorphism.
  kind: theorem
  location: Section 35
  name: Theorem 35.3 (Excision)
- description: '$\varphi: \mathcal{J} \rightarrow \mathcal{I}$ is cofinal if for all
    $i \in \mathcal{I}$, there exists $j \in \mathcal{J}$ such that $i \leq \varphi(j)$.'
  kind: definition
  location: Section 35
  name: Definition 35.5
- description: 'If $\varphi: \mathcal{J} \rightarrow \mathcal{I}$ is cofinal then
    $\varinjlim_{\mathcal{J}} A\varphi \rightarrow \varinjlim_{\mathcal{I}} A$ is
    an isomorphism.'
  kind: lemma
  location: Section 35
  name: Lemma 35.7
- description: Assume that $X$ is a normal space and $A, B$ closed subsets, or that
    $X$ is a Hausdorff space and $A, B$ compact subsets. Then the order-preserving
    maps $\mathcal{U}_{(A \cup B, B)} \leftarrow \mathcal{U}_{A} \times \mathcal{U}_{B}
    \rightarrow \mathcal{U}_{(A, A \cap B)}$ given by $(W \cup Y, Y) \hookleftarrow
    (W, Y) \mapsto (W, W \cap Y)$ are both cofinal.
  kind: lemma
  location: Section 35
  name: Lemma 35.8
- description: 'Suppose $A$ and $B$ are closed subsets of a normal space, or compact
    subsets of a Hausdorff space. There is a natural long exact sequence: $\cdots
    \rightarrow \check{H}^{p-1}(A \cup B) \rightarrow \check{H}^{p-1}(A) \oplus \check{H}^{p}(B)
    \rightarrow \check{H}^{p-1}(A \cap B) \rightarrow \check{H}^{p}(A \cup B) \rightarrow
    \cdots$.'
  kind: corollary
  location: Section 35
  name: Corollary 35.9 (Mayer-Vietoris)
- description: 'Let $L \subseteq K$ be closed subspaces of a space $X$. There is a
    fully relative cap product $\cap: \check{H}^{p}(K, L) \otimes H_{n}(X, X-K) \rightarrow
    H_{q}(X-L, X-K)$, $p+q=n$, such that for any $x_{K} \in H_{n}(X, X-K)$ the ladder
    involving the long exact sequences of the pairs in Čech cohomology and singular
    homology commutes, where $x_{L}$ is the restriction of $x_{K}$ to $H_{n}(X, X-L)$,
    and for any $x \in H_{n}(X)$ the corresponding ladder commutes, where $x_{K}$
    is the restriction of $x$ to $H_{n}(X, X-K)$.'
  kind: theorem
  location: Section 36
  name: Theorem 36.1
- description: 'Let $A, B$ be closed in a normal space or compact in a Hausdorff space.
    The Čech cohomology and singular homology Mayer-Vietoris sequences are compatible:
    for any $x_{A \cup B} \in H_{n}(X, X - A \cup B)$, there is a commutative ladder
    (where $H_{q}(X \mid A) = H_{q}(X, X-A)$ and $p+q=n$) in which the homology classes
    $x_{A}, x_{B}, x_{A \cap B}$ are restrictions of the class $x_{A \cup B}$.'
  kind: theorem
  location: Section 36
  name: Theorem 36.2
- description: 'Let $M$ be an $n$-manifold and $K \supseteq L$ a pair of compact subsets.
    Assume given an $R$-orientation along $K$, with corresponding fundamental class
    $[M]_{K}$. With $p+q=n$, the map $\cap[M]_{K}: \check{H}^{p}(K, L; R) \rightarrow
    H_{q}(M-L, M-K; R)$ is an isomorphism.'
  kind: theorem
  location: Section 37
  name: Theorem 37.1 (Fully relative Poincaré duality)
- description: Let $A_{1} \supseteq A_{2} \supseteq \cdots$ be a decreasing sequence
    of compact subspaces of $M$, and let $A = \bigcap A_k$. Then $\check{H}^{p}(A_{k})
    \rightarrow \check{H}^{p}(A)$ is an isomorphism.
  kind: lemma
  location: Section 37
  name: Lemma 37.2
- description: Suppose that $M$ is a compact $R$-oriented $n$-manifold, and let $L$
    be a closed subset. Then (with $p+q=n$) we have the commuting ladder whose rungs
    are isomorphisms involving $\check{H}^{p}(M, L; R) \rightarrow H_{q}(M-L; R)$,
    $H^{p}(M; R) \rightarrow H_{q}(M; R)$, and $\check{H}^{p}(L; R) \rightarrow H_{q}(M,
    M-L; R)$.
  kind: corollary
  location: Section 37
  name: Corollary 37.3
- description: 'Suppose that $M$ is an $n$-manifold, and let $K$ be a compact subset.
    An $R$-orientation along $K$ determines (with $p+q=n$) an isomorphism $\cap[M]_{K}:
    \check{H}^{p}(K; R) \rightarrow H_{q}(M, M-K; R)$.'
  kind: corollary
  location: Section 37
  name: Corollary 37.4
- description: 'Let $M$ be a compact $R$-oriented $n$-manifold. Then $\cap[M]: H^{p}(M;
    R) \rightarrow H_{n-p}(M; R)$ is an isomorphism.'
  kind: corollary
  location: Section 37
  name: Corollary 37.5 (Poincaré duality)
- description: 'Let $M$ be an $n$-manifold and $K$ a compact subset. An $R$-orientation
    along $K$ determines a fundamental class $[M]_{K} \in H_{n}(M, M-K)$, and capping
    gives an isomorphism: $\cap[M]_{K}: \check{H}^{n-q}(K; R) \xrightarrow{\cong}
    H_{q}(M, M-K; R)$.'
  kind: theorem
  location: Section 38
  name: Theorem 38.1
- description: $\check{H}^{p}(K; R) = 0$ for $p > n$.
  kind: corollary
  location: Section 38
  name: Corollary 38.2
- description: For any compact subset $K$ of $\mathbf{R}^{n}$, the composite $\check{H}^{n-q}(K;
    R) \xrightarrow{\cap[\mathbf{R}^{n}]_{K}} H_{q}(\mathbf{R}^{n}, \mathbf{R}^{n}-K;
    R) \xrightarrow{\partial} \widetilde{H}_{q-1}(\mathbf{R}^{n}-K; R)$ is an isomorphism.
  kind: theorem
  location: Section 38
  name: Theorem 38.4 (Alexander duality)
- description: If $K$ is a compact subset of $\mathbf{R}^{n}$ then $\check{H}^{n}(K;
    R) = 0$.
  kind: corollary
  location: Section 38
  name: Corollary 38.5
- description: The complement of a knot in $S^{3}$ is a homology circle.
  kind: corollary
  location: Section 38
  name: Corollary 38.6
- description: Let $R$ be a PID and $M$ a compact $R$-oriented $n$-manifold. Then
    $a \otimes b \mapsto \langle a \cup b,[M]\rangle$ induces a perfect pairing (with
    $p+q=n$) $$\frac{H^{p}(M ; R)}{\text{tors}} \otimes_{R} \frac{H^{q}(M ; R)}{\text{tors}}
    \rightarrow R$$
  kind: theorem
  location: Section 38
  name: Theorem 38.8
- description: 'Think of $S^{n}$ as the unit vectors in $\mathbf{R}^{n+1}$. For any
    continuous function $f: S^{n} \rightarrow \mathbf{R}^{n}$, there exists $x \in
    S^{n}$ such that $f(x)=f(-x)$.'
  kind: theorem
  location: Section 38
  name: Theorem 38.11 (Borsuk-Ulam)
