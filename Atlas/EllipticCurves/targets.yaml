- description: 'For a polynomial $f(x, y)=\sum a_{ij} x^{i} y^{j} \in k[x, y]$, the
    Newton polygon $\Delta(f)$ of $f$ is the convex hull of the set $\{(i, j): a_{ij}
    \neq 0\} \subseteq \mathbb{Z}^{2}$ in $\mathbb{R}^{2}$. The interior and boundary
    of $\Delta(f)$ are denoted $\Delta^{\circ}(f)$ and $\partial \Delta(f)$, respectively,
    and for each edge $\gamma \subseteq \Gamma \Delta(f)$ we define the polynomial
    $f_{\gamma}(x, y):=\sum_{(i, j) \in \gamma} a_{ij} x^{i} y^{j}$.'
  kind: definition
  location: Section 1.1
  name: Definition 1.1
- description: Let $f(x, y) \in k[x, y]$ be irreducible in $\bar{k}[x, y]$, and let
    $F := \operatorname{Frac}(k[x, y]/(f))$ denote the corresponding function field,
    with genus $g(F)$. Then $g(F) \leq \#\{\Delta^{\circ}(F) \cap \mathbb{Z}^{2}\}$.
  kind: theorem
  location: Section 1.1
  name: Theorem 1.2 (Baker's Theorem)
- description: A polynomial $f \in k[x, y]$ is nondegenerate with respect to an edge
    $\gamma$ of $\partial \Delta(f)$ if the polynomials $f_{\gamma}, x \frac{\partial
    f_{\gamma}}{\partial x}, y \frac{\partial f_{\gamma}}{\partial y}$ have no common
    zero in $(\bar{k}^{\times})^{2}$. The polynomial $f$ is nondegenerate with respect
    to $\Delta(f)$ if it is nondegenerate with respect to every edge of $\partial
    \Delta(f)$ and not divisible by $x$ or $y$.
  kind: definition
  location: Section 1.1
  name: Definition 1.3
- description: 'Let $f(x, y) \in k[x, y]$ be an irreducible nondegenerate polynomial
    in $\bar{k}[x, y]$, and suppose $f^{*}(x, y, z)$ has no singularities outside
    $\{(0: 0: 1),(0: 1: 0),(1: 0: 0)\}$. Then $g(F)=\#\{\Delta^{\circ}(F) \cap \mathbb{Z}^{2}\}$.'
  kind: proposition
  location: Section 1.1
  name: Proposition 1.5
- description: The ring $\mathbb{F}_{p}$ is a field, and every field of characteristic
    $p$ contains a canonical subfield isomorphic to $\mathbb{F}_{p}$. In particular,
    all fields of cardinality $p$ are isomorphic.
  kind: theorem
  location: Section 3.1
  name: Theorem 3.3
- description: For each prime $p$ we define $\mathbb{F}_{p}$ to be the quotient ring
    $\mathbb{Z} / p\mathbb{Z}$.
  kind: definition
  location: Section 3.1
  name: Definition 3.2
- description: 'For each prime power $q=p^{n}$ we define $\mathbb{F}_{q}=\mathbb{F}_{p^{n}}$
    to be the field extension of $\mathbb{F}_{p}$ generated by adjoining all roots
    of $x^{q}-x$ to $\mathbb{F}_{p}$ (the splitting field of $x^{q}-x$ over $\mathbb{F}_{p}$).
    Equivalently, $\mathbb{F}_{q}:=\overline{\mathbb{F}}_{p}^{\sigma_{q}}$ is the
    subfield of the algebraic closure of $\mathbb{F}_{p}$ fixed by the $q$-power Frobenius
    automorphism $\sigma_{q}: x \mapsto x^{q}$.'
  kind: definition
  location: Section 3.1
  name: Definition 3.4
- description: Let $q=p^{n}$ be a prime power. The field $\mathbb{F}_{q}$ has cardinality
    $q$ and every field of cardinality $q$ is (non-canonically) isomorphic to $\mathbb{F}_{q}$.
  kind: theorem
  location: Section 3.1
  name: Theorem 3.6
- description: The finite field $\mathbb{F}_{p^{m}}$ is a subfield of $\mathbb{F}_{p^{n}}$
    if and only if $m$ divides $n$.
  kind: theorem
  location: Section 3.1
  name: Theorem 3.8
- description: For any irreducible $f \in \mathbb{F}_{p}[x]$ of degree $n>0$ we have
    $\mathbb{F}_{p}[x]/(f) \simeq \mathbb{F}_{p^{n}}$.
  kind: theorem
  location: Section 3.1
  name: Theorem 3.9
- description: Every irreducible $f \in \mathbb{F}_{p}[x]$ of degree $n$ splits completely
    in $\mathbb{F}_{p^{n}}$.
  kind: corollary
  location: Section 3.1
  name: Corollary 3.10
- description: Every finite subgroup of the multiplicative group of a field is cyclic.
  kind: theorem
  location: Section 3.1
  name: Theorem 3.12
- description: The multiplicative group of a finite field is cyclic.
  kind: corollary
  location: Section 3.1
  name: Corollary 3.13
- description: A monic irreducible polynomial $f \in \mathbb{F}_{p}[x]$ whose roots
    generate the multiplicative group of the finite field $\mathbb{F}_{p}[x]/(f)$
    is called a primitive polynomial.
  kind: definition
  location: Section 3.1
  name: Definition 3.14
- description: For every prime $p$ and positive integer $n$ there exist primitive
    polynomials of degree $n$ in $\mathbb{F}_{p}[x]$. Indeed, the number of such polynomials
    is $\phi(p^{n}-1)/n$.
  kind: theorem
  location: Section 3.1
  name: Theorem 3.15
- description: 'Order polynomials $f(x)=x^{n}-a_{n-1} x^{n-1}+\cdots+(-1)^{n} a_{0}
    \in (\mathbb{Z}/p\mathbb{Z})[x]$ with $0 \leq a_{i}<p$ according to the lexicographic
    order on integer sequences $(a_{0}, \ldots, a_{n-1}, 1)$. For each prime $p$ and
    $n>0$ the Conway polynomial $f_{p, n}(x)$ is defined by: For $n=1$, let $f_{p,
    1}(x):=x-r$, where $r$ is the least positive integer generating $(\mathbb{Z}/p\mathbb{Z})^{\times}$;
    For $n>1$, let $f_{p, n}(x)$ be the least primitive polynomial of degree $n$ such
    that for $0<m<n$ and every root $\alpha$ of $f_{p, m}(x)$ we have $f_{p, n}(\alpha^{n/m})=0$.'
  kind: definition
  location: Section 3.1
  name: Definition 3.16
- description: 'Let $k$ be a field and let $f=\sum f_{i} x^{i} \in k[x]$ be a polynomial.
    We say that $f$ is separable if any of the following equivalent conditions hold:
    $f$ has $\deg f$ distinct roots in any algebraic closure $\bar{k}$ of $k$; $f$
    is squarefree over every extension of $k$; $\gcd(f, f'')$ is a unit in $k[x]$,
    where $f'' := \sum i f_{i} x^{i-1}$ denotes the formal derivative of $f$. A polynomial
    that is not separable is said to be inseparable.'
  kind: definition
  location: Section 3
  name: Definition 3.17
- description: An irreducible polynomial $f \in k[x]$ is inseparable if and only if
    $f'=0$.
  kind: lemma
  location: Section 3
  name: Lemma 3.20
- description: A field $k$ is perfect if every irreducible polynomial in $k[x]$ is
    separable, equivalently, has a nonzero derivative.
  kind: definition
  location: Section 3
  name: Definition 3.21
- description: Finite fields are perfect.
  kind: theorem
  location: Section 3
  name: Theorem 3.22
- description: The time to add or subtract two elements of $\mathbb{F}_{q}$ in our
    standard representation is $O(n)$, where $n=\lg q$ is the size of a finite field
    element.
  kind: theorem
  location: Section 3.2
  name: Theorem 3.24
- description: $\operatorname{DFT}_{\omega}(f * g) = \operatorname{DFT}_{\omega}(f)
    \cdot \operatorname{DFT}_{\omega}(g)$.
  kind: theorem
  location: Section 3.4.3
  name: Theorem 3.29
- description: The FFT algorithm outputs $\mathrm{DFT}_{\omega}(f)$.
  kind: theorem
  location: Section 3.4.3
  name: Theorem 3.30
- description: Let $R$ be a commutative ring containing a primitive $n$th root of
    unity, with $n = 2^k$, and assume $2 \in R^{\times}$. We can multiply two polynomials
    in $R[x]$ of degree less than $n/2$ using $O(n \log n)$ operations in $R$.
  kind: corollary
  location: Section 3.4.3
  name: Corollary 3.31
- description: The time to multiply two elements of $\mathbb{F}_p$ is $O(\mathrm{M}(n))$,
    where $n = \lg p$.
  kind: theorem
  location: Section 3.7
  name: Theorem 3.33
- description: 'Given $a, b \in \mathbb{F}_p[x]$ with $b$ monic, compute $q, r \in
    \mathbb{F}_p[x]$ such that $a = qb + r$ with $\deg r < \deg b$ as follows:

    1. If $\deg a < \deg b$ then return $q = 0$ and $r = a$.

    2. Let $m = \deg a - \deg b$ and $k = \lceil \lg m + 1 \rceil$.

    3. Let $f = \operatorname{rev}(b)$ (reverse the coefficients of $b$).

    4. Compute $g_0 = 1, g_i = (2g_{i-1} - fg_{i-1}^2) \bmod x^{2^i}$ for $i$ from
    1 to $k$. (this yields $fg_k \equiv 1 \bmod x^{m+1}$).

    5. Set $s = \operatorname{rev}(a) g_k \bmod x^{m+1}$ (now $\operatorname{rev}(b)
    s \equiv \operatorname{rev}(a) \bmod x^{m+1}$).

    6. Return $q = x^{m - \deg s} \operatorname{rev}(s)$ and $r = a - bq$.'
  kind: construction
  location: Section 3.7
  name: Algorithm 3.34 (Fast Euclidean division of polynomials)
- description: Let $q = p^e$ be a prime power, and assume that $\log e = O(\log p)$.
    The time to multiply two elements of $\mathbb{F}_q$ is $O(\mathrm{M}(n)) = O(n
    \log n)$, where $n = \lg q$.
  kind: theorem
  location: Section 3.7
  name: Theorem 3.35
- description: 'Given positive integers $a = \sum_{i=0}^{m} a_i 2^i$ and $b = \sum_{i=0}^{n}
    b_i 2^i$, compute $q, r \in \mathbb{Z}$ such that $a = qb + r$ with $0 \leq r
    < b$ as follows:

    1. If $b > a$ return $q = 0$ and $r = b$, and if $b = 1$ return $q = a$ and $r
    = 0$.

    2. Set $q \leftarrow 0, r \leftarrow 0$, and $k \leftarrow m$.

    3. While $k \geq 0$ and $r < b$ set $q \leftarrow 2q, r \leftarrow 2r + a_k$,
    and $k \leftarrow k - 1$.

    4. If $r < b$ then return $q$ and $r$.

    5. Set $q \leftarrow q + 1, r \leftarrow r - b$, and return to Step 3.'
  kind: construction
  location: Section 3.7
  name: Algorithm 3.37 (Long division)
- description: The long division algorithm uses $O(mn)$ bit operations to perform
    Euclidean division of an $m$-bit integer by an $n$-bit integer.
  kind: theorem
  location: Section 3.7
  name: Theorem 3.38
- description: Let $p$ be a prime. The time to invert an element of $\mathbb{F}_p^{\times}$
    is $O(\mathrm{M}(n) \log n)$, where $n = \lg p$.
  kind: theorem
  location: Section 3.8
  name: Theorem 3.40
- description: Let $q=p^{e}$ be a prime power and assume $\log e=O(\log p)$. The time
    to invert an element of $\mathbb{F}_{q}^{\times}$ is $O(\mathrm{M}(n) \log n)=O(n
    \log^{2} n)$, where $n=\lg q$.
  kind: theorem
  location: Section 3.8 (context of extended Euclidean algorithm discussion)
  name: Theorem 3.41
- description: 'For every pair of distinct $\alpha, \beta \in \mathbb{F}_{q}$ we have
    $$\#\left\{\delta \in \mathbb{F}_{q}: \alpha+\delta \text{ and } \beta+\delta
    \text{ are of different type}\right\}=\frac{q-1}{2}.$$'
  kind: theorem
  location: Section 3.11
  name: Theorem 3.44 (Rabin 1980)
- description: "Given a monic polynomial $f \\in \\mathbb{F}_{q}[x]$, output an element\
    \ $r \\in \\mathbb{F}_{q}$ such that $f(r)=0$, or null if no such $r$ exists.\n\
    1. If $f(0)=0$ then return 0.\n2. Compute $g=\\operatorname{gcd}\\left(f, x^{q}-x\\\
    right)$.\n3. If $\\operatorname{deg} g=0$ then return null.\n4. While $\\operatorname{deg}\
    \ g>1$:\n   a. Pick a random $\\delta \\in \\mathbb{F}_{q}$.\n   b. Compute $h=\\\
    operatorname{gcd}\\left(g,(x+\\delta)^{s}-1\\right)$.\n   c. If $0<\\operatorname{deg}\
    \ h<\\operatorname{deg} g$ then replace $g$ by $h$ or $g/h$, whichever has lower\
    \ degree.\n5. Return $r$, where $g(x)=x-r$."
  kind: construction
  location: Section 3.11
  name: Algorithm 3.45
- description: "Given a monic polynomial $f \\in \\mathbb{F}_{q}[x]$ with $\\operatorname{deg}\
    \ f < \\operatorname{char}(\\mathbb{F}_{q})$, compute squarefree coprime polynomials\
    \ $g_{1}, \\ldots, g_{m} \\in \\mathbb{F}_{q}[x]$ with $g_{m} \\neq 1$ such that\
    \ $f=g_{1} g_{2}^{2} \\cdots g_{m}^{m}$.\n1. Compute $u=\\operatorname{gcd}\\\
    left(f, f^{\\prime}\\right), v_{1}=f/u, w_{1}=f^{\\prime}/u$, and set $i=1$.\n\
    2. Compute $g_{1}=\\operatorname{gcd}\\left(v_{1}, w_{1}-v_{1}^{\\prime}\\right)$.\n\
    3. While $v_{i} \\neq g_{i}$:\n   a. Compute $v_{i+1}$ with $v_{i}/g_{i}$ and\
    \ $w_{i+1}=\\left(w_{i}-v_{i}^{\\prime}\\right)/g_{i}$.\n   b. Increment $i$ and\
    \ compute $g_{i}=\\operatorname{gcd}\\left(v_{i}, w_{i}-v_{i}^{\\prime}\\right)$.\n\
    4. Set $m=i$ and return $g_{1}, \\ldots, g_{m}$."
  kind: construction
  location: Section 3.11.2
  name: Algorithm 3.46
- description: 'Given a monic polynomial $f \in \mathbb{F}_{q}[x]$, compute its irreducible
    factorization as follows:

    1. Compute the squarefree factorization of $f=g_{1} g_{2}^{2} \cdots g_{m}^{m}$
    using Yun''s algorithm.

    2. By successively computing $g_{ij}=\operatorname{gcd}\left(g_{i}, x^{q^{j}}-x\right)$
    and replacing $g_{i}$ with $g_{i}/g_{ij}$ for $j=1,2,3, \ldots \operatorname{deg}
    g_{i}$, factor each $g_{i}$ into polynomials $g_{ij}$ that are each (possibly
    trivial) products of distinct irreducible polynomials of degree $j$; note that
    once $j>(\operatorname{deg} g_{i})/2$ we know $g_{i}$ must be irreducible and
    can immediately determine all the remaining $g_{ij}$.

    3. Factor each nontrivial $g_{ij}$ into irreducible polynomials $g_{ijk}$ of degree
    $j$ as follows: while $\operatorname{deg} g_{ij}>j$ generate random polynomials
    $u \in \mathbb{F}_{q}[x]$ with $\operatorname{deg} u < \operatorname{deg} g_{ij}$
    until either $h=\operatorname{gcd}\left(g_{ij}, u\right)$ or $h:=\operatorname{gcd}\left(g_{ij},
    u^{(q^{j}-1)/2}-1\right)$ properly divides $g_{ij}$, then recursively factor $h$
    and $g_{ij}/h$ (note that $j \mid \operatorname{deg} h$ and $j \mid \operatorname{deg}(g_{ij}/h)$).

    4. Output each $g_{ijk}$ with multiplicity $i$.'
  kind: construction
  location: Section 3.12
  name: Algorithm 3.47
- description: 'Let $C/k$ be a plane projective curve $f(x, y, z)=0$ with $f$ a nonconstant
    homogeneous polynomial in $k[x, y, z]$ that is irreducible in $\bar{k}[x, y, z]$.
    The function field $k(C)$ is the set of equivalence classes of rational functions
    $g/h$ such that:

    (i) $g$ and $h$ are homogeneous polynomials in $k[x, y, z]$ of the same degree;'
  kind: definition
  location: Section 4.1
  name: Definition 4.2
- description: Let $C / k$ be a projective curve with $\alpha \in k(C)$. We say that
    $\alpha$ is defined (or regular) at a point $P \in C(\bar{k})$ if $\alpha$ can
    be represented as $g / h$ for some $g, h \in k[x, y, z]$ with $h(P) \neq 0$.
  kind: definition
  location: Section 4.1
  name: Definition 4.7
- description: 'Let $C_{1}$ and $C_{2}$ be plane projective curves defined over $k$.
    A rational map $\phi: C_{1} \rightarrow C_{2}$ is a projective triple $(\phi_{x}:
    \phi_{y}: \phi_{z}) \in \mathbb{P}^{2}(k(C_{1}))$, such that for every $P \in
    C_{1}(\bar{k})$ where $\phi_{x}, \phi_{y}, \phi_{z}$ are defined and not all zero,
    the projective point $(\phi_{x}(P): \phi_{y}(P): \phi_{z}(P))$ lies in $C_{2}(\bar{k})$.
    The map $\phi$ is defined (or regular) at $P$ if there exists $\lambda \in k(C_{1})^{\times}$
    such that $\lambda \phi_{x}, \lambda \phi_{y}, \lambda \phi_{z}$ are all defined
    at $P$ and not all zero at $P$.'
  kind: definition
  location: Section 4.1
  name: Definition 4.9
- description: 'Let $C_{1}$ and $C_{2}$ be plane projective curves over $k$ defined
    by $f_{1}(x, y, z)=0$ and $f_{2}(x, y, z)=0$, respectively. A rational map $\psi:
    C_{1} \rightarrow C_{2}$ is an equivalence class of triples $(\psi_{x}: \psi_{y}:
    \psi_{z})$ of homogeneous polynomials in $k[x, y, z]$ of the same degree, not
    all of which lie in $(f_{1})$, such that $f_{2}(\psi_{x}, \psi_{y}, \psi_{z})
    \in (f_{1})$. Triples $(\psi_{x}: \psi_{y}: \psi_{z})$ and $(\psi_{x}^{\prime}:
    \psi_{y}^{\prime}: \psi_{z}^{\prime})$ are equivalent whenever $\psi_{x} \psi_{y}^{\prime}-\psi_{x}^{\prime}
    \psi_{y}$ and $\psi_{x} \psi_{z}^{\prime}-\psi_{x}^{\prime} \psi_{z}$ and $\psi_{y}
    \psi_{z}^{\prime}-\psi_{y}^{\prime} \psi_{z}$ all lie in $(f_{1})$. The rational
    map $\phi$ is defined at $P \in C_{1}(\bar{k})$ if any of $\psi_{x}(P), \psi_{y}(P),
    \psi_{z}(P)$ is nonzero, in which case $(\psi_{x}(P): \psi_{y}(P): \psi_{z}(P)
    \in C_{2}(\bar{k}))$.'
  kind: definition
  location: Section 4.1
  name: Definition 4.13
- description: A rational map that is defined everywhere is called a morphism.
  kind: definition
  location: Section 4.1
  name: Definition 4.14
- description: If $C_{1}$ is a smooth projective curve then every rational map from
    $C_{1}$ to a projective curve $C_{2}$ is a morphism.
  kind: theorem
  location: Section 4.1
  name: Theorem 4.15
- description: A morphism of projective curves is either surjective or constant.
  kind: theorem
  location: Section 4.1
  name: Theorem 4.17
- description: 'An isogeny $\phi: E_{1} \rightarrow E_{2}$ of elliptic curves defined
    over $k$ is a surjective morphism of curves that induces a group homomorphism
    $E_{1}(\bar{k}) \rightarrow E_{2}(\bar{k})$. The elliptic curves $E_{1}$ and $E_{2}$
    are then said to be isogenous.'
  kind: definition
  location: Section 4.2
  name: Definition 4.18
- description: 'An isogeny $\phi: E_{1} \rightarrow E_{2}$ of elliptic curves defined
    over $k$ is a non-constant rational map that sends the distinguished point of
    $E_{1}$ to the distinguished point of $E_{2}$.'
  kind: definition
  location: Section 4.2
  name: Definition 4.20
- description: 'Elliptic curves $E_{1}$ and $E_{2}$ defined over a field $k$ are isomorphic
    if there exist isogenies $\phi_{1}: E_{1} \rightarrow E_{2}$ and $\phi_{2}: E_{2}
    \rightarrow E_{1}$ whose composition is the identity; the isogenies $\phi_{1}$
    and $\phi_{2}$ are then isomorphisms.'
  kind: definition
  location: Section 4.2
  name: Definition 4.22
- description: A morphism from an elliptic curve $E/k$ to itself that fixes the distinguished
    point is called an endomorphism. An endomorphism that is also an isomorphism is
    an automorphism.
  kind: definition
  location: Section 4.2
  name: Definition 4.23
- description: 'Let $E$ be an elliptic curve over a finite field $\mathbb{F}_{q}$.
    The Frobenius endomorphism of $E$ is the map $\pi_{E}:(x: y: z) \mapsto (x^{q}:
    y^{q}: z^{q})$.'
  kind: definition
  location: Section 4.3.3
  name: Definition 4.24
- description: 'Let $E_{1}: y^{2}=f_{1}(x)$ and $E_{2}: y^{2}=f_{2}(x)$ be elliptic
    curves over $k$, and let $\alpha: E_{1} \rightarrow E_{2}$ be an isogeny. Then
    $\alpha$ can be defined by an affine rational map of the form $\alpha(x, y)=\left(\frac{u(x)}{v(x)},
    \frac{s(x)}{t(x)} y\right)$ where $u, v, s, t \in k[x]$ are polynomials in $x$
    with $u \perp v$ and $s \perp t$. The notation $u \perp v$ indicates that the
    polynomials $u$ and $v$ are coprime ($\gcd(u, v)=1$).'
  kind: lemma
  location: Section 4.4
  name: Lemma 4.26
- description: 'Let $E_{1}: y^{2}=f_{1}(x)$ and $E_{2}: y^{2}=f_{2}(x)$ be elliptic
    curves over $k$ and let $\alpha(x, y)=\left(\frac{u(x)}{v(x)}, \frac{s(x)}{t(x)}
    y\right)$ be an isogeny from $E_{1}$ to $E_{2}$ in standard form. Then $v^{3}$
    divides $t^{2}$ and $t^{2}$ divides $v^{3} f_{1}$. Moreover, $v(x)$ and $t(x)$
    have the same set of roots in $\bar{k}$.'
  kind: lemma
  location: Section 4.4
  name: Lemma 4.27
- description: 'Let $\alpha(x, y)=\left(\frac{u(x)}{v(x)}, \frac{s(x)}{t(x)} y\right)$
    be an isogeny $E_{1} \rightarrow E_{2}$ in standard form. The affine points $\left(x_{0}:
    y_{0}: 1\right) \in E_{1}(\bar{k})$ in the kernel of $\alpha$ are precisely those
    for which $v\left(x_{0}\right)=0$.'
  kind: corollary
  location: Section 4.4
  name: Corollary 4.28
- description: 'Let $\alpha: E_{1} \rightarrow E_{2}$ be an isogeny of elliptic curves
    defined over a field $k$. The kernel of $\alpha$ is a finite subgroup of $E_{1}(\bar{k})$.'
  kind: corollary
  location: Section 4.4
  name: Corollary 4.29
- description: Let $\alpha(x, y)=\left(\frac{u(x)}{v(x)}, \frac{s(x)}{t(x)} y\right)$
    be an isogeny in standard form. The degree of $\alpha$ is $\deg \alpha:=\max \{\deg
    u, \deg v\}$, and we say that $\alpha$ is separable if the derivative of $\frac{u(x)}{v(x)}$
    is nonzero; otherwise we say that $\alpha$ is inseparable.
  kind: definition
  location: Section 4.5
  name: Definition 4.31
- description: Every transcendence basis for $L/k$ has the same cardinality.
  kind: theorem
  location: Section 4.6
  name: Theorem 4.34
- description: The transcendence degree of a field extension $L/K$ is the cardinality
    of any (hence every) transcendence basis for $L/k$.
  kind: definition
  location: Section 4.6
  name: Definition 4.35
- description: 'A field $k$ is perfect if any of the following equivalent conditions
    hold: (1) $\operatorname{char}(k)=0$ or $\operatorname{char}(k)=p>0$ and $k=\{x^p:
    x \in k\}$ ($k$ is fixed by Frobenius); (2) every finite extension of $k$ is separable
    over $k$; (3) every algebraic extension of $k$ is separable over $k$.'
  kind: definition
  location: Section 4.6.1
  name: Definition 4.38
- description: An algebraic extension $L/k$ is Galois if it is both normal and separable,
    in which case we call $\operatorname{Gal}(L/k)=\operatorname{Aut}(L/k)$ the Galois
    group of $L/k$.
  kind: definition
  location: Section 4.6.1
  name: Definition 4.40
- description: The $n$-dimensional affine space $\mathbb{A}^n = \mathbb{A}_k^n$ over
    $k$ is the set $\mathbb{A}^n := \{(x_1, \ldots, x_n) \in \bar{k}^n\}$, equivalently,
    $\mathbb{A}^n$ is the vector space $\bar{k}^n$ regarded as a set. When $k$ is
    clear from context we may just write $\mathbb{A}^n$. If $k \subseteq L \subseteq
    \bar{k}$, the set of $L$-rational points (or just $L$-points) in $\mathbb{A}^n$
    is $\mathbb{A}^n(L) = \{(x_1, \ldots, x_n) \in L^n\} = \mathbb{A}^n(\bar{k})^{G_L}$
    where $\mathbb{A}^n(\bar{k})^{G_L}$ denotes the set of points in $\mathbb{A}^n(\bar{k})$
    fixed by $G_L := \operatorname{Gal}(L^{\text{sep}}/L)$. In particular, $\mathbb{A}^n(k)
    = \mathbb{A}^n(\bar{k})^{G_k}$.
  kind: definition
  location: Section 4.7
  name: Definition 4.41
- description: 'If $S$ is a set of polynomials in $\bar{k}[x_1, \ldots, x_n]$, the
    set of points $Z_S := \{P \in \mathbb{A}^n : f(P) = 0 \text{ for all } f \in S\}$
    is called an (affine) algebraic set. If $k \subseteq L \subseteq \bar{k}$, the
    set of $L$-rational points in $Z_S$ is $Z_S(L) = Z_S \cap \mathbb{A}^n(L)$. When
    $S$ is a singleton $\{f\}$ we may write $Z_f$ in place of $Z_{\{f\}}$.'
  kind: definition
  location: Section 4.7
  name: Definition 4.42
- description: A commutative ring $R$ is noetherian if every $R$-ideal is finitely
    generated. Equivalently, every infinite ascending chain of $R$-ideals $I_1 \subseteq
    I_2 \subseteq \cdots$ eventually stabilizes, that is, $I_{n+1} = I_n$ for all
    sufficiently large $n$.
  kind: definition
  location: Section 4.7
  name: Definition 4.44
- description: If $R$ is a noetherian ring, then so is $R[x]$.
  kind: theorem
  location: Section 4.7
  name: Theorem 4.45 (Hilbert basis theorem)
- description: 'For an algebraic set $Z \subseteq \mathbb{A}^n$, the ideal of $Z$
    is the set $I(Z) = \{f \in \bar{k}[x_1, \ldots, x_n] : f(P) = 0 \text{ for all
    } P \in Z\}$.'
  kind: definition
  location: Section 4.7
  name: Definition 4.46
- description: 'Let $R$ be a commutative ring. For any $R$-ideal $I$ we define $\sqrt{I}
    = \{x \in R : x^r \in I \text{ for some integer } r > 0\}$ and say that $I$ is
    a radical ideal if $I = \sqrt{I}$.'
  kind: definition
  location: Section 4.7
  name: Definition 4.47
- description: For any ideal $I$ in a commutative ring $R$, the set $\sqrt{I}$ is
    an ideal.
  kind: lemma
  location: Section 4.7
  name: Lemma 4.48
- description: For every ideal $I \subseteq \bar{k}[x_1, \ldots, x_n]$ we have $I(Z_I)
    = \sqrt{I}$.
  kind: theorem
  location: Section 4.7
  name: Theorem 4.49 (Hilbert's Nullstellensatz)
- description: For any ideal $I \subsetneq \bar{k}[x_1, \ldots, x_n]$, the variety
    $Z_I$ is nonempty.
  kind: theorem
  location: Section 4.7
  name: Theorem 4.50 (weak Nullstellensatz)
- description: The maximal ideals of the ring $\bar{k}[x_1, \ldots, x_n]$ are all
    of the form $m_P = (x_1 - P_1, \ldots, x_n - P_n)$ for some point $P = (P_1, \ldots,
    P_n)$ in $\mathbb{A}^n(\bar{k})$.
  kind: corollary
  location: Section 4.7
  name: Corollary 4.51
- description: There is a one-to-one inclusion-reversing correspondence between radical
    ideals $I \subseteq \bar{k}[x_1, \ldots, x_n]$ and algebraic sets $Z \subseteq
    \mathbb{A}^n(\bar{k})$ in which $I = I(Z)$ and $Z = Z_I$.
  kind: corollary
  location: Section 4.7
  name: Corollary 4.52
- description: An algebraic set is irreducible if it is nonempty and not the union
    of two smaller algebraic sets.
  kind: definition
  location: Section 4.7
  name: Definition 4.54
- description: An algebraic set is irreducible if and only if its ideal is prime.
  kind: theorem
  location: Section 4.7
  name: Theorem 4.55
- description: Let $u$ and $v$ be relatively prime polynomials in $k[x]$. Then $\left(\frac{u}{v}\right)'
    = 0 \iff u' = v' = 0 \iff u = f(x^p)$ and $v = g(x^p)$, where $f$ and $g$ are
    polynomials in $k[x]$ and $p$ is the characteristic of $k$ (which may be zero).
  kind: lemma
  location: Chapter 5, Section 5.1
  name: Lemma 5.1
- description: Over a field of characteristic zero, every isogeny is separable.
  kind: corollary
  location: Chapter 5, Section 5.1
  name: Corollary 5.2
- description: 'Let $\alpha: E_1 \rightarrow E_2$ be an inseparable isogeny of elliptic
    curves $E_1: y^2 = f_1(x)$ and $E_2: y^2 = f_2(x)$ over a field $k$ of characteristic
    $p > 0$. Then $\alpha$ can be written in the form $\alpha = (a(x^p), b(x^p) y^p)$
    for some rational functions $a, b \in k(x)$.'
  kind: lemma
  location: Chapter 5, Section 5.1
  name: Lemma 5.3
- description: Let $\alpha$ be an isogeny of elliptic curves over a field $k$ of characteristic
    $p > 0$. Then $\alpha = \alpha_{\mathrm{sep}} \circ \pi^n$ for some separable
    isogeny $\alpha_{\text{sep}}$ and integer $n \geq 0$, where $\pi$ is the $p$-power
    Frobenius morphism $(x:y:z) \mapsto (x^p:y^p:z^p)$. We then have $\deg \alpha
    = p^n \deg \alpha_{\text{sep}}$.
  kind: corollary
  location: Chapter 5, Section 5.1
  name: Corollary 5.4
- description: For an isogeny $\alpha = \alpha_{\text{sep}} \circ \pi^n$ decomposed
    as in Corollary 5.4, we define the separable degree $\deg_s \alpha$ and inseparable
    degree $\deg_i \alpha$ of $\alpha$ as $\deg_s \alpha := \deg \alpha_{\text{sep}}$,
    $\deg_i \alpha = p^n$, and we always have $\deg \alpha = (\deg_s \alpha)(\deg_i
    \alpha)$.
  kind: definition
  location: Chapter 5, Section 5.1
  name: Definition 5.6
- description: The order of the kernel of an isogeny is equal to its separable degree.
  kind: theorem
  location: Chapter 5, Section 5.1
  name: Theorem 5.8
- description: Every purely inseparable isogeny has trivial kernel.
  kind: corollary
  location: Chapter 5, Section 5.1
  name: Corollary 5.9
- description: For any composition of isogenies $\alpha = \beta \circ \gamma$ we have
    $\deg \alpha = (\deg \beta)(\deg \gamma)$, $\deg_s \alpha = (\deg_s \beta)(\deg_s
    \gamma)$, $\deg_i \alpha = (\deg_i \beta)(\deg_i \gamma)$.
  kind: corollary
  location: Chapter 5, Section 5.1
  name: Corollary 5.10
- description: 'Let $E/k$ be an elliptic curve and let $G$ be a finite subgroup of
    $E(\bar{k})$. There exists an elliptic curve $E''$ and a separable isogeny $\phi:
    E \rightarrow E''$ with $\ker \phi = G$. The curve $E''$ and the isogeny $\phi$
    are defined over a finite extension of $k$ and unique up to isomorphism.'
  kind: theorem
  location: Chapter 5, Section 5.2
  name: Theorem 5.11
- description: An isogeny of composite degree can always be decomposed into a sequence
    of isogenies of prime degree.
  kind: corollary
  location: Section 5.2
  name: Corollary 5.12
- description: 'Let $E: y^2 = x^3 + Ax + B$ be an elliptic curve over $k$ and let
    $x_0 \in \bar{k}$ be a root of $x^3 + Ax + B$. Define $t := 3x_0^2 + A$ and $w
    := x_0 t$. The rational map $\phi(x, y) := \left(\frac{x^2 - x_0 x + t}{x - x_0},
    \frac{(x - x_0)^2 - t}{(x - x_0)^2} y\right)$ is a separable isogeny from $E$
    to $E'': y^2 = x^3 + A''x + B''$, where $A'' := A - 5t$ and $B'' := B - 7w$. The
    kernel of $\phi$ is the group of order 2 generated by $(x_0, 0)$.'
  kind: theorem
  location: Section 5.2
  name: Theorem 5.13 (Vélu)
- description: 'Let $E: y^2 = x^3 + Ax + B$ be an elliptic curve over $k$ and let
    $G$ be a finite subgroup of $E(\bar{k})$ of odd order. For each nonzero $Q = (x_Q,
    y_Q)$ in $G$ define $t_Q := 3x_Q^2 + A$, $u_Q := 2y_Q^2$, $w_Q := u_Q + t_Q x_Q$
    and let $t := \sum_{Q \in G_{\neq 0}} t_Q$, $w := \sum_{Q \in G_{\neq 0}} w_Q$,
    $r(x) := x + \sum_{Q \in G_{\neq 0}} \left(\frac{t_Q}{x - x_Q} + \frac{u_Q}{(x
    - x_Q)^2}\right)$. The rational map $\phi(x, y) := (r(x), r''(x) y)$ is a separable
    isogeny from $E$ to $E'': y^2 = x^3 + A''x + B''$, where $A'' := A - 5t$ and $B''
    := B - 7w$, with $\ker \phi = G$.'
  kind: theorem
  location: Section 5.2
  name: Theorem 5.15 (Vélu)
- description: 'For every integer $n$,


    $\psi_n$ lies in $\mathbb{Z}[x, A, B]$ if $n$ is odd, and in $2y\mathbb{Z}[x,
    A, B]$ if $n$ is even;


    $\phi_n$ lies in $\mathbb{Z}[x, A, B]$ for all $n$;


    $\omega_n$ lies in $\mathbb{Z}[x, A, B]$ if $n$ is even, and in $y\mathbb{Z}[x,
    A, B]$ if $n$ is odd.'
  kind: lemma
  location: Section 5.5
  name: Lemma 5.20
- description: 'Let $E/k$ be an elliptic curve defined by the equation $y^2 = x^3
    + Ax + B$ and let $n$ be a nonzero integer. The rational map

    $$[n](x,y) = \left(\frac{\phi_n(x)}{\psi_n^2(x)}, \frac{\omega_n(x,y)}{\psi_n^3(x,y)}\right)$$

    sends each point $P \in E(\bar{k})$ to $nP$.'
  kind: theorem
  location: Section 5.6
  name: Theorem 5.21
- description: 'For every positive integer $n$ the polynomials $\phi_n$ and $\psi_n$
    satisfy

    $$\phi_n(x) = x^{n^2} + \cdots$$

    $$\psi_n(x) = \begin{cases} nx^{\frac{n^2-1}{2}} + \cdots, & n \text{ odd} \\
    y\left(nx^{\frac{n^2-4}{2}} + \cdots\right), & n \text{ even} \end{cases}$$

    where each ellipsis hides terms of lower degree in $x$.'
  kind: lemma
  location: Section 5.6
  name: Lemma 5.22
- description: For all positive integers $n$, we have $\psi_n^2(x) = n^2 x^{n^2 -
    1} + \cdots$, where the ellipsis denotes terms of degree less than $n^2 - 1$.
  kind: corollary
  location: Section 5.6
  name: Corollary 5.23
- description: Let $E/k$ be an elliptic curve defined by $y^2 = x^3 + Ax + B$. The
    polynomials $\phi_n(x)$ and $\psi_n^2(x)$ are relatively prime.
  kind: lemma
  location: Section 5.6
  name: Lemma 5.24
- description: 'Let $E/k$ be an elliptic curve. The multiplication-by-$n$ map $[n]:
    E \rightarrow E$ has degree $n^{2}$. It is separable if and only if $n$ is not
    divisible by the characteristic of $k$.'
  kind: theorem
  location: Section 5
  name: Theorem 5.25
- description: 'Let $E/k$ be an elliptic curve and let $p:=\operatorname{char}(k)$.
    For each prime $\ell$: $E[\ell^{e}] \simeq \begin{cases} \mathbb{Z}/\ell^{e}\mathbb{Z}
    \oplus \mathbb{Z}/\ell^{e}\mathbb{Z} & \text{if } \ell \neq p \\ \mathbb{Z}/\ell^{e}\mathbb{Z}
    \text{ or } \{0\} & \text{if } \ell=p \end{cases}$'
  kind: theorem
  location: Chapter 6, Section 6.1
  name: Theorem 6.1
- description: Let $E$ be an elliptic curve defined over a field of characteristic
    $p>0$. If $E[p] \simeq \mathbb{Z}/p\mathbb{Z}$ then $E$ is said to be ordinary,
    and if $E[p] \simeq \{0\}$, we say that $E$ is supersingular.
  kind: definition
  location: Chapter 6, Section 6.1
  name: Definition 6.2
- description: Let $E/k$ be an elliptic curve. Every finite subgroup of $E(\bar{k})$
    can be written as the direct sum of two (possibly trivial) cyclic groups, at most
    one of which has order divisible by the characteristic of $k$. If $k=\mathbb{F}_{q}$
    is a finite field of characteristic $p$ we have $E(\mathbb{F}_{q}) \simeq \mathbb{Z}/m\mathbb{Z}
    \oplus \mathbb{Z}/n\mathbb{Z}$ for some positive integers $m, n$ with $m \mid
    n$ and $p \nmid m$.
  kind: corollary
  location: Chapter 6, Section 6.1
  name: Corollary 6.4
- description: Let $E_{1}, E_{2}$ be elliptic curves over a field $k$. For all $n
    \in \mathbb{Z}$ and all $\alpha \in \operatorname{Hom}(E_{1}, E_{2})$ we have
    $[n] \circ \alpha = n\alpha = \alpha \circ [n]$, where the map $[n]$ on the LHS
    is multiplication-by-$n$ on $E_{2}$ and the map $[n]$ on the RHS is multiplication-by-$n$
    on $E_{1}$.
  kind: proposition
  location: Chapter 6, Section 6.2
  name: Proposition 6.5
- description: 'Let $\delta: E_{0} \rightarrow E_{1}$, $\alpha, \beta: E_{1} \rightarrow
    E_{2}$, and $\gamma: E_{2} \rightarrow E_{3}$ be isogenies. Then $\delta \circ
    \alpha = \delta \circ \beta \Longrightarrow \alpha = \beta$ and $\alpha \circ
    \gamma = \beta \circ \gamma \Longrightarrow \alpha = \beta$.'
  kind: lemma
  location: Chapter 6, Section 6.2
  name: Lemma 6.6
- description: 'For any isogeny $\alpha: E_{1} \rightarrow E_{2}$ of elliptic curves
    over a field $k$ there exists a unique isogeny $\hat{\alpha}: E_{2} \rightarrow
    E_{1}$ for which $\hat{\alpha} \circ \alpha = [n]$, where $n = \deg \alpha$.'
  kind: theorem
  location: Chapter 6, Section 6.3
  name: Theorem 6.7
- description: The isogeny $\hat{\alpha}$ given by Theorem 6.7 is the dual isogeny
    of $\alpha$.
  kind: definition
  location: Chapter 6, Section 6.3
  name: Definition 6.8
- description: For an isogeny $\alpha$ of degree $n$ we have $\alpha \circ \hat{\alpha}=[n]$,
    meaning that $\hat{\hat{\alpha}}=\alpha$. For any $n \in \mathbb{Z}$ the endomorphism
    $[n]$ is self-dual, that is, $[\hat{n}]=[n]$.
  kind: lemma
  location: Section 6
  name: Lemma 6.10
- description: For any $\alpha, \beta \in \operatorname{Hom}(E_1, E_2)$ we have $\widehat{\alpha+\beta}=\hat{\alpha}+\hat{\beta}$.
  kind: lemma
  location: Section 6
  name: Lemma 6.11
- description: For any $\alpha \in \operatorname{Hom}(E_2, E_3)$ and $\beta \in \operatorname{Hom}(E_1,
    E_2)$ we have $\widehat{\alpha \circ \beta}=\hat{\beta} \circ \hat{\alpha}$.
  kind: lemma
  location: Section 6
  name: Lemma 6.12
- description: 'Let $E/k$ be an elliptic curve. The endomorphism ring of $E$ is the
    additive group $\operatorname{End}(E):=\operatorname{Hom}(E, E)$ with multiplication
    given by composition: $\alpha \beta:=\alpha \circ \beta$.'
  kind: definition
  location: Section 6.4
  name: Definition 6.13
- description: For any endomorphism $\alpha$ we have $\alpha+\hat{\alpha}=1+\operatorname{deg}
    \alpha-\operatorname{deg}(1-\alpha)$.
  kind: lemma
  location: Section 6.4
  name: Lemma 6.16
- description: The trace of an endomorphism $\alpha$ is the integer $\operatorname{tr}
    \alpha:=\alpha+\hat{\alpha}$.
  kind: definition
  location: Section 6.4
  name: Definition 6.17
- description: Let $\alpha$ be an endomorphism of an elliptic curve. Both $\alpha$
    and its dual $\hat{\alpha}$ are solutions to $\lambda^{2}-(\operatorname{tr} \alpha)
    \lambda+\operatorname{deg} \alpha=0$.
  kind: theorem
  location: Section 6.4
  name: Theorem 6.18
- description: Let $\alpha$ and $\beta$ be endomorphisms of an elliptic curve $E/k$
    and let $m$ be the maximum of $\operatorname{deg} \alpha$ and $\operatorname{deg}
    \beta$. Let $n \geq 2\sqrt{m}+1$ be an integer prime to the characteristic of
    $k$, and also relatively prime to the integers $\operatorname{deg} \alpha$ and
    $\operatorname{deg} \beta$. If $\alpha_n=\beta_n$ then $\alpha=\beta$.
  kind: lemma
  location: Section 6.5
  name: Lemma 6.19
- description: Let $\alpha$ be an endomorphism of an elliptic curve $E/k$ and let
    $n$ be a positive integer prime to the characteristic of $k$. Then $\operatorname{tr}
    \alpha \equiv \operatorname{tr} \alpha_n \bmod n$ and $\operatorname{deg} \alpha
    \equiv \operatorname{det} \alpha_n \bmod n$.
  kind: theorem
  location: Section 6.5
  name: Theorem 6.20
- description: Let $\alpha$ and $\beta$ be isogenies from $E_1$ to $E_2$, with $\alpha$
    inseparable. Then $\alpha+\beta$ is inseparable if and only if $\beta$ is inseparable.
  kind: lemma
  location: Section 7.1
  name: Lemma 7.1
- description: Let $E/\mathbb{F}_q$ be an elliptic curve over a finite field. Then
    $\# E(\mathbb{F}_q)=q+1-t$ where $t:=\operatorname{tr} \pi_E$ is the trace of
    the Frobenius endomorphism $\pi_E$ and $|t| \leq 2\sqrt{q}$.
  kind: theorem
  location: Section 7.2
  name: Theorem 7.3 (Hasse)
- description: 'Given an element $P$ of an additive group and the prime factorization
    $M=p_{1}^{e_{1}} \cdots p_{r}^{e_{r}}$ of an integer $M$ for which $MP=0$, compute
    the order of $P$ as follows: 1. Let $m=M=p_{1}^{e_{1}} \cdots p_{r}^{e_{r}}$.
    2. For each prime $p_{i}$, while $p_{i} \mid m$ and $(m/p_{i})P=0$, replace $m$
    by $m/p_{i}$. 3. Output $m$.'
  kind: construction
  location: Section 7.4
  name: Algorithm 7.4
- description: 'For a finite group $G$, the exponent of $G$, denoted $\lambda(G)$,
    is defined by $\lambda(G)=\operatorname{lcm}\{|\alpha|: \alpha \in G\}$.'
  kind: definition
  location: Section 7.5
  name: Definition 7.5
- description: Let $G$ be a finite abelian group with exponent $\lambda(G)$. Let $\alpha$
    and $\beta$ be uniformly distributed random elements of $G$. Then $\operatorname{Pr}[\operatorname{lcm}(|\alpha|,|\beta|)=\lambda(G)]>\frac{6}{\pi^{2}}$.
  kind: theorem
  location: Section 7.5
  name: Theorem 7.6
- description: Let $p>229$ be prime, and let $E/\mathbb{F}_{p}$ be an elliptic curve
    with quadratic twist $\widetilde{E}/\mathbb{F}_{p}$. At least one of the integers
    $\lambda(E(\mathbb{F}_{p}))$ and $\lambda(\widetilde{E}(\mathbb{F}_{p}))$ has
    a unique multiple in the Hasse interval $\mathcal{H}(p)=[(\sqrt{p}-1)^{2},(\sqrt{p}+1)^{2}]$.
  kind: theorem
  location: Section 7.7
  name: Theorem 7.7 (Mestre)
- description: Let $E/\mathbb{F}_{q}$ be an elliptic curve with Frobenius endomorphism
    $\pi$, let $\ell$ be a prime not dividing $q$, and let $P \in E[\ell]$ be nonzero.
    Suppose that for some integer $c$ the equation $\pi_{\ell}^{2}(P)-c \pi_{\ell}(P)+q_{\ell}(P)=0$
    holds. Then $c \equiv t_{\ell}=\operatorname{tr} \pi \bmod \ell$.
  kind: lemma
  location: Section 8.2
  name: Lemma 8.2
- description: Suppose $G=\mathbb{F}_{101}^{\times}$. Then $\log_{3} 37=24$, since
    $3^{24} \equiv 37 \bmod 101$.
  kind: claim
  location: Section 9
  name: Example 9.1
- description: Suppose $G=\mathbb{F}_{101}^{+}$. Then $\log_{3} 37=46$, since $46
    \cdot 3 \equiv 37 \bmod 101$.
  kind: claim
  location: Section 9
  name: Example 9.2
- description: 'Let $V$ be a finite set. For any $v_{0} \in V$, the expected value
    of $\rho$ for a walk from $v_{0}$ defined by a random function $f: V \to V$ is
    $\mathrm{E}[\rho] \sim \sqrt{\pi N / 2}$ as the cardinality $N$ of $V$ tends to
    infinity.'
  kind: theorem
  location: Section 9.7.2
  name: Theorem 9.3
- description: 'Given $\alpha$, $N=|\alpha|$, $\beta \in \langle\alpha\rangle$, compute
    $\log_{\alpha} \beta$ as follows: 1. Compute $\delta_{i}=c_{i} \alpha+d_{i} \beta$
    for $r \approx 20$ randomly chosen pairs $c_{i}, d_{i} \in \mathbb{Z}/N\mathbb{Z}$.
    2. Compute $\gamma_{0}=a_{0} \alpha+b_{0} \beta$ for randomly chosen $a_{0}, b_{0}
    \in \mathbb{Z}/N\mathbb{Z}$. 3. Compute $(a_{j}, b_{j}, \gamma_{j})=f(a_{j-1},
    b_{j-1}, \gamma_{j-1})$ for $j=1,2,3,\ldots$, until $\gamma_{k}=\gamma_{j}$ with
    $k>j$. 4. The collision $\gamma_{k}=\gamma_{j}$ implies $a_{j} \alpha+b_{j} \beta=a_{k}
    \alpha+b_{k} \beta$. Provided that $b_{k}-b_{j}$ is invertible in $\mathbb{Z}/N\mathbb{Z}$,
    we return $\log_{\alpha} \beta=\frac{a_{j}-a_{k}}{b_{k}-b_{j}} \in \mathbb{Z}/N\mathbb{Z}$;
    otherwise start over at step 1.'
  kind: construction
  location: Section 9.8
  name: Algorithm 9.5 (Pollard-$\rho$)
- description: "1. Pick random c_i, d_i, a_0, b_0 ∈ ℤ/Nℤ, compute δ_i = c_i α + d_i\
    \ β and γ_0 = a_0 α + b_0 β, and initialize D ← ∅.\n2. For j = 1, 2, 3, …:\n \
    \ a. Compute (a_j, b_j, γ_j) = f(a_{j-1}, b_{j-1}, γ_{j-1}).\n  b. If B(γ_j) =\
    \ 1 then\n    i. If there exists (a_k, b_k, γ_k) ∈ D with γ_j = γ_k then return\
    \ log_α β = (a_j − a_k)/(b_k − b_j) if gcd(b_k − b_j, N) = 1 and restart at step\
    \ 1 otherwise.\n    ii. If not, replace D by D ∪ {(a_j, b_j, γ_j)} and continue."
  kind: construction
  location: Section 9.10
  name: Algorithm 9.6 (Pollard-ρ using distinguished points)
- description: 'Let G = ⟨α⟩ be a group of order N. Let B be a black box for G supporting
    the operations identity, inverse, and compose, using a random identification map
    id: G ↪ {0,1}^m. Let A: {0,1}^m × {0,1}^m → ℤ/Nℤ be a randomized generic group
    algorithm that makes at most s − 4⌈lg N⌉ calls to B, for some integer s, and let
    x denote a random element of ℤ/Nℤ. Then Pr_{x, id, τ}[A(id(α), id(xα)) = x] <
    s²/(2p), where τ denotes the random coin-flips made by A and p is the largest
    prime factor of N.'
  kind: theorem
  location: Section 9.13
  name: Theorem 9.7 (Shoup)
- description: Let G be a cyclic group of prime order N. Every deterministic generic
    algorithm for the discrete logarithm problem in G uses at least (√2 + o(1))√N
    group operations.
  kind: corollary
  location: Section 9.13
  name: Corollary 9.8
- description: Let G be a cyclic group of prime order N. Every generic Monte Carlo
    algorithm for the discrete logarithm problem in G that uses o(√N / log N) random
    group elements uses at least (1 + o(1))√N group operations.
  kind: corollary
  location: Section 9.13
  name: Corollary 9.9
- description: Let G be a cyclic group of prime order N. Every generic Las Vegas algorithm
    for the discrete logarithm problem in G that generates an expected o(√N / log
    N) random group elements uses at least (2√2/3 + o(1))√N expected group operations.
  kind: corollary
  location: Section 9.13
  name: Corollary 9.10
- description: Let G be a cyclic group of prime order N. Every generic Las Vegas algorithm
    for the discrete logarithm problem in G uses an expected Ω(√N) group operations.
  kind: corollary
  location: Section 9.13
  name: Corollary 9.11
- description: The asymptotic bound $\frac{1}{x} \psi(x, x^{1/u}) = u^{-u+o(u)}$ holds
    uniformly as $u, x \rightarrow \infty$, provided that $u < (1-\epsilon) \log x
    / \log \log x$ for some $\epsilon > 0$.
  kind: theorem
  location: Chapter 10, Section 10.2
  name: Theorem 10.6 (Canfield-Erdős-Pomerance)
- description: 'Given $\beta \in \langle\alpha\rangle = (\mathbb{Z}/p\mathbb{Z})^{\times}$,
    compute $\log_{\alpha} \beta$ as follows:

    1. Pick a smoothness bound $B$, compute the factor base $P_B := \{p_1, \ldots,
    p_b\}$ with $b := \pi(B)$, and let $N := p-1$.

    2. Generate $b+1$ random relations $R_i = (e_{i,1}, e_{i,2}, \ldots, e_{i,b},
    1, e_i)$ by picking $e \in [1, N]$ at random and attempting to factor $\alpha^e
    \beta^{-1} \in [1, N]$ over the factor base $P_B$. Each successful factorization
    yields a relation $R_i$ with $e_i = e$ and $\alpha^{e_i}\beta^{-1} = \prod p_j^{e_{i,j}}$.

    3. Attempt to solve the system defined by the relations $R_1, \ldots, R_{b+1}$
    for $x_{b+1} \in \mathbb{Z}/N\mathbb{Z}$ using linear algebra (row reduce the
    corresponding matrix).

    4. If $x_{b+1} = \log_{\alpha} \beta$ is uniquely determined, return this value,
    otherwise go to step 2.'
  kind: construction
  location: Section 10.1
  name: Algorithm 10.1 (Index calculus)
- description: 'Input: An integer N to be factored and a smoothness bound B. Output:
    A proper divisor of N or failure. 1. Pick a random integer a ∈ [1, N−1]. 2. If
    d = gcd(a, N) is not 1 then return d. 3. Set b = a and for each prime ℓ ≤ B: a.
    Set b = b^{ℓ^e} mod N, where ℓ^{e−1} < N ≤ ℓ^e. If b = 1 then return failure.
    b. If d = gcd(b−1, N) is not 1 then return d. 4. Return failure.'
  kind: construction
  location: Section 10.5
  name: Algorithm 10.8 (Pollard p−1 factorization)
- description: Let p and q be prime divisors of N, and let ℓ_p and ℓ_q be the largest
    prime divisors of p−1 and q−1, respectively. If ℓ_p ≤ B and ℓ_p < ℓ_q then Algorithm
    10.8 succeeds with probability at least 1 − 1/ℓ_q.
  kind: theorem
  location: Section 10.5
  name: Theorem 10.10
- description: 'Input: An integer N to be factored, a smoothness bound B, and a prime
    bound M. Output: A proper divisor of N or failure. 1. Pick random integers a,
    x_0, y_0 ∈ [0, N−1] and set b = y_0^2 − x_0^3 − a x_0. 2. If d = gcd(4a^3 + 27b^2,
    N) is not 1 then return d if d < N or failure if d = N. 3. Let Q = P = (x_0 :
    y_0 : 1). 4. For all primes ℓ < B: a. Set Q = ℓ^e Q mod N, where ℓ^{e−1} ≤ (√M
    + 1)^2 < ℓ^e. b. If d = gcd(Q_z, N) is not 1 then return d if d < N or failure
    if d = N. 5. Return failure.'
  kind: construction
  location: Section 10.6
  name: Algorithm 10.11 (ECM)
- description: Assume 4a^3 + 27b^2 is not divisible by N, and let P_1 and P_2 be the
    reductions of P modulo distinct primes p_1 and p_2 dividing N, with p_1 ≤ M. Suppose
    |P_1| is ℓ_1-smooth and |P_2| is not, for some prime ℓ_1 ≤ B. Then Algorithm 10.11
    succeeds.
  kind: theorem
  location: Section 10.6
  name: Theorem 10.12
- description: The Montgomery curve $E/k$ defined by $By^2 = x^3 + Ax^2 + x$ has either
    three rational points of order 2 or a rational point of order 4 (possibly both).
  kind: theorem
  location: Section 10.10
  name: Theorem 10.14
- description: 'Let $E: y^2 = x^3 + ax + b$ be an elliptic curve over a field $k$.
    Suppose $E(k)$ contains a point $P$ of order 4, and let $2P = (x_0, 0)$. Then
    $3x_0^2 + a$ is a square in $k$ and $E$ can be put in Montgomery form $E'': By^2
    = x^3 + Ax^2 + x$ by setting $B = 1/\sqrt{3x_0^2 + a}$ and $A = 3x_0 B$; the map
    $(x, y) \mapsto (B(x - x_0), By)$ defines an isomorphism from $E$ to $E''$.'
  kind: theorem
  location: Section 10.10
  name: Theorem 10.15
- description: 'If $N$ is prime, then for all $a \in \mathbb{Z}/N\mathbb{Z}$: $a^N
    = a$.'
  kind: theorem
  location: Section 11.1
  name: Theorem 11.2 (Fermat)
- description: A Carmichael number is a composite integer $N$ such that $a^N \equiv
    a \bmod N$ for every integer $a$.
  kind: definition
  location: Section 11.1
  name: Definition 11.3
- description: The set of Carmichael numbers is infinite.
  kind: theorem
  location: Section 11.1
  name: Theorem 11.4 (Alford-Granville-Pomerance)
- description: A positive integer $N$ is prime if and only if $\phi(N) = N - 1$.
  kind: theorem
  location: Section 11.1
  name: Theorem 11.5
- description: 'Let $p = 2^s t + 1$ be prime, with $t$ odd, and let $a$ be an integer
    that is nonzero modulo $p$. Exactly one of the following holds: (i) $a^t \equiv
    1 \bmod p$; (ii) $a^{2^i t} \equiv -1 \bmod p$, for some $0 \leq i < s$.'
  kind: lemma
  location: Section 11.1
  name: Lemma 11.6
- description: 'Let $N = 2^s t + 1$ be an odd integer, with $t$ odd. An integer $a
    \not\equiv 0 \bmod N$ is a witness for (the compositeness of) $N$ if both of the
    following hold: (i) $a^t \not\equiv 1 \bmod N$; (ii) $a^{2^i t} \not\equiv -1
    \bmod N$ for $0 \leq i < s$.'
  kind: definition
  location: Section 11.1
  name: Definition 11.7
- description: Let $N$ be an odd composite integer. The probability that a random
    integer $a \in [1, N-1]$ is a witness for $N$ is at least $3/4$.
  kind: theorem
  location: Section 11.1
  name: Theorem 11.8 (Monier-Rabin)
- description: Let $N$ be a random odd integer in the interval $[2^{k-1}, 2^k]$ and
    let $a$ be a random integer in $[1, N-1]$. Then $$\operatorname{Pr}[N \text{ is
    prime} \mid a \text{ is not a witness for } N] \geq 1 - k^2 \cdot 4^{2-\sqrt{k}}.$$
  kind: theorem
  location: Section 11
  name: Theorem 11.11 (Damgård-Landrock-Pomerance)
- description: 'Let $P = (P_x : P_y : P_z)$ be a projective point on an elliptic curve
    $E/\mathbb{Q}$, with $P_x, P_y, P_z \in \mathbb{Z}$, and let $N$ be a nonzero
    integer. If $P_z \equiv 0 \bmod N$ then $P$ is zero $\bmod N$; otherwise, $P$
    is nonzero $\bmod N$. If $\gcd(P_z, N) = 1$ then $P$ is strongly nonzero $\bmod
    N$.'
  kind: definition
  location: Section 11.2
  name: Definition 11.12
- description: Let $E/\mathbb{Q}$ be an elliptic curve, and let $M, N > 1$ be integers
    with $M > (N^{1/4}+1)^2$ and $N \perp \Delta(E)$, and let $P \in E(\mathbb{Q})$.
    If $MP$ is zero $\bmod N$ and $(M/\ell)P$ is strongly nonzero $\bmod N$ for every
    prime $\ell \mid M$ then $N$ is prime.
  kind: theorem
  location: Section 11.2
  name: Theorem 11.13 (Goldwasser-Kilian)
- description: 'A primality certificate for $p$ is a tuple of integers $(p, A, B,
    x_1, y_1, q)$, where $P = (x_1 : y_1 : 1)$ is a point on the elliptic curve $E:
    y^2 = x^3 + Ax + B$ over $\mathbb{Q}$, the integer $p > 1$ is prime to $\Delta(E)$,
    and $qP$ is zero $\bmod p$ with $q > (p^{1/4}+1)^2$.'
  kind: definition
  location: Section 11.2
  name: Definition 11.14
- description: 'An anti-homomorphism $\varphi: R \rightarrow S$ of rings is a homomorphism
    of their additive groups that satisfies $\varphi(1_R) = 1_S$ and $\varphi(\alpha\beta)
    = \varphi(\beta)\varphi(\alpha)$ for all $\alpha, \beta \in R$. An involution
    (or anti-involution) is an anti-homomorphism $\varphi: R \rightarrow R$ that is
    its own inverse: $\varphi \circ \varphi$ is the identity map.'
  kind: definition
  location: Chapter 12
  name: Definition 12.1
- description: The endomorphism algebra of $E$ is $\operatorname{End}^0(E) := \operatorname{End}(E)
    \otimes_{\mathbb{Z}} \mathbb{Q}$.
  kind: definition
  location: Section 12.1
  name: Definition 12.2
- description: Let $R$ be an integral domain with fraction field $B$, and let $A$
    be an $R$-algebra. Every element of $A \otimes_R B$ can be written as a pure tensor
    $\alpha \otimes \beta$.
  kind: lemma
  location: Section 12.1
  name: Lemma 12.5
- description: Let $\alpha \in \operatorname{End}^{0}(E)$. The (reduced) norm of $\alpha$
    is $\mathrm{N} \alpha = \alpha \hat{\alpha}$ and the (reduced) trace of $\alpha$
    is $\mathrm{T} \alpha=\alpha+\hat{\alpha}$.
  kind: definition
  location: Section 12.2
  name: Definition 12.6
- description: For all $\alpha \in \operatorname{End}^{0}(E)$ we have $\mathrm{N}
    \alpha \in \mathbb{Q}_{\geq 0}$, with $\mathrm{N} \alpha=0$ if and only if $\alpha=0$.
    We also have $\mathrm{N} \hat{\alpha}=\mathrm{N} \alpha$ and $\mathrm{N}(\alpha
    \beta)=\mathrm{N} \alpha \mathrm{N} \beta$ for all $\alpha, \beta \in \operatorname{End}^{0}(E)$.
  kind: lemma
  location: Section 12.2
  name: Lemma 12.7
- description: Every nonzero $\alpha \in \operatorname{End}^{0}(E)$ has a multiplicative
    inverse $\alpha^{-1}$.
  kind: corollary
  location: Section 12.2
  name: Corollary 12.8
- description: For all $\alpha \in \operatorname{End}^{0}(E)$ we have $\mathrm{T}
    \hat{\alpha}=\mathrm{T} \alpha \in \mathbb{Q}$. For any $r \in \mathbb{Q}, \alpha,
    \beta \in \operatorname{End}^{0}(E)$ we have $\mathrm{T}(\alpha+\beta)=\mathrm{T}
    \alpha+\mathrm{T} \beta$, and $\mathrm{T}(r \alpha)=r \mathrm{T} \alpha$.
  kind: lemma
  location: Section 12.2
  name: Lemma 12.9
- description: Let $\alpha \in \operatorname{End}^{0}(E)$. Then $\alpha$ and $\hat{\alpha}$
    are roots of the polynomial $x^{2}-(\mathrm{T} \alpha) x+\mathrm{N} \alpha \in
    \mathbb{Q}[x]$.
  kind: lemma
  location: Section 12.2
  name: Lemma 12.10
- description: For any nonzero $\alpha \in \operatorname{End}^{0}(E)$, if $\mathrm{T}
    \alpha=0$ then $\alpha^{2}=-\mathrm{N} \alpha<0$. An element $\alpha \in \operatorname{End}^{0}(E)$
    is fixed by the Rosati involution if and only if $\alpha \in \mathbb{Q}$.
  kind: corollary
  location: Section 12.2
  name: Corollary 12.11
- description: A quaternion algebra over a field $k$ is a $k$-algebra that has a $k$-basis
    of the form $\{1, \alpha, \beta, \alpha \beta\}$, with $\alpha^{2}, \beta^{2}
    \in k^{\times}$ and $\alpha \beta=-\beta \alpha$.
  kind: definition
  location: Section 12.3
  name: Definition 12.12
- description: A quaternion algebra is a division ring if and only if $\mathrm{N}
    \gamma=0$ implies $\gamma=0$.
  kind: lemma
  location: Section 12.3
  name: Lemma 12.13
- description: 'Let $E/k$ be an elliptic curve. Then $\operatorname{End}^{0}(E)$ is
    isomorphic to one of: (i) the field of rational numbers $\mathbb{Q}$; (ii) an
    imaginary quadratic field $\mathbb{Q}(\alpha)$ with $\alpha^{2}<0$; (iii) a quaternion
    algebra $\mathbb{Q}(\alpha, \beta)$ with $\alpha^{2}, \beta^{2}<0$.'
  kind: theorem
  location: Section 12.4
  name: Theorem 12.17
- description: If $\alpha, \beta \in \operatorname{End}^{0}(E)$ commute and $\alpha
    \notin \mathbb{Q}$ then $\beta \in \mathbb{Q}(\alpha)$.
  kind: lemma
  location: Section 12.4
  name: Lemma 12.18
- description: Let $E/k$ be an elliptic curve. The endomorphism ring $\operatorname{End}(E)$
    is a free $\mathbb{Z}$-module of rank $r$, where $r=1,2,4$ is the dimension of
    $\operatorname{End}^{0}(E)$ as a $\mathbb{Q}$-vector space.
  kind: corollary
  location: Section 12.4
  name: Corollary 12.20
- description: An elliptic curve $E$ for which $\operatorname{End}(E) \not\simeq \mathbb{Z}$
    is said to have complex multiplication.
  kind: definition
  location: Section 12 (Lecture 12)
  name: Definition 12.21
- description: Let $K$ be a $\mathbb{Q}$-algebra of finite dimension $r$ as a $\mathbb{Q}$-vector
    space. An order $\mathcal{O}$ in $K$ is a subring of $K$ that is a free $\mathbb{Z}$-module
    of rank $r$. Equivalently, $\mathcal{O}$ is a subring of $K$ that is finitely
    generated as a $\mathbb{Z}$-module and satisfies $K=\mathcal{O} \otimes_{\mathbb{Z}}
    \mathbb{Q}$.
  kind: definition
  location: Section 12.5
  name: Definition 12.22
- description: An algebraic number $\alpha$ is a complex number that is the root of
    a polynomial with coefficients in $\mathbb{Q}$. An algebraic integer is a complex
    number that is the root of a monic polynomial with coefficients in $\mathbb{Z}$.
  kind: definition
  location: Section 12.5
  name: Definition 12.24
- description: The set of algebraic integers $\mathcal{O}_{K}$ in a number field $K$
    form a ring that is a free $\mathbb{Z}$-module of rank $r$, where $r=[K:\mathbb{Q}]$
    is the dimension of $K$ as a $\mathbb{Q}$-vector space.
  kind: theorem
  location: Section 12.5
  name: Theorem 12.25
- description: The ring of integers $\mathcal{O}_{K}$ of a number field $K$ is its
    unique maximal order.
  kind: theorem
  location: Section 12.5
  name: Theorem 12.26
- description: Let $K$ be an imaginary quadratic field with ring of integers $\mathcal{O}_{K}$.
    The orders $\mathcal{O}$ in $K$ are precisely the subrings $\mathbb{Z}+f\mathcal{O}_{K}$,
    where $f$ is any positive integer.
  kind: theorem
  location: Section 12.5
  name: Theorem 12.27
- description: 'Let $\phi: E_{1} \rightarrow E_{2}$ be an isogeny of elliptic curves.
    Then $E_{1}$ is supersingular if and only if $E_{2}$ is supersingular (and $E_{1}$
    is ordinary if and only if $E_{2}$ is ordinary).'
  kind: theorem
  location: Section 13 (Lecture 13)
  name: Theorem 13.2
- description: An elliptic curve $E/\mathbb{F}_{q}$ is supersingular if and only if
    $\operatorname{tr} \pi_{E} \equiv 0 \bmod p$.
  kind: theorem
  location: Section 13.1
  name: Theorem 13.3
- description: Let $E/\mathbb{F}_{p}$ be an elliptic curve over a field of prime order
    $p>3$. Then $E$ is supersingular if and only if $\operatorname{tr} \pi_{E}=0$,
    equivalently, if and only if $\# E(\mathbb{F}_{p})=p+1$.
  kind: corollary
  location: Section 13.1
  name: Corollary 13.4
- description: Let $E$ be an elliptic curve over a finite field $\mathbb{F}_{q}$ and
    suppose $\pi_{E} \notin \mathbb{Z}$. Then $\operatorname{End}^{0}(E)=\mathbb{Q}(\pi_{E})
    \simeq \mathbb{Q}(\sqrt{D})$ is an imaginary quadratic field with $D=(\operatorname{tr}
    \pi_{E})^{2}-4q$. This applies in particular whenever $q$ is prime, and also whenever
    $E$ is ordinary.
  kind: theorem
  location: Section 13.1
  name: Theorem 13.6
- description: Let $E$ be an elliptic curve over $\mathbb{F}_{q}$ with $q=p^{n}$.
    If $n$ is odd or $E$ is ordinary, then $\operatorname{End}^{0}(E)=\mathbb{Q}(\pi_{E})
    \simeq \mathbb{Q}(\sqrt{D})$ is an imaginary quadratic field with $D=(\operatorname{tr}
    \pi_{E})^{2}-4q$.
  kind: corollary
  location: Section 13.1
  name: Corollary 13.7
- description: 'Let $E/\mathbb{F}_{q}$ be an elliptic curve for which $\operatorname{End}^{0}(E)$
    is an imaginary quadratic field $K$ with ring of integers $\mathcal{O}_{K}$. Then
    $\mathbb{Z}[\pi_{E}] \subseteq \operatorname{End}(E) \subseteq \mathcal{O}_{K}$,
    and the conductor of $\operatorname{End}(E)$ divides $[\mathcal{O}_{K} : \mathbb{Z}[\pi_{E}]]$.'
  kind: theorem
  location: Section 13.1
  name: Theorem 13.8
- description: 'The $j$-invariant of the elliptic curve $E: y^{2}=x^{3}+Ax+B$ is $j(E)=j(A,B)=1728
    \frac{4A^{3}}{4A^{3}+27B^{2}}$.'
  kind: definition
  location: Section 13.2
  name: Definition 13.11
- description: For every $j_{0} \in k$ there is an elliptic curve $E / k$ with $j$-invariant
    $j(E)=j_{0}$.
  kind: theorem
  location: Section 13.2
  name: Theorem 13.12
- description: 'Elliptic curves $E: y^{2}=x^{3}+Ax+B$ and $E^{\prime}: y^{2}=x^{3}+A^{\prime}x+B^{\prime}$
    defined over $k$ are isomorphic (over $k$) if and only if $A^{\prime}=\mu^{4}
    A$ and $B^{\prime}=\mu^{6} B$, for some $\mu \in k^{\times}$.'
  kind: theorem
  location: Section 13.2
  name: Theorem 13.13
- description: Let $E$ and $E^{\prime}$ be elliptic curves over $k$. Then $E$ and
    $E^{\prime}$ are isomorphic over $\bar{k}$ if and only if $j(E)=j\left(E^{\prime}\right)$.
    If $j(E)=j\left(E^{\prime}\right)$ and the characteristic of $k$ is not 2 or 3
    then there is a field extension $K / k$ of degree at most 6, 4, or 2, depending
    on whether $j(E)=0$, $j(E)=1728$, or $j(E) \neq 0,1728$, such that $E$ and $E^{\prime}$
    are isomorphic over $K$.
  kind: theorem
  location: Section 13.2
  name: Theorem 13.14
- description: Let $E$ be a supersingular elliptic curve over a field $k$ of characteristic
    $p>0$. Then $j(E)$ lies in $\mathbb{F}_{p^{2}}$ (and possibly in $\mathbb{F}_{p}$).
  kind: theorem
  location: Section 13.3
  name: Theorem 13.16
- description: Let $E$ be a supersingular elliptic curve over a field $k$ of characteristic
    $p$. Then $\operatorname{End}^{0}\left(E_{\bar{k}}\right)$ is a quaternion algebra.
  kind: theorem
  location: Section 13.3
  name: Theorem 13.18
- description: Let $E$ be an elliptic curve over a field $k$ of characteristic $p$
    for which $\operatorname{End}^{0}\left(E_{\bar{k}}\right)$ is a quaternion algebra.
    Then $E$ is supersingular.
  kind: theorem
  location: Section 13.3
  name: Theorem 13.19
- description: Let $E$ be an elliptic curve over a finite field of characteristic
    $p$. Either $E$ is supersingular, $\operatorname{tr} \pi_{E} \equiv 0 \bmod p$,
    and $\operatorname{End}^{0}\left(E_{\overline{\mathbb{F}}_{q}}\right)$ is a quaternion
    algebra, or $E$ is ordinary, $\operatorname{tr} \pi_{E} \not\equiv 0 \bmod p$,
    and $\operatorname{End}^{0}\left(E_{\overline{\mathbb{F}}_{q}}\right)=\operatorname{End}^{0}\left(E_{\mathbb{F}_{q}}\right)$
    is an imaginary quadratic field.
  kind: corollary
  location: Section 13.3
  name: Corollary 13.20
- description: A lattice $L=\left[\omega_{1}, \omega_{2}\right]$ is an additive subgroup
    $\omega_{1} \mathbb{Z}+\omega_{2} \mathbb{Z}$ of $\mathbb{C}$ generated by complex
    numbers $\omega_{1}$ and $\omega_{2}$ that are linearly independent over $\mathbb{R}$.
  kind: definition
  location: Section 14.1
  name: Definition 14.1
- description: 'A fundamental parallelogram for $L=\left[\omega_{1}, \omega_{2}\right]$
    is any set of the form $\mathcal{F}_{\alpha}=\left\{\alpha+t_{1} \omega_{1}+t_{2}
    \omega_{2}: \alpha \in \mathbb{C}, 0 \leq t_{1}, t_{2}<1\right\}$.'
  kind: definition
  location: Section 14.1
  name: Definition 14.3
- description: 'A function $f: \Omega \rightarrow \mathbb{C}$ defined on an open neighborhood
    $\Omega$ of a point $z_{0} \in \mathbb{C}$ is said to be holomorphic at $z_{0}$
    if the derivative $f^{\prime}\left(z_{0}\right):=\lim_{z \rightarrow z_{0}} \frac{f(z)-f\left(z_{0}\right)}{z-z_{0}}$
    exists. We say that $f$ is holomorphic on an open set $\Omega$ if it is holomorphic
    at every $z_{0} \in \Omega$. Functions that are holomorphic on all of $\mathbb{C}$
    are simply said to be holomorphic or entire.'
  kind: definition
  location: Section 14.1
  name: Definition 14.4
- description: Let $k$ be a positive integer. A complex function $f(z)$ has a zero
    of order $k$ at $z_{0}$ if an equation of the form $$f(z)=(z-z_{0})^{k} g(z)$$
    holds in some open neighborhood of $z_{0}$ in which $g(z)$ is holomorphic and
    $g(z_{0}) \neq 0$. We say that $f(z)$ has a pole of order $k$ at $z_{0}$ if the
    function $1/f(z)$ has a zero of order $k$ at $z_{0}$. A pole or zero of order
    1 is called a simple pole or a simple zero.
  kind: definition
  location: Section 14.1
  name: Definition 14.5
- description: A complex function $f$ is meromorphic on an open set $\Omega$ if it
    is holomorphic at every point on $\Omega$ except for a discrete set of poles.
  kind: definition
  location: Section 14.1
  name: Definition 14.6
- description: For any nonzero complex function $f(z)$ that is meromorphic on an open
    neighborhood of a point $z_{0} \in \mathbb{C}$ we define $$\operatorname{ord}_{z_{0}}(f):=
    \begin{cases}n & \text{ if } f \text{ has a zero of order } n \text{ at } z_{0}
    \\ -n & \text{ if } f \text{ has a pole of order } n \text{ at } z_{0} \\ 0 &
    \text{ otherwise }\end{cases}$$
  kind: definition
  location: Section 14.1
  name: Definition 14.7
- description: An elliptic function for a lattice $L$ is a complex function $f(z)$
    such that 1. $f$ is meromorphic on $\mathbb{C}$. 2. $f$ is periodic with respect
    to $L$; this means that $f(z+\omega)=f(z)$ for all $\omega \in L$.
  kind: definition
  location: Section 14.1
  name: Definition 14.8
- description: The order of an elliptic function is the number of poles it has in
    any fundamental parallelogram, where each pole is counted with multiplicity equal
    to its order (this is a finite number because the poles in a fundamental parallelogram
    are a discrete subset of its closure, which is compact).
  kind: definition
  location: Section 14.1
  name: Definition 14.9
- description: A smooth curve in $\mathbb{C}$ is a continuously differentiable function
    $\gamma:[a, b] \rightarrow \mathbb{C}$ where $[a, b]$ is a closed interval in
    $\mathbb{R}$. A piecewise smooth curve $\gamma:[a, b] \rightarrow \mathbb{C}$
    is defined by a finite sequence of $n$ smooth curves $\gamma_{i}:[a_{i}, b_{i}]
    \rightarrow \mathbb{C}$ with $a_{0}=a, a_{i+1}=b_{i}$, and $b_{n}=b$. We will
    simply use the term curve to refer to a piecewise smooth curve. A curve is simple
    if its restriction to the open interval $(a, b)$ is injective, and it is closed
    if $\gamma(a)=\gamma(b)$.
  kind: definition
  location: Section 14.2
  name: Definition 14.11
- description: For a smooth curve $\gamma:[a, b] \rightarrow \mathbb{C}$ and a complex
    function $f(z)$ defined on an open set containing $\gamma$ the contour integral
    of $f$ along $\gamma$ is defined by $$\int_{\gamma} f(z) dz:=\int_{a}^{b} f(\gamma(t))
    \gamma'(t) dt$$ This definition extends to piecewise smooth curves in the obvious
    way (sum the contour integrals on each smooth piece).
  kind: definition
  location: Section 14.2
  name: Definition 14.12
- description: Let $\Omega$ be an open set containing a curve $\gamma:[a, b] \rightarrow
    \mathbb{C}$, and let $F(z)$ be a holomorphic function on $\Omega$ and let $f(z)=F'(z)$.
    Then $$\int_{\gamma} f(z) dz=F(\gamma(b))-F(\gamma(a))$$
  kind: theorem
  location: Section 14.2
  name: Theorem 14.13
- description: Let $f$ be a function that is holomorphic on an open set containing
    a closed curve $\gamma$ and its interior. Then $$\int_{\gamma} f(z) dz=0$$
  kind: theorem
  location: Section 14.2
  name: Theorem 14.14 (Cauchy's theorem)
- description: The residue at $z_{0}$ of a function $f(z)=\sum_{n \geq n_{0}} a_{n}(z-z_{0})^{n}$
    that is meromorphic on an open neighborhood of $z_{0}$ is $$\operatorname{res}_{z_{0}}(f):=a_{-1}$$
  kind: definition
  location: Section 14.2
  name: Definition 14.15
- description: Let $\gamma$ be a simple closed curve with positive orientation and
    let $f(z)$ be a function that is meromorphic on an open set containing $\gamma$
    and its interior with no poles on $\gamma$. Let $z_{1}, \ldots, z_{N}$ be the
    poles of $f(z)$ that lie in the interior of $\gamma$. Then $$\int_{\gamma} f(z)
    dz=2 \pi i \sum_{k=1}^{N} \operatorname{res}_{z_{k}}(f)$$
  kind: theorem
  location: Section 14.2
  name: Theorem 14.16 (Residue formula)
- description: Let $\gamma$ be a simple closed curve with positive orientation, let
    $f(z)$ be a function that is meromorphic on an open set $\Omega$ containing $\gamma$
    and its interior $\Gamma$, with no zeros or poles on $\gamma$, and let $g(z)$
    be a nonzero function that is holomorphic on $\Omega$. $$\frac{1}{2\pi i} \int_{\gamma}
    g(z) \frac{f'(z)}{f(z)} dz=\sum_{w \in \Gamma} g(w) \operatorname{ord}_{w}(f)$$
    When $g(z)=1$, the RHS is the difference between the number of zeros and poles
    that $f(z)$ has in $\Gamma$ (counted with multiplicity), which is the usual argument
    principle.
  kind: theorem
  location: Section 14.2
  name: Theorem 14.17
- description: Let $f(z)$ be a nonzero elliptic function for a lattice $L$. When counted
    with multiplicity, the number of zeros of $f(z)$ in any fundamental parallelogram
    $F_{\alpha}$ for $L$ is equal to the number of poles of $f(z)$ in $F_{\alpha}$.
  kind: theorem
  location: Section 14.2
  name: Theorem 14.18
- description: Let $L$ be a lattice and let $k>2$ be an integer. The weight-$k$ Eisenstein
    series for $L$ is the sum $$G_{k}(L)=\sum_{\omega \in L^{*}} \frac{1}{\omega^{k}}$$
    where $L^{*}=L-\{0\}$.
  kind: definition
  location: Section 14.3
  name: Definition 14.19
- description: For any lattice $L$, the sum $\sum_{\omega \in L^{*}} \frac{1}{\omega^{k}}$
    converges absolutely for all $k>2$.
  kind: lemma
  location: Section 14.3
  name: Lemma 14.22
- description: The Weierstrass $\wp$-function of a lattice $L$ is defined by $$\wp(z):=\wp(z
    ; L):=\frac{1}{z^{2}}+\sum_{\omega \in L^{*}}\left(\frac{1}{(z-\omega)^{2}}-\frac{1}{\omega^{2}}\right).$$
  kind: definition
  location: Section 14.4
  name: Definition 14.23
- description: Suppose $\{f_{n}\}$ is a sequence of functions holomorphic on an open
    set $\Omega$, and that $\{f_{n}\}$ converges to a function $f$ uniformly on every
    compact subset of $\Omega$. Then $f$ is holomorphic on $\Omega$.
  kind: theorem
  location: Section 14.4
  name: Theorem 14.24
- description: For any lattice $L$, the function $\wp(z ; L)$ is holomorphic at every
    $z_{0} \notin L$.
  kind: theorem
  location: Section 14.4
  name: Theorem 14.25
- description: 'For any lattice $L$, the function $\wp(z)=\wp(z ; L)$ and its derivative
    $$\wp^{\prime}(z)=-2 \sum_{\omega \in L} \frac{1}{(z-\omega)^{3}}$$ satisfy the
    following: (i) $\wp(z)$ is a meromorphic even function whose poles consist of
    double poles at each $z \in L$. (ii) $\wp^{\prime}(z)$ is a meromorphic odd function
    whose poles consist of triple poles at each $z \in L$.'
  kind: theorem
  location: Section 14.4
  name: Theorem 14.26
- description: Let $L$ be a lattice. The function $\wp(z)=\wp(z ; L)$ is an elliptic
    function of order 2 for $L$, and its derivative $\wp^{\prime}(z)$ is an elliptic
    function of order 3 for $L$.
  kind: corollary
  location: Section 14.4
  name: Corollary 14.27
- description: Let $L$ be a lattice. The Laurent series expansion for $\wp(z)=\wp(z
    ; L)$ at $z=0$ is given by $$\wp(z)=\frac{1}{z^{2}}+\sum_{n=1}^{\infty}(2 n+1)
    G_{2 n+2}(L) z^{2 n}$$ where $G_{k}(L)$ denotes the Eisenstein series of weight
    $k$.
  kind: theorem
  location: Section 14.4
  name: Theorem 14.28
- description: Let $L$ be a lattice. The function $\wp(z)=\wp(z ; L)$ satisfies the
    differential equation $$\wp^{\prime}(z)^{2}=4 \wp(z)^{3}-g_{2}(L) \wp(z)-g_{3}(L)$$
    where $g_{2}(L)=60 G_{4}(L)$ and $g_{3}(L)=140 G_{6}(L)$.
  kind: theorem
  location: Section 14.5
  name: Theorem 14.29
- description: The only functions that are bounded and holomorphic on $\mathbb{C}$
    are constant functions.
  kind: theorem
  location: Section 14.5
  name: Theorem 14.30 (Liouville's Theorem)
- description: A point $z \notin L$ is a zero of $\wp^{\prime}(z ; L)$ if and only
    if $2 z \in L$.
  kind: lemma
  location: Section 14.5
  name: Lemma 14.31
- description: For any lattice $L$, the discriminant $\Delta(L)$ is nonzero.
  kind: lemma
  location: Section 14.5
  name: Lemma 14.33
- description: 'Let $L \subseteq \mathbb{C}$ be a lattice and let $E_{L}: y^{2}=4
    x^{3}-g_{2}(L) x-g_{3}(L)$ be the corresponding elliptic curve. The map $\Phi:
    \mathbb{C} / L \rightarrow E_{L}(\mathbb{C})$ is a group isomorphism.'
  kind: theorem
  location: Section 15.1
  name: Theorem 15.1
- description: The $j$-invariant of a lattice $L$ is defined by $$j(L)=1728 \frac{g_{2}(L)^{3}}{\Delta(L)}=1728
    \frac{g_{2}(L)^{3}}{g_{2}(L)^{3}-27 g_{3}(L)^{2}}$$
  kind: definition
  location: Section 15.2
  name: Definition 15.2
- description: 'The discriminant of an elliptic curve $E: y^{2}=x^{3}+Ax+B$ is $$\Delta(E)=-16\left(4A^{3}+27B^{2}\right)$$'
  kind: definition
  location: Section 15.2
  name: Definition 15.3
- description: Lattices $L$ and $L^{\prime}$ are said to be homothetic if $L^{\prime}=\lambda
    L$ for some $\lambda \in \mathbb{C}^{\times}$.
  kind: definition
  location: Section 15.2
  name: Definition 15.4
- description: Two lattices $L$ and $L^{\prime}$ are homothetic if and only if $j(L)=j(L^{\prime})$.
  kind: theorem
  location: Section 15.2
  name: Theorem 15.5
- description: Two lattices $L$ and $L^{\prime}$ are homothetic if and only if the
    corresponding elliptic curves $E_{L}$ and $E_{L^{\prime}}$ are isomorphic.
  kind: corollary
  location: Section 15.2
  name: Corollary 15.6
- description: 'The $j$-function $j: \mathbb{H} \rightarrow \mathbb{C}$ is defined
    by $j(\tau)=j([1, \tau])$. We similarly define $g_{2}(\tau)=g_{2}([1, \tau])$,
    $g_{3}(\tau)=g_{3}([1, \tau])$, and $\Delta(\tau)=\Delta([1, \tau])$.'
  kind: definition
  location: Section 15.3
  name: Definition 15.7
- description: The $j$-function is holomorphic on $\mathbb{H}$, and satisfies $j(-1/\tau)=j(\tau)$
    and $j(\tau+1)=j(\tau)$.
  kind: theorem
  location: Section 15.3
  name: Theorem 15.8
- description: We have $j(\tau)=j(\tau^{\prime})$ if and only if $\tau^{\prime}=\gamma
    \tau$ for some $\gamma \in \Gamma$.
  kind: lemma
  location: Section 15.4
  name: Lemma 15.9
- description: 'The set $\mathcal{F}=\{\tau \in \mathbb{H}: \operatorname{re}(\tau)
    \in [-1/2,1/2) \text{ and } |\tau| \geq 1, \text{ such that } |\tau|>1 \text{
    if } \operatorname{re}(\tau)>0\}$ is a fundamental domain for $\mathbb{H} / \Gamma$.'
  kind: lemma
  location: Section 15
  name: Lemma 15.10
- description: The restriction of the $j$-function to $\mathcal{F}$ defines a bijection
    from $\mathcal{F}$ to $\mathbb{C}$.
  kind: theorem
  location: Section 15
  name: Theorem 15.11
- description: For every elliptic curve $E/\mathbb{C}$ there exists a lattice $L$
    such that $E=E_L$.
  kind: corollary
  location: Section 15
  name: Corollary 15.12 (Uniformization Theorem)
- description: 'Let $\varphi: \mathbb{C}/L_1 \rightarrow \mathbb{C}/L_2$ be a holomorphic
    map with $\varphi(0)=0$. There is a unique $\alpha \in \mathbb{C}$ for which $\varphi=\varphi_\alpha$.'
  kind: theorem
  location: Section 16.1
  name: Theorem 16.1
- description: 'For any two lattices $L_1, L_2 \subseteq \mathbb{C}$ the map $$\{\alpha
    \in \mathbb{C}: \alpha L_1 \subseteq L_2\} \rightarrow \{\text{morphisms } \varphi:
    \mathbb{C}/L_1 \rightarrow \mathbb{C}/L_2\}, \quad \alpha \mapsto \varphi_\alpha$$
    is an isomorphism of additive groups. If $L_1=L_2$ it is an isomorphism of commutative
    rings.'
  kind: corollary
  location: Section 16.1
  name: Corollary 16.2
- description: 'Let $L \subseteq \mathbb{C}$ be a lattice. The following hold: (i)
    $\mathbb{C}(L)=\mathbb{C}(\wp, \wp'')$; (ii) $\mathbb{C}(L)^{\text{even}}=\mathbb{C}(\wp)$;
    (iii) if $f \in \mathbb{C}(L)^{\text{even}}$ is holomorphic on $\mathbb{C}-L$
    then $f \in \mathbb{C}[\wp]$.'
  kind: lemma
  location: Section 16.2
  name: Lemma 16.3
- description: 'For $i=1,2$ let $L_i \subseteq \mathbb{C}$ be a lattice, let $E_i
    := E_{L_i}$ be the corresponding elliptic curve, define $\wp_i(z) := \wp(z; L_i)$,
    and let $\Phi_i: \mathbb{C}/L_i \rightarrow E_i(\mathbb{C})$ be the isomorphism
    that sends $z \notin L_i$ to $(\wp_i(z), \wp_i''(z))$ and $z \in L_i$ to 0. For
    any $\alpha \in \mathbb{C}$, the following are equivalent: (1) $\alpha L_1 \subseteq
    L_2$; (2) $\wp_2(\alpha z) = u(\wp_1(z))/v(\wp_1(z))$ for some polynomials $u,
    v \in \mathbb{C}[x]$; (3) There is a unique $\phi_\alpha \in \operatorname{Hom}(E_1,
    E_2)$ such that the diagram $\Phi_2 \circ \alpha = \phi_\alpha \circ \Phi_1$ commutes.
    For every morphism $\phi \in \operatorname{Hom}(E_1, E_2)$ there is a unique $\alpha
    = \alpha_\phi$ satisfying (1)-(3). The maps $\phi \mapsto \alpha_\phi$ and $\alpha
    \mapsto \phi_\alpha$ define inverse isomorphisms of $\operatorname{Hom}(E_1, E_2)$
    and $\{\alpha \in \mathbb{C}: \alpha L_1 \subseteq L_2\}$.'
  kind: theorem
  location: Section 16.2
  name: Theorem 16.4
- description: 'Let $L \subseteq \mathbb{C}$ be a lattice and let $E := E_L$. The
    maps $\alpha \mapsto \phi_\alpha$ and $\phi \mapsto \alpha_\phi$ are inverse ring
    isomorphisms between $\{\alpha \in \mathbb{C}: \alpha L \subseteq L\}$ and $\operatorname{End}(E)$,
    the involution $\phi \mapsto \hat{\phi}$ of $\operatorname{End}(E)$ corresponds
    to complex conjugation $\alpha \mapsto \bar{\alpha}$ in $\{\alpha \in \mathbb{C}:
    \alpha L \subseteq L\}$, and we have $\mathrm{T}(\alpha) := \alpha + \bar{\alpha}
    = \operatorname{tr} \phi_\alpha$ and $\mathrm{N}(\alpha) := \alpha\bar{\alpha}
    = \operatorname{deg} \phi_\alpha = \operatorname{deg} u = \operatorname{deg} v
    + 1$, where $u, v \in \mathbb{C}[x]$ are as in (2) of Theorem 16.4.'
  kind: corollary
  location: Section 16.3
  name: Corollary 16.5
- description: Let $E$ be an elliptic curve defined over $\mathbb{C}$. Then $\operatorname{End}(E)$
    is commutative and therefore isomorphic to either $\mathbb{Z}$ or an order in
    an imaginary quadratic field.
  kind: corollary
  location: Section 16.3
  name: Corollary 16.7
- description: Let $\mathcal{O}$ be an order in an imaginary quadratic field $K$,
    and let $L$ be an $\mathcal{O}$-ideal. We say that $L$ is a proper $\mathcal{O}$-ideal
    if $\mathcal{O}(L) = \mathcal{O}$.
  kind: definition
  location: Section 16.4
  name: Definition 16.9
- description: Let $\mathcal{O}$ be an order in an imaginary quadratic field $K$.
    Two $\mathcal{O}$-ideals $\mathfrak{a}$ and $\mathfrak{b}$ are said to be equivalent
    if they are homothetic as lattices; equivalently, $\alpha\mathfrak{a} = \beta\mathfrak{b}$
    for some nonzero $\alpha, \beta \in \mathcal{O}$; we can also write this as $(\alpha)\mathfrak{a}
    = (\beta)\mathfrak{b}$, where $(\alpha)$ and $(\beta)$ denote principal ideals
    and $(\alpha)\mathfrak{a}$ and $(\beta)\mathfrak{b}$ are products of ideals.
  kind: definition
  location: Section 16.4
  name: Definition 16.10
- description: Let $\mathcal{O}$ be an order in an imaginary quadratic field. The
    ideal class group $\operatorname{cl}(\mathcal{O})$ is the multiplicative group
    of equivalence classes of proper $\mathcal{O}$-ideals.
  kind: definition
  location: Section 16.4
  name: Definition 16.11
- description: Let $\mathcal{O}$ be an order in an imaginary quadratic field. There
    is a one-to-one correspondence between elements of the ideal class group $\operatorname{cl}(\mathcal{O})$
    and homothety classes of lattices $L \subseteq \mathbb{C}$ for which $\operatorname{End}(E_L)
    \simeq \mathcal{O}$.
  kind: theorem
  location: Section 16.4
  name: Theorem 16.12
- description: 'Let $\mathcal{O}$ be an integral domain with fraction field $K$. For
    any $\lambda \in K^{\times}$ and $\mathcal{O}$-ideal $\mathfrak{a}$, the $\mathcal{O}$-module
    $\mathfrak{b}=\lambda \mathfrak{a}:=\{\lambda \alpha: \alpha \in \mathfrak{a}\}$
    is called a fractional $\mathcal{O}$-ideal. Multiplication of fractional ideals
    $\mathfrak{b}=\lambda \mathfrak{a}$ and $\mathfrak{b}^{\prime}=\lambda^{\prime}
    \mathfrak{a}^{\prime}$ is defined by $\mathfrak{b} \mathfrak{b}^{\prime}:=(\lambda
    \lambda^{\prime}) \mathfrak{a} \mathfrak{a}^{\prime}$, where $\mathfrak{a} \mathfrak{a}''$
    is the product of the $\mathcal{O}$-ideals $\mathfrak{a}$ and $\mathfrak{a}^{\prime}$.'
  kind: definition
  location: Section 17.1
  name: Definition 17.2
- description: Let $K/k$ be a field extension and let $\lambda \in K^{\times}$. The
    multiplication-by-$\lambda$ map $K \rightarrow K$ is an invertible linear transformation
    $M_{\lambda} \in \mathrm{GL}(K)$ of $K$ as a $k$-vector space. The (field) norm
    and trace of $\lambda$ are defined by $\mathrm{N}_{K/k} \lambda := \det M_{\lambda}
    \in k^{\times}$ and $\mathrm{T}_{K/k} \lambda := \operatorname{tr} M_{\lambda}
    \in k$.
  kind: definition
  location: Section 17.2
  name: Definition 17.3
- description: 'Let $\mathcal{O}$ be an order in a number field $K$ and let $\mathfrak{a}$
    be a nonzero $\mathcal{O}$-ideal. The (absolute) norm of the ideal $\mathfrak{a}$
    is $\mathrm{N}\mathfrak{a} := [\mathcal{O} : \mathfrak{a}] = \# \mathcal{O}/\mathfrak{a}
    \in \mathbb{Z}_{>0}$.'
  kind: definition
  location: Section 17.2
  name: Definition 17.4
- description: Let $\alpha$ be a nonzero element of an order $\mathcal{O}$ in a number
    field $K$. Then $\mathrm{N}(\alpha) = |\mathrm{N} \alpha|$, where $(\alpha)$ denotes
    the principal $\mathcal{O}$-ideal generated by $\alpha$.
  kind: lemma
  location: Section 17.2
  name: Lemma 17.5
- description: Let $\mathcal{O}$ be an order in a number field, let $\alpha \in \mathcal{O}$
    be nonzero, and let $\mathfrak{a}$ be a nonzero $\mathcal{O}$-ideal. Then $\mathrm{N}(\alpha
    \mathfrak{a}) = \mathrm{N}(\alpha) \mathrm{N}\mathfrak{a}$.
  kind: corollary
  location: Section 17.2
  name: Corollary 17.7
- description: Let $\mathfrak{b} = \frac{1}{b} \mathfrak{a}$ be a nonzero fractional
    ideal in an order $\mathcal{O}$ of a number field, with $b \in \mathbb{Z}_{>0}$.
    The (absolute) norm of $\mathfrak{b}$ is $\mathrm{N}\mathfrak{b} := \frac{\mathrm{N}\mathfrak{a}}{\mathrm{N}
    b} \in \mathbb{Q}_{>0}^{\times}$.
  kind: definition
  location: Section 17.2
  name: Definition 17.8
- description: Let $\mathcal{O}$ be an order in an imaginary quadratic field, let
    $\mathfrak{a}$ be a nonzero $\mathcal{O}$-ideal, and let $\mathfrak{b}=\lambda
    \mathfrak{a}$ be a fractional $\mathcal{O}$-ideal. Then $\mathfrak{a}$ is proper
    if and only if $\mathfrak{b}$ is proper, and $\mathfrak{a}$ is invertible if and
    only if $\mathfrak{b}$ is invertible.
  kind: lemma
  location: Section 17.3
  name: Lemma 17.9
- description: Let $\mathcal{O}$ be an order in an imaginary quadratic field and let
    $\mathfrak{a}=[\alpha, \beta]$ be an $\mathcal{O}$-ideal. Then $\mathfrak{a}$
    is proper if and only if $\mathfrak{a}$ is invertible. Whenever $\mathfrak{a}$
    is invertible we have $\mathfrak{a} \overline{\mathfrak{a}} = (\mathrm{N}\mathfrak{a})$,
    where $\overline{\mathfrak{a}}=[\bar{\alpha}, \bar{\beta}]$ and $(\mathrm{N}\mathfrak{a})$
    is the principal $\mathcal{O}$-ideal generated by the integer $\mathrm{N}\mathfrak{a}$;
    the inverse of $\mathfrak{a}$ is then the fractional $\mathcal{O}$-ideal $\mathfrak{a}^{-1}
    = \frac{1}{\mathrm{N}\mathfrak{a}} \overline{\mathfrak{a}}$.
  kind: theorem
  location: Section 17.3
  name: Theorem 17.10
- description: The ideal class group $\operatorname{cl}(\mathcal{O})$ is the group
    of invertible fractional $\mathcal{O}$-ideals modulo its subgroup of principal
    fractional $\mathcal{O}$-ideals (in particular $\operatorname{cl}(\mathcal{O})$
    is a group).
  kind: corollary
  location: Section 17.3
  name: Corollary 17.11
- description: Let $\mathcal{O}$ be an order in an imaginary quadratic field and let
    $\mathfrak{a}$ and $\mathfrak{b}$ be invertible (equivalently, proper) fractional
    $\mathcal{O}$-ideals. Then $\mathrm{N}(\mathfrak{a}\mathfrak{b}) = \mathrm{N}\mathfrak{a}\,
    \mathrm{N}\mathfrak{b}$.
  kind: corollary
  location: Section 17.3
  name: Corollary 17.12
- description: 'Let $E / k$ be any elliptic curve with CM by an imaginary quadratic
    order $\mathcal{O}$, and let $\mathfrak{a}$ be an $\mathcal{O}$-ideal. The $\mathfrak{a}$-torsion
    subgroup of $E$ is defined by $E[\mathfrak{a}]:=\{P \in E(\bar{k}): \alpha(P)=0
    \text{ for all } \alpha \in \mathfrak{a}\}$ where we are viewing each $\alpha
    \in \mathfrak{a} \subseteq \mathcal{O} \simeq \operatorname{End}(E)$ as an endomorphism.'
  kind: definition
  location: Section 17.5
  name: Definition 17.13
- description: 'Let $\mathcal{O}$ be an imaginary quadratic order, let $E / \mathbb{C}$
    be an elliptic curve with endomorphism ring $\mathcal{O}$, let $\mathfrak{a}$
    be an invertible $\mathcal{O}$-ideal, and let $\phi_{\mathfrak{a}}$ be the corresponding
    isogeny from $E$ to $\mathfrak{a} E$. The following hold: (i) $\operatorname{ker}
    \phi_{\mathfrak{a}}=E[\mathfrak{a}]$; (ii) $\operatorname{deg} \phi_{\mathfrak{a}}=\mathrm{N}\mathfrak{a}$.'
  kind: theorem
  location: Section 17.5
  name: Theorem 17.14
- description: 'Let $\mathcal{O}$ be an imaginary quadratic order and let $\mathfrak{a}$
    be an invertible $\mathcal{O}$-ideal. For every elliptic curve $E / \mathbb{C}$
    with CM by $\mathcal{O}$ the elliptic curves $E$ and $\mathfrak{a} E$ are related
    by an isogeny $\phi_{\mathfrak{a}}: E \rightarrow \mathfrak{a} E$ of degree $\mathrm{N}\mathfrak{a}$.'
  kind: corollary
  location: Section 17.5
  name: Corollary 17.15
- description: Let $\mathcal{O}=[1, \tau]$ be an imaginary quadratic order. The discriminant
    of $\mathcal{O}$ is the discriminant of the minimal polynomial of $\tau$, which
    we can compute as $\operatorname{disc}(\mathcal{O})=(\tau+\bar{\tau})^{2}-4\tau\bar{\tau}=(\tau-\bar{\tau})^{2}=\operatorname{det}\left(\begin{smallmatrix}
    1 & \tau \\ 1 & \bar{\tau} \end{smallmatrix}\right)^{2}$.
  kind: definition
  location: Section 17.6
  name: Definition 17.16
- description: A negative integer $D$ that is a square modulo 4 is an (imaginary quadratic)
    discriminant. Discriminants not of the form $u^{2} D'$ for some integer $u>1$
    and discriminant $D'$ are said to be fundamental. Every discriminant can be written
    uniquely as the product of a square and a fundamental discriminant.
  kind: definition
  location: Section 17.6
  name: Definition 17.17
- description: Let $D$ be an imaginary quadratic discriminant. There is a unique imaginary
    quadratic order $\mathcal{O}$ with $\operatorname{disc}(\mathcal{O})=D=u^{2} D_{K}$,
    where $D_{K}$ is the fundamental discriminant of the maximal order $\mathcal{O}_{K}$
    in $K=\mathbb{Q}(\sqrt{D_{K}})$, and $u=[\mathcal{O}_{K}:\mathcal{O}]$.
  kind: theorem
  location: Section 17.6
  name: Theorem 17.18
- description: If $L'$ is an index $n$ sublattice of $L$ then $nL$ is an index $n$
    sublattice of $L'$.
  kind: lemma
  location: Section 17.6
  name: Lemma 17.19
- description: 'For any compact sets $A, B \subseteq \mathbb{H}$ the set $S=\{\gamma
    \in \Gamma: \gamma A \cap B \neq \emptyset\}$ is finite.'
  kind: lemma
  location: Section 18.1
  name: Lemma 18.1
- description: For any $\tau_{1}, \tau_{2} \in \mathbb{H}^{*}$ there exist open neighborhoods
    $U_{1}$, $U_{2}$ of $\tau_{1}, \tau_{2}$ such that $\gamma U_{1} \cap U_{2} \neq
    \emptyset \Longleftrightarrow \gamma \tau_{1}=\tau_{2}$, for all $\gamma \in \Gamma$.
    In particular, each $\tau \in \mathbb{H}^{*}$ has an open neighborhood in which
    it is the sole representative of its $\Gamma$-orbit.
  kind: lemma
  location: Section 18.1
  name: Lemma 18.2
- description: $X(1)$ is a connected compact Hausdorff space.
  kind: theorem
  location: Section 18.1
  name: Theorem 18.3
- description: 'A complex structure on a topological space $X$ is an open cover $\{U_{i}\}$
    of $X$ together with a set of compatible homeomorphisms $\psi_{i}: U_{i} \rightarrow
    \mathbb{C}$ with open images. Homeomorphisms $\psi_{i}$ and $\psi_{j}$ are compatible
    if whenever $U_{i} \cap U_{j} \neq \emptyset$ the transition map $\psi_{j} \circ
    \psi_{i}^{-1}: \psi_{i}(U_{i} \cap U_{j}) \rightarrow \psi_{j}(U_{i} \cap U_{j})$
    is holomorphic. The homeomorphisms $\psi_{i}$ are called charts (or local parameters),
    and the collection $\{\psi_{i}\}$ is called an atlas.'
  kind: definition
  location: Section 18.2
  name: Definition 18.4
- description: A Riemann surface is a connected Hausdorff space with a complex structure
    (equivalently, it is a connected complex manifold of dimension one).
  kind: definition
  location: Section 18.2
  name: Definition 18.5
- description: For $\tau \in \mathcal{F}^{*}$, let $G_{\tau}$ denote the stabilizer
    of $\tau$ in $\Gamma=\operatorname{SL}_{2}(\mathbb{Z})$. Let $S=\left(\begin{smallmatrix}0
    & -1 \\ 1 & 0\end{smallmatrix}\right)$ and $T=\left(\begin{smallmatrix}1 & 1 \\
    0 & 1\end{smallmatrix}\right)$. Then $G_{\tau}=\{\pm I\} \simeq \mathbb{Z}/2\mathbb{Z}$
    if $\tau \notin \{i, \rho, \infty\}$; $G_{\tau}=\langle S\rangle \simeq \mathbb{Z}/4\mathbb{Z}$
    if $\tau=i$; $G_{\tau}=\langle ST\rangle \simeq \mathbb{Z}/6\mathbb{Z}$ if $\tau=\rho$;
    $G_{\tau}=\langle \pm T\rangle \simeq \mathbb{Z}$ if $\tau=\infty$.
  kind: lemma
  location: Section 18.2
  name: Lemma 18.7
- description: 'Let $\tau_{x} \in \mathbb{H}$, with $\delta_{x}(\tau)$ as in (1),
    and let $\varphi: \mathbb{H} \rightarrow \mathbb{H}$ be a holomorphic function
    fixing $\tau_{x}$ whose $n$-fold composition with itself is the identity, with
    $n$ minimal. Then for some primitive $n$th root of unity $\zeta$, we have $\delta_{x}(\varphi(\tau))=\zeta
    \delta_{x}(\tau)$ for all $\tau \in \mathbb{H}$.'
  kind: lemma
  location: Section 18.3
  name: Lemma 18.8
- description: The open cover $\{U_{x}\}$ and atlas $\{\psi_{x}\}$ define a complex
    structure on $X(1)$.
  kind: theorem
  location: Section 18.3
  name: Theorem 18.9
- description: The modular curve $X(1)$ is a compact Riemann surface of genus 0.
  kind: theorem
  location: Section 18
  name: Theorem 18.10
- description: The principal congruence subgroup $\Gamma(N)$ is defined by $\Gamma(N)=\left\{\left(\begin{array}{ll}a
    & b \\ c & d\end{array}\right) \in \operatorname{SL}_{2}(\mathbb{Z}):\left(\begin{array}{ll}a
    & b \\ c & d\end{array}\right) \equiv\left(\begin{array}{ll}1 & 0 \\ 0 & 1\end{array}\right)
    \bmod N\right\}$. A congruence subgroup (of level $N$) is any subgroup of $\operatorname{SL}_{2}(\mathbb{Z})$
    that contains $\Gamma(N)$. A modular curve is a quotient of $\mathbb{H}^{*}$ or
    $\mathbb{H}$ by a congruence subgroup.
  kind: definition
  location: Section 18.4
  name: Definition 18.11
- description: 'Let $f: \mathbb{H} \rightarrow \mathbb{C}$ be a meromorphic function
    that is $\Gamma$-invariant for some congruence subgroup $\Gamma$. The function
    $f(\tau)$ is said to be meromorphic at the cusps if for every $\gamma \in \mathrm{SL}_{2}(\mathbb{Z})$
    the function $f(\gamma \tau)$ is meromorphic at $\infty$.'
  kind: definition
  location: Section 19.1
  name: Definition 19.1
- description: 'Let $\Gamma$ be a congruence subgroup. A modular function for $\Gamma$
    is a $\Gamma$-invariant meromorphic function $f: \mathbb{H} \rightarrow \mathbb{C}$
    that is meromorphic at the cusps; equivalently, it is a meromorphic function $g:
    X_{\Gamma} \rightarrow \mathbb{C}$.'
  kind: definition
  location: Section 19.1
  name: Definition 19.2
- description: Let $\sigma_{k}(n)=\sum_{d \mid n} d^{k}$, and let $q=e^{2 \pi i \tau}$.
    We have $$g_{2}(\tau)=\frac{4 \pi^{4}}{3}\left(1+240 \sum_{n=1}^{\infty} \sigma_{3}(n)
    q^{n}\right)$$ $$g_{3}(\tau)=\frac{8 \pi^{6}}{27}\left(1-504 \sum_{n=1}^{\infty}
    \sigma_{5}(n) q^{n}\right)$$ $$\Delta(\tau)=g_{2}(\tau)^{3}-27 g_{3}(\tau)^{2}=(2
    \pi)^{12} q \prod_{n=1}^{\infty}\left(1-q^{n}\right)^{24}$$
  kind: lemma
  location: Section 19.2
  name: Lemma 19.5
- description: With $q=e^{2 \pi i \tau}$ we have $$j(\tau)=\frac{1}{q}+744+\sum_{n=1}^{\infty}
    a_{n} q^{n}$$ where the $a_{n}$ are integers.
  kind: corollary
  location: Section 19.2
  name: Corollary 19.6
- description: Every modular function for $\Gamma(1)$ is a rational function of $j(\tau)$;
    in other words $\mathbb{C}(\Gamma(1))=\mathbb{C}(j)$.
  kind: theorem
  location: Section 19.2
  name: Theorem 19.8
- description: 'Every meromorphic function $f: \mathcal{S} \rightarrow \mathbb{C}$
    on the Riemann sphere $\mathcal{S}:=\mathbb{P}^{1}(\mathbb{C})$ is a rational
    function.'
  kind: lemma
  location: Section 19.2
  name: Lemma 19.9
- description: Every modular function $f(\tau)$ for $\Gamma(1)$ that is holomorphic
    on $\mathbb{H}$ is a polynomial in $j(\tau)$.
  kind: corollary
  location: Section 19.2
  name: Corollary 19.10
- description: 'Let $\Gamma$ be a congruence subgroup. The field $\mathbb{C}(\Gamma)$
    of modular functions for $\Gamma$ is a finite extension of $\mathbb{C}(j)$ of
    degree at most $n:=[\Gamma(1): \Gamma]$.'
  kind: theorem
  location: Section 19.2
  name: Theorem 19.11
- description: The function $j_{N}(\tau):=j(N \tau)$ is a modular function for $\Gamma_{0}(N)$.
  kind: theorem
  location: Section 19.2.1
  name: Theorem 19.13
- description: 'The field of modular functions for $\Gamma_{0}(N)$ is an extension
    of $\mathbb{C}(j)$ of degree $n:=[\Gamma(1): \Gamma_{0}(N)]$ generated by $j_{N}(\tau)$.'
  kind: theorem
  location: Section 19.2.1
  name: Theorem 19.14
- description: The modular polynomial $\Phi_N$ is the minimal polynomial of $j_N$
    over $\mathbb{C}(j)$.
  kind: definition
  location: Section 19.3
  name: Definition 19.15
- description: 'For prime $N$ we can write the right cosets of $\Gamma_0(N)$ in $\Gamma(1)$
    as $\{\Gamma_0(N)\} \cup \{\Gamma_0(N) S T^k : 0 \leq k < N\}$ where $S = \left(\begin{smallmatrix}
    0 & -1 \\ 1 & 0 \end{smallmatrix}\right)$ and $T = \left(\begin{smallmatrix} 1
    & 1 \\ 0 & 1 \end{smallmatrix}\right)$.'
  kind: lemma
  location: Section 19.3
  name: Lemma 19.16
- description: $\Phi_N \in \mathbb{Z}[X, Y]$.
  kind: theorem
  location: Section 19.3
  name: Theorem 19.17
- description: Let $f(\tau)$ be a modular function for $\Gamma(1)$ that is holomorphic
    on $\mathbb{H}$ and whose $q$-expansion has coefficients that lie in an additive
    subgroup $A$ of $\mathbb{C}$. Then $f(\tau) = P(j(\tau))$, for some polynomial
    $P \in A[X]$.
  kind: lemma
  location: Section 19.3
  name: Lemma 19.18 (Hasse $q$-expansion principle)
- description: 'If $L_{1}$ is a sublattice of $L_{2}$ for which the group $L_{2} /
    L_{1}$ is cyclic, then we say that $L_{1}$ is a cyclic sublattice of $L_{2}$.
    Similarly, an isogeny $\phi: E_{1} \rightarrow E_{2}$ is said to be cyclic if
    its kernel is a cyclic group. If $\phi$ is induced by the lattice inclusion $L_{1}
    \subseteq L_{2}$ then $\phi$ is cyclic if and only if $L_{1}$ is a cyclic sublattice
    of $L_{2}$.'
  kind: definition
  location: Section 20.1
  name: Definition 20.1
- description: Let $L=[1, \tau]$ be a lattice with $\tau \in \mathbb{H}$ and let $N$
    be prime. The cyclic sublattices of $L$ of index $N$ are the lattice $[1, N\tau]$
    and the lattices $[N, \tau+k]$, for $0 \leq k < N$.
  kind: lemma
  location: Section 20.1
  name: Lemma 20.2
- description: For all $j_{1}, j_{2} \in \mathbb{C}$, we have $\Phi_{N}(j_{1}, j_{2})=0$
    if and only if $j_{1}$ and $j_{2}$ are the $j$-invariants of elliptic curves over
    $\mathbb{C}$ that are related by a cyclic isogeny of degree $N$.
  kind: theorem
  location: Section 20.1
  name: Theorem 20.3
- description: Let $N>1$ be an integer and let $k$ be a field of characteristic not
    dividing $N$. For all $j_{1}, j_{2} \in k$ we have $\Phi_{N}(j_{1}, j_{2})=0$
    if and only if $j_{1}$ and $j_{2}$ are the $j$-invariants of elliptic curves over
    $k$ that are related by a cyclic isogeny of degree $N$ defined over $k$.
  kind: theorem
  location: Section 20.1
  name: Theorem 20.4
- description: $\Phi_{N}(X, Y)=\Phi_{N}(Y, X)$ for all $N>1$.
  kind: theorem
  location: Section 20.1
  name: Theorem 20.7
- description: If $N$ is prime then the leading term of $\Phi_{N}(X, X) \in \mathbb{Z}[X]$
    is $-X^{2N}$.
  kind: lemma
  location: Section 20.3
  name: Lemma 20.9
- description: Let $\mathcal{O}$ be an imaginary quadratic order. Every ideal class
    in $\operatorname{cl}(\mathcal{O})$ contains infinitely many ideals of prime norm.
  kind: theorem
  location: Section 20.3
  name: Theorem 20.11
- description: The coefficients of the Hilbert class polynomial $H_{D}(X)$ are integers.
  kind: theorem
  location: Section 20.3
  name: Theorem 20.12
- description: Let $E/\mathbb{C}$ be an elliptic curve with complex multiplication.
    Then $j(E)$ is an algebraic integer.
  kind: corollary
  location: Section 20.3
  name: Corollary 20.13
- description: 'Let $\mathcal{O}$ be an imaginary quadratic order of discriminant
    $D$ and let $L$ be the splitting field of $H_{D}(X)$ over $K:=\mathbb{Q}(\sqrt{D})$.
    The map $\Psi: \operatorname{Gal}(L/K) \rightarrow \operatorname{cl}(\mathcal{O})$
    that sends each $\sigma \in \operatorname{Gal}(L/K)$ to the unique $\alpha_{\sigma}
    \in \operatorname{cl}(\mathcal{O})$ for which $j(E)^{\sigma}=\alpha_{\sigma} j(E)$
    for all $j(E) \in \operatorname{Ell}_{\mathcal{O}}(E)$ is an injective group homomorphism.'
  kind: theorem
  location: Section 20
  name: Theorem 20.14
- description: 'Let $\mathcal{O}$ be an imaginary quadratic order of discriminant
    $D$ and let $L$ be the splitting field of $H_{D}(X)$ over $K:=\mathbb{Q}(\sqrt{D})$.
    The map $\Psi: \operatorname{Gal}(L/K) \rightarrow \operatorname{cl}(\mathcal{O})$
    that sends each $\sigma \in \operatorname{Gal}(L/K)$ to the unique $\alpha_{\sigma}
    \in \operatorname{cl}(\mathcal{O})$ such that $j(E)^{\sigma}=\alpha_{\sigma} j(E)$
    for all $j(E) \in \operatorname{Ell}_{\mathcal{O}}(L)$ is a group isomorphism
    compatible with the actions of $\operatorname{Gal}(L/K)$ and $\operatorname{cl}(\mathcal{O})$
    on $\operatorname{Ell}_{\mathcal{O}}(L)$.'
  kind: theorem
  location: Section 21.2
  name: Theorem 21.1
- description: Let $\mathcal{O}$ be an imaginary quadratic order with discriminant
    $D$. The Hilbert class polynomial $H_{D}(x)$ is irreducible over $K=\mathbb{Q}(\sqrt{D})$
    and for any elliptic curve $E/\mathbb{C}$ with CM by $\mathcal{O}$ the field $K(j(E))$
    is a finite abelian extension of $K$ with $\operatorname{Gal}(K(j(E))/K) \simeq
    \operatorname{cl}(\mathcal{O})$.
  kind: corollary
  location: Section 21.2
  name: Corollary 21.2
- description: Let $\mathcal{O}$ be an imaginary quadratic order with discriminant
    $D$. The splitting field of the Hilbert class polynomial of $H_{D}(X)$ over $K=\mathbb{Q}(\sqrt{D})$,
    equivalently, the extension of $K$ generated by the $j$-invariant of any elliptic
    curve $E/\mathbb{C}$ with CM by $\mathcal{O}$, is known as the ring class field
    of the imaginary quadratic order $\mathcal{O}$ with discriminant $D$.
  kind: definition
  location: Section 21.3
  name: Definition 21.3
- description: 'Let $p$ be a prime and $D$ an integer. For $p>2$ the Kronecker symbol
    is $\left(\frac{D}{p}\right):=\#\{x \in \mathbb{F}_{p}: x^{2}=D\}-1$. For $p=2$,
    we define $\left(\frac{D}{p}\right)$ to be 1 for $D \equiv \pm 1 \bmod 8$, zero
    if $p \mid D$, and -1 for $D \equiv \pm 3 \bmod 8$.'
  kind: definition
  location: Section 21.3
  name: Definition 21.4
- description: 'Let $\mathcal{O}$ be an imaginary quadratic order with discriminant
    $D$ and ring class field $L$. Let $p \nmid D$ be an odd prime unramified in $L$.
    The following are equivalent: (i) $p$ is the norm of a principal $\mathcal{O}$-ideal;
    (ii) $\left(\frac{D}{p}\right)=1$ and $H_{D}(X)$ splits into linear factors in
    $\mathbb{F}_{p}[X]$; (iii) $p$ splits completely in $L$; (iv) $4p=t^{2}-v^{2}D$
    for some integers $t$ and $v$ with $t \not\equiv 0 \bmod p$.'
  kind: theorem
  location: Section 21.3
  name: Theorem 21.5
- description: Let $K$ be an imaginary quadratic field of discriminant $D$ with ring
    of integers $\mathcal{O}_{K}=[1, \omega]$ and let $p$ be prime. Every $\mathcal{O}_{K}$-ideal
    of norm $p$ is of the form $\mathfrak{p}=[p, \omega-r]$, where $r \in \mathbb{Z}$
    is a root of the minimal polynomial of $\omega$ modulo $p$. The number of such
    ideals $\mathfrak{p}$ is $1+\left(\frac{D}{p}\right) \in \{0,1,2\}$ and the factorization
    of the principal $\mathcal{O}_{K}$-ideal into prime ideals is $(p)=\mathfrak{p}\overline{\mathfrak{p}}$
    if $\left(\frac{D}{p}\right)=1$, $(p)=\mathfrak{p}^{2}$ if $\left(\frac{D}{p}\right)=0$,
    $(p)=(p)$ if $\left(\frac{D}{p}\right)=-1$.
  kind: lemma
  location: Section 21.3
  name: Lemma 21.6
- description: 'Let $\mathcal{O}$ be an order of discriminant $D$ in an imaginary
    quadratic field $K$, and let $p$ be a prime. When $p$ divides the conductor $[\mathcal{O}:
    \mathcal{O}_{K}]$ there are no proper $\mathcal{O}$-ideals of norm $p$ and otherwise
    there are $1+\left(\frac{D}{p}\right)=0,1,2$, depending on whether $p$ is inert,
    ramified, or split in $K$, respectively.'
  kind: corollary
  location: Section 21
  name: Corollary 21.7
- description: Let $\mathcal{O}$ be an order of discriminant $D$ in an imaginary quadratic
    field $K$. The splitting field $L$ of $H_{D}(X)$ over $K$ is unramified at all
    primes that do not divide the conductor of $\mathcal{O}$. In particular, every
    rational prime $p \nmid D$ is unramified in $L$.
  kind: corollary
  location: Section 21.4
  name: Corollary 21.8
- description: Let $\mathcal{O}$ be an imaginary quadratic order with discriminant
    $D$ and ring class field $L$, and let $p \nmid D$ be an odd prime satisfying $4p=t^{2}-v^{2}D$.
    Every $j(E) \in \operatorname{Ell}_{\mathcal{O}}(\mathbb{C})$ is the $j$-invariant
    of an elliptic curve $E/L$ with good reduction $\bar{E}$ modulo a prime $\mathfrak{q}$
    of $L$ lying above $p$. Provided $j(\bar{E}) \neq 0, 1728$, we have $\operatorname{tr}
    \pi_{\bar{E}} = \pm t \not\equiv 0 \bmod p$ and $\bar{E}$ is ordinary.
  kind: corollary
  location: Section 21.5
  name: Corollary 21.9
- description: 'Let $\mathcal{O}$ be an imaginary quadratic order of discriminant
    $D$ with ring class field $L$, and let $q$ be the norm of a prime ideal in $\mathcal{O}_{L}$
    with $q \perp D$. Then $H_{D}(X)$ splits into distinct linear factors in $\mathbb{F}_{q}[X]$
    and its roots form the set

    $$\operatorname{Ell}_{\mathcal{O}}(\mathbb{F}_{q}):=\{j(E) \in \mathbb{F}_{q}:
    \operatorname{End}(E) \simeq \mathcal{O}\}$$

    of $j$-invariants of elliptic curves $E/\mathbb{F}_{q}$ with CM by $\mathcal{O}$.'
  kind: theorem
  location: Section 21.6
  name: Theorem 21.12 (Deuring)
- description: Let $E/\mathbb{F}_{q}$ be an elliptic curve over a finite field and
    let $\phi \in \operatorname{End}(E)$ be nonzero. There exists an elliptic curve
    $E^{*}$ over a number field $L$ with an endomorphism $\phi^{*} \in \operatorname{End}(E^{*})$
    such that $E^{*}$ has good reduction modulo a prime $\mathfrak{q}$ of $L$ with
    residue field $\mathcal{O}_{L}/\mathfrak{q} \simeq \mathbb{F}_{q}$ and $E$ and
    $\phi$ are the reductions modulo $\mathfrak{q}$ of $E^{*}$ and $\phi^{*}$.
  kind: theorem
  location: Section 21.6
  name: Theorem 21.13 (Deuring lifting theorem)
- description: The $\ell$-isogeny graph $G_{\ell}(k)$ is the directed graph with vertex
    set $k$ and edges $(j_1, j_2)$ present with multiplicity equal to the multiplicity
    of $j_2$ as a root of $\Phi_{\ell}(j_1, Y)$.
  kind: definition
  location: Section 22
  name: Definition 22.1
- description: 'Let $\varphi: E \rightarrow E''$ be an $\ell$-isogeny of elliptic
    curves defined over a field $k$. Then $\operatorname{End}^0(E'') \simeq \operatorname{End}^0(E)$,
    and if $\operatorname{End}^0(E) = K$ is an imaginary quadratic field then $\operatorname{End}(E)
    = \mathcal{O}$ and $\operatorname{End}(E'') = \mathcal{O}''$ are orders in $K$
    such that one of the following holds: (i) $\mathcal{O} = \mathcal{O}''$, (ii)
    $[\mathcal{O} : \mathcal{O}''] = \ell$, (iii) $[\mathcal{O}'' : \mathcal{O}] =
    \ell$.'
  kind: theorem
  location: Section 22.1
  name: Theorem 22.3
- description: 'Theorem 22.3 allows us to distinguish $\ell$-isogenies $\varphi: E
    \rightarrow E''$ of elliptic curves with CM by an imaginary quadratic field as
    follows: (i) when $\mathcal{O} = \mathcal{O}''$ we say that $\varphi$ is horizontal;
    (ii) when $[\mathcal{O} : \mathcal{O}''] = \ell$ we say that $\varphi$ is descending;
    (iii) when $[\mathcal{O}'' : \mathcal{O}] = \ell$ we say that $\varphi$ is ascending.
    We collectively refer to ascending and descending isogenies as vertical isogenies.'
  kind: definition
  location: Section 22.1
  name: Definition 22.4
- description: 'Let $E/\mathbb{C}$ be an elliptic curve with CM by an order $\mathcal{O}$
    of discriminant $D$ in an imaginary quadratic field $K$, and let $\ell$ be prime.
    If $\ell \nmid [\mathcal{O}_K : \mathcal{O}]$ then $E$ admits $1 + \left(\frac{D}{\ell}\right)$
    horizontal, $\ell - \left(\frac{D}{\ell}\right)$ descending, and no ascending
    $\ell$-isogenies. Otherwise $E$ admits no horizontal, $\ell$ descending, and one
    ascending $\ell$-isogenies.'
  kind: theorem
  location: Section 22.1
  name: Theorem 22.5
- description: Let $\mathcal{O}$ be an imaginary quadratic order of discriminant $D$
    and let $\mathbb{F}_q$ be a finite field with $q \perp D$. The set $\operatorname{Ell}_{\mathcal{O}}(\mathbb{F}_q)$
    is either empty or has cardinality $h(D)$. If $\operatorname{Ell}_{\mathcal{O}}(\mathbb{F}_q)$
    is nonempty, so is $\operatorname{Ell}_{\mathcal{O}'}(\mathbb{F}_q)$ for every
    imaginary quadratic order $\mathcal{O}'$ containing $\mathcal{O}$.
  kind: lemma
  location: Section 22.1
  name: Lemma 22.6
- description: 'Let $E/\mathbb{F}_q$ be an elliptic curve with CM by an order $\mathcal{O}$
    of discriminant $D \perp q$ in an imaginary quadratic field $K$, and let $\ell
    \nmid q$ be prime. Then $E$ admits $1 + \left(\frac{D}{\ell}\right)$ horizontal
    $\ell$-isogenies and one or zero ascending $\ell$-isogenies, depending on whether
    $\ell \mid [\mathcal{O}_K : \mathcal{O}]$ or not. The number of descending $\ell$-isogenies
    admitted by $E$ over $\mathbb{F}_q$ is either zero or $\ell - \left(\frac{D}{\ell}\right)$,
    depending on whether $\operatorname{Ell}_{\mathcal{O}''}(\mathbb{F}_q)$ is empty
    or not, where $\mathcal{O}''$ is the order of index $\ell$ in $\mathcal{O}$.'
  kind: corollary
  location: Section 22.1
  name: Corollary 22.7
- description: Let $\mathcal{O}$ be an imaginary quadratic order of discriminant $D$
    and let $\mathbb{F}_q$ be a finite field with $q \perp D$. If the set $\operatorname{Ell}_{\mathcal{O}}(\mathbb{F}_q)$
    is nonempty then it is a $\operatorname{cl}(\mathcal{O})$-torsor in which the
    action of the ideal class of any proper $\mathcal{O}$-ideal of prime norm $\ell
    \nmid q$ is given by a horizontal $\ell$-isogeny, and the inverse of this action
    is given by the dual isogeny.
  kind: corollary
  location: Section 22.1
  name: Corollary 22.8
- description: 'An $\ell$-volcano $V$ is a connected undirected graph whose vertices
    are partitioned into one or more levels $V_0, \ldots, V_d$ such that the following
    hold: 1. The subgraph on $V_0$ (the surface) is a regular graph of degree at most
    2. 2. For $i > 0$, each vertex in $V_i$ has exactly one neighbor in level $V_{i-1}$,
    and this accounts for every edge not on the surface. 3. For $i < d$, each vertex
    in $V_i$ has degree $\ell + 1$. Level $V_d$ is called the floor of the volcano;
    the floor and surface coincide when $d = 0$.'
  kind: definition
  location: Section 22.2
  name: Definition 22.10
- description: 'Let $\mathbb{F}_q$ be a finite field, let $\ell \nmid q$ be a prime,
    and let $V$ be an ordinary component of $G_{\ell}(\mathbb{F}_q)$ that does not
    contain the $j$-invariants 0 or 1728. Then $V$ is an $\ell$-volcano for which
    the following hold: (i) The vertices in level $V_i$ all have the same endomorphism
    ring $\mathcal{O}_i$. (ii) The subgraph on $V_0$ has degree $1 + \left(\frac{D_0}{\ell}\right)$,
    where $D_0 = \operatorname{disc}(\mathcal{O}_0)$. (iii) If $\left(\frac{D_0}{\ell}\right)
    \geq 0$, then $|V_0|$ is the order of $[\mathfrak{l}]$ in $\operatorname{cl}(\mathcal{O}_0)$;
    otherwise $|V_0| = 1$. (iv) The depth of $V$ is $d$, where $4q = t^2 - \ell^{2d}
    v^2 D_0$ with $\ell \nmid v$, $t^2 = (\operatorname{tr} \pi_E)^2$, for $j(E) \in
    V$. (v) $\ell \nmid [\mathcal{O}_K : \mathcal{O}_0]$ and $[\mathcal{O}_i : \mathcal{O}_{i+1}]
    = \ell$ for $0 \leq i < d$.'
  kind: theorem
  location: Section 22.2
  name: Theorem 22.11 (Kohel)
- description: Let $v$ be a vertex in an ordinary component $V$ of depth $d$ in $G_{\ell}(\mathbb{F}_q)$.
    Either $\deg v \leq 2$ and $v \in V_d$, or $\deg v = \ell + 1$ and $v \notin V_d$.
  kind: lemma
  location: Section 22.3
  name: Lemma 22.13
- description: 'For any point $P \in C(\bar{k})$, we define the local ring at $P$
    (or the ring of regular functions at $P$) by $\mathcal{O}_{P}:=\{f \in k(C): f(P)
    \neq \infty\} \subseteq k(C)$ where $\infty=(1:0) \in \mathbb{P}^{1}$. It is a
    principal ideal domain (PID) with a unique maximal ideal $\mathfrak{m}_{P}:=\{f
    \in \mathcal{O}_{P}: f(P)=0\}$. Any generator $u_{P}$ for the principal ideal
    $\mathfrak{m}_{P}=(u_{P})$ is called a uniformizer at $P$.'
  kind: definition
  location: Section 23.1
  name: Definition 23.3
- description: 'A discrete valuation on a field $F$ is a surjective homomorphism $v:
    F^{\times} \rightarrow \mathbb{Z}$ that satisfies the inequality $v(x+y) \geq
    \min(v(x), v(y))$ for all $x, y \in F^{\times}$. If $v$ is a discrete valuation
    on $F$, then the subring $R:=\{x \in F: v(x) \geq 0\}$ is a PID with the unique
    maximal ideal $\mathfrak{m}:=\{x \in R: v(x) \geq 1\}$. Every nonzero ideal $(x)$
    of $R$ is then of the form $\mathfrak{m}^{n}$, where $n=v(x)$. Any $u \in F$ for
    which $v(u)=1$ generates $\mathfrak{m}$ and is called a uniformizer for $\mathfrak{m}$.'
  kind: definition
  location: Section 23.1
  name: Definition 23.4
- description: 'Let $C_{1}/k$ be a smooth projective curve and let $\phi: C_{1} \rightarrow
    C_{2}$ be a rational map. Then $\phi$ is a morphism.'
  kind: theorem
  location: Section 23.1
  name: Theorem 23.6
- description: 'Let $C$ be a smooth projective curve over an algebraically closed
    field $k$ and let $f \in k(C)^{\times}$ be an element of its function field (viewed
    as a morphism $f: C \rightarrow \mathbb{P}^{1}$). For every point $Q \in \mathbb{P}^{1}(k)$
    we have $\operatorname{deg} f = \sum_{f(P)=Q} v_{P}(u_{Q} \circ f)$ where $u_{Q}
    \in k(\mathbb{P}^{1})$ denotes any uniformizer for $m_{Q}$.'
  kind: theorem
  location: Section 23.1
  name: Theorem 23.9
- description: Let $C$ be a smooth projective curve over an algebraically closed field
    $k$. For every $f \in k(C)^{\times}$ we have $\sum_{P \in C(k)} v_{P}(f) = 0$
    and $v_{P}(f)=0$ for all but finitely many $P$; we have $v_{P}(f)=0$ for all $P$
    if and only if $f \in k^{\times}$.
  kind: corollary
  location: Section 23.1
  name: Corollary 23.10
- description: 'To each point $P \in C(\bar{k})$ we associate a formal symbol $[P]$.
    The divisor group of $C$ is the free abelian group on the set $\{[P]: P \in C(\bar{k})\}$,
    denoted $\operatorname{Div} C$. Its elements are called divisors. Each is a finite
    sum of the form $D=\sum_{P} n_{P}[P]$ in which the $n_{P}$ are integers (so $n_{P}=0$
    for all but finitely many $P$). The integer $n_{P}$ is the valuation of $D$ at
    $P$, also denoted by $v_{P}(D):=n_{P}$. For each divisor $D$ the finite set $\operatorname{supp}(D):=\{[P]:
    v_{P}(D) \neq 0\}$ is its support, and the integer $\operatorname{deg} D:=\sum_{P}
    v_{P}(D)$ is its degree. The degree map $D \mapsto \operatorname{deg} D$ is a
    surjective homomorphism of abelian groups whose kernel is the subgroup $\operatorname{Div}^{0}
    C$ of divisors of degree zero. Associated to each function $f \in k(C)^{\times}$
    there is a divisor $\operatorname{div} f:=\sum_{P} v_{P}(f)[P]$, which is called
    a principal divisor. Because each $v_{P}: k(C)^{\times} \rightarrow \mathbb{Z}$
    is a group homomorphism, we have $\operatorname{div} fg=\operatorname{div} f+\operatorname{div}
    g$, and the map $\operatorname{div}: k(C)^{\times} \rightarrow \operatorname{Div}
    C$ is a group homomorphism whose image $\operatorname{Princ} C$ is a subgroup
    of $\operatorname{Div} C$, and whose kernel consists of the nonzero constant functions
    $k^{\times}$, by Corollary 23.10. The quotient group $\operatorname{Pic} C:=\operatorname{Div}
    C / \operatorname{Princ} C$ is the divisor class group or Picard group of $C$.
    Since $\operatorname{Princ} C$ lies in the kernel of the degree map $\deg: \operatorname{Div}
    C \rightarrow \mathbb{Z}$, we also have a degree map $\deg: \operatorname{Pic}
    C \rightarrow \mathbb{Z}$ on divisor classes, and its kernel is the group $\operatorname{Pic}^{0}
    C:=\operatorname{Div}^{0} C / \operatorname{Princ} C$ of divisor classes of degree
    zero. We then have an exact sequence $1 \longrightarrow k^{\times} \longrightarrow
    k(C)^{\times} \longrightarrow \operatorname{Div}^{0} C \longrightarrow \operatorname{Pic}^{0}
    C \longrightarrow 0$.'
  kind: definition
  location: Section 23.2
  name: Definition 23.13
- description: Let $C / k$ be a smooth projective curve with a rational point $0 \in
    C(k)$. The Abel-Jacobi map is the map $C(k) \rightarrow \operatorname{Pic}^{0}
    C$ defined by $P \mapsto [P]-[0]$.
  kind: definition
  location: Section 23.2
  name: Definition 23.15
- description: 'Let $E / k$ be an elliptic curve with 0 as its distinguished point
    (for curves in Weierstrass form this is the projective point $(0: 1: 0)$, the
    point "at infinity"). For each pair of points $P, Q \in E(k)$ let $L_{P, Q} \in
    k(E)$ denote the function corresponding to the line $\overline{PQ}$, which we
    define as the tangent to the curve when $P=Q$. We now define $G_{P, Q}:=\frac{L_{P,
    Q}}{L_{P+Q,-(P+Q)}}$.'
  kind: definition
  location: Section 23.3
  name: Definition 23.16
- description: Let $E / k$ be an elliptic curve with the distinguished point 0. The
    Abel-Jacobi map $E \mapsto \operatorname{Pic}^{0} E$ defined by $P \mapsto [P]-[0]$
    is a group isomorphism.
  kind: theorem
  location: Section 23.3
  name: Theorem 23.17
- description: Let $C/k$ be a smooth projective curve, and let $f \in k(C)^{\times}$.
    For each divisor $D \in \operatorname{Div} C$ with support disjoint from $\operatorname{div}
    f$ we define $f(D):=\prod_{P \in \operatorname{supp}(D)} f(P)^{v_{P}(D)} \in k^{\times}$,
    which satisfies $f(D_{1}+D_{2})=f(D_{1})f(D_{2})$ for any $D_{1}, D_{2}$ with
    support disjoint from $\operatorname{div} f$.
  kind: definition
  location: Section 23.4
  name: Definition 23.18
- description: Let $n$ be a positive integer and let $k$ be an algebraically closed
    field whose characteristic does not divide $n$. Let $C / k$ be a smooth projective
    curve and let $D_{1}, D_{2}$ be divisors with disjoint support representing $n$-torsion
    elements of $\operatorname{Pic}^{0} C$ (this means $D_{1}, D_{2} \in \operatorname{Div}^{0}
    C$ and $nD_{1}, nD_{2} \in \operatorname{Princ} C$). Let $f_{1}, f_{2} \in k(C)^{\times}$
    be the unique normalized functions for which $nD_{1}=\operatorname{div} f_{1}$
    and $nD_{2}=\operatorname{div} f_{2}$. We then define $e_{n}(D_{1}, D_{2}):=\frac{f_{1}(D_{2})}{f_{2}(D_{1})}
    \in k^{\times}$. For each integer $n$, the map $(D_{1}, D_{2}) \mapsto e_{n}(D_{1},
    D_{2})$ is called the Weil pairing.
  kind: definition
  location: Section 23.4
  name: Definition 23.19
- description: Let $C/k$ be a smooth projective curve and let $f, g \in k(C)^{\times}$
    be functions whose divisors have disjoint support. Then $f(\operatorname{div}
    g)=g(\operatorname{div} f)$.
  kind: theorem
  location: Section 23.4
  name: Theorem 23.20
- description: The value of the Weil pairing $e_{n}(D_{1}, D_{2}) \in k^{\times}$
    depends only on the divisor classes of $D_{1}$ and $D_{2}$ and is an element of
    $\mu_{n} \subseteq k^{\times}$.
  kind: lemma
  location: Section 23.4
  name: Lemma 23.21
- description: 'Let $n$ be a positive integer, let $k$ be an algebraically closed
    field whose characteristic does not divide $n$, and let $C/k$ be a smooth projective
    curve. Let $D_1, D_2, D_3$ denote divisors with disjoint support that represent
    $n$-torsion elements of $\operatorname{Pic}^0 C$. The Weil pairing $e_n: (\operatorname{Pic}^0
    C)[n] \times (\operatorname{Pic}^0 C)[n] \to \mu_n$ satisfies:

    - Bilinear: $e_n(D_1 + D_2, D_3) = e_n(D_1, D_3) e_n(D_2, D_3)$;

    - Alternating: $e_n(D_1, D_2) = e_n(D_2, D_1)^{-1}$.'
  kind: theorem
  location: Section 23
  name: Theorem 23.22
- description: Let $E/k$ be an elliptic curve and let $P \in E(k)$. For each integer
    $n$ we recursively define the function $f_{n,P}$ via $$f_{0,P} = f_{1,P} := 1,
    \quad f_{n+1,P} := f_{n,P} G_{P,nP}, \quad f_{-n,P} := (f_{n,P} G_{nP,-nP})^{-1}$$
    where $G_{P,Q}$ is as in Definition 23.16.
  kind: definition
  location: Section 23.5
  name: Definition 23.23
- description: 'The functions $f_{n,P}$ satisfy the following properties:

    (i) $\operatorname{div} f_{n,P} = n[P] - (n-1)[0] - [nP]$;

    (ii) $f_{m+n,P} = f_{m,P} f_{n,P} G_{mP,nP}$;

    (iii) $f_{mn,P} = f_{m,P}^n f_{n,mP} = f_{n,P}^m f_{m,nP}$.'
  kind: lemma
  location: Section 23.5
  name: Lemma 23.24
- description: Let $E/k$ be an elliptic curve and let $n$ be a positive integer. For
    any $P, Q \in E(k)$ we can evaluate $f_{n,P}(Q)$ using $O(\log n)$ field operations
    in $k$.
  kind: corollary
  location: Section 23.5
  name: Corollary 23.25
- description: Let $E/k$ be an elliptic curve, let $n$ be a positive integer not divisible
    by the characteristic of $k$, and let $P, Q \in E(k)[n]$. For any point $T \notin
    \{0, Q, -P, Q-P\}$ on $E$ we have $$e_n(P, Q) = \frac{f_{n,Q}(T) f_{n,P}(Q-T)}{f_{n,P}(-T)
    f_{n,Q}(P+T)}.$$
  kind: lemma
  location: Section 23.5
  name: Lemma 23.26
- description: Let $E/k$ be an elliptic curve with distinct points $P, Q \in E(k)[n]$,
    where $n > 1$ is prime to the characteristic of $k$. Then $$e_n(P, Q) = (-1)^n
    \frac{f_{n,P}(Q)}{f_{n,Q}(P)}.$$
  kind: corollary
  location: Section 23.5
  name: Corollary 23.27
- description: 'Let $E/k$ be an elliptic curve and let $m$ and $n$ be positive integers
    prime to the characteristic of $k$. The Weil pairing $e_n: E[n] \times E[n] \to
    \mu_n$ satisfies the following properties.

    - Bilinear: $e_n(P+Q, R) = e_n(P, R) e_n(Q, R)$ and $e_n(P, Q+R) = e_n(P, Q) e_n(P,
    R)$;

    - Alternating: $e_n(P, P) = 1$ and $e_n(P, Q) = e_n(Q, P)^{-1}$;

    - Non-degenerate: If $P \neq 0$ then $e_n(P, Q) \neq 1$ for some $Q \in E[n]$;

    - Compatibility: $e_{mn}(P, Q) = e_n(mP, Q)$ for all $P \in E[mn]$ and $Q \in
    E[n]$;

    - Galois-equivariant: $e_n(P^{\sigma}, Q^{\sigma}) = e_n(P, Q)^{\sigma}$ for all
    $\sigma \in \operatorname{Gal}(\bar{k}/k)$;

    - Endomorphisms: $e_n(\alpha(P), \alpha(Q)) = e_n(P, Q)^{\deg \alpha}$ for all
    $\alpha \in \operatorname{End}(E)$;

    - Surjective: for each $P \in E[n]$ we have $\{e_n(P, Q) : Q \in E[n]\} = \mu_r$,
    where $r := |P|$.'
  kind: theorem
  location: Section 23.5
  name: Theorem 23.29
- description: Let $E/k$ be an elliptic curve and let $n$ be a positive integer prime
    to the characteristic of $k$. If $E[n] \subseteq E(k)$ then $\mu_n \subseteq k^{\times}$.
    In particular, if $k = \mathbb{Q}$ then $E[n] \subseteq E(k)$ can occur only for
    $n \leq 2$, and if $k = \mathbb{F}_q$ then $E[n] \subseteq E(k)$ can occur only
    if $q \equiv 1 \bmod n$.
  kind: corollary
  location: Section 23.5
  name: Corollary 23.30
- description: Let $E/k$ be an elliptic curve and let $P \in E(\bar{k})$ be a point
    of order $n$ prime to the characteristic of $k$. For every $Q \in E[n]$ the order
    of $e_n(P, Q)$ in $\mu_n$ is the largest integer $m$ for which $E[m] \subseteq
    \langle P, Q \rangle$, equivalently, the least integer $m$ for which $mQ \in \langle
    P \rangle$. In particular, $e_n(P, Q) = 1$ if and only if $\langle P, Q \rangle$
    is cyclic.
  kind: corollary
  location: Section 23.5
  name: Corollary 23.31
- description: Let $E / K$ be an elliptic curve over a field $K$ and let $n$ be a
    positive integer. The embedding degree of $E$ with respect to $n$ is the degree
    of the minimal extension $L / K$ for which $E[n] \subseteq E(L)$.
  kind: definition
  location: Section 23.7
  name: Definition 23.32
- description: Let $E / \mathbb{F}_{q}$ be an elliptic curve, let $n \perp q$ be a
    prime divisor of $\# E(\mathbb{F}_{q})$, and let $\pi_{n}$ denote the restriction
    of the Frobenius endomorphism $\pi_{E}$ to $\operatorname{End}(E[n]) \simeq \operatorname{GL}_{2}(\mathbb{Z}
    / n \mathbb{Z})$. Then either $E[n] \subseteq E(\mathbb{F}_{q})$ or $E[n] \simeq
    \ker(\pi_{n}-1) \oplus \ker(\pi_{n}-q)$, and the embedding degree of $E$ with
    respect to $n$ is the least integer $k>0$ such that $q^{k} \equiv 1 \bmod n$.
  kind: lemma
  location: Section 23.7
  name: Lemma 23.33
- description: 'Let $n>2$ be an integer and let $E / \mathbb{F}_{q}$ be an elliptic
    curve over a finite field with embedding degree $k$ with respect to $n$. The (modified)
    Tate pairing is the map $t_{n}: E[n] \times E[n] \rightarrow \mu_{n}$ defined
    by $t_{n}(P, Q):=\left(\frac{f_{n, P}(Q+T)}{f_{n, P}(T)}\right)^{(q^{k}-1)/n}$
    where $T \in E[n]-\{0, P,-Q, P-Q\}$.'
  kind: definition
  location: Section 23.8
  name: Definition 23.34
- description: Every semistable elliptic curve $E / \mathbb{Q}$ is modular.
  kind: theorem
  location: Section 24
  name: Theorem 24.1 (Taylor-Wiles)
- description: Every elliptic curve $E / \mathbb{Q}$ is modular.
  kind: theorem
  location: Section 24
  name: Theorem 24.2 (Breuil-Conrad-Diamond-Taylor)
- description: 'A holomorphic function $f: \mathbb{H} \rightarrow \mathbb{C}$ is a
    weak modular form of weight $k$ for a congruence subgroup $\Gamma$ if $f(\gamma
    \tau)=(c \tau+d)^{k} f(\tau)$ for all $\gamma=\left(\begin{smallmatrix}a & b \\
    c & d\end{smallmatrix}\right) \in \Gamma$.'
  kind: definition
  location: Section 24.1
  name: Definition 24.3
- description: A modular form $f$ is a weak modular form that is holomorphic at the
    cusps. Equivalently, $f$ is a weak modular form that extends to a holomorphic
    function on the extended upper half plane $\mathbb{H}^{*}=\mathbb{H} \cup \mathbb{P}^{1}(\mathbb{Q})$.
  kind: definition
  location: Section 24.1
  name: Definition 24.5
- description: A modular form is a cusp form if it vanishes at all the cusps. Equivalently,
    its $q$-expansion at every cusp has constant coefficient $a_{0}=0$.
  kind: definition
  location: Section 24.1
  name: Definition 24.6
- description: Let $\Gamma$ be a congruence subgroup. For $k=0$ we have $\dim M_{k}(\Gamma)=1$
    and $\dim S_{k}(\Gamma)=0$. For any even integer $k>0$ we have $\dim M_{k}(\Gamma)=(k-1)(g(\Gamma)-1)+\left\lfloor\frac{k}{4}\right\rfloor
    \nu_{2}+\left\lfloor\frac{k}{3}\right\rfloor \nu_{3}+\frac{k}{2} \nu_{\infty}$
    and if $k>2$ we also have $\dim S_{k}(\Gamma)=(k-1)(g(\Gamma)-1)+\left\lfloor\frac{k}{4}\right\rfloor
    \nu_{2}+\left\lfloor\frac{k}{3}\right\rfloor \nu_{3}+\left(\frac{k}{2}-1\right)
    \nu_{\infty}$. For $k=2$ we have $\dim S_{k}(\Gamma)=g(\Gamma)$.
  kind: theorem
  location: Section 24.1
  name: Theorem 24.8
- description: 'The operators $T_{n}$ and $R_{\lambda}$ satisfy the following: (i)
    $T_{n} R_{\lambda}=R_{\lambda} T_{n}$ and $R_{\lambda} R_{\mu}=R_{\lambda\mu}$.
    (ii) $T_{mn}=T_{m} T_{n}$ for all $m \perp n$. (iii) $T_{p^{r+1}}=T_{p^{r}} T_{p}-p
    T_{p^{r-1}} R_{p}$ for all primes $p$ and integers $r \geq 1$.'
  kind: theorem
  location: Section 24.2
  name: Theorem 24.11
- description: 'The subring of $\operatorname{End}(\operatorname{Div}(\mathcal{L}))$
    generated by $\{R_{p}, T_{p}: p \text{ prime}\}$ is commutative and contains all
    the Hecke operators $T_{n}$.'
  kind: corollary
  location: Section 24.2
  name: Corollary 24.12
- description: The Hecke operators $T_{n}$ for $M_{k}(\Gamma_{0}(1))$ satisfy $T_{mn}=T_{m}
    T_{n}$ for $m \perp n$ and $T_{p^{r+1}}=T_{p^{r}} T_{p}-p^{k-1} T_{p^{r-1}}$ for
    $p$ prime.
  kind: corollary
  location: Section 24.3
  name: Corollary 24.13
- description: For any $f \in S_{k}(\Gamma_{0}(1))$ and prime $p$ we have $$a_{n}(T_{p}
    f)= \begin{cases}a_{np}(f) & \text{if } p \nmid n, \\ a_{np}(f)+p^{k-1} a_{n/p}(f)
    & \text{if } p \mid n.\end{cases}$$
  kind: theorem
  location: Section 24.3
  name: Theorem 24.14
- description: For any modular form $f \in S_{k}(\Gamma_{0}(1))$ and integers $m \perp
    n$ we have $a_{m}(T_{n} f)=a_{mn}(f)$; in particular, $a_{1}(T_{n} f)=a_{n}(f)$.
  kind: corollary
  location: Section 24.3
  name: Corollary 24.15
- description: 'The Petersson inner product on $S_{k}(\Gamma)$ is defined by $$\langle
    f, g\rangle=\int_{\mathcal{F}} f(\tau) \overline{g(\tau)} y^{k-2} dx\, dy$$ where
    the integral ranges over points $\tau=x+yi$ in a fundamental region $\mathcal{F}
    \subseteq \mathbb{H}$ for $\Gamma$. It is a positive definite Hermitian form:
    it is bilinear in $f$ and $g$, it satisfies $\langle f, g\rangle=\overline{\langle
    g, f\rangle}$, and $\langle f, f\rangle \geq 0$ with equality only when $f=0$.
    It thus defines an inner product on the $\mathbb{C}$-vector space $S_{k}(\Gamma)$.'
  kind: definition
  location: Section 24.4
  name: Definition 24.18
- description: Let $V$ be a finite-dimensional $\mathbb{C}$-vector space equipped
    with a positive definite Hermitian form, and let $\alpha_{1}, \alpha_{2}, \ldots$
    be a sequence of commuting Hermitian operators. Then $V=\bigoplus_{i} V_{i}$,
    where each $V_{i}$ is an eigenspace of every $\alpha_{n}$.
  kind: lemma
  location: Section 24.4
  name: Lemma 24.19
- description: The space of cusp forms $S_{k}(\Gamma_{0}(1))$ is a direct sum of one-dimensional
    eigenspaces for the Hecke operators $T_{n}$ and has a unique basis of eigenforms
    $f(\tau)=\sum a_{n} q^{n}$, where each $a_{n}$ is the eigenvalue of $T_{n}$ on
    the one-dimensional subspace spanned by $f$.
  kind: theorem
  location: Section 24.4
  name: Theorem 24.20
- description: The space $S_{k}^{\text{new}}(\Gamma_{0}(N))$ is a direct sum of one-dimensional
    eigenspaces for the Hecke operators $T_{n}$ and has a unique basis of newforms
    $f(\tau)=\sum a_{n} q^{n}$, where each $a_{n}$ is the eigenvalue of $T_{n}$ on
    the one-dimensional subspace spanned by $f$.
  kind: theorem
  location: Section 24.4
  name: Theorem 24.21
- description: A Dirichlet series is a series of the form $$L(s)=\sum_{n \geq 1} a_{n}
    n^{-s}$$
  kind: definition
  location: Section 24.5
  name: Definition 24.22
- description: The $L$-function (or $L$-series) of a cusp form $f(\tau)=\sum_{n=1}^{\infty}
    a_{n} q^{n}$ of weight $k$ is the complex function defined by the Dirichlet series
    $L(f, s):=\sum_{n=1}^{\infty} a_{n} n^{-s}$ which converges locally uniformly
    to a holomorphic function on $\operatorname{re}(s)>1+k/2$.
  kind: definition
  location: Section 24.5
  name: Definition 24.24
- description: Let $f \in S_{k}(\Gamma_{0}(N))$. The $L$-function $L(f, s)$ extends
    analytically to a holomorphic function on $\mathbb{C}$, and the normalized $L$-function
    $\tilde{L}_{f}(s)=N^{s/2}(2\pi)^{-s} \Gamma(s) L(f, s)$ satisfies the functional
    equation $\tilde{L}_{f}(s)= \pm \tilde{L}_{f}(k-s)$.
  kind: theorem
  location: Section 24.5
  name: Theorem 24.25 (Hecke)
- description: Let $f \in S_{k}^{\text{new}}(\Gamma_{0}(N))$. The $L$-function $L(f,
    s)$ has the Euler product $L(f, s)=\sum_{n=1}^{\infty} a_{n} n^{-s}=\prod_{p}(1-a_{p}
    p^{-s}+\chi(p) p^{k-1} p^{-2s})^{-1}$ where $\chi(p)=0$ for $p \mid N$ and $\chi(p)=1$
    otherwise.
  kind: theorem
  location: Section 24.5
  name: Theorem 24.27
- description: The $L$-function of an elliptic curve $E/\mathbb{Q}$ is given by the
    Euler product $L(E, s)=\prod_{p} L_{p}(p^{-s})^{-1}=\prod_{p}(1-a_{p} p^{-s}+\chi(p)
    p p^{-2s})^{-1}$, where $\chi(p)$ is 0 if $E$ has bad reduction at $p$, and 1
    otherwise. For primes $p$ where $E$ has good reduction, $a_{p}:=p+1-\# E_{p}(\mathbb{F}_{p})$
    is the trace of Frobenius, where $E_{p}$ denotes the reduction of $E$ modulo $p$.
    Equivalently, $L_{p}(T)$ is the numerator of the zeta function $Z(E_{p}; T)=\exp(\sum_{n=1}^{\infty}
    \# E_{p}(\mathbb{F}_{p^{n}}) \frac{T^{n}}{n})=\frac{1-a_{p} T+p T^{2}}{(1-T)(1-p
    T)}$. For primes $p$ where $E$ has bad reduction, $L_{p}(T)=1$ if $E$ has additive
    reduction at $p$, $L_{p(T)=1-T$ if $E$ has split multiplicative reduction at $p$,
    and $L_{p}(T)=1+T$ if $E$ has non-split multiplicative reduction at $p$. This
    means that $a_{p} \in \{0, \pm 1\}$ at bad primes. The $L$-function $L(E, s)$
    converges to a holomorphic function on $\operatorname{re}(s)>3/2$.
  kind: definition
  location: Section 24.6
  name: Definition 24.28
- description: Let $E/\mathbb{Q}$ be an elliptic curve. A (global) minimal model for
    $E$ is an integral Weierstrass equation $y^{2}+a_{1} x y+a_{3} y=x^{3}+a_{2} x^{2}+a_{4}
    x+a_{6}$ with $a_{1}, a_{2}, a_{3}, a_{4}, a_{6} \in \mathbb{Z}$ that defines
    an elliptic curve that is isomorphic to $E$ and whose discriminant $\Delta_{\min}(E)$
    divides the discriminant of every integral Weierstrass equation for $E$.
  kind: definition
  location: Section 24.7
  name: Definition 24.29
- description: An elliptic curve $E/\mathbb{Q}$ is semi-stable if it does not have
    additive reduction at any prime.
  kind: definition
  location: Section 24.7
  name: Definition 24.30
- description: Let $E/\mathbb{Q}$ be a semi-stable elliptic curve with minimal discriminant
    $\Delta_{\min}(E)$. The conductor $N_{E}$ of $E$ is the product of the prime divisors
    of $\Delta_{\min}(E)$.
  kind: definition
  location: Section 24.8
  name: Definition 24.31
- description: An elliptic curve $E/\mathbb{Q}$ is modular if $f_{E}$ is a modular
    form.
  kind: definition
  location: Section 24.8
  name: Definition 24.32
- description: Every elliptic curve $E/\mathbb{Q}$ is modular.
  kind: theorem
  location: Section 24.8
  name: Theorem 24.33 (Modularity Theorem)
- description: Let $E$ be an elliptic curve over $\mathbb{Q}$. Then $L(E, s)$ has
    an analytic continuation to a holomorphic function on $\mathbb{C}$, and the normalized
    $L$-function $\tilde{L}_E(s) := N_E^{s/2}(2\pi)^{-s} \Gamma(s) L(E, s)$ satisfies
    the functional equation $\tilde{L}_E(s) = w_E \tilde{L}_E(2-s)$, where $w_E =
    \pm 1$.
  kind: corollary
  location: Section 24.9
  name: Corollary 24.34
- description: Let $E / \mathbb{Q}$ be an elliptic curve of rank $r$. Then $L(E, s)$
    has a zero of order $r$ at $s = 1$.
  kind: conjecture
  location: Section 24.9
  name: Conjecture 24.35 (Weak BSD)
- description: Let $E / \mathbb{Q}$ be an elliptic curve of rank $r$. Then the root
    number is given by $w_E = (-1)^r$.
  kind: conjecture
  location: Section 24.9
  name: Conjecture 24.36 (Parity Conjecture)
- description: Let $f = \sum a_n q^n \in S_2^{\text{new}}(\Gamma_0(N))$ be a newform
    with $a_n \in \mathbb{Z}$. There exists an elliptic curve $E / \mathbb{Q}$ of
    conductor $N$ for which $f_E = f$.
  kind: theorem
  location: Section 24.10
  name: Theorem 24.37 (Eichler-Shimura, Carayol)
- description: Let $E$ and $E'$ be elliptic curves over $\mathbb{Q}$ with $L$-functions
    $L(E, s) = \sum a_n n^{-s}$ and $L(E', s) = \sum a_n' n^{-s}$, respectively. If
    $a_p = a_p'$ for sufficiently many primes $p$ of good reduction for $E$ and $E'$,
    then $E$ and $E'$ are isogenous.
  kind: theorem
  location: Section 24.10
  name: Theorem 24.38 (Faltings-Tate)
- description: Elliptic curves $E, E' / \mathbb{Q}$ are isogenous if and only if $L(E,
    s) = L(E', s)$, equivalently, if and only if $E_p$ and $E_p'$ are isogenous modulo
    sufficiently many good primes $p$.
  kind: corollary
  location: Section 24.10
  name: Corollary 24.39
- description: 'Every odd irreducible Galois representation $\bar{\rho}: G_{\mathbb{Q}}
    \rightarrow \mathrm{GL}_{2}(\mathbb{Z} / \ell \mathbb{Z})$ is modular.'
  kind: conjecture
  location: Section 25.4
  name: Conjecture 25.1 (Serre's modularity conjecture)
- description: Let $\ell$ be prime, let $E$ be an elliptic curve of conductor $N=mN'$,
    where $m$ is the product of all primes $p \mid N$ such that $v_p(N)=1$ and $v_p(\Delta_{\min}(E))
    \equiv 0 \bmod \ell$. If $E$ is modular and $\bar{\rho}_{E,\ell}$ is irreducible,
    then $\bar{\rho}_{E,\ell}$ is modular of weight 2 and level $N'$.
  kind: theorem
  location: Section 25.4
  name: Theorem 25.2 (Ribet)
- description: The elliptic curve $E_{a,b,c}$ is not modular.
  kind: corollary
  location: Section 25.4
  name: Corollary 25.3
- description: Let $E/\mathbb{Q}$ be a semistable elliptic curve. If $\bar{\rho}_{E,\ell}$
    is modular, then $\rho_{E,\ell}$ is also modular (and therefore $E$ is modular).
  kind: theorem
  location: Section 25.5
  name: Theorem 25.4 (Taylor-Wiles)
- description: Let $E$ be an elliptic curve over $\mathbb{Q}$. If $\bar{\rho}_{E,3}$
    is irreducible, then it is modular.
  kind: theorem
  location: Section 25.6
  name: Theorem 25.5 (Langlands-Tunnel)
- description: No semistable elliptic curve $E/\mathbb{Q}$ admits a rational 15-isogeny.
  kind: theorem
  location: Section 25.6
  name: Theorem 25.6
- description: Let $E/\mathbb{Q}$ be a semistable elliptic curve for which $\bar{\rho}_{E,5}$
    is irreducible. There exists a semistable elliptic curve $E'/\mathbb{Q}$ such
    that $\bar{\rho}_{E',3}$ is irreducible and $\bar{\rho}_{E',5} \simeq \bar{\rho}_{E,5}$.
  kind: theorem
  location: Section 25.6
  name: Theorem 25.7 (Wiles)
- description: Let $E/\mathbb{Q}$ be a semistable elliptic curve. Then $E$ is modular.
  kind: theorem
  location: Section 25.6
  name: Theorem 25.8 (Wiles)
- description: $x^n + y^n = z^n$ has no integer solutions with $xyz \neq 0$ for $n
    > 2$.
  kind: corollary
  location: Section 25.6
  name: Corollary 25.9
