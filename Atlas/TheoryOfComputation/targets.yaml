    M on w halt with f(w) on the tape or reject. 2) Some branch of M on w does not
    reject.'
  kind: definition
  location: Lecture 20, NL = coNL (part 1/4)
  name: Definition
- description: NL = coNL
  kind: theorem
  location: Lecture 20, NL = coNL
