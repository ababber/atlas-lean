- description: If A_1, A_2 are regular languages, so is A_1 ∪ A_2 (the class of regular
    languages is closed under union).
  kind: theorem
  location: Lecture 1, Closure Properties for Regular Languages
  name: Theorem (Closure under union)
- description: If A_1, A_2 are regular languages, so is A_1 A_2 (the class of regular
    languages is closed under concatenation).
  kind: theorem
  location: Lecture 2, Closure under ∘ (concatenation)
  name: Theorem (Closure under concatenation)
- description: If A is a regular language, so is A* (the class of regular languages
    is closed under star).
  kind: theorem
  location: Lecture 2, Closure under * (star)
  name: Theorem (Closure under star)
- description: If an NFA recognizes A then A is regular.
  kind: theorem
  location: Lecture 2, Converting NFAs to DFAs
  name: Theorem (NFA to DFA conversion)
- description: If R is a regular expression and A = L(R) then A is regular.
  kind: theorem
  location: Lecture 2, Regular Expressions → NFA
  name: Theorem (Regular expressions to NFA)
- description: 'A finite automaton M is a 5-tuple (Q, Σ, δ, q_0, F) where Q is a finite
    set of states, Σ is a finite set of alphabet symbols, δ is a transition function
    δ: Q × Σ → Q, q_0 is the start state, and F is the set of accept states.'
  kind: definition
  location: Lecture 1, Finite Automata — Formal Definition
  name: Definition (Finite Automaton)
- description: 'M accepts string w = w_1 w_2 … w_n, each w_i ∈ Σ, if there is a sequence
    of states r_0, r_1, r_2, …, r_n ∈ Q where: r_0 = q_0, r_i = δ(r_{i-1}, w_i) for
    1 ≤ i ≤ n, and r_n ∈ F.'
  kind: definition
  location: Lecture 1, Finite Automata — Computation
  name: Definition (M accepts string w)
- description: A language is regular if some finite automaton recognizes it.
  kind: definition
  location: Lecture 1, Finite Automata — Computation
  name: Definition (Regular language)
- description: 'A nondeterministic finite automaton (NFA) N is a 5-tuple (Q, Σ, δ,
    q_0, F) where all components are the same as for a DFA except δ: Q × Σ_ε → P(Q),
    where Σ_ε = Σ ∪ {ε} and P(Q) = {R | R ⊆ Q} is the power set of Q.'
  kind: definition
  location: Lecture 2, NFA — Formal Definition
  name: Definition (Nondeterministic Finite Automaton)
- description: For every regular language A, there is a number p (the "pumping length")
    such that if s ∈ A and |s| ≥ p then s = xyz where 1) xy^i z ∈ A for all i ≥ 0,
    2) y ≠ ε, 3) |xy| ≤ p.
  kind: lemma
  location: Lecture 3
  name: Pumping Lemma
- description: Every GNFA G has an equivalent regular expression R.
  kind: lemma
  location: Lecture 3, section on GNFA → Regular Expressions
  name: Lemma (GNFA → Regular Expressions)
- description: 'A Generalized Nondeterministic Finite Automaton (GNFA) is similar
    to an NFA, but allows regular expressions as transition labels. For convenience
    we assume: one accept state, separate from the start state; one arrow from each
    state to each state, except (a) only exiting the start state and (b) only entering
    the accept state.'
  kind: definition
  location: Lecture 3, section on Generalized NFA
  name: Definition (Generalized Nondeterministic Finite Automaton)
- description: 'A Context Free Grammar (CFG) G is a 4-tuple (V, Σ, R, S) where V is
    a finite set of variables, Σ is a finite set of terminal symbols, R is a finite
    set of rules (rule form: V → (V ∪ Σ)*), and S is the start variable. For u, v
    ∈ (V ∪ Σ)*, write u ⇒ v if can go from u to v with one substitution step, and
    u ⇒* v if can go from u to v with some number of substitutions. L(G) = { w | w
    ∈ Σ* and S ⇒* w }.'
  kind: definition
  location: Lecture 4, section on CFG — Formal Definition
  name: Definition (Context Free Grammar)
- description: A is a Context Free Language (CFL) if A = L(G) for some CFG G.
  kind: definition
  location: Lecture 4, section on CFG — Formal Definition
  name: Definition (Context Free Language)
- description: 'A Pushdown Automaton (PDA) is a 6-tuple (Q, Σ, Γ, δ, q₀, F) where
    Σ is the input alphabet, Γ is the stack alphabet, and δ: Q × Σ_ε × Γ_ε → P(Q ×
    Γ_ε). Accept if some thread is in the accept state at the end of the input string.'
  kind: definition
  location: Lecture 4, section on PDA — Formal Definition
  name: Definition (Pushdown Automaton)
- description: If A is a CFL then some PDA recognizes A.
  kind: theorem
  location: Lecture 4, section on Converting CFGs to PDAs
  name: Theorem (Converting CFGs to PDAs)
- description: A is a CFL if and only if some PDA recognizes A.
  kind: theorem
  location: Lecture 4, section on Equivalence of CFGs and PDAs
  name: Theorem (Equivalence of CFGs and PDAs)
- description: A is T-recognizable iff A = L(E) for some T-enumerator E.
  kind: theorem
  location: Lecture 6, Turing Enumerators
  name: Theorem
- description: Every regular language is a CFL.
  kind: corollary
  location: Lecture 5, Equivalence of CFGs and PDAs, Corollaries
  name: Corollary 1
- description: If A is a CFL and B is regular then A ∩ B is a CFL.
  kind: corollary
  location: Lecture 5, Equivalence of CFGs and PDAs, Corollaries
  name: Corollary 2
- description: For every CFL A, there is a p such that if s ∈ A and |s| ≥ p then s
    = uvxyz where 1) uv^i xy^i z ∈ A for all i ≥ 0, 2) vy ≠ ε, 3) |vxy| ≤ p.
  kind: lemma
  location: Lecture 5, Proving languages not Context Free
  name: Pumping Lemma for CFLs
- description: 'A Turing Machine (TM) is a 7-tuple (Q, Σ, Γ, δ, q₀, q_acc, q_rej)
    where Σ is the input alphabet, Γ is the tape alphabet (Σ ⊆ Γ), and δ: Q × Γ →
    Q × Γ × {L, R} is the transition function (L = Left, R = Right). On input w a
    TM M may halt (enter q_acc or q_rej) or M may run forever (''loop''). So M has
    3 possible outcomes for each input w: 1. Accept w (enter q_acc), 2. Reject w by
    halting (enter q_rej), 3. Reject w by looping (running forever).'
  kind: definition
  location: Lecture 5, TM — Formal Definition
  name: 'Definition: Turing Machine'
- description: A is Turing-recognizable if A = L(M) for some TM M.
  kind: definition
  location: Lecture 5, TM Recognizers and Deciders
  name: 'Definition: Turing-recognizable'
- description: TM M is a decider if M halts on all inputs. Say that M decides A if
    A = L(M) and M is a decider.
  kind: definition
  location: Lecture 5, TM Recognizers and Deciders
  name: 'Definition: Decider'
- description: A is Turing-decidable if A = L(M) for some TM decider M.
  kind: definition
  location: Lecture 5, TM Recognizers and Deciders
  name: 'Definition: Turing-decidable'
- description: A Turing Enumerator is a deterministic TM with a printer. It starts
    on a blank tape and it can print strings w₁, w₂, w₃, ... possibly going forever.
    Its language is the set of all strings it prints. It is a generator, not a recognizer.
    For enumerator E we say L(E) = {w | E prints w}.
  kind: definition
  location: Lecture 6, Turing Enumerators
  name: 'Definition: Turing Enumerator'
- description: If $A$ and $\overline{A}$ are T-recognizable then $A$ is decidable.
  kind: theorem
  location: Lecture 8
  name: Theorem
- description: Can convert every CFG into CNF.
  kind: lemma
  location: Lecture 7
  name: Lemma 1
- description: If H is in CNF and $w \in L(H)$ then every derivation of w has $2|w|-1$
    steps.
  kind: lemma
  location: Lecture 7
  name: Lemma 2
- description: A set is countable if it is finite or it has the same size as $\mathbb{N}$.
  kind: definition
  location: Lecture 8
  name: Definition
- description: $\mathcal{L}$ (the set of all languages) is uncountable.
  kind: corollary
  location: Lecture 8
  name: Corollary 1
- description: Some language is not decidable.
  kind: corollary
  location: Lecture 8
  name: Corollary 2
