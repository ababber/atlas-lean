- description: 'Let f: ℕ → ℕ where f(n) ≥ n. Say TM M runs in space f(n) if M always
    halts and uses at most f(n) tape cells on all inputs of length n. An NTM M runs
    in space f(n) if all branches halt and each branch uses at most f(n) tape cells
    on all inputs of length n. SPACE(f(n)) = {B | some 1-tape TM decides B in space
    O(f(n))}. NSPACE(f(n)) = {B | some 1-tape NTM decides B in space O(f(n))}.'
  kind: definition
  location: 'Lecture 18, Review: SPACE Complexity'
  name: Definition (SPACE and NSPACE)
- description: PSPACE = ∪_k SPACE(n^k) (polynomial space). NPSPACE = ∪_k NSPACE(n^k)
    (nondeterministic polynomial space).
  kind: definition
  location: 'Lecture 18, Review: SPACE Complexity'
  name: Definition (PSPACE and NPSPACE)
- description: For f(n) ≥ n, NSPACE(f(n)) ⊆ SPACE(f²(n)).
  kind: theorem
  location: Lecture 18, PSPACE = NPSPACE
  name: Savitch's Theorem
- description: A configuration for M on w is (q, p_1, p_2, t) where q is a state,
