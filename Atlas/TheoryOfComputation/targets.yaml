- description: If $p(x) \neq 0$ is a polynomial of degree $\leq d$ then $p$ has $\leq
    d$ roots.
  kind: lemma
  location: Lecture 24, Roots of Polynomials
  name: Polynomial Lemma
- description: If $p_1(x)$ and $p_2(x)$ are both degree $\leq d$ and $p_1 \neq p_2$
    then $p_1(a) = p_2(a)$ for $\leq d$ values $a$.
  kind: corollary
  location: Lecture 24, Roots of Polynomials
  name: Corollary 1
- description: If $p(x) \neq 0$ has degree $\leq d$ and we pick a random $r \in \mathbb{F}_q$,
    then $\Pr[p(r) = 0] \leq \frac{d}{q}$.
  kind: corollary
  location: Lecture 24, Roots of Polynomials
  name: Corollary 2
- description: If $p(x_1, \ldots, x_m) \neq 0$ has degree $\leq d$ in each $x_i$ and
    we pick random $r_1, \ldots, r_m \in \mathbb{F}_q$ then $\Pr[p(r_1, \ldots, r_m)
    = 0] \leq \frac{dm}{q}$.
  kind: theorem
