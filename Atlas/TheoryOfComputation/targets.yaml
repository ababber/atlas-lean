    {⟨φ⟩ | Player ∃ has a forced win on φ} = TQBF.
  kind: claim
  location: Lecture 19
  name: Claim (Formula Game and TQBF)
- description: L = SPACE(log n). NL = NSPACE(log n).
  kind: definition
  location: Lecture 19
  name: Definition (L and NL)
