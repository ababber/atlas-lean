  kind: theorem
  location: Lecture 12, Deciding A = {a^k b^k | k ≥ 0} faster
  name: Theorem (Deciding A = {a^k b^k | k ≥ 0} in O(n log n))
- description: A_LBA is decidable, where A_LBA = {⟨B, w⟩ | LBA B accepts w}.
  kind: theorem
  location: Lecture 10, Linearly Bounded Automata section
  name: Theorem (A_LBA is decidable)
- description: PCP is undecidable, where PCP = {⟨P⟩ | P has a match}.
  kind: theorem
  location: Lecture 10, PCP is undecidable section
  name: Theorem (PCP is undecidable)
- description: ALL_CFG is undecidable, where ALL_CFG = {⟨G⟩ | G is a CFG and L(G)
    = Σ*}.
  kind: theorem
  location: Lecture 10, ALL_CFG is undecidable section
  name: Theorem (ALL_CFG is undecidable)
- description: There is a TM SELF which (on any input) halts with ⟨SELF⟩ on the tape.
  kind: theorem
  location: Lecture 11, A Self-Reproducing TM section
  name: Theorem (Self-Reproducing TM)
- description: 'There is a computable function q: Σ* → Σ* such that q(w) = ⟨P_w⟩ for
    every w, where P_w is the TM P_w = "Print w on the tape and halt".'
  kind: lemma
  location: Lecture 11, A Self-Reproducing TM section
  name: Lemma (Computable function q)
- description: For any TM T there is a TM R where for all w, R on input w operates
    in the same way as T on input ⟨w, R⟩.
  kind: theorem
  location: Lecture 11, The Recursion Theorem section
  name: Theorem (Recursion Theorem)
- description: A_TM is not decidable.
  kind: theorem
  location: 'Lecture 11, Ex 1: A_TM is undecidable - new proof section'
  name: Theorem (A_TM is undecidable - new proof)
- description: M is a minimal TM if |⟨M'⟩| < |⟨M⟩| → L(M') ≠ L(M). Thus, a minimal
    TM has the shortest description among all equivalent TMs. MIN_TM = {⟨M⟩ | M is
    a minimal TM}.
  kind: definition
  location: 'Lecture 11, Ex 3: MIN_TM is T-unrecognizable section'
  name: Definition (Minimal TM)
- description: MIN_TM is T-unrecognizable.
  kind: theorem
  location: 'Lecture 11, Ex 3: MIN_TM is T-unrecognizable section'
  name: Theorem (MIN_TM is T-unrecognizable)
- description: In any reasonable formal system, some true statements are not provable.
  kind: theorem
  location: Lecture 11, Intro to Mathematical Logic section
  name: Theorem (Gödel's First Incompleteness Theorem)
- description: (1) φ_U has no proof. (2) φ_U is true. Where φ_U is the statement ⟨R,
    0⟩ ∈ \overline{A_{TM}} and R is a TM that on any input obtains ⟨R⟩, uses it to
    obtain φ_U, and for each possible proof π tests if π is a proof that φ_U is true,
    accepting if yes.
  kind: theorem
  location: Lecture 11, A True but Unprovable Statement section
  name: Theorem (A True but Unprovable Statement)
- description: 'For any computable function f: Σ* → Σ*, there is a TM R such that
    L(R) = L(S) where f(⟨R⟩) = ⟨S⟩.'
  kind: theorem
  location: 'Lecture 11, Ex 2: Fixed-point Theorem section'
  name: Theorem (Fixed-point Theorem)
- description: If A ≤_P B and B ∈ P then A ∈ P.
  kind: theorem
  location: Lecture 14, section on Polynomial Time Reducibility
  name: Theorem
- description: A is polynomial time reducible to B (A ≤_P B) if A ≤_m B by a reduction
    function that is computable in polynomial time.
  kind: definition
  location: Lecture 14, section on Polynomial Time Reducibility
  name: Definition
- description: $SAT = \{\langle \phi \rangle \mid \phi \text{ is a satisfiable Boolean
    formula}\}$
  kind: definition
  location: Lecture 14
  name: Definition (SAT)
- description: $3SAT$ is NP-complete.
  kind: theorem
  location: Lecture 16, 3SAT is NP-complete
  name: Theorem (3SAT is NP-complete)
- description: $SAT \in P \rightarrow P = NP$.
  kind: theorem
  location: Lecture 15, Quick Review
  name: Cook-Levin Theorem
- description: A Boolean formula $\phi$ is in Conjunctive Normal Form (CNF) if it
    has the form $\phi = (x \lor \overline{y} \lor z) \land (\overline{x} \lor \overline{s}
    \lor z \lor u) \land \cdots \land (\overline{z} \lor \overline{u})$, where a literal
    is a variable or a negated variable, a clause is an OR ($\lor$) of literals, and
    a CNF is an AND ($\land$) of clauses. A 3CNF is a CNF with exactly 3 literals
    in each clause.
  kind: definition
  location: 'Lecture 15, $\leq_P$ Example: 3SAT and CLIQUE'
  name: Definition (Conjunctive Normal Form)
- description: $3SAT = \{\langle \phi \rangle \mid \phi \text{ is a satisfiable 3CNF
    formula}\}$
  kind: definition
  location: 'Lecture 15, $\leq_P$ Example: 3SAT and CLIQUE'
  name: Definition (3SAT)
- description: A $k$-clique in a graph is a subset of $k$ nodes all directly connected
    by edges. $CLIQUE = \{\langle G, k \rangle \mid \text{graph } G \text{ contains
    a } k\text{-clique}\}$.
  kind: definition
  location: 'Lecture 15, $\leq_P$ Example: 3SAT and CLIQUE'
  name: Definition (k-clique and CLIQUE)
- description: $CLIQUE \in P \rightarrow 3SAT \in P$.
  kind: corollary
  location: Lecture 15, $3SAT \leq_P CLIQUE$ conclusion
  name: Corollary ($CLIQUE \in P \rightarrow 3SAT \in P$)
- description: $B$ is NP-complete if 1) $B \in NP$, and 2) for all $A \in NP$, $A
    \leq_P B$.
  kind: definition
  location: Lecture 15, NP-completeness
  name: Definition (NP-complete)
- description: $HAMPATH$ is NP-complete.
  kind: theorem
  location: Lecture 15, HAMPATH is NP-complete
  name: Theorem (HAMPATH is NP-complete)
- description: $B$ is NP-complete if 1) $B \in NP$, and 2) for all $A \in NP$, $A
    \leq_P B$.
  kind: definition
  location: Lecture 16, Quick Review
  name: Definition (NP-complete, restated)
- description: Let $f\colon \mathbb{N} \to \mathbb{N}$ where $f(n) \ge n$. Say TM
    $M$ runs in space $f(n)$ if $M$ always halts and uses at most $f(n)$ tape cells
    on all inputs of length $n$.
  kind: definition
  location: Lecture 17, SPACE Complexity
  name: Definition (SPACE complexity)
- description: 'For $t(n) \ge n$: 1) $\mathsf{TIME}(t(n)) \subseteq \mathsf{SPACE}(t(n))$;
    2) $\mathsf{SPACE}(t(n)) \subseteq \mathsf{TIME}(2^{O(t(n))}) = \bigcup_c \mathsf{TIME}(c^{t(n)})$.'
  kind: theorem
  location: Lecture 17, Relationships between Time and SPACE Complexity
  name: Theorem (Relationships between Time and Space Complexity)
- description: $P \subseteq PSPACE$.
  kind: corollary
  location: Lecture 17, Relationships between Time and SPACE Complexity
  name: Corollary ($P \subseteq PSPACE$)
- description: $NP \subseteq PSPACE$.
  kind: theorem
  location: Lecture 17, $NP \subseteq PSPACE$
  name: Theorem ($NP \subseteq PSPACE$)
- description: $coNP = \{\overline{A} \mid A \in NP\}$.
  kind: definition
  location: Lecture 17, $NP \subseteq PSPACE$
  name: Definition (coNP)
- description: A quantified Boolean formula (QBF) is a Boolean formula with leading
    $\exists x$ and $\forall x$ quantifiers, where all variables must lie within the
    scope of a quantifier. A QBF is True or False. $TQBF = \{\langle \phi \rangle
    \mid \phi \text{ is a QBF that is TRUE}\}$.
  kind: definition
  location: 'Lecture 17, Example: TQBF'
  name: Definition (Quantified Boolean Formula and TQBF)
- description: $TQBF \in PSPACE$.
  kind: theorem
  location: Lecture 17, $TQBF \in PSPACE$
  name: Theorem ($TQBF \in PSPACE$)
- description: $SAT$ is NP-complete.
  kind: theorem
  location: Lecture 15, Quick Review section
  name: Cook-Levin Theorem (NP-completeness of SAT)
- description: An (accepting) tableau for NTM $M$ on $w$ is an $n^k \times n^k$ table
    representing a computation history for $M$ on $w$ on an accepting branch of the
    nondeterministic computation.
  kind: definition
  location: Lecture 16, Tableau for M on w section
  name: Definition (Tableau)
- description: A ladder is a sequence of strings of a common length where consecutive
    strings differ in a single symbol. A ladder in a language $A$ is a ladder of strings
    in $A$. $LADDER_{DFA} = \{\langle B, u, v \rangle | B \text{ is a DFA and } L(B)
    \text{ contains a ladder } y_1, y_2, \dots, y_k \text{ where } y_1 = u \text{
    and } y_k = v \}$.
  kind: definition
  location: 'Lecture 17, Example: Ladder Problem section'
  name: Definition ($LADDER_{DFA}$)
- description: '$SAT$ is NP-complete. Proof: 1) $SAT \in NP$. 2) For each $A \in NP$,
    $A \leq_P SAT$: Let $A \in NP$ be decided by NTM $M$ in time $n^k$. Give a polynomial-time
    reduction $f$ mapping $A$ to SAT: $f(w) = \langle \phi_{M,w} \rangle$ where $w
    \in A$ iff $\phi_{M,w}$ is satisfiable. The formula $\phi_{M,w} = \phi_{\text{cell}}
    \wedge \phi_{\text{start}} \wedge \phi_{\text{move}} \wedge \phi_{\text{accept}}$
    simulates $M$ on $w$. The size of $\phi_{M,w}$ is $O(n^{2k})$, so $f$ is computable
    in polynomial time.'
  kind: theorem
  location: Lecture 16, Cook-Levin Theorem (idea) and Conclusion sections
  name: Theorem (SAT is NP-complete)
- description: LADDER_DFA ∈ NPSPACE.
  kind: theorem
  location: Lecture 17
  name: Theorem (LADDER_DFA ∈ NPSPACE)
- description: LADDER_DFA ∈ PSPACE.
  kind: theorem
  location: Lecture 17
  name: Theorem (LADDER_DFA ∈ PSPACE)
- description: LADDER_DFA ∈ SPACE(n²). Write u →^b v if there's a ladder from u to
    v of length ≤ b. A recursive procedure solves the bounded DFA ladder problem BOUNDED-LADDER_DFA
    = {⟨B, u, v, b⟩ | B a DFA and u →^b v by a ladder in L(B)}. Each recursive level
    uses space O(n) (to record w). Recursion depth is log t = O(m) = O(n). Total space
    used is O(n²).
  kind: theorem
  location: Lecture 17
  name: Theorem (LADDER_DFA ∈ SPACE(n²))
- description: B is PSPACE-complete if (1) B ∈ PSPACE, and (2) for all A ∈ PSPACE,
