- description: 'For any f: N → N (where f satisfies a technical condition) there is
    a language A where A requires O(f(n)) space, i.e, 1) A is decidable in O(f(n))
    space, and 2) A is not decidable in o(f(n)) space. In other words, SPACE(o(f(n)))
    ⊊ SPACE(f(n)).'
  kind: theorem
  location: Space Hierarchy Theorem (1/2)
  name: Theorem (Space Hierarchy Theorem)
- description: 'For any f: N → N where f is time constructible there is a language
    A where A requires O(f(n)) time, i.e, 1) A is decidable in O(f(n)) time, and 2)
    A is not decidable in o(f(n)/log(f(n))) time. In other words, TIME(o(f(n)/log(f(n))))
    ⊊ TIME(f(n)).'
  kind: theorem
  location: Time Hierarchy Theorem (1/2)
  name: Theorem (Time Hierarchy Theorem)
- description: 'For any f: N → N (where f satisfies a technical condition) there is
    a language A where A requires O(f(n)) space, i.e, 1) A is decidable in O(f(n))
    space, and 2) A is not decidable in o(f(n)) space. In other words, SPACE(o(f(n)))
    ⊊ SPACE(f(n)).'
  kind: theorem
  location: Space Hierarchy Theorem (1/2)
  name: Space Hierarchy Theorem
- description: 'For any f: N → N where f is time constructible there is a language
    A where A requires O(f(n)) time, i.e, 1) A is decidable in O(f(n)) time, and 2)
    A is not decidable in o(f(n)/log(f(n))) time. In other words, TIME(o(f(n)/log(f(n))))
    ⊊ TIME(f(n)).'
  kind: theorem
  location: Time Hierarchy Theorem (1/2)
  name: Time Hierarchy Theorem
